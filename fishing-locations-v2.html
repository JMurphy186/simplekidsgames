<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch & Reel — Fishing Locations v2</title>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Baloo+2:wght@500;700;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #040810;
    color: #e8f0ff;
    font-family: 'Baloo 2', sans-serif;
    overflow-x: hidden;
  }
  .header {
    text-align: center;
    padding: 40px 24px 4px;
  }
  .header h1 {
    font-family: 'Luckiest Guy', cursive;
    font-size: 38px;
    background: linear-gradient(135deg, #22C1C3, #6af0ff, #22C1C3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 3px;
  }
  .header .sub {
    font-size: 14px;
    color: #4a6a8a;
    margin-top: 6px;
  }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 18px 10px 14px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 10px 18px;
    border-radius: 12px;
    border: 2px solid #14243a;
    background: linear-gradient(145deg, #0a1520, #0d1a2e);
    color: #4a6a8a;
    font-family: 'Luckiest Guy', cursive;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.35s;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }
  .tab::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.02));
    pointer-events: none;
  }
  .tab:hover { border-color: #2a4a6a; color: #7aa0c0; transform: translateY(-1px); }
  .tab.active { border-color: var(--accent, #22C1C3); color: var(--accent, #22C1C3); background: linear-gradient(145deg, rgba(34,193,195,0.06), rgba(34,193,195,0.02)); box-shadow: 0 0 20px rgba(34,193,195,0.08); }
  .tab .unlock {
    font-family: 'Baloo 2', sans-serif;
    font-size: 10px;
    opacity: 0.55;
    display: block;
    margin-top: -1px;
    letter-spacing: 0.5px;
  }
  .scene-outer {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px 24px;
  }
  .scene-frame {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    border: 2px solid #14243a;
    box-shadow: 0 12px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  canvas { display: block; width: 100%; height: auto; }
  .overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.75) 70%);
    padding: 50px 28px 22px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .overlay-left {}
  .scene-name {
    font-family: 'Luckiest Guy', cursive;
    font-size: 30px;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    line-height: 1.1;
  }
  .scene-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-top: 4px;
    max-width: 440px;
    line-height: 1.4;
  }
  .badge {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .overlay-right {
    text-align: right;
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    line-height: 1.5;
  }
  .overlay-right .boost {
    color: var(--accent, #22C1C3);
    font-weight: 700;
  }
  .detail-bar {
    display: flex;
    gap: 1px;
    overflow: hidden;
    border-radius: 0 0 16px 16px;
    font-size: 12px;
  }
  .detail-bar .cell {
    flex: 1;
    padding: 10px 14px;
    background: #080f1a;
    text-align: center;
    color: #4a6a8a;
    border-top: 1px solid #14243a;
  }
  .detail-bar .cell strong {
    display: block;
    color: #8ab0d0;
    font-size: 13px;
  }
  .detail-bar .cell em {
    font-style: normal;
    color: var(--accent, #22C1C3);
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎣 FISHING LOCATIONS</h1>
  <div class="sub">5 unique scenes unlocked by lifetime catches · Each with its own atmosphere and fish pool</div>
</div>

<div class="tabs" id="tabs"></div>

<div class="scene-outer">
  <div class="scene-frame">
    <canvas id="C" width="960" height="540"></canvas>
    <div class="overlay">
      <div class="overlay-left">
        <div class="scene-name" id="sName">Wooden Dock</div>
        <div class="scene-sub" id="sSub"></div>
        <div class="badge" id="sBadge"></div>
      </div>
      <div class="overlay-right" id="sPool"></div>
    </div>
    <div class="detail-bar" id="sBar"></div>
  </div>
</div>

<script>
const C = document.getElementById('C');
const ctx = C.getContext('2d');
const W = 960, H = 540;
let cur = 0, frame = 0, P = [];

const WATER_LINE = 0.58;

const S = [
  {
    name: 'Wooden Dock',
    sub: 'Where every angler begins. Starlit sky, twinkling constellations, shooting stars, and a warm lantern glowing over calm dark water.',
    unlock: '🎣 Default', unlockBg: 'rgba(34,193,195,0.12)', unlockCol: '#22C1C3', accent: '#22C1C3',
    pool: 'Balanced · base odds',
    bar: [
      { label: 'Common', val: 'Standard' },
      { label: 'Rare', val: 'Standard' },
      { label: 'Exotic', val: 'Standard' },
      { label: 'Bonus', val: 'None', em: false }
    ]
  },
  {
    name: 'Sunny Pier',
    sub: 'A bright coastal dock with seagulls riding the breeze, a distant lighthouse, puffy clouds, and sunlight dancing on turquoise water.',
    unlock: '🔓 50 catches', unlockBg: 'rgba(255,210,60,0.12)', unlockCol: '#f0c830', accent: '#f0c830',
    pool: 'Easy pickings',
    bar: [
      { label: 'Common', val: '+15%', em: true },
      { label: 'Uncommon', val: '+10%', em: true },
      { label: 'Rare', val: 'Standard' },
      { label: 'Bonus', val: 'Best for new collections', em: false }
    ]
  },
  {
    name: 'Coral Reef',
    sub: 'Tropical sunset over a shallow reef. Palm silhouettes frame warm water where colorful fish dart below the surface and coral sways gently.',
    unlock: '🔓 100 catches', unlockBg: 'rgba(255,120,70,0.12)', unlockCol: '#ff8855', accent: '#ff8855',
    pool: 'Rare hunting ground',
    bar: [
      { label: 'Rare', val: '2×', em: true },
      { label: 'Ultra Rare', val: '+50%', em: true },
      { label: 'Epic', val: 'Standard' },
      { label: 'Bonus', val: 'Best rare rates in game', em: false }
    ]
  },
  {
    name: 'Deep Sea',
    sub: 'Open ocean under storm clouds. Your boat rocks in heavy swells as lightning cracks the sky, rain hammers the water, and monsters lurk below.',
    unlock: '🔓 200 catches', unlockBg: 'rgba(100,150,210,0.12)', unlockCol: '#7ab0e0', accent: '#7ab0e0',
    pool: 'Monster territory',
    bar: [
      { label: 'Epic', val: '2×', em: true },
      { label: 'Legendary', val: '+50%', em: true },
      { label: 'Exotic', val: 'Standard' },
      { label: 'Bonus', val: 'Heavyweights only', em: false }
    ]
  },
  {
    name: 'Volcano Cove',
    sub: 'A hidden volcanic cove. Ember particles drift upward, lava veins pulse in obsidian walls, and the rarest creatures surface from the deep.',
    unlock: '🔓 300 catches', unlockBg: 'rgba(255,80,30,0.12)', unlockCol: '#ff6030', accent: '#ff6030',
    pool: 'Exotic paradise',
    bar: [
      { label: 'Exotic', val: '3×', em: true },
      { label: 'Legendary', val: '2×', em: true },
      { label: 'Epic', val: '+50%', em: true },
      { label: 'Bonus', val: 'Best exotics in game', em: false }
    ]
  }
];

// Build tabs
const tabsEl = document.getElementById('tabs');
S.forEach((s, i) => {
  const t = document.createElement('div');
  t.className = 'tab' + (i===0?' active':'');
  t.style.setProperty('--accent', s.accent);
  t.innerHTML = `${s.name}<span class="unlock">${s.unlock.replace(/^[^\s]+\s/, '')}</span>`;
  t.onclick = () => show(i);
  tabsEl.appendChild(t);
});

function show(i) {
  cur = i; frame = 0;
  document.querySelectorAll('.tab').forEach((t, j) => {
    t.classList.toggle('active', j===i);
    t.style.setProperty('--accent', S[j].accent);
  });
  document.documentElement.style.setProperty('--accent', S[i].accent);
  document.getElementById('sName').textContent = S[i].name;
  document.getElementById('sSub').textContent = S[i].sub;
  const b = document.getElementById('sBadge');
  b.textContent = S[i].unlock;
  b.style.background = S[i].unlockBg;
  b.style.color = S[i].unlockCol;
  document.getElementById('sPool').innerHTML = `<span class="boost">${S[i].pool}</span>`;
  document.getElementById('sBar').innerHTML = S[i].bar.map(c =>
    `<div class="cell"><strong>${c.em ? '<em>'+c.val+'</em>' : c.val}</strong>${c.label}</div>`
  ).join('');
  initP(i);
}

// ==================== PARTICLES ====================
function initP(s) {
  P = [];
  if (s === 0) {
    for (let i=0;i<150;i++) P.push({t:'star',x:R()*W,y:R()*H*WATER_LINE,r:R()*2+0.2,tw:R()*6.28,sp:0.015+R()*0.025,hue:200+R()*40});
    for (let i=0;i<3;i++) P.push({t:'shoot',x:-50,y:R()*120+30,vx:3+R()*3,vy:1+R()*1.2,life:0,ml:50+R()*50,del:R()*180});
    // Fireflies near dock
    for (let i=0;i<8;i++) P.push({t:'firefly',x:W*0.08+R()*W*0.22,y:H*0.35+R()*H*0.18,vx:(R()-0.5)*0.3,vy:(R()-0.5)*0.2,tw:R()*6.28});
  } else if (s === 1) {
    for (let i=0;i<6;i++) P.push({t:'cloud',x:R()*W*1.5-W*0.2,y:20+R()*80,w:90+R()*140,h:30+R()*25,sp:0.12+R()*0.2,op:0.55+R()*0.35});
    for (let i=0;i<5;i++) P.push({t:'gull',x:R()*W,y:50+R()*110,sp:0.4+R()*0.5,wi:0,ws:0.05+R()*0.03,sz:1+R()*0.5});
    for (let i=0;i<40;i++) P.push({t:'sparkle',x:R()*W,y:H*WATER_LINE+R()*H*0.12,tw:R()*6.28,sp:0.04+R()*0.04});
    // Gentle bobbing debris
    for (let i=0;i<3;i++) P.push({t:'floater',x:W*0.3+R()*W*0.5,y:H*WATER_LINE+5+R()*10,sp:0.1+R()*0.1,sz:2+R()*2});
  } else if (s === 2) {
    for (let i=0;i<4;i++) P.push({t:'cloud',x:R()*W*1.5-W*0.2,y:10+R()*50,w:70+R()*110,h:18+R()*15,sp:0.08+R()*0.12,op:0.25+R()*0.2});
    for (let i=0;i<3;i++) P.push({t:'bird',x:R()*W,y:25+R()*55,sp:0.25+R()*0.35,wi:0,ws:0.035+R()*0.02});
    for (let i=0;i<10;i++) P.push({t:'cfish',x:R()*W,y:H*0.65+R()*H*0.22,sp:0.25+R()*0.45,dir:R()>0.5?1:-1,hue:R()*80+140,sz:4+R()*5});
    // Fireflies/tropical sparkles
    for (let i=0;i<12;i++) P.push({t:'tfly',x:R()*W,y:H*0.2+R()*H*0.35,vx:(R()-0.5)*0.4,vy:(R()-0.5)*0.3,tw:R()*6.28,hue:30+R()*30});
  } else if (s === 3) {
    for (let i=0;i<250;i++) P.push({t:'rain',x:R()*W*1.2,y:R()*H,sp:6+R()*5,len:10+R()*16,wind:-2.5});
    for (let i=0;i<5;i++) P.push({t:'fog',x:R()*W*1.5-W*0.2,y:H*0.3+R()*H*0.2,w:160+R()*220,h:22+R()*25,sp:0.2+R()*0.35,op:0.08+R()*0.08});
    P.push({t:'ltn',timer:0,next:80+R()*200,flash:0,x:0,bolts:[]});
    // Sea spray
    for (let i=0;i<15;i++) P.push({t:'spray',x:R()*W,y:H*WATER_LINE-5+R()*10,vx:(R()-0.5)*2,vy:-1-R()*2,life:0,ml:30+R()*30});
  } else if (s === 4) {
    for (let i=0;i<80;i++) P.push({t:'ember',x:W*0.2+R()*W*0.6,y:H*0.5+R()*H*0.5,vx:(R()-0.5)*0.4,vy:-0.4-R()*1.8,life:0,ml:120+R()*220,r:0.8+R()*2.5,br:0.4+R()*0.6});
    for (let i=0;i<4;i++) P.push({t:'smoke',x:W*0.73+(R()-0.5)*25,y:H*0.04+R()*15,r:18+R()*25,vy:-0.25-R()*0.2,vx:(R()-0.5)*0.4,op:0.1+R()*0.08,life:0});
    for (let i=0;i<6;i++) P.push({t:'lglow',x:W*0.15+R()*W*0.7,y:H*WATER_LINE+R()*15,r:25+R()*45,ph:R()*6.28});
    // Ash flakes
    for (let i=0;i<30;i++) P.push({t:'ash',x:R()*W,y:R()*H,vx:(R()-0.5)*0.3,vy:0.2+R()*0.4,r:0.5+R()*1.5,tw:R()*6.28,op:0.15+R()*0.15});
  }
}

function R() { return Math.random(); }
function lerp(a,b,t) { return a+(b-a)*t; }

// ==================== DRAWING HELPERS ====================
function grad(y0,y1,stops) {
  let g = ctx.createLinearGradient(0,y0,0,y1);
  stops.forEach(s => g.addColorStop(s[0],s[1]));
  return g;
}
function radGrad(x,y,r0,r1,stops) {
  let g = ctx.createRadialGradient(x,y,r0,x,y,r1);
  stops.forEach(s => g.addColorStop(s[0],s[1]));
  return g;
}
function wave(yBase, count, amp, freq, speed, color, lw) {
  for (let i=0;i<count;i++) {
    let y = yBase + i*(H*0.045);
    ctx.beginPath(); ctx.moveTo(-5,y);
    for (let x=-5;x<=W+5;x+=3) ctx.lineTo(x, y + Math.sin(x*freq+frame*speed+i*1.1)*amp + Math.sin(x*freq*0.4+frame*speed*0.7)*amp*0.5);
    ctx.strokeStyle = color.replace('A', Math.max(0,(0.08-i*0.007)).toFixed(3));
    ctx.lineWidth = lw||1;
    ctx.stroke();
  }
}

// ==================== DOCK (shared across scenes 0, 1, 2) ====================
function drawDock(woodColor, shadowColor, plankHighlight, lanternWarm, waterReflect) {
  const DX = W*0.04, DY = H*WATER_LINE - 8, DW = W*0.28, DH = 10;
  
  // Dock shadow on water
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = shadowColor || '#000';
  ctx.beginPath();
  ctx.ellipse(DX+DW*0.5, DY+DH+20, DW*0.5, 8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  
  // Support posts going into water
  const posts = [0.08, 0.2, 0.32];
  posts.forEach(px => {
    let postX = W*px;
    // Post reflection in water
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = woodColor;
    ctx.fillRect(postX-3, DY+DH, 7, H*0.15);
    ctx.restore();
    // Post
    ctx.fillStyle = woodColor;
    ctx.fillRect(postX-3, DY-2, 7, DH+H*0.08);
    // Post cap
    ctx.fillStyle = plankHighlight;
    ctx.fillRect(postX-5, DY-4, 11, 4);
    // Cross brace
    if (px < 0.3) {
      ctx.strokeStyle = woodColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(postX+3, DY+DH);
      ctx.lineTo(W*(px+0.12)-3, DY+DH*0.5+H*0.04);
      ctx.stroke();
    }
  });
  
  // Main deck planks
  for (let i=0; i<7; i++) {
    let py = DY + i*1.4;
    ctx.fillStyle = i%2===0 ? woodColor : plankHighlight;
    ctx.fillRect(DX, py, DW, 1.4);
    // Plank gap
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(DX, py+1.3, DW, 0.3);
  }
  // Deck surface (main)
  ctx.fillStyle = woodColor;
  ctx.fillRect(DX, DY, DW, DH);
  // Plank lines on surface
  for (let i=0;i<8;i++) {
    let lx = DX + i*(DW/8);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(lx, DY, 0.5, DH);
  }
  // Front edge highlight
  ctx.fillStyle = plankHighlight;
  ctx.fillRect(DX, DY, DW, 1.5);
  
  // Rope coil on dock
  ctx.save();
  let rx = DX + DW*0.7, ry = DY - 2;
  ctx.strokeStyle = '#8a7a5a';
  ctx.lineWidth = 2;
  for (let i=0;i<3;i++) {
    ctx.beginPath();
    ctx.ellipse(rx, ry, 6-i*1.5, 3-i*0.8, 0.1, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();
  
  // === HANGING LANTERN ===
  let lx = DX + DW + 2, ly = DY - 6;
  // Tall post
  ctx.fillStyle = woodColor;
  ctx.fillRect(lx-3, DY-2, 6, DH + H*0.06);
  // Post cap
  ctx.fillStyle = plankHighlight;
  ctx.fillRect(lx-5, DY-4, 10, 4);
  
  // Lantern arm (curved bracket extending outward)
  let armTipX = lx + 20, armTipY = ly - 55;
  ctx.save();
  ctx.strokeStyle = '#3a3028';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  // Vertical pole
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(lx, ly - 60);
  ctx.stroke();
  // Curved arm
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(lx, ly - 58);
  ctx.quadraticCurveTo(lx+12, ly-62, armTipX, armTipY);
  ctx.stroke();
  // Decorative curl at top of pole
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(lx, ly-62, 4, Math.PI, 0);
  ctx.stroke();
  ctx.restore();
  
  // Chain/rope hanging from arm tip
  let chainLen = 15;
  let lanternY = armTipY + chainLen;
  // Subtle swing
  let swing = Math.sin(frame * 0.012) * 2;
  let lanternX = armTipX + swing;
  
  ctx.save();
  ctx.strokeStyle = '#5a5040';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 2]);
  ctx.beginPath();
  ctx.moveTo(armTipX, armTipY);
  ctx.lineTo(lanternX, lanternY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
  
  // Lantern body
  ctx.save();
  // Lantern cap (top)
  ctx.fillStyle = '#4a4035';
  ctx.beginPath();
  ctx.moveTo(lanternX-8, lanternY);
  ctx.lineTo(lanternX-5, lanternY-6);
  ctx.lineTo(lanternX+5, lanternY-6);
  ctx.lineTo(lanternX+8, lanternY);
  ctx.fill();
  // Ring at top
  ctx.beginPath();
  ctx.arc(lanternX, lanternY-6, 2, 0, Math.PI*2);
  ctx.fillStyle = '#5a5040';
  ctx.fill();
  
  // Glass housing
  let glassGrad = ctx.createLinearGradient(lanternX-7, lanternY, lanternX+7, lanternY);
  glassGrad.addColorStop(0, 'rgba(60,50,30,0.7)');
  glassGrad.addColorStop(0.3, lanternWarm || 'rgba(255,200,80,0.4)');
  glassGrad.addColorStop(0.7, lanternWarm || 'rgba(255,200,80,0.35)');
  glassGrad.addColorStop(1, 'rgba(60,50,30,0.7)');
  ctx.fillStyle = glassGrad;
  ctx.fillRect(lanternX-7, lanternY, 14, 18);
  // Glass frame lines
  ctx.strokeStyle = '#4a4035';
  ctx.lineWidth = 1;
  ctx.strokeRect(lanternX-7, lanternY, 14, 18);
  ctx.beginPath();
  ctx.moveTo(lanternX, lanternY);
  ctx.lineTo(lanternX, lanternY+18);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(lanternX-7, lanternY+9);
  ctx.lineTo(lanternX+7, lanternY+9);
  ctx.stroke();
  
  // Lantern bottom
  ctx.fillStyle = '#4a4035';
  ctx.fillRect(lanternX-8, lanternY+18, 16, 3);
  // Small finial hanging
  ctx.fillRect(lanternX-1, lanternY+21, 2, 4);
  
  // FLAME inside lantern
  let flicker = Math.sin(frame*0.08)*0.5 + Math.sin(frame*0.13)*0.3;
  ctx.beginPath();
  ctx.moveTo(lanternX-2, lanternY+14);
  ctx.quadraticCurveTo(lanternX-3+flicker, lanternY+6, lanternX, lanternY+4);
  ctx.quadraticCurveTo(lanternX+3+flicker, lanternY+6, lanternX+2, lanternY+14);
  ctx.fillStyle = 'rgba(255,200,60,0.9)';
  ctx.fill();
  // Inner flame
  ctx.beginPath();
  ctx.moveTo(lanternX-1, lanternY+13);
  ctx.quadraticCurveTo(lanternX-1+flicker*0.5, lanternY+8, lanternX, lanternY+6);
  ctx.quadraticCurveTo(lanternX+1+flicker*0.5, lanternY+8, lanternX+1, lanternY+13);
  ctx.fillStyle = 'rgba(255,255,200,0.8)';
  ctx.fill();
  
  // Lantern warm glow — large radius
  let glowR = 80 + Math.sin(frame*0.06)*8;
  ctx.beginPath();
  ctx.arc(lanternX, lanternY+9, glowR, 0, Math.PI*2);
  ctx.fillStyle = radGrad(lanternX, lanternY+9, 5, glowR, [
    [0, 'rgba(255,190,60,0.12)'],
    [0.3, 'rgba(255,160,40,0.06)'],
    [0.7, 'rgba(255,120,20,0.02)'],
    [1, 'rgba(255,100,10,0)']
  ]);
  ctx.fill();
  
  // Light reflection on water
  if (waterReflect !== false) {
    ctx.save();
    ctx.globalAlpha = 0.06 + Math.sin(frame*0.03)*0.02;
    for (let i=0;i<8;i++) {
      let wy = H*WATER_LINE + 10 + i*8;
      let ww = 4 + Math.sin(frame*0.02+i*0.5)*2;
      ctx.fillStyle = 'rgba(255,180,60,0.4)';
      ctx.fillRect(lanternX-ww+Math.sin(frame*0.015+i)*2, wy, ww*2, 1.5);
    }
    ctx.restore();
  }
  ctx.restore();
}

// ==================== SCENE 0: WOODEN DOCK — NIGHT ====================
function draw0() {
  // Sky
  ctx.fillStyle = grad(0, H*WATER_LINE, [[0,'#030810'],[0.25,'#081020'],[0.5,'#0c1830'],[0.8,'#122448'],[1,'#183058']]);
  ctx.fillRect(0,0,W,H*WATER_LINE);
  
  // Milky way band — subtle
  ctx.save();
  ctx.globalAlpha = 0.025;
  ctx.beginPath();
  ctx.moveTo(W*0.1, 0);
  ctx.quadraticCurveTo(W*0.3, H*0.2, W*0.6, H*0.15);
  ctx.quadraticCurveTo(W*0.8, H*0.1, W, H*0.05);
  ctx.lineTo(W, 0);
  ctx.fillStyle = '#8090c0';
  ctx.fill();
  ctx.restore();
  
  // Moon
  let mx=W*0.78, my=H*0.1;
  ctx.beginPath(); ctx.arc(mx,my,22,0,6.28);
  ctx.fillStyle = radGrad(mx,my,5,22,[[0,'rgba(255,252,235,0.95)'],[0.5,'rgba(220,220,205,0.6)'],[1,'rgba(180,200,220,0)']]);
  ctx.fill();
  ctx.beginPath(); ctx.arc(mx,my,55,0,6.28);
  ctx.fillStyle = radGrad(mx,my,18,55,[[0,'rgba(180,200,240,0.07)'],[1,'rgba(180,200,240,0)']]);
  ctx.fill();
  // Moon craters subtle
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.beginPath(); ctx.arc(mx-5,my-3,4,0,6.28); ctx.fillStyle='#aab'; ctx.fill();
  ctx.beginPath(); ctx.arc(mx+7,my+5,3,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(mx-2,my+8,2,0,6.28); ctx.fill();
  ctx.restore();
  
  // Stars
  P.forEach(p => {
    if (p.t==='star') {
      p.tw += p.sp;
      let a = 0.25+Math.sin(p.tw)*0.45;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28);
      ctx.fillStyle = `hsla(${p.hue},40%,85%,${a})`;
      ctx.fill();
      if (p.r > 1.5) { // Bright star gets a subtle cross
        ctx.save();
        ctx.globalAlpha = a*0.3;
        ctx.strokeStyle = `hsla(${p.hue},40%,85%,0.5)`;
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(p.x-p.r*2,p.y); ctx.lineTo(p.x+p.r*2,p.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(p.x,p.y-p.r*2); ctx.lineTo(p.x,p.y+p.r*2); ctx.stroke();
        ctx.restore();
      }
    }
    if (p.t==='shoot') {
      if (p.del>0){p.del--;return;}
      p.life++; if(p.life>p.ml){p.x=-50;p.y=R()*120+30;p.life=0;p.del=120+R()*250;return;}
      p.x+=p.vx; p.y+=p.vy;
      let a=1-p.life/p.ml;
      // Trail
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx*12,p.y-p.vy*12);
      let tg = ctx.createLinearGradient(p.x,p.y,p.x-p.vx*12,p.y-p.vy*12);
      tg.addColorStop(0,`rgba(220,240,255,${a*0.7})`);
      tg.addColorStop(1,'rgba(220,240,255,0)');
      ctx.strokeStyle=tg; ctx.lineWidth=1.8; ctx.stroke();
      ctx.beginPath(); ctx.arc(p.x,p.y,2,0,6.28);
      ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill();
    }
    if (p.t==='firefly') {
      p.tw += 0.03;
      p.x += p.vx + Math.sin(p.tw*2)*0.2;
      p.y += p.vy + Math.cos(p.tw*1.5)*0.15;
      if (p.x<W*0.02) p.vx=Math.abs(p.vx);
      if (p.x>W*0.35) p.vx=-Math.abs(p.vx);
      if (p.y<H*0.3) p.vy=Math.abs(p.vy);
      if (p.y>H*WATER_LINE-10) p.vy=-Math.abs(p.vy);
      let a = 0.3+Math.sin(p.tw)*0.4;
      if (a > 0) {
        ctx.beginPath(); ctx.arc(p.x,p.y,8,0,6.28);
        ctx.fillStyle = `rgba(255,230,80,${a*0.06})`;
        ctx.fill();
        ctx.beginPath(); ctx.arc(p.x,p.y,2,0,6.28);
        ctx.fillStyle = `rgba(255,240,120,${a*0.6})`;
        ctx.fill();
      }
    }
  });
  
  // Water
  ctx.fillStyle = grad(H*WATER_LINE,H,[[0,'#0c1a30'],[0.3,'#081428'],[0.7,'#06101e'],[1,'#040c18']]);
  ctx.fillRect(0,H*WATER_LINE,W,H*(1-WATER_LINE));
  
  // Moon reflection
  ctx.save();
  ctx.globalAlpha=0.1;
  for (let i=0;i<15;i++){
    let ry=H*WATER_LINE+5+i*7, rw=2+Math.sin(frame*0.02+i*0.5)*2;
    ctx.fillStyle='rgba(200,220,255,0.3)';
    ctx.fillRect(mx-rw+Math.sin(frame*0.012+i)*3,ry,rw*2,1.5);
  }
  ctx.restore();
  
  wave(H*WATER_LINE+5, 10, 2.5, 0.014, 0.018, 'rgba(80,130,200,A)', 1);
  
  // Dock
  drawDock('#1c1208','#000','#2a1e12','rgba(255,200,80,0.35)');
  
  // Distant treeline silhouette
  ctx.save();
  ctx.fillStyle = '#0a1018';
  ctx.beginPath();
  ctx.moveTo(W*0.35, H*WATER_LINE);
  for (let x=W*0.35; x<=W; x+=8) {
    let th = 12+Math.sin(x*0.02)*8+Math.sin(x*0.05)*5;
    ctx.lineTo(x, H*WATER_LINE - th);
  }
  ctx.lineTo(W, H*WATER_LINE);
  ctx.fill();
  ctx.restore();
}

// ==================== SCENE 1: SUNNY PIER — DAY ====================
function draw1() {
  // Sky
  ctx.fillStyle = grad(0,H*WATER_LINE,[[0,'#1080f0'],[0.2,'#2898ff'],[0.45,'#50b0ff'],[0.7,'#80c8ff'],[1,'#a8dcff']]);
  ctx.fillRect(0,0,W,H*WATER_LINE);
  
  // Sun
  let sx=W*0.82,sy=H*0.1;
  ctx.beginPath(); ctx.arc(sx,sy,32,0,6.28);
  ctx.fillStyle=radGrad(sx,sy,8,32,[[0,'rgba(255,255,225,1)'],[0.6,'rgba(255,240,150,0.7)'],[1,'rgba(255,220,100,0)']]);
  ctx.fill();
  ctx.beginPath(); ctx.arc(sx,sy,90,0,6.28);
  ctx.fillStyle=radGrad(sx,sy,25,90,[[0,'rgba(255,245,190,0.15)'],[1,'rgba(255,245,190,0)']]);
  ctx.fill();
  // God rays
  ctx.save();
  ctx.globalAlpha = 0.03;
  for (let i=0;i<5;i++) {
    let angle = -0.8+i*0.35 + Math.sin(frame*0.003+i)*0.05;
    ctx.beginPath();
    ctx.moveTo(sx,sy);
    ctx.lineTo(sx+Math.cos(angle)*500, sy+Math.sin(angle)*500);
    ctx.lineTo(sx+Math.cos(angle+0.06)*500, sy+Math.sin(angle+0.06)*500);
    ctx.fillStyle='#fff';
    ctx.fill();
  }
  ctx.restore();
  
  // Clouds
  P.forEach(p => {
    if (p.t==='cloud') {
      p.x+=p.sp; if(p.x>W+p.w) p.x=-p.w*1.5;
      ctx.save(); ctx.globalAlpha=p.op;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.ellipse(p.x,p.y,p.w*0.5,p.h*0.5,0,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.ellipse(p.x-p.w*0.28,p.y+4,p.w*0.38,p.h*0.42,0,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.ellipse(p.x+p.w*0.22,p.y+2,p.w*0.33,p.h*0.38,0,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.ellipse(p.x+p.w*0.05,p.y-p.h*0.2,p.w*0.25,p.h*0.3,0,0,6.28); ctx.fill();
      // Cloud bottom shadow
      ctx.globalAlpha=p.op*0.1;
      ctx.fillStyle='#5080b0';
      ctx.beginPath(); ctx.ellipse(p.x,p.y+p.h*0.3,p.w*0.45,p.h*0.2,0,0,6.28); ctx.fill();
      ctx.restore();
    }
  });
  
  // Lighthouse
  let lhx=W*0.9, lhy=H*0.28;
  ctx.fillStyle='#e0e0e0'; ctx.fillRect(lhx-4,lhy,8,65);
  ctx.fillStyle='#cc3333'; ctx.fillRect(lhx-4,lhy,8,12);
  ctx.fillStyle='#cc3333'; ctx.fillRect(lhx-4,lhy+30,8,8);
  // Light dome
  ctx.beginPath(); ctx.arc(lhx,lhy,6,Math.PI,0);
  ctx.fillStyle='#ffee99'; ctx.fill();
  // Sweeping beam
  let beamAngle = (frame*0.02)%6.28;
  if (Math.cos(beamAngle) < -0.3) {
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.beginPath();
    ctx.moveTo(lhx,lhy);
    ctx.lineTo(lhx+Math.cos(beamAngle)*300, lhy+Math.sin(beamAngle)*300);
    ctx.lineTo(lhx+Math.cos(beamAngle+0.08)*300, lhy+Math.sin(beamAngle+0.08)*300);
    ctx.fillStyle='#fff';
    ctx.fill();
    ctx.restore();
  }
  
  // Distant green hills
  ctx.fillStyle = '#70b060';
  ctx.beginPath(); ctx.moveTo(W*0.5,H*WATER_LINE);
  for (let x=W*0.5;x<=W;x+=6) ctx.lineTo(x, H*WATER_LINE-8-Math.sin(x*0.008)*12-Math.sin(x*0.02)*5);
  ctx.lineTo(W,H*WATER_LINE); ctx.fill();
  ctx.fillStyle = '#5a9a4a';
  ctx.beginPath(); ctx.moveTo(W*0.6,H*WATER_LINE);
  for (let x=W*0.6;x<=W;x+=6) ctx.lineTo(x, H*WATER_LINE-4-Math.sin(x*0.01+1)*8);
  ctx.lineTo(W,H*WATER_LINE); ctx.fill();
  
  // Water
  ctx.fillStyle = grad(H*WATER_LINE,H,[[0,'#18b8c8'],[0.2,'#15a5b5'],[0.5,'#1090a0'],[1,'#0a7888']]);
  ctx.fillRect(0,H*WATER_LINE,W,H*(1-WATER_LINE));
  
  // Sun reflection column
  ctx.save(); ctx.globalAlpha=0.06;
  for (let i=0;i<20;i++){
    let ry=H*WATER_LINE+5+i*6, rw=8+Math.sin(frame*0.015+i*0.4)*5;
    ctx.fillStyle=`rgba(255,250,200,${0.4-i*0.015})`;
    ctx.fillRect(sx-rw+Math.sin(frame*0.01+i)*4,ry,rw*2,2);
  }
  ctx.restore();
  
  // Sparkles
  P.forEach(p => {
    if (p.t==='sparkle'){
      p.tw+=p.sp;
      let a=Math.max(0,Math.sin(p.tw))*0.65;
      if(a>0.05){ctx.beginPath();ctx.arc(p.x,p.y,1.8,0,6.28);ctx.fillStyle=`rgba(255,255,230,${a})`;ctx.fill();}
    }
    if (p.t==='floater'){
      p.x+=p.sp; if(p.x>W+10) p.x=-10;
      ctx.save(); ctx.globalAlpha=0.15;
      ctx.fillStyle='#4a7a2a';
      ctx.beginPath(); ctx.ellipse(p.x,p.y+Math.sin(frame*0.025+p.x)*2,p.sz,p.sz*0.5,0,0,6.28); ctx.fill();
      ctx.restore();
    }
  });
  
  wave(H*WATER_LINE+5, 8, 2, 0.011, 0.022, 'rgba(255,255,255,A)', 1);
  
  // Seagulls
  P.forEach(p => {
    if (p.t==='gull'){
      p.x+=p.sp; p.wi+=p.ws;
      if(p.x>W+30){p.x=-30;p.y=50+R()*110;}
      let wy=Math.sin(p.wi)*7*p.sz;
      ctx.save(); ctx.strokeStyle='#fff'; ctx.lineWidth=2*p.sz; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(p.x-12*p.sz,p.y+wy);
      ctx.quadraticCurveTo(p.x-4*p.sz,p.y-2*p.sz,p.x,p.y);
      ctx.quadraticCurveTo(p.x+4*p.sz,p.y-2*p.sz,p.x+12*p.sz,p.y+wy);
      ctx.stroke();
      // Body dot
      ctx.beginPath(); ctx.arc(p.x,p.y,1.5*p.sz,0,6.28);
      ctx.fillStyle='#fff'; ctx.fill();
      ctx.restore();
    }
  });
  
  // Dock (daytime colors)
  drawDock('#9a8868','rgba(0,0,0,0.1)','#b8a880','rgba(255,220,120,0.25)');
}

// ==================== SCENE 2: CORAL REEF — SUNSET ====================
function draw2() {
  // Sky — dramatic sunset
  ctx.fillStyle = grad(0,H*WATER_LINE,[[0,'#120828'],[0.15,'#3a1240'],[0.3,'#7a2240'],[0.5,'#c04428'],[0.7,'#e07830'],[0.85,'#e8a040'],[1,'#f0c050']]);
  ctx.fillRect(0,0,W,H*WATER_LINE);
  
  // Sun — half set
  let sx=W*0.5, sy=H*WATER_LINE;
  ctx.save();
  ctx.beginPath(); ctx.arc(sx,sy,55,Math.PI,0);
  ctx.fillStyle=radGrad(sx,sy,15,55,[[0,'rgba(255,210,80,0.9)'],[0.5,'rgba(255,140,50,0.6)'],[1,'rgba(255,80,20,0)']]);
  ctx.fill();
  // Sun halo
  ctx.beginPath(); ctx.arc(sx,sy,120,Math.PI,0);
  ctx.fillStyle=radGrad(sx,sy,40,120,[[0,'rgba(255,180,80,0.08)'],[1,'rgba(255,100,30,0)']]);
  ctx.fill();
  ctx.restore();
  
  // Warm clouds
  P.forEach(p => {
    if (p.t==='cloud'){
      p.x+=p.sp; if(p.x>W+p.w) p.x=-p.w*1.5;
      ctx.save(); ctx.globalAlpha=p.op;
      ctx.fillStyle='rgba(255,160,80,0.6)';
      ctx.beginPath(); ctx.ellipse(p.x,p.y,p.w*0.5,p.h*0.45,0,0,6.28); ctx.fill();
      ctx.fillStyle='rgba(255,120,60,0.3)';
      ctx.beginPath(); ctx.ellipse(p.x+p.w*0.15,p.y+5,p.w*0.35,p.h*0.3,0,0,6.28); ctx.fill();
      ctx.restore();
    }
  });
  
  // Palm trees
  function palm(px,py,h,lean,thick) {
    ctx.save();
    // Trunk
    ctx.strokeStyle='#1a0c04';
    ctx.lineWidth=thick||6;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.quadraticCurveTo(px+lean*0.4,py-h*0.5,px+lean,py-h);
    ctx.stroke();
    // Trunk texture
    ctx.lineWidth=1;
    ctx.strokeStyle='rgba(255,200,150,0.06)';
    for (let i=0;i<8;i++){
      let t=i/8, tx=px+(px+lean*0.4-px)*2*t*(1-t)+(px+lean-px)*t*t, ty=py+(py-h*0.5-py)*2*t*(1-t)+(py-h-py)*t*t;
      ctx.beginPath(); ctx.ellipse(tx,ty,thick*0.4,2,lean*0.01,0,6.28); ctx.stroke();
    }
    // Fronds
    let fx=px+lean, fy=py-h;
    for (let i=0;i<7;i++){
      let angle=(i/7)*Math.PI*1.6-Math.PI*0.6+Math.sin(frame*0.008+i*0.7)*0.06;
      let fl=40+R()*20;
      ctx.beginPath(); ctx.moveTo(fx,fy);
      let tipX=fx+Math.cos(angle)*fl, tipY=fy+Math.sin(angle)*fl*0.5+12;
      let cpx=fx+Math.cos(angle)*fl*0.5, cpy=fy+Math.sin(angle)*fl*0.15;
      ctx.quadraticCurveTo(cpx,cpy,tipX,tipY);
      ctx.strokeStyle='#0c0602';
      ctx.lineWidth=3.5;
      ctx.stroke();
      // Leaflets
      for (let j=0.2;j<0.9;j+=0.15){
        let lx=fx+(cpx-fx)*2*j*(1-j)+(tipX-fx)*j*j;
        let ly=fy+(cpy-fy)*2*j*(1-j)+(tipY-fy)*j*j;
        ctx.beginPath();
        ctx.moveTo(lx,ly);
        ctx.lineTo(lx+Math.cos(angle+1.2)*8, ly+Math.sin(angle+1.2)*6);
        ctx.strokeStyle='#0c0602';
        ctx.lineWidth=1.5;
        ctx.stroke();
      }
    }
    ctx.restore();
  }
  palm(W*0.03, H*WATER_LINE, H*0.38, 25, 7);
  palm(W*0.94, H*WATER_LINE, H*0.32, -18, 6);
  palm(W*0.08, H*WATER_LINE, H*0.28, 15, 5);
  
  // Water — warm tropical
  ctx.fillStyle = grad(H*WATER_LINE,H,[[0,'#d88030'],[0.08,'#28a8a0'],[0.3,'#1a8888'],[0.6,'#126868'],[1,'#0a4848']]);
  ctx.fillRect(0,H*WATER_LINE,W,H*(1-WATER_LINE));
  
  // Sun reflection column on water
  ctx.save(); ctx.globalAlpha=0.08;
  for (let i=0;i<20;i++){
    let ry=H*WATER_LINE+3+i*5, rw=15+Math.sin(frame*0.015+i*0.3)*8;
    ctx.fillStyle=`rgba(255,180,60,${0.5-i*0.02})`;
    ctx.fillRect(sx-rw+Math.sin(frame*0.01+i)*5,ry,rw*2,1.5);
  }
  ctx.restore();
  
  // Coral formations underwater
  function coral(cx,cy,col,h,branches) {
    ctx.save(); ctx.globalAlpha=0.3;
    for (let i=0;i<branches;i++){
      let bx=cx+(i-(branches-1)/2)*7+Math.sin(frame*0.012+i)*1.5;
      let bh=h*(0.5+i*0.1);
      ctx.fillStyle=col;
      ctx.beginPath();
      ctx.moveTo(bx-3,cy); ctx.quadraticCurveTo(bx-2,cy-bh*0.7,bx,cy-bh);
      ctx.quadraticCurveTo(bx+2,cy-bh*0.7,bx+3,cy); ctx.fill();
      // Coral tips
      ctx.beginPath(); ctx.arc(bx,cy-bh,3,0,6.28);
      ctx.fillStyle=col; ctx.fill();
    }
    ctx.restore();
  }
  coral(W*0.18,H*0.92,'#ff5070',45,6);
  coral(W*0.38,H*0.95,'#ff9040',35,5);
  coral(W*0.58,H*0.93,'#c060ff',40,5);
  coral(W*0.78,H*0.9,'#40d0a0',48,7);
  coral(W*0.48,H*0.97,'#ff7060',25,4);
  
  // Fish shadows
  P.forEach(p => {
    if (p.t==='cfish'){
      p.x+=p.sp*p.dir; if(p.x>W+20)p.x=-20; if(p.x<-20)p.x=W+20;
      ctx.save(); ctx.globalAlpha=0.2;
      ctx.fillStyle=`hsl(${p.hue},65%,55%)`;
      ctx.beginPath(); ctx.ellipse(p.x,p.y,p.sz,p.sz*0.45,0,0,6.28); ctx.fill();
      ctx.beginPath();
      let td=p.dir*(-p.sz*0.8);
      ctx.moveTo(p.x+td,p.y); ctx.lineTo(p.x+td*1.6,p.y-p.sz*0.5); ctx.lineTo(p.x+td*1.6,p.y+p.sz*0.5); ctx.fill();
      ctx.restore();
    }
    if (p.t==='tfly'){
      p.tw+=0.025;
      p.x+=p.vx+Math.sin(p.tw*1.5)*0.3;
      p.y+=p.vy+Math.cos(p.tw)*0.2;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<H*0.1)p.vy=Math.abs(p.vy);
      if(p.y>H*WATER_LINE-5)p.vy=-Math.abs(p.vy);
      let a=0.2+Math.sin(p.tw)*0.3;
      if(a>0){
        ctx.beginPath(); ctx.arc(p.x,p.y,6,0,6.28);
        ctx.fillStyle=`hsla(${p.hue},80%,70%,${a*0.08})`; ctx.fill();
        ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,6.28);
        ctx.fillStyle=`hsla(${p.hue},80%,80%,${a*0.5})`; ctx.fill();
      }
    }
    if (p.t==='bird'){
      p.x+=p.sp; p.wi+=p.ws;
      if(p.x>W+20){p.x=-20;p.y=25+R()*55;}
      let wy=Math.sin(p.wi)*5;
      ctx.save(); ctx.strokeStyle='#1a0804'; ctx.lineWidth=1.5; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(p.x-8,p.y+wy); ctx.quadraticCurveTo(p.x,p.y-1,p.x+8,p.y+wy);
      ctx.stroke(); ctx.restore();
    }
  });
  
  wave(H*WATER_LINE+5, 8, 2, 0.012, 0.02, 'rgba(255,200,100,A)', 1);
  
  // Dock (sunset-lit warm tones)
  drawDock('#6a5030','rgba(0,0,0,0.15)','#8a6a48','rgba(255,180,60,0.3)');
}

// ==================== SCENE 3: DEEP SEA — STORM + BOAT ====================
function draw3() {
  // Sky — dark stormy
  ctx.fillStyle = grad(0,H*WATER_LINE,[[0,'#12121e'],[0.2,'#1e1e30'],[0.4,'#2a2a40'],[0.6,'#383848'],[0.8,'#424252'],[1,'#4a4a58']]);
  ctx.fillRect(0,0,W,H*WATER_LINE);
  
  // Lightning
  P.forEach(p => {
    if(p.t==='ltn'){
      p.timer++;
      if(p.flash>0){
        p.flash--;
        ctx.save(); ctx.globalAlpha=p.flash*0.035;
        ctx.fillStyle='#c0c8e0'; ctx.fillRect(0,0,W,H); ctx.restore();
        if(p.flash>8){
          // Bolt
          ctx.save();
          ctx.strokeStyle=`rgba(210,220,255,${p.flash*0.05})`;
          ctx.lineWidth=2.5;
          ctx.beginPath();
          let lx=p.x;
          ctx.moveTo(lx,0);
          for(let y=0;y<H*WATER_LINE;y+=15){lx+=(R()-0.5)*35;ctx.lineTo(lx,y);}
          ctx.stroke();
          // Branch
          ctx.lineWidth=1;
          ctx.beginPath();
          let bx=p.x+(R()-0.5)*20, by=H*0.15;
          ctx.moveTo(bx,by);
          for(let y=by;y<H*0.35;y+=12){bx+=(R()-0.5)*25;ctx.lineTo(bx,y);}
          ctx.stroke();
          ctx.restore();
        }
      }
      if(p.timer>p.next){p.flash=18;p.timer=0;p.next=150+R()*350;p.x=W*0.15+R()*W*0.7;}
    }
  });
  
  // Heavy clouds/fog
  P.forEach(p => {
    if(p.t==='fog'){
      p.x+=p.sp; if(p.x>W+p.w)p.x=-p.w;
      ctx.save(); ctx.globalAlpha=p.op;
      ctx.fillStyle='#55556a';
      ctx.beginPath(); ctx.ellipse(p.x,p.y,p.w*0.5,p.h,0,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.ellipse(p.x+p.w*0.2,p.y-8,p.w*0.35,p.h*0.8,0,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.ellipse(p.x-p.w*0.15,p.y+5,p.w*0.3,p.h*0.7,0,0,6.28); ctx.fill();
      ctx.restore();
    }
  });
  
  // Water — dark choppy
  ctx.fillStyle = grad(H*WATER_LINE-10,H,[[0,'#1a2535'],[0.2,'#141e2c'],[0.5,'#0e1520'],[1,'#080e18']]);
  ctx.fillRect(0,H*WATER_LINE-10,W,H-H*WATER_LINE+10);
  
  // Dramatic waves
  wave(H*WATER_LINE-5, 12, 5, 0.018, 0.03, 'rgba(70,90,120,A)', 1.5);
  
  // White caps
  for (let i=0;i<5;i++){
    let wx = (i*200 + frame*0.8)%W;
    let wy = H*WATER_LINE + 5 + Math.sin(wx*0.01+frame*0.02)*8;
    ctx.save(); ctx.globalAlpha=0.15;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(wx,wy,12+Math.sin(frame*0.03+i)*4,2,0,0,6.28); ctx.fill();
    ctx.restore();
  }
  
  // Rain
  ctx.save(); ctx.lineWidth=1;
  P.forEach(p => {
    if(p.t==='rain'){
      p.y+=p.sp; p.x+=p.wind;
      if(p.y>H){p.y=-p.len;p.x=R()*W*1.2;}
      if(p.x<-10)p.x=W+10;
      ctx.strokeStyle=`rgba(140,160,190,${0.2+R()*0.15})`;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+p.wind*0.4,p.y+p.len); ctx.stroke();
    }
    if(p.t==='spray'){
      p.life++;
      if(p.life>p.ml){p.x=R()*W;p.y=H*WATER_LINE-5+R()*10;p.vy=-1-R()*2;p.vx=(R()-0.5)*2;p.life=0;p.ml=30+R()*30;}
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.08;
      let a=(1-p.life/p.ml)*0.2;
      ctx.beginPath(); ctx.arc(p.x,p.y,1,0,6.28);
      ctx.fillStyle=`rgba(180,200,220,${a})`; ctx.fill();
    }
  });
  ctx.restore();
  
  // === FISHING BOAT ===
  let boatX=W*0.18, boatY=H*WATER_LINE-12;
  let rockY=Math.sin(frame*0.018)*6;
  let rockR=Math.sin(frame*0.014)*0.04;
  ctx.save();
  ctx.translate(boatX, boatY+rockY);
  ctx.rotate(rockR);
  
  // Hull
  ctx.beginPath();
  ctx.moveTo(-65,0);
  ctx.quadraticCurveTo(-72,18,-45,24);
  ctx.lineTo(55,24);
  ctx.quadraticCurveTo(78,18,70,0);
  ctx.closePath();
  let hullG = ctx.createLinearGradient(0,-5,0,24);
  hullG.addColorStop(0,'#3a3545');
  hullG.addColorStop(0.5,'#2a2535');
  hullG.addColorStop(1,'#1e1a28');
  ctx.fillStyle=hullG; ctx.fill();
  ctx.strokeStyle='#4a4555'; ctx.lineWidth=1; ctx.stroke();
  
  // Hull waterline stripe
  ctx.fillStyle='#6a2020';
  ctx.beginPath();
  ctx.moveTo(-60,12); ctx.lineTo(65,12); ctx.lineTo(62,18); ctx.lineTo(-55,18);
  ctx.fill();
  
  // Deck
  ctx.fillStyle='#4a4050';
  ctx.fillRect(-50,-4,105,6);
  // Deck planks
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  for (let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(-50+i*13,-4);ctx.lineTo(-50+i*13,2);ctx.stroke();}
  
  // Cabin
  ctx.fillStyle='#3a3545';
  ctx.fillRect(-15,-28,40,24);
  ctx.strokeStyle='#4a4555'; ctx.lineWidth=0.5; ctx.strokeRect(-15,-28,40,24);
  // Cabin window — warm glow
  ctx.fillStyle=`rgba(255,200,80,${0.3+Math.sin(frame*0.04)*0.1})`;
  ctx.fillRect(-8,-22,10,10);
  ctx.fillRect(8,-22,10,10);
  ctx.strokeStyle='#4a4555'; ctx.strokeRect(-8,-22,10,10); ctx.strokeRect(8,-22,10,10);
  // Cabin roof
  ctx.fillStyle='#2a2530';
  ctx.fillRect(-18,-32,46,5);
  
  // Mast
  ctx.strokeStyle='#5a5565'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(5,-4); ctx.lineTo(5,-70); ctx.stroke();
  // Radar/antenna
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(5,-68); ctx.lineTo(15,-64); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,-68); ctx.lineTo(-8,-64); ctx.stroke();
  
  // Mast light — blinking
  ctx.beginPath(); ctx.arc(5,-70,3,0,6.28);
  let mlA = 0.4+Math.sin(frame*0.06)*0.4;
  ctx.fillStyle=`rgba(255,60,60,${mlA})`; ctx.fill();
  ctx.beginPath(); ctx.arc(5,-70,8,0,6.28);
  ctx.fillStyle=`rgba(255,60,60,${mlA*0.15})`; ctx.fill();
  
  // Railing
  ctx.strokeStyle='#5a5565'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-55,-8); ctx.lineTo(-15,-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(25,-8); ctx.lineTo(62,-8); ctx.stroke();
  for (let i=0;i<4;i++){
    let rx=-55+i*10;
    ctx.beginPath(); ctx.moveTo(rx,-8); ctx.lineTo(rx,-4); ctx.stroke();
  }
  for (let i=0;i<4;i++){
    let rx=28+i*10;
    ctx.beginPath(); ctx.moveTo(rx,-8); ctx.lineTo(rx,-4); ctx.stroke();
  }
  
  ctx.restore();
  
  // Boat reflection
  ctx.save();
  ctx.globalAlpha=0.04;
  ctx.translate(boatX, boatY+rockY+48);
  ctx.scale(1,-0.3);
  ctx.fillStyle='#2a2535';
  ctx.beginPath();
  ctx.moveTo(-65,0); ctx.quadraticCurveTo(-72,18,-45,24); ctx.lineTo(55,24); ctx.quadraticCurveTo(78,18,70,0);
  ctx.fill();
  ctx.restore();
}

// ==================== SCENE 4: VOLCANO COVE — DUSK ====================
function draw4() {
  // Sky — dark volcanic haze
  ctx.fillStyle = grad(0,H*WATER_LINE,[[0,'#0e0605'],[0.2,'#1e0e0a'],[0.4,'#351812'],[0.6,'#4e2218'],[0.8,'#6a2e1a'],[1,'#803820']]);
  ctx.fillRect(0,0,W,H*WATER_LINE);
  
  // Haze glow
  ctx.save();
  ctx.beginPath(); ctx.ellipse(W*0.5,H*WATER_LINE,W*0.6,H*0.15,0,0,6.28);
  ctx.fillStyle=radGrad(W*0.5,H*WATER_LINE,50,W*0.6,[[0,'rgba(200,80,20,0.06)'],[1,'rgba(200,80,20,0)']]);
  ctx.fill();
  ctx.restore();
  
  // Volcano
  ctx.fillStyle='#0e0604';
  ctx.beginPath();
  ctx.moveTo(W*0.52,H*WATER_LINE);
  ctx.lineTo(W*0.66,H*0.04);
  ctx.quadraticCurveTo(W*0.7,0,W*0.74,H*0.04);
  ctx.lineTo(W*0.88,H*WATER_LINE);
  ctx.fill();
  // Volcano texture
  ctx.save(); ctx.globalAlpha=0.04;
  for (let i=0;i<10;i++){
    ctx.beginPath();
    ctx.moveTo(W*0.66+i*2,H*0.04+i*15);
    ctx.lineTo(W*0.62+i*5,H*WATER_LINE);
    ctx.strokeStyle='#402010'; ctx.lineWidth=1; ctx.stroke();
  }
  ctx.restore();
  
  // Crater glow — pulsing
  let cgA = 0.5+Math.sin(frame*0.02)*0.2;
  ctx.beginPath(); ctx.arc(W*0.7,H*0.04,30,0,6.28);
  ctx.fillStyle=radGrad(W*0.7,H*0.04,5,30,[[0,`rgba(255,120,20,${cgA})`],[0.4,`rgba(255,60,10,${cgA*0.4})`],[1,'rgba(255,30,0,0)']]);
  ctx.fill();
  // Wider glow
  ctx.beginPath(); ctx.arc(W*0.7,H*0.04,80,0,6.28);
  ctx.fillStyle=radGrad(W*0.7,H*0.04,20,80,[[0,`rgba(255,80,10,${cgA*0.08})`],[1,'rgba(255,40,0,0)']]);
  ctx.fill();
  
  // Smoke
  P.forEach(p => {
    if(p.t==='smoke'){
      p.life++; p.y+=p.vy; p.x+=p.vx+Math.sin(frame*0.008+p.life*0.04)*0.4; p.r+=0.12; p.op-=0.0004;
      if(p.op<=0||p.y<-60){p.x=W*0.7+(R()-0.5)*25;p.y=H*0.04+R()*12;p.r=18+R()*20;p.op=0.1+R()*0.07;p.life=0;}
      ctx.save(); ctx.globalAlpha=p.op;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28);
      ctx.fillStyle='#3a2a1e'; ctx.fill();
      ctx.restore();
    }
  });
  
  // Left rock wall
  ctx.fillStyle='#0a0503';
  ctx.beginPath();
  ctx.moveTo(0,H*0.12);
  ctx.lineTo(W*0.06,H*0.08);
  ctx.quadraticCurveTo(W*0.1,H*0.15,W*0.13,H*0.3);
  ctx.quadraticCurveTo(W*0.15,H*0.42,W*0.17,H*WATER_LINE);
  ctx.lineTo(0,H*WATER_LINE);
  ctx.fill();
  // Lava veins — pulsing
  function lavaVein(pts,w,phase) {
    ctx.save();
    let a=0.35+Math.sin(frame*0.022+phase)*0.2;
    ctx.strokeStyle=`rgba(255,90,15,${a})`;
    ctx.lineWidth=w;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    for (let i=1;i<pts.length;i+=2) {
      if(i+1<pts.length) ctx.quadraticCurveTo(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
      else ctx.lineTo(pts[i][0],pts[i][1]);
    }
    ctx.stroke();
    // Hot core
    ctx.strokeStyle=`rgba(255,200,60,${a*0.4})`;
    ctx.lineWidth=w*0.4;
    ctx.stroke();
    ctx.restore();
  }
  lavaVein([[W*0.02,H*0.18],[W*0.05,H*0.25],[W*0.04,H*0.35],[W*0.07,H*0.42],[W*0.1,H*0.52]],2.5,0);
  lavaVein([[W*0.06,H*0.12],[W*0.09,H*0.22],[W*0.11,H*0.38],[W*0.13,H*0.48]],2,1.5);
  lavaVein([[W*0.01,H*0.3],[W*0.03,H*0.38],[W*0.06,H*0.45]],1.5,3);
  
  // Right rock wall
  ctx.fillStyle='#0a0503';
  ctx.beginPath();
  ctx.moveTo(W,H*0.15);
  ctx.lineTo(W*0.95,H*0.1);
  ctx.quadraticCurveTo(W*0.9,H*0.2,W*0.87,H*0.35);
  ctx.quadraticCurveTo(W*0.85,H*0.45,W*0.84,H*WATER_LINE);
  ctx.lineTo(W,H*WATER_LINE);
  ctx.fill();
  lavaVein([[W*0.97,H*0.18],[W*0.94,H*0.26],[W*0.92,H*0.38],[W*0.88,H*0.48]],2.5,2);
  lavaVein([[W*0.93,H*0.14],[W*0.9,H*0.24],[W*0.87,H*0.38]],1.8,4);
  
  // Water — black with lava reflections
  ctx.fillStyle = grad(H*WATER_LINE,H,[[0,'#200c06'],[0.15,'#150804'],[0.5,'#0c0502'],[1,'#060301']]);
  ctx.fillRect(0,H*WATER_LINE,W,H*(1-WATER_LINE));
  
  // Lava glow on water
  P.forEach(p => {
    if(p.t==='lglow'){
      p.ph+=0.012;
      let a=0.025+Math.sin(p.ph)*0.015;
      ctx.beginPath(); ctx.arc(p.x,p.y+Math.sin(frame*0.01+p.x*0.005)*3,p.r,0,6.28);
      ctx.fillStyle=radGrad(p.x,p.y,5,p.r,[[0,`rgba(255,80,15,${a*4})`],[1,'rgba(255,40,0,0)']]);
      ctx.fill();
    }
  });
  
  // Embers
  P.forEach(p => {
    if(p.t==='ember'){
      p.life++; p.x+=p.vx+Math.sin(p.life*0.025)*0.4; p.y+=p.vy;
      if(p.life>p.ml||p.y<-10){p.x=W*0.2+R()*W*0.6;p.y=H*0.55+R()*H*0.4;p.life=0;p.ml=120+R()*220;}
      let a=p.br*(1-p.life/p.ml);
      let r=p.r*(1-p.life/p.ml*0.3);
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,6.28);
      ctx.fillStyle=`rgba(255,${80+R()*60},15,${a})`; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,r*3.5,0,6.28);
      ctx.fillStyle=`rgba(255,60,5,${a*0.1})`; ctx.fill();
    }
    if(p.t==='ash'){
      p.tw+=0.015;
      p.x+=p.vx+Math.sin(p.tw)*0.5; p.y+=p.vy;
      if(p.y>H+5){p.y=-5;p.x=R()*W;}
      ctx.save(); ctx.globalAlpha=p.op;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28);
      ctx.fillStyle='#5a4a3a'; ctx.fill();
      ctx.restore();
    }
  });
  
  wave(H*WATER_LINE+5,8,2,0.012,0.015,'rgba(180,60,20,A)',1);
  
  // === OBSIDIAN ROCK LEDGE ===
  // Main ledge
  ctx.save();
  let ledgeG = ctx.createLinearGradient(W*0.17,H*WATER_LINE-15,W*0.17,H*WATER_LINE+15);
  ledgeG.addColorStop(0,'#1a1215');
  ledgeG.addColorStop(0.5,'#0e0a0c');
  ledgeG.addColorStop(1,'#060304');
  ctx.fillStyle=ledgeG;
  ctx.beginPath();
  ctx.moveTo(W*0.02, H*WATER_LINE-5);
  ctx.lineTo(W*0.05, H*WATER_LINE-12);
  ctx.quadraticCurveTo(W*0.1,H*WATER_LINE-15,W*0.18,H*WATER_LINE-10);
  ctx.quadraticCurveTo(W*0.25,H*WATER_LINE-8,W*0.32,H*WATER_LINE-4);
  ctx.lineTo(W*0.34, H*WATER_LINE+8);
  ctx.lineTo(W*0.02, H*WATER_LINE+8);
  ctx.fill();
  
  // Obsidian surface details — glassy highlights
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(W*0.06,H*WATER_LINE-10);
  ctx.quadraticCurveTo(W*0.15,H*WATER_LINE-14,W*0.25,H*WATER_LINE-9);
  ctx.stroke();
  // Sharp edge facets
  ctx.strokeStyle='rgba(180,100,50,0.06)';
  ctx.beginPath();
  ctx.moveTo(W*0.08,H*WATER_LINE-11);
  ctx.lineTo(W*0.12,H*WATER_LINE-8);
  ctx.lineTo(W*0.15,H*WATER_LINE-13);
  ctx.stroke();
  
  // Lava veins in ledge edge
  let ledgeGlowA = 0.25+Math.sin(frame*0.025)*0.15;
  ctx.strokeStyle=`rgba(255,80,10,${ledgeGlowA})`;
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(W*0.04,H*WATER_LINE+3);
  ctx.quadraticCurveTo(W*0.12,H*WATER_LINE+6,W*0.2,H*WATER_LINE+3);
  ctx.quadraticCurveTo(W*0.28,H*WATER_LINE+1,W*0.33,H*WATER_LINE+5);
  ctx.stroke();
  // Hot core of ledge vein
  ctx.strokeStyle=`rgba(255,180,40,${ledgeGlowA*0.5})`;
  ctx.lineWidth=0.8;
  ctx.stroke();
  
  // Small rocks on ledge
  ctx.fillStyle='#1a1215';
  ctx.beginPath(); ctx.ellipse(W*0.1,H*WATER_LINE-12,5,3,0.2,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(W*0.22,H*WATER_LINE-9,4,2.5,-0.1,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(W*0.28,H*WATER_LINE-6,3,2,0,0,6.28); ctx.fill();
  
  ctx.restore();
}

// ==================== RENDER LOOP ====================
const drawFns = [draw0, draw1, draw2, draw3, draw4];

function render() {
  frame++;
  ctx.clearRect(0,0,W,H);
  drawFns[cur]();
  requestAnimationFrame(render);
}

show(0);
render();
</script>
</body>
