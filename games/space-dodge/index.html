      x: Math.random() * W, y: Math.random() * H,
      size: 1.5 + Math.random() * 2.5, phase: Math.random() * Math.PI * 2
    }));
    const moon = {
      x: W * 0.22, y: H * 0.12, r: 40,
      craters: [
        {x: -12, y: -8, r: 8}, {x: 10, y: 5, r: 6}, {x: -5, y: 15, r: 5}
      ]
    };
    worldDecor.push({ type: 'ice_data', crystals: [...largeCrystals, ...medCrystals, ...smallCrystals], auroraParams: auroraDefs, fogParams: {baseY: H*0.75}, sparkles, moon });
  } else if (idx === 4) {
    // Supernova — shockwave rings are animated (no pre-gen needed), embers pre-gen
    for (let i = 0; i < 40; i++) {
      worldDecor.push({ type: 'ember', x: Math.random(), y: Math.random(), r: 1.5 + Math.random() * 3, speed: 0.2 + Math.random() * 0.6, color: Math.random() > 0.5 ? '#FF5722' : '#FFC107', alpha: 0.2 + Math.random() * 0.5 });
    }
  }
}

// --- WORLD BACKGROUND DRAWING ---
function drawWorldBackground() {
  const idx = getWorldIdx();
  const w = WORLDS[idx];

  // Base gradient
  drawWorldGradient(idx);

  // World-specific decorations
  if (idx === 0) drawDeepSpaceDecor();
  else if (idx === 1) drawNebulaDecor();
  else if (idx === 2) drawAsteroidBeltDecor();
  else if (idx === 3) drawIceFieldDecor();
  else if (idx === 4) drawSupernovaDecor();

  // Stars (already tinted per world)
  drawStars();
}

function drawWorldGradient(idx) {
  const gradients = [
    ['#050510', '#0B0B1A', '#121225', '#0B0B1A'],  // Deep Space
    ['#0a0520', '#1a0a3e', '#2a0e4a', '#1a0830'],  // Nebula — Pillars of Creation
    ['#0f0a04', '#1a1008', '#251810', '#1a1008'],  // Asteroid Belt — Dense Debris
    ['#040e18', '#081828', '#0a1e35', '#061520'],  // Ice Field — Frozen Expanse
    ['#200808', '#2e0a0a', '#3a0c0c', '#2e0a0a'],  // Supernova
  ];
  const stops = gradients[idx];
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,    stops[0]);
  grad.addColorStop(0.33, stops[1]);
  grad.addColorStop(0.66, stops[2]);
  grad.addColorStop(1,    stops[3]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawDeepSpaceDecor() {
  for (const d of worldDecor) {
    if (d.type !== 'galaxy') continue;
    ctx.save();
    ctx.translate(d.x * W, d.y * H);
    ctx.rotate(d.rot);
    ctx.globalAlpha = d.alpha;
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, d.rx);
    grad.addColorStop(0, '#8888cc');
    grad.addColorStop(0.5, '#444466');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, d.rx * scale, d.ry * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawNebulaDecor() {
  const nd = worldDecor.find(d => d.type === 'nebula_data');
  if (!nd) return;
  const fc = frameCount;

  // 1. Background glow patches
  const glowCenters = [{x:W*0.15,y:H*0.3,c:'#8030c0'},{x:W*0.55,y:H*0.6,c:'#c03080'},{x:W*0.82,y:H*0.25,c:'#3040c0'}];
  for (const g of glowCenters) {
    const gr = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, H * 0.55);
    gr.addColorStop(0, g.c + '1e');
    gr.addColorStop(1, 'transparent');
    ctx.fillStyle = gr;
    ctx.fillRect(0, 0, W, H);
  }

  // 2. Gas pillars
  for (let i = 0; i < nd.pillars.length; i++) {
    const p = nd.pillars[i];
    // drift downward, reset when off screen
    p.topY += p.speed;
    p.botY += p.speed;
    if (p.topY > H + 50) { p.topY = -H - 50; p.botY = -50; }
    const sway = Math.sin(fc * 0.008 + p.phase) * 18;
    const px = p.x * W + sway;
    const pw = p.width * scale;
    const opacity = 0.10 + Math.sin(fc * 0.012 + p.phase) * 0.04;
    ctx.save();
    ctx.globalAlpha = opacity;
    const pg = ctx.createLinearGradient(px - pw/2, 0, px + pw/2, 0);
    pg.addColorStop(0, 'transparent');
    pg.addColorStop(0.3, p.colors[0]);
    pg.addColorStop(0.5, p.colors[1]);
    pg.addColorStop(0.7, p.colors[0]);
    pg.addColorStop(1, 'transparent');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.rect(px - pw/2, p.topY, pw, p.botY - p.topY);
    ctx.fill();
    ctx.restore();
  }

  // 3. Tendrils (curved gas filaments)
  for (const td of nd.tendrils) {
    const pulse = Math.sin(fc * 0.015 + td.phase) * 0.025;
    // Glow stroke
    ctx.save();
    ctx.globalAlpha = 0.03 + pulse * 0.5;
    ctx.strokeStyle = td.color;
    ctx.lineWidth = 28 * scale;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(td.x0, td.y0);
    ctx.quadraticCurveTo(td.cx, td.cy, td.x1, td.y1);
    ctx.stroke();
    // Core stroke
    ctx.globalAlpha = 0.07 + pulse;
    ctx.lineWidth = 10 * scale;
    ctx.stroke();
    ctx.restore();
  }

  // 4. Bright stars with glow halos
  for (const bs of nd.brightStars) {
    const glow = bs.r * (3 + Math.sin(fc * 0.04 + bs.phase) * 1.5);
    const sg = ctx.createRadialGradient(bs.x, bs.y, 0, bs.x, bs.y, glow);
    sg.addColorStop(0, bs.color);
    sg.addColorStop(0.3, bs.color + '80');
    sg.addColorStop(1, 'transparent');
    ctx.save();
    ctx.globalAlpha = 0.55 + Math.sin(fc * 0.04 + bs.phase) * 0.2;
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(bs.x, bs.y, glow, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = bs.color;
    ctx.beginPath();
    ctx.arc(bs.x, bs.y, bs.r * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 5. Star cluster
  const cl = nd.cluster;
  ctx.save();
  for (let i = 0; i < 18; i++) {
    const ang = (i / 18) * Math.PI * 2 + fc * 0.001;
    const dist = 4 + (i % 5) * 6;
    const sx = cl.x + Math.cos(ang) * dist;
    const sy = cl.y + Math.sin(ang) * dist * 0.5;
    ctx.globalAlpha = 0.3 + (i % 3) * 0.12;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(sx, sy, 0.8 + (i % 3) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawAsteroidBeltDecor() {
  const ad = worldDecor.find(d => d.type === 'asteroid_data');
  if (!ad) return;

  // 1. Gas giant (bottom-right, partial circle)
  const giantX = W * 0.88, giantY = H * 1.05, giantR = H * 0.52;
  ctx.save();
  ctx.beginPath();
  ctx.arc(giantX, giantY, giantR, 0, Math.PI * 2);
  ctx.clip();
  const gg = ctx.createRadialGradient(giantX - giantR*0.25, giantY - giantR*0.3, giantR*0.1, giantX, giantY, giantR);
  gg.addColorStop(0, '#b87820');
  gg.addColorStop(0.45, '#8a5010');
  gg.addColorStop(0.7, '#6a3808');
  gg.addColorStop(1, '#3a1a04');
  ctx.fillStyle = gg;
  ctx.fillRect(giantX - giantR, giantY - giantR, giantR * 2, giantR * 2);
  // atmosphere bands scrolling
  ad.bandX = (ad.bandX - 0.15 + W) % W;
  const bandColors = ['rgba(200,150,60,0.06)','rgba(160,100,40,0.05)','rgba(220,180,80,0.06)','rgba(140,80,30,0.05)'];
  for (let bi = 0; bi < 4; bi++) {
    const bandY = giantY - giantR * 0.5 + bi * giantR * 0.22;
    ctx.fillStyle = bandColors[bi];
    ctx.fillRect(giantX - giantR + ad.bandX - W, bandY, W * 2, giantR * 0.12);
    ctx.fillRect(giantX - giantR + ad.bandX, bandY, W * 2, giantR * 0.12);
  }
  ctx.restore();
  // atmospheric glow ring
  const gRing = ctx.createRadialGradient(giantX, giantY, giantR * 0.92, giantX, giantY, giantR * 1.12);
  gRing.addColorStop(0, 'rgba(200,140,60,0.10)');
  gRing.addColorStop(1, 'transparent');
  ctx.fillStyle = gRing;
  ctx.beginPath();
  ctx.arc(giantX, giantY, giantR * 1.12, 0, Math.PI * 2);
  ctx.fill();

  // 2. Dust haze bands
  for (const b of ad.gasBands) {
    b.y += b.speed;
    if (b.y > H + 20) b.y = -20;
    ctx.globalAlpha = b.alpha;
    ctx.fillStyle = '#8D6E63';
    ctx.fillRect(W * 0.5 - b.w / 2, b.y, b.w, 18 * scale);
    ctx.globalAlpha = 1;
  }

  // 3. Draw rocks (far, then mid, then near by layer)
  for (let layer = 0; layer <= 2; layer++) {
    for (const rock of ad.rocks) {
      if (rock.layer !== layer) continue;
      rock.y += rock.speed;
      rock.rotation += rock.rotSpeed;
      if (rock.y > H + rock.r + 10) {
        rock.y = -(rock.r + 10);
        rock.x = Math.random() * W;
      }
      ctx.save();
      ctx.translate(rock.x, rock.y);
      ctx.rotate(rock.rotation);
      ctx.globalAlpha = rock.alpha;
      // Irregular polygon
      const rs = rock.r * scale;
      ctx.beginPath();
      for (let vi = 0; vi < rock.vertices.length; vi++) {
        const v = rock.vertices[vi];
        const vx = Math.cos(v.a) * rs * v.r;
        const vy = Math.sin(v.a) * rs * v.r;
        if (vi === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
      }
      ctx.closePath();
      // Radial gradient fill — lit top-left side
      const rg = ctx.createRadialGradient(-rs*0.3, -rs*0.3, 0, 0, 0, rs);
      rg.addColorStop(0, '#a08060');
      rg.addColorStop(0.5, '#6a4828');
      rg.addColorStop(1, '#2a1808');
      ctx.fillStyle = rg;
      ctx.fill();
      // Highlight arc
      ctx.globalAlpha = rock.alpha * 0.5;
      ctx.strokeStyle = 'rgba(220,190,140,0.35)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(-rs * 0.25, -rs * 0.25, rs * 0.45, -Math.PI * 0.8, 0.1);
      ctx.stroke();
      // Small crater (only for far/mid)
      if (rock.craterR > 0) {
        const crg = ctx.createRadialGradient(rock.craterX, rock.craterY, 0, rock.craterX, rock.craterY, rock.craterR * scale);
        crg.addColorStop(0, 'rgba(20,10,5,0.6)');
        crg.addColorStop(1, 'rgba(60,35,15,0.1)');
        ctx.globalAlpha = rock.alpha * 0.8;
        ctx.fillStyle = crg;
        ctx.beginPath();
        ctx.arc(rock.craterX, rock.craterY, rock.craterR * scale, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // 4. Dust particles drift down
  for (const dp of ad.dustParticles) {
    dp.y += dp.speed;
    if (dp.y > H + 5) { dp.y = -5; dp.x = Math.random() * W; }
    ctx.globalAlpha = dp.alpha;
    ctx.fillStyle = dp.color;
    ctx.beginPath();
    ctx.arc(dp.x, dp.y, dp.r * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // 5. Warm bright stars with orange halos
  for (const ws of ad.warmStars) {
    const glow = (8 + Math.sin(frameCount * 0.05 + ws.phase) * 4) * scale;
    const wg = ctx.createRadialGradient(ws.x, ws.y, 0, ws.x, ws.y, glow);
    wg.addColorStop(0, '#ffcc80');
    wg.addColorStop(0.4, 'rgba(255,160,60,0.3)');
    wg.addColorStop(1, 'transparent');
    ctx.save();
    ctx.globalAlpha = 0.6 + Math.sin(frameCount * 0.05 + ws.phase) * 0.2;
    ctx.fillStyle = wg;
    ctx.beginPath();
    ctx.arc(ws.x, ws.y, glow, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff8e0';
    ctx.beginPath();
    ctx.arc(ws.x, ws.y, ws.r * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawIceFieldDecor() {
  const id = worldDecor.find(d => d.type === 'ice_data');
  if (!id) return;
  const fc = frameCount;

  // 1. Frozen moon (upper-left)
  const mn = id.moon;
  const moonGlow = ctx.createRadialGradient(mn.x, mn.y, 0, mn.x, mn.y, mn.r * 1.6 * scale);
  moonGlow.addColorStop(0, 'rgba(200,230,255,0.12)');
  moonGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = moonGlow;
  ctx.beginPath();
  ctx.arc(mn.x, mn.y, mn.r * 1.6 * scale, 0, Math.PI * 2);
  ctx.fill();
  const moonBody = ctx.createRadialGradient(mn.x - mn.r*0.2*scale, mn.y - mn.r*0.2*scale, 0, mn.x, mn.y, mn.r*scale);
  moonBody.addColorStop(0, '#ddeeff');
  moonBody.addColorStop(0.6, '#b0c8e0');
  moonBody.addColorStop(1, '#7090b0');
  ctx.fillStyle = moonBody;
  ctx.beginPath();
  ctx.arc(mn.x, mn.y, mn.r * scale, 0, Math.PI * 2);
  ctx.fill();
  // Craters
  for (const cr of mn.craters) {
    const crg = ctx.createRadialGradient(mn.x+cr.x*scale, mn.y+cr.y*scale, 0, mn.x+cr.x*scale, mn.y+cr.y*scale, cr.r*scale);
    crg.addColorStop(0, 'rgba(40,60,90,0.55)');
    crg.addColorStop(1, 'rgba(80,110,150,0.08)');
    ctx.fillStyle = crg;
    ctx.beginPath();
    ctx.arc(mn.x+cr.x*scale, mn.y+cr.y*scale, cr.r*scale, 0, Math.PI*2);
    ctx.fill();
  }
  // Pulsing glow ring
  const moonRingA = 0.08 + Math.sin(fc * 0.01) * 0.03;
  ctx.save();
  ctx.globalAlpha = moonRingA;
  ctx.strokeStyle = '#a0c8f0';
  ctx.lineWidth = 4 * scale;
  ctx.beginPath();
  ctx.arc(mn.x, mn.y, mn.r * 1.15 * scale, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // 2. Aurora bands
  for (const au of id.auroraParams) {
    ctx.save();
    // Glow pass
    ctx.globalAlpha = 0.04 + Math.sin(fc * 0.015 + au.phase) * 0.015;
    ctx.strokeStyle = au.colorGlow;
    ctx.lineWidth = 40 * scale;
    ctx.lineCap = 'round';
    ctx.beginPath();
    for (let x = 0; x <= W; x += 8) {
      const y = au.baseY + Math.sin(x * au.freq + fc * 0.02 + au.phase) * au.amplitude
              + Math.sin(x * au.freq * 2.4 + au.phase * 0.5) * (au.amplitude * 0.4);
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    // Core pass
    ctx.globalAlpha = 0.10 + Math.sin(fc * 0.015 + au.phase) * 0.03;
    ctx.strokeStyle = au.colorCore;
    ctx.lineWidth = 14 * scale;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 8) {
      const y = au.baseY + Math.sin(x * au.freq + fc * 0.02 + au.phase) * au.amplitude
              + Math.sin(x * au.freq * 2.4 + au.phase * 0.5) * (au.amplitude * 0.4);
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    // White highlight
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  // 3. Ice crystals (pentagonal elongated shapes)
  // Shimmer: occasionally flash one crystal
  if (id.crystals.length > 0) {
    const shIdx = Math.floor(fc / 60) % id.crystals.length;
    id.crystals[shIdx].shimmerTimer = Math.max(id.crystals[shIdx].shimmerTimer, 1);
  }
  for (const cr of id.crystals) {
    ctx.save();
    ctx.translate(cr.x, cr.y);
    ctx.rotate(cr.rot);
    const ch = cr.h * scale;
    const cw = cr.w * scale;
    const shimmer = cr.shimmerTimer > 0 ? 0.08 : 0;
    if (cr.shimmerTimer > 0) cr.shimmerTimer--;
    ctx.globalAlpha = cr.alpha + shimmer;
    // Gradient fill
    const cg = ctx.createLinearGradient(-cw/2, -ch/2, cw/2, ch/2);
    cg.addColorStop(0, '#e8f8ff');
    cg.addColorStop(0.4, '#90d8f8');
    cg.addColorStop(1, '#4890c0');
    ctx.fillStyle = cg;
    // Pentagonal elongated shape: sharp top, two angled sides, two bottom edges
    ctx.beginPath();
    ctx.moveTo(0, -ch/2);             // sharp top point
    ctx.lineTo(cw/2, -ch*0.1);       // upper right
    ctx.lineTo(cw*0.6, ch/2);        // lower right
    ctx.lineTo(-cw*0.6, ch/2);       // lower left
    ctx.lineTo(-cw/2, -ch*0.1);      // upper left
    ctx.closePath();
    ctx.fill();
    // Internal facet line
    if (cr.hasHighlight) {
      ctx.globalAlpha = cr.alpha * 0.6 + shimmer;
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -ch/2);
      ctx.lineTo(cw * 0.12, ch * 0.25);
      ctx.stroke();
    }
    ctx.restore();
  }

  // 4. Ice fog at bottom
  const fogY = id.fogParams.baseY + Math.sin(fc * 0.005) * 10;
  const fg = ctx.createLinearGradient(0, fogY, 0, H);
  fg.addColorStop(0, 'transparent');
  fg.addColorStop(0.4, 'rgba(160,210,240,0.06)');
  fg.addColorStop(1, 'rgba(180,220,255,0.12)');
  ctx.fillStyle = fg;
  ctx.fillRect(0, fogY, W, H - fogY);

  // 5. Sparkles (4-pointed diamonds)
  for (const sp of id.sparkles) {
    const alpha = 0.3 + Math.sin(fc * 0.06 + sp.phase) * 0.3;
    if (alpha < 0.05) {
      sp.x = Math.random() * W;
      sp.y = Math.random() * H;
      sp.phase = Math.random() * Math.PI * 2;
      continue;
    }
    const ss = sp.size * scale;
    ctx.save();
    ctx.translate(sp.x, sp.y);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(0, -ss * 2);
    ctx.lineTo(ss * 0.4, 0);
    ctx.lineTo(0, ss * 2);
    ctx.lineTo(-ss * 0.4, 0);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-ss * 2, 0);
    ctx.lineTo(0, ss * 0.4);
    ctx.lineTo(ss * 2, 0);
    ctx.lineTo(0, -ss * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawSupernovaDecor() {
  const t = frameCount;

  // Shockwave rings from bottom center
  const ringCenterX = W / 2;
  const ringCenterY = H + 50;
  for (let i = 0; i < 3; i++) {
    const radius = ((t * 0.5 + i * 200) % 600) * scale;
    const alpha = Math.max(0, 0.3 - radius / (600 * scale) * 0.3);
    if (alpha > 0.01) {
      ctx.strokeStyle = i === 0 ? '#FF5722' : (i === 1 ? '#FF9800' : '#FFCC80');
      ctx.lineWidth = (20 - i * 5) * scale * (1 - radius / (600 * scale));
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(ringCenterX, ringCenterY, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Bottom glow
  const glowGrad = ctx.createRadialGradient(W / 2, H + 30, 0, W / 2, H + 30, H * 0.7);
  glowGrad.addColorStop(0, 'rgba(255,87,34,0.15)');
  glowGrad.addColorStop(0.5, 'rgba(255,152,0,0.05)');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, W, H);

  // Embers floating up
  for (const d of worldDecor) {
    if (d.type !== 'ember') continue;
    d.y -= d.speed * 0.002;
    if (d.y < -0.05) { d.y = 1.05; d.x = Math.random(); }
    ctx.globalAlpha = d.alpha;
    ctx.fillStyle = d.color;
    ctx.beginPath();
    ctx.arc(d.x * W, d.y * H, d.r * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// --- COLLISION ---
function checkCollision(a) {
  // circle vs rectangle approximation (ship as ellipse)
  const dx = a.x - ship.x;
  const dy = a.y - ship.y;
  const sw = ship.w * 0.4; // hitbox narrower than visual
  const sh = ship.h * 0.45;
  const nx = dx / (sw + a.r);
  const ny = dy / (sh + a.r);
  return (nx * nx + ny * ny) < 1;
}

// --- UPDATE ---
function update() {
  frameCount++;
  updateStars();

  // World title timer
  if (gameState === 'worldtitle') {
    transitionTimer--;
    if (transitionTimer <= 0) startCountdown();
    return;
  }

  // Countdown timer
  if (gameState === 'countdown') {
    transitionTimer--;
    if (transitionTimer <= 0) {
      countdownNum--;
      if (countdownNum > 0) {
        transitionTimer = 60;
        playSound('beep');
      } else if (countdownNum === 0) {
        transitionTimer = 40;
        playSound('beepgo');
      } else {
        gameState = 'playing';
        playSound('start');
        restartMusic();
      }
    }
    return;
  }

  // Level complete screen (auto-advance)
  if (gameState === 'levelcomplete') {
    transitionTimer--;
    if (transitionTimer <= 0) {
      currentWorld++;
      if (currentWorld >= WORLDS.length) {
        // Beat all worlds!
        gameState = 'victory';
        stopMusic();
        playSound('victory');
        endlessUnlocked = true;
        localStorage.setItem('sd_endless', 'true');
        // Unlock next ship
        const nextShip = selectedShip + 1;
        if (nextShip < SHIPS.length && !unlockedShips.includes(nextShip)) {
          unlockedShips.push(nextShip);
          localStorage.setItem('sd_unlocked', JSON.stringify(unlockedShips));
        }
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('sd_best', bestScore.toString());
        }
      } else {
        showWorldTitle();
      }
    }
    return;
  }

  if (gameState !== 'playing') return;

  worldFrameCount++;

  // Ship movement
  const moveSpeed = ship.speed * scale;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) ship.x -= moveSpeed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ship.x += moveSpeed;

  // Touch control
  if (touchActive && touchX !== null) {
    const dx = touchX - ship.x;
    if (Math.abs(dx) > 5) {
      ship.x += Math.sign(dx) * Math.min(Math.abs(dx) * 0.15, moveSpeed);
    }
  }

  // Clamp
  ship.x = Math.max(ship.w / 2, Math.min(W - ship.w / 2, ship.x));

  // Auto-fire blasters
  blasterTimer++;
  const fireRate = plasmaActive ? PLASMA_FIRE_RATE : BLASTER_FIRE_RATE;
  if (blasterTimer >= fireRate) {
    spawnBlaster();
    blasterTimer = 0;
  }

  // Timers
  if (invincibleTimer > 0) invincibleTimer--;
  if (wobbleTimer > 0) wobbleTimer--;

  // Speed ramp (per-world values for campaign, escalating for endless)
  const w = gameMode === 'campaign' ? WORLDS[currentWorld] : WORLDS[Math.min(Math.floor(frameCount / 3600), WORLDS.length - 1)];
  currentSpeed = w.baseSpeed + worldFrameCount * w.speedInc;
  spawnInterval = Math.max(w.spawnMin, w.spawnStart - worldFrameCount * w.spawnDec);

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnAsteroid();
    spawnTimer = 0;
  }

  // Mega Beam — destroy asteroids in beam column
  if (megabeamActive) {
    const beamLeft = ship.x - MEGABEAM_WIDTH * scale / 2;
    const beamRight = ship.x + MEGABEAM_WIDTH * scale / 2;
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      if (a.x + a.r > beamLeft && a.x - a.r < beamRight && a.y < ship.y - ship.h / 2) {
        spawnExplosionParticles(a.x, a.y, a.r);
        playSound('explode');
        score++;
        levelScore++;
        levelBlasted++;
        if (gameMode === 'campaign') worldProgress += BLAST_PROGRESS;
        asteroids.splice(j, 1);
      }
    }
  }

  // Update asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.y += a.speed;
    a.rot += a.rotSpeed;

    // Score when asteroid passes below ship
    if (a.y > ship.y + ship.h && !a.scored) {
      a.scored = true;
      score++;
      levelScore++;
      if (gameMode === 'campaign') worldProgress += DODGE_PROGRESS;
      if (score % 50 === 0) playSound('score');
    }

    // Off screen
    if (a.y > H + a.r * 2) {
      asteroids.splice(i, 1);
      continue;
    }

    // Collision
    if (!phaseActive && invincibleTimer <= 0 && checkCollision(a)) {
      if (shieldActive) {
        // Shield absorbs the hit!
        shieldActive = false;
        spawnHitParticles(a.x, a.y);
        playSound('shieldbreak');
        asteroids.splice(i, 1);
        invincibleTimer = 30; // brief invincibility after shield break
        // Green shield break particles
        for (let p = 0; p < 10; p++) {
          const ang = Math.random() * Math.PI * 2;
          particles.push({ x: ship.x, y: ship.y, vx: Math.cos(ang) * 4, vy: Math.sin(ang) * 4, life: 25, maxLife: 25, size: 3, color: '#69F0AE' });
        }
      } else {
        lives--;
        spawnHitParticles(a.x, a.y);
        playSound('hit');
        asteroids.splice(i, 1);

        if (lives <= 0) {
          gameState = 'gameover';
          stopMusic();
          playSound('lose');
          if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('sd_best', bestScore.toString());
          }
        } else {
          invincibleTimer = INVINCIBLE_DURATION;
          wobbleTimer = WOBBLE_DURATION;
        }
      }
    }
  }

  // Check world completion (campaign only)
  if (gameMode === 'campaign' && worldProgress >= WORLDS[currentWorld].threshold) {
    gameState = 'levelcomplete';
    transitionTimer = 180;
    stopMusic();
    playSound('levelup');
  }

  updatePowerups();
  updateBlasters();
  updateParticles();
}

// --- DRAW ---
function draw() {
  if (gameState === 'title') { drawTitle(); return; }
  if (gameState === 'shippicker') { drawShipPicker(); return; }
  if (gameState === 'worldtitle') { drawWorldTitle(); return; }
  if (gameState === 'countdown') { drawCountdown(); return; }
  if (gameState === 'gameover') { drawGameOver(); return; }
  if (gameState === 'levelcomplete') { drawLevelComplete(); return; }
  if (gameState === 'victory') { drawVictory(); return; }

  // Playing
  drawWorldBackground();
  for (const a of asteroids) drawAsteroid(a);
  drawMegaBeam();
  drawShip(ship.x, ship.y, ship.w, ship.h, wobbleTimer);
  drawPhaseEffect();
  drawShieldEffect();
  drawBlasters();
  drawPowerups();
  drawParticles();
  drawHUD();
  drawPowerupHUD();
  drawPauseButton();
}

// --- PAUSE ---
let paused = false;
let pauseBtn = {};
let pauseMenuBtns = { resume: {}, restart: {}, menu: {} };

let muteBtn = {};

function drawMuteButton() {
  const sz = 30 * scale;
  const x = W - sz - 52 * scale;
  const y = 13;
  muteBtn = { x, y, w: sz, h: sz };
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.beginPath();
  ctx.roundRect(x, y, sz, sz, 5);
  ctx.fill();
  ctx.fillStyle = muted ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.6)';
  ctx.font = `${Math.round(14 * scale)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(muted ? '🔇' : '🔊', x + sz / 2, y + sz / 2 + 4 * scale);
}

function drawPauseButton() {
  const sz = 36 * scale;
  const x = W - sz - 10;
  const y = 10;
  pauseBtn = { x, y, w: sz, h: sz };
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.roundRect(x, y, sz, sz, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = `${Math.round(18 * scale)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(paused ? '▶' : '⏸', x + sz / 2, y + sz / 2 + 5 * scale);
  drawMuteButton();
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(36 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H * 0.3);

  // Buttons
  const btnW = 180 * scale;
  const btnH = 44 * scale;
  const gap = 14 * scale;
  const startY = H * 0.4;

  // Resume
  const rY = startY;
  ctx.fillStyle = '#2E7D32';
  ctx.beginPath(); ctx.roundRect(W / 2 - btnW / 2, rY, btnW, btnH, 8); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(16 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText('▶  RESUME', W / 2, rY + btnH / 2 + 5 * scale);
  pauseMenuBtns.resume = { x: W / 2 - btnW / 2, y: rY, w: btnW, h: btnH };

  // Restart
  const rsY = startY + btnH + gap;
  ctx.fillStyle = '#1565C0';
  ctx.beginPath(); ctx.roundRect(W / 2 - btnW / 2, rsY, btnW, btnH, 8); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText('🔄  RESTART', W / 2, rsY + btnH / 2 + 5 * scale);
  pauseMenuBtns.restart = { x: W / 2 - btnW / 2, y: rsY, w: btnW, h: btnH };

  // Menu
  const mY = startY + (btnH + gap) * 2;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath(); ctx.roundRect(W / 2 - btnW / 2, mY, btnW, btnH, 8); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('🏠  MENU', W / 2, mY + btnH / 2 + 5 * scale);
  pauseMenuBtns.menu = { x: W / 2 - btnW / 2, y: mY, w: btnW, h: btnH };

  // Mute button on pause screen
  drawMuteButton();
}

function handlePauseClick(tx, ty) {
  if (hitTest(tx, ty, pauseMenuBtns.resume)) { paused = false; return; }
  if (hitTest(tx, ty, pauseMenuBtns.restart)) {
    paused = false;
    if (gameMode === 'campaign') {
      showWorldTitle();
    } else {
      gameState = 'playing';
      resetPlayState();
      generateWorldDecor();
    }
    return;
  }
  if (hitTest(tx, ty, pauseMenuBtns.menu)) {
    paused = false;
    stopMusic();
    gameState = 'title';
    return;
  }
}

// --- MAIN LOOP ---
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  if (!lastTime) { lastTime = timestamp; return; }
  const delta = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += delta;

  if (!paused) {
    while (accumulator >= FRAME_TIME) {
      update();
      accumulator -= FRAME_TIME;
    }
  }

  draw();
  if (paused && gameState === 'playing') drawPauseOverlay();
}

// --- INPUT HANDLERS ---
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
    handleAction();
  }
  if (e.key === 'Escape' && gameState === 'playing') {
    paused = !paused;
  }
  if (e.key === 'm' || e.key === 'M') {
    toggleMute();
  }
  // Arrow keys cycle ships on title
  if (gameState === 'title' && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
    e.preventDefault();
    if (e.key === 'ArrowLeft') selectedShip = (selectedShip - 1 + SHIPS.length) % SHIPS.length;
    else selectedShip = (selectedShip + 1) % SHIPS.length;
    localStorage.setItem('sd_ship', selectedShip.toString());
  }
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
});

function handleAction() {
  if (gameState === 'title') { if (unlockedShips.includes(selectedShip)) startCampaign(); return; }
  if (gameState === 'gameover') { gameState = 'title'; if (!muted) restartMusic(); return; }
  if (gameState === 'victory') { gameState = 'title'; if (!muted) restartMusic(); return; }
  if (gameState === 'playing' && paused) { paused = false; }
}

// Helpers
function hitTest(x, y, btn) {
  return btn.w && x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h;
}

function handleTitleClick(tx, ty) {
  initAudio();
  if (!musicPlaying && !muted) startMusic(); // ambient music on title
  // Ship picker arrows
  if (hitTest(tx, ty, titleBtns.prevShip)) {
    selectedShip = (selectedShip - 1 + SHIPS.length) % SHIPS.length;
    localStorage.setItem('sd_ship', selectedShip.toString());
    playSound('beep');
    return true;
  }
  if (hitTest(tx, ty, titleBtns.nextShip)) {
    selectedShip = (selectedShip + 1) % SHIPS.length;
    localStorage.setItem('sd_ship', selectedShip.toString());
    playSound('beep');
    return true;
  }
  if (hitTest(tx, ty, titleBtns.campaign)) {
    if (!unlockedShips.includes(selectedShip)) return false; // can't play locked ship
    startCampaign(); return true;
  }
  if (hitTest(tx, ty, titleBtns.endless) && endlessUnlocked) {
    if (!unlockedShips.includes(selectedShip)) return false;
    startEndless(); return true;
  }
  return false;
}

function handlePickerClick(tx, ty) {
  // Back button
  if (hitTest(tx, ty, pickerBackBtn)) { gameState = 'title'; return; }

  // Ship card clicks
  const cardW = Math.min(130, (W - 60) / 5) * scale;
  const cardH = cardW * 1.4;
  const gap = 12 * scale;
  const totalW = SHIPS.length * cardW + (SHIPS.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const cardY = H * 0.22;

  for (let i = 0; i < SHIPS.length; i++) {
    const cx = startX + i * (cardW + gap);
    if (tx >= cx && tx <= cx + cardW && ty >= cardY && ty <= cardY + cardH) {
      if (unlockedShips.includes(i)) {
        selectedShip = i;
        localStorage.setItem('sd_ship', selectedShip.toString());
        playSound('start');
      }
      return;
    }
  }
}

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
  const ty = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);

  // Check menu button
  if (hitTest(tx, ty, menuBtn)) { window.location.href = '/'; return; }

  // Check mute button
  if (hitTest(tx, ty, muteBtn)) { initAudio(); toggleMute(); return; }

  // Check pause button
  if (gameState === 'playing' && !paused && hitTest(tx, ty, pauseBtn)) { paused = true; return; }

  // Pause menu
  if (gameState === 'playing' && paused) { handlePauseClick(tx, ty); return; }

  if (gameState === 'title') { handleTitleClick(tx, ty); return; }
  if (gameState === 'shippicker') { initAudio(); handlePickerClick(tx, ty); return; }
  if (gameState === 'gameover' || gameState === 'victory') { gameState = 'title'; if (!muted) restartMusic(); return; }

  touchActive = true;
  touchX = tx;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  const rect = canvas.getBoundingClientRect();
  touchX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  touchX = null;
}, { passive: false });

// Mouse click (for desktop)
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);

  if (hitTest(mx, my, menuBtn)) { window.location.href = '/'; return; }
  if (hitTest(mx, my, muteBtn)) { initAudio(); toggleMute(); return; }
  if (gameState === 'playing' && !paused && hitTest(mx, my, pauseBtn)) { paused = true; return; }
  if (gameState === 'playing' && paused) { handlePauseClick(mx, my); return; }
  if (gameState === 'title') { handleTitleClick(mx, my); return; }
  if (gameState === 'shippicker') { initAudio(); handlePickerClick(mx, my); return; }

  handleAction();
});

// --- INIT ---
initStars();
// Force initial paint (Safari fix)
ctx.fillStyle = '#0a0a2e';
ctx.fillRect(0, 0, W, H);
drawStars();
requestAnimationFrame(() => { requestAnimationFrame(gameLoop); });

</script>
