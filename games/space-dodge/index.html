<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="description" content="Dodge and blast asteroids in space! A free, ad-free browser game for kids.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100dvh;
    overflow: hidden;
    background: #0a0a2e;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #rotate-overlay {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0a0a2e;
    color: #fff;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    font-size: 24px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 16px;
  }
  #rotate-overlay .phone-icon { font-size: 60px; animation: tiltPhone 1.5s ease-in-out infinite; }
  @keyframes tiltPhone { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }
  @media (orientation: portrait) and (max-width: 900px) {
    #rotate-overlay { display: flex !important; }
    canvas { display: none !important; }
  }
</style>
</head>

// --- AUDIO ---
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch (type) {
    case 'hit':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.3);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
      break;
    case 'dodge':
      // subtle whoosh for near misses — future
      break;
    case 'lose':
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(55, t + 0.6);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.start(t); osc.stop(t + 0.6);
      break;
    case 'start':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(330, t);
      osc.frequency.setValueAtTime(440, t + 0.1);
      osc.frequency.setValueAtTime(660, t + 0.2);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
      break;
    case 'score':
      // every 50 points
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.08);
      osc.frequency.setValueAtTime(784, t + 0.16);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
      break;
    case 'blaster':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
      gain.gain.setValueAtTime(0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t); osc.stop(t + 0.1);
      break;
    case 'explode':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.2);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(t); osc.stop(t + 0.25);
      break;
  }
}

// --- RESIZE ---
function resize() {
  const vv = window.visualViewport || { width: window.innerWidth, height: window.innerHeight };
  canvas.width = vv.width;
  canvas.height = vv.height;
  W = canvas.width;
  H = canvas.height;
  scale = Math.min(W / 800, H / 500);
}
window.addEventListener('resize', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

// --- STARS (background) ---
function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.8 + 0.2,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function updateStars() {
  for (const s of stars) {
    s.y += s.speed * (gameState === 'playing' ? 1.5 : 0.5);
    s.twinkle += 0.03;
    if (s.y > H + 5) { s.y = -5; s.x = Math.random() * W; }
  }
}

function drawStars() {
  for (const s of stars) {
    const alpha = 0.4 + 0.3 * Math.sin(s.twinkle);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- SHIP DRAWING ---
function drawShip(x, y, w, h, wobble) {
  ctx.save();
  ctx.translate(x, y);

  // wobble effect
  if (wobble > 0) {
    const wobAng = Math.sin(wobble * 0.8) * 0.25;
    ctx.rotate(wobAng);
  }

  // invincible flash
  if (invincibleTimer > 0 && Math.floor(invincibleTimer / 6) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  const hw = w / 2;
  const hh = h / 2;

  // Animated Canvas exhaust flames (drawn BEHIND ship)
  const flameH = 14 + Math.random() * 12;
  const flameW = w * 0.35;
  // Outer flame
  ctx.fillStyle = '#E65100';
  ctx.beginPath();
  ctx.moveTo(-flameW / 2, hh * 0.75);
  ctx.quadraticCurveTo(-flameW * 0.1, hh + flameH * 0.7, 0, hh + flameH);
  ctx.quadraticCurveTo(flameW * 0.1, hh + flameH * 0.7, flameW / 2, hh * 0.75);
  ctx.fill();
  // Mid flame
  ctx.fillStyle = '#FFB300';
  ctx.beginPath();
  ctx.moveTo(-flameW / 3, hh * 0.75);
  ctx.quadraticCurveTo(0, hh + flameH * 0.6, 0, hh + flameH * 0.8);
  ctx.quadraticCurveTo(0, hh + flameH * 0.6, flameW / 3, hh * 0.75);
  ctx.fill();
  // Core flame
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(-flameW / 6, hh * 0.75);
  ctx.quadraticCurveTo(0, hh + flameH * 0.3, 0, hh + flameH * 0.5);
  ctx.quadraticCurveTo(0, hh + flameH * 0.3, flameW / 6, hh * 0.75);
  ctx.fill();

  // SVG ship body
  if (shipImgReady) {
    // The SVG has wings extending to edges — draw it sized to include wing span
    // Ship draw width is wider than hitbox to show wings
    const drawW = w * 1.7;
    const drawH = h * 1.3;
    ctx.drawImage(shipImg, -drawW / 2, -drawH / 2, drawW, drawH);
  } else {
    // Fallback: simple Canvas ship while SVG loads
    const grad = ctx.createLinearGradient(-hw, 0, hw, 0);
    grad.addColorStop(0, '#2962FF');
    grad.addColorStop(0.5, '#42A5F5');
    grad.addColorStop(1, '#0D47A1');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.bezierCurveTo(hw * 0.3, -hh, hw, -hh * 0.4, hw, hh * 0.5);
    ctx.lineTo(hw * 0.6, hh);
    ctx.lineTo(-hw * 0.6, hh);
    ctx.lineTo(-hw, hh * 0.5);
    ctx.bezierCurveTo(-hw, -hh * 0.4, -hw * 0.3, -hh, 0, -hh);
    ctx.fill();
    // Nose
    ctx.fillStyle = '#f44336';
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.bezierCurveTo(hw * 0.15, -hh, hw * 0.35, -hh * 0.55, hw * 0.35, -hh * 0.35);
    ctx.lineTo(-hw * 0.35, -hh * 0.35);
    ctx.bezierCurveTo(-hw * 0.35, -hh * 0.55, -hw * 0.15, -hh, 0, -hh);
    ctx.fill();
    // Window
    ctx.fillStyle = '#81D4FA';
    ctx.beginPath();
    ctx.arc(0, -hh * 0.1, hw * 0.28, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// --- ASTEROID DRAWING ---
function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);

  if (asteroidImgReady) {
    // SVG viewBox 200x200, asteroid shape spans ~170px diameter
    // Scale so game radius matches visual radius
    const drawSize = a.r * 2.35;
    ctx.drawImage(asteroidImg, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
  } else {
    // Canvas fallback
    const grad = ctx.createRadialGradient(0, 0, a.r * 0.2, 0, 0, a.r);
    grad.addColorStop(0, '#a0896e');
    grad.addColorStop(0.6, '#8b7355');
    grad.addColorStop(1, '#6b5540');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, a.r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function spawnAsteroid() {
  const r = 18 + Math.random() * 28;
  asteroids.push({
    x: r + Math.random() * (W - r * 2),
    y: -r * 2,
    r: r,
    speed: currentSpeed * (0.7 + Math.random() * 0.6),
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04
  });
}

// --- PARTICLES ---
function spawnHitParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 2 + Math.random() * 3,
      color: ['#ff6600', '#ffcc00', '#ff3333', '#fff'][Math.floor(Math.random() * 4)]
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- BLASTERS ---
function spawnBlaster() {
  blasters.push({
    x: ship.x,
    y: ship.y - ship.h / 2,
    w: BLASTER_WIDTH * scale,
    h: BLASTER_HEIGHT * scale
  });
  playSound('blaster');
}

function updateBlasters() {
  for (let i = blasters.length - 1; i >= 0; i--) {
    const b = blasters[i];
    b.y -= BLASTER_SPEED * scale;
    if (b.y + b.h < 0) { blasters.splice(i, 1); continue; }

    // Check collision with asteroids
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (dx * dx + dy * dy < (a.r + b.w) * (a.r + b.w)) {
        // Asteroid destroyed!
        spawnExplosionParticles(a.x, a.y, a.r);
        playSound('explode');
        score++;
        if (score % 50 === 0) playSound('score');
        asteroids.splice(j, 1);
        blasters.splice(i, 1);
        break;
      }
    }
  }
}

function drawBlasters() {
  for (const b of blasters) {
    // Glowing pellet
    ctx.shadowColor = '#42A5F5';
    ctx.shadowBlur = 8;
    const grad = ctx.createLinearGradient(b.x, b.y - b.h / 2, b.x, b.y + b.h / 2);
    grad.addColorStop(0, '#90caf9');
    grad.addColorStop(0.5, '#42A5F5');
    grad.addColorStop(1, '#1565C0');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, b.w / 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function spawnExplosionParticles(x, y, radius) {
  const count = 10 + Math.floor(radius * 0.4);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 25 + Math.random() * 20,
      maxLife: 45,
      size: 2 + Math.random() * 4,
      color: ['#ff6600', '#ffcc00', '#a0896e', '#fff', '#ff3333'][Math.floor(Math.random() * 5)]
    });
  }
}

// --- HEARTS ---
function drawHearts() {
  const heartSize = 18 * scale;
  const startX = 14;
  const startY = 14;
  for (let i = 0; i < MAX_LIVES; i++) {
    const x = startX + i * (heartSize + 8);
    const y = startY;
    drawHeart(x, y, heartSize, i < lives ? '#f44336' : '#333');
  }
}

function drawHeart(x, y, size, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color;
  ctx.beginPath();
  const s = size / 2;
  ctx.moveTo(0, s * 0.3);
  ctx.bezierCurveTo(-s, -s * 0.5, -s, -s, 0, -s * 0.4);
  ctx.bezierCurveTo(s, -s, s, -s * 0.5, 0, s * 0.3);
  ctx.fill();
  // shine
  if (color !== '#333') {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(-s * 0.25, -s * 0.35, s * 0.2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// --- HUD ---
function drawHUD() {
  drawHearts();

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(22 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText(score, W - 14, 32 * scale);

  // Best
  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.round(13 * scale)}px Arial, sans-serif`;
    ctx.fillText('BEST ' + bestScore, W - 14, 50 * scale);
  }
}

// --- TITLE SCREEN ---
let titleShipBob = 0;

function drawTitle() {
  // Background
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  titleShipBob += 0.03;

  // Ship
  const shipY = H * 0.42 + Math.sin(titleShipBob) * 8;
  drawShip(W / 2, shipY, SHIP_WIDTH * 1.8 * scale, SHIP_HEIGHT * 1.8 * scale, 0);

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(42 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('SPACE DODGE', W / 2, H * 0.13);

  // Subtitle
  ctx.fillStyle = '#42A5F5';
  ctx.font = `${Math.round(16 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText('Dodge and blast the asteroids!', W / 2, H * 0.2);

  // Floating asteroids (decorative)
  const decT = Date.now() / 1000;
  for (let i = 0; i < 3; i++) {
    const ax = W * (0.15 + i * 0.35) + Math.sin(decT + i * 2) * 20;
    const ay = H * 0.7 + Math.cos(decT * 0.7 + i) * 15;
    const aSize = (36 + i * 10) * scale;
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(decT * 0.3 * (i % 2 === 0 ? 1 : -1));
    if (asteroidImgReady) {
      ctx.drawImage(asteroidImg, -aSize / 2, -aSize / 2, aSize, aSize);
    } else {
      ctx.fillStyle = '#6b5540';
      ctx.beginPath();
      ctx.arc(0, 0, aSize / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Prompt
  const blink = Math.sin(Date.now() / 400) > 0;
  if (blink) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = `bold ${Math.round(20 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('TAP OR PRESS SPACE TO START', W / 2, H * 0.88);
  }

  // Best score
  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.95);
  }

  // Menu button
  drawMenuButton();
}

// --- MENU BUTTON ---
function drawMenuButton() {
  const btnW = 70 * scale;
  const btnH = 30 * scale;
  const btnX = 10;
  const btnY = H - btnH - 10;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = `bold ${Math.round(13 * scale)}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('🏠 MENU', btnX + btnW / 2, btnY + btnH / 2 + 4 * scale);
  // store for click detection
  menuBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
}
let menuBtn = {};

// --- GAME OVER SCREEN ---
function drawGameOver() {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, W, H);
  drawStars();
  drawParticles();

  // Title
  ctx.fillStyle = '#ffcc00';
  ctx.font = `bold ${Math.round(38 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('GREAT RUN!', W / 2, H * 0.22);

  // Stars decoration
  const starY = H * 0.3;
  for (let i = 0; i < 3; i++) {
    const sx = W / 2 + (i - 1) * 50 * scale;
    drawStar5(sx, starY, 16 * scale, '#ffcc00');
  }

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(52 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText(score, W / 2, H * 0.48);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${Math.round(16 * scale)}px Arial, sans-serif`;
  ctx.fillText('ASTEROIDS CLEARED', W / 2, H * 0.55);

  // New best
  if (score >= bestScore && score > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = `bold ${Math.round(18 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('⭐ NEW BEST! ⭐', W / 2, H * 0.64);
  } else if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.64);
  }

  // Prompt
  const blink = Math.sin(Date.now() / 400) > 0;
  if (blink) {
    ctx.fillStyle = '#42A5F5';
    ctx.font = `bold ${Math.round(20 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('TAP OR PRESS SPACE TO RETRY', W / 2, H * 0.8);
  }

  drawMenuButton();
}

function drawStar5(cx, cy, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
  }
  ctx.closePath();
  ctx.fill();
}

// --- GAME INIT ---
function startGame() {
  initAudio();
  playSound('start');
  gameState = 'playing';
  ship = { x: W / 2, y: H * 0.8, w: SHIP_WIDTH * scale, h: SHIP_HEIGHT * scale, speed: 6 };
  asteroids = [];
  blasters = [];
  blasterTimer = 0;
  particles = [];
  score = 0;
  lives = MAX_LIVES;
  invincibleTimer = 0;
  wobbleTimer = 0;
  spawnTimer = 0;
  spawnInterval = SPAWN_INTERVAL_START;
  currentSpeed = BASE_ASTEROID_SPEED;
  frameCount = 0;
}

// --- COLLISION ---
function checkCollision(a) {
  // circle vs rectangle approximation (ship as ellipse)
  const dx = a.x - ship.x;
  const dy = a.y - ship.y;
  const sw = ship.w * 0.4; // hitbox narrower than visual
  const sh = ship.h * 0.45;
  const nx = dx / (sw + a.r);
  const ny = dy / (sh + a.r);
  return (nx * nx + ny * ny) < 1;
}

// --- UPDATE ---
function update() {
  frameCount++;
  updateStars();

  if (gameState !== 'playing') return;

  // Ship movement
  const moveSpeed = ship.speed * scale;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) ship.x -= moveSpeed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ship.x += moveSpeed;

  // Touch control
  if (touchActive && touchX !== null) {
    const dx = touchX - ship.x;
    if (Math.abs(dx) > 5) {
      ship.x += Math.sign(dx) * Math.min(Math.abs(dx) * 0.15, moveSpeed);
    }
  }

  // Clamp
  ship.x = Math.max(ship.w / 2, Math.min(W - ship.w / 2, ship.x));

  // Auto-fire blasters
  blasterTimer++;
  if (blasterTimer >= BLASTER_FIRE_RATE) {
    spawnBlaster();
    blasterTimer = 0;
  }

  // Timers
  if (invincibleTimer > 0) invincibleTimer--;
  if (wobbleTimer > 0) wobbleTimer--;

  // Speed ramp
  currentSpeed = BASE_ASTEROID_SPEED + frameCount * SPEED_INCREMENT;
  spawnInterval = Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_START - frameCount * SPAWN_INTERVAL_DECREMENT);

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnAsteroid();
    spawnTimer = 0;
  }

  // Update asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.y += a.speed;
    a.rot += a.rotSpeed;

    // Score when asteroid passes below ship
    if (a.y > ship.y + ship.h && !a.scored) {
      a.scored = true;
      score++;
      if (score % 50 === 0) playSound('score');
    }

    // Off screen
    if (a.y > H + a.r * 2) {
      asteroids.splice(i, 1);
      continue;
    }

    // Collision
    if (invincibleTimer <= 0 && checkCollision(a)) {
      lives--;
      spawnHitParticles(a.x, a.y);
      playSound('hit');
      asteroids.splice(i, 1);

      if (lives <= 0) {
        gameState = 'gameover';
        playSound('lose');
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('sd_best', bestScore.toString());
        }
      } else {
        invincibleTimer = INVINCIBLE_DURATION;
        wobbleTimer = WOBBLE_DURATION;
      }
    }
  }

  updateBlasters();
  updateParticles();
}

// --- DRAW ---
function draw() {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'title') {
    drawTitle();
    return;
  }

  if (gameState === 'gameover') {
    drawGameOver();
    return;
  }

  // Playing
  drawStars();

  // Asteroids
  for (const a of asteroids) drawAsteroid(a);

  // Blasters
  drawBlasters();

  // Ship
  drawShip(ship.x, ship.y, ship.w, ship.h, wobbleTimer);

  // Particles
  drawParticles();

  // HUD
  drawHUD();

  // Pause button
  drawPauseButton();
}

// --- PAUSE ---
let paused = false;
let pauseBtn = {};

function drawPauseButton() {
  const sz = 36 * scale;
  const x = W - sz - 10;
  const y = H - sz - 10;
  pauseBtn = { x, y, w: sz, h: sz };
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.roundRect(x, y, sz, sz, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = `${Math.round(18 * scale)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(paused ? '▶' : '⏸', x + sz / 2, y + sz / 2 + 5 * scale);
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(36 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${Math.round(16 * scale)}px Arial, sans-serif`;
  ctx.fillText('Tap or press Space to continue', W / 2, H / 2 + 30 * scale);
}

// --- MAIN LOOP ---
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  if (!lastTime) { lastTime = timestamp; return; }
  const delta = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += delta;

  if (!paused) {
    while (accumulator >= FRAME_TIME) {
      update();
      accumulator -= FRAME_TIME;
    }
  }

  draw();
  if (paused && gameState === 'playing') drawPauseOverlay();
}

// --- INPUT HANDLERS ---
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
    handleAction();
  }
  if (e.key === 'Escape' && gameState === 'playing') {
    paused = !paused;
  }
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
});

function handleAction() {
  if (gameState === 'title') { startGame(); return; }
  if (gameState === 'gameover') { gameState = 'title'; return; }
  if (gameState === 'playing' && paused) { paused = false; }
}

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
  const ty = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);

  // Check menu button
  if (menuBtn.w && tx >= menuBtn.x && tx <= menuBtn.x + menuBtn.w && ty >= menuBtn.y && ty <= menuBtn.y + menuBtn.h) {
    window.location.href = '/';
    return;
  }

  // Check pause button
  if (gameState === 'playing' && pauseBtn.w) {
    if (tx >= pauseBtn.x && tx <= pauseBtn.x + pauseBtn.w && ty >= pauseBtn.y && ty <= pauseBtn.y + pauseBtn.h) {
      paused = !paused;
      return;
    }
  }

  if (gameState === 'title') { initAudio(); startGame(); return; }
  if (gameState === 'gameover') { gameState = 'title'; return; }
  if (paused) { paused = false; return; }

  touchActive = true;
  touchX = tx;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  const rect = canvas.getBoundingClientRect();
  touchX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  touchX = null;
}, { passive: false });

// Mouse click (for desktop)
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);

  // Menu button
  if (menuBtn.w && mx >= menuBtn.x && mx <= menuBtn.x + menuBtn.w && my >= menuBtn.y && my <= menuBtn.y + menuBtn.h) {
    window.location.href = '/';
    return;
  }

  // Pause button
  if (gameState === 'playing' && pauseBtn.w) {
    if (mx >= pauseBtn.x && mx <= pauseBtn.x + pauseBtn.w && my >= pauseBtn.y && my <= pauseBtn.y + pauseBtn.h) {
      paused = !paused;
      return;
    }
  }

  handleAction();
});

// --- INIT ---
initStars();
// Force initial paint (Safari fix)
ctx.fillStyle = '#0a0a2e';
ctx.fillRect(0, 0, W, H);
drawStars();
requestAnimationFrame(() => { requestAnimationFrame(gameLoop); });

</script>
