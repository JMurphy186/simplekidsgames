// Preload all ship images
const shipImages = SHIPS.map(s => {
  const img = new Image();
  img.src = s.svg;
  return img;
});
let shipsLoaded = 0;
shipImages.forEach(img => { img.onload = () => { shipsLoaded++; }; });

// Ship selection & unlocks
let selectedShip = parseInt(localStorage.getItem('sd_ship') || '0');
let unlockedShips = JSON.parse(localStorage.getItem('sd_unlocked') || '[0]');
// Ensure ship 0 always unlocked
if (!unlockedShips.includes(0)) unlockedShips.unshift(0);
function getShip() { return SHIPS[selectedShip]; }
function isShipReady() { return shipImages[selectedShip].complete && shipImages[selectedShip].naturalWidth > 0; }

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function toggleMute() {
  muted = !muted;
  localStorage.setItem('sd_muted', muted.toString());
  if (muted) stopMusic();
  else if (gameState === 'playing') startMusic();
}

function playSound(type) {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch (type) {
    case 'hit':
      // Deeper bass hit + crunch
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(180, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.35);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
      // Add noise burst for crunch
      { const n = audioCtx.createOscillator(); const ng = audioCtx.createGain();
        n.type = 'square'; n.frequency.setValueAtTime(100, t);
        n.frequency.exponentialRampToValueAtTime(30, t + 0.15);
        ng.gain.setValueAtTime(0.12, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        n.connect(ng); ng.connect(audioCtx.destination); n.start(t); n.stop(t + 0.15); }
      break;
    case 'dodge':
      break;
    case 'lose':
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(55, t + 0.6);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.start(t); osc.stop(t + 0.6);
      break;
    case 'start':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(330, t);
      osc.frequency.setValueAtTime(440, t + 0.1);
      osc.frequency.setValueAtTime(660, t + 0.2);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
      break;
    case 'score':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.08);
      osc.frequency.setValueAtTime(784, t + 0.16);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
      break;
    case 'blaster':
      // Half volume, skip every other pew during plasma
      blasterPewCount++;
      if (plasmaActive && blasterPewCount % 2 === 0) { osc.disconnect(); return; }
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(1200, t + 0.06);
      gain.gain.setValueAtTime(0.04, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.start(t); osc.stop(t + 0.08);
      break;
    case 'explode':
      // Deeper, more satisfying
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(35, t + 0.3);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
      break;
    case 'levelup':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.1);
      osc.frequency.setValueAtTime(784, t + 0.2);
      osc.frequency.setValueAtTime(1047, t + 0.3);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t); osc.stop(t + 0.5);
      break;
    case 'victory':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.12);
      osc.frequency.setValueAtTime(784, t + 0.24);
      osc.frequency.setValueAtTime(1047, t + 0.36);
      osc.frequency.setValueAtTime(1319, t + 0.48);
      gain.gain.setValueAtTime(0.22, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      osc.start(t); osc.stop(t + 0.7);
      break;
    case 'beep':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, t);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
      break;
    case 'beepgo':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(t); osc.stop(t + 0.25);
      break;
    case 'powerup':
      // Sparkly ascending — longer tail
      osc.type = 'sine';
      osc.frequency.setValueAtTime(500, t);
      osc.frequency.setValueAtTime(800, t + 0.06);
      osc.frequency.setValueAtTime(1100, t + 0.12);
      osc.frequency.setValueAtTime(1400, t + 0.2);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
      // Sparkle overlay
      { const s = audioCtx.createOscillator(); const sg = audioCtx.createGain();
        s.type = 'triangle'; s.frequency.setValueAtTime(2000, t);
        s.frequency.exponentialRampToValueAtTime(3000, t + 0.2);
        sg.gain.setValueAtTime(0.03, t); sg.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        s.connect(sg); sg.connect(audioCtx.destination); s.start(t); s.stop(t + 0.3); }
      break;
    case 'shieldbreak':
      // Glass shatter feel — high freq burst + descend
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(1200, t);
      osc.frequency.exponentialRampToValueAtTime(200, t + 0.2);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(t); osc.stop(t + 0.25);
      // Tinkle fragments
      { const s = audioCtx.createOscillator(); const sg = audioCtx.createGain();
        s.type = 'triangle'; s.frequency.setValueAtTime(3000, t);
        s.frequency.exponentialRampToValueAtTime(800, t + 0.15);
        sg.gain.setValueAtTime(0.06, t + 0.05); sg.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        s.connect(sg); sg.connect(audioCtx.destination); s.start(t + 0.05); s.stop(t + 0.2); }
      break;
  }
}

// --- BACKGROUND MUSIC (Ambient Drone + Melodic Pings) ---
const MUSIC_VOL = 0.04; // very subtle
// Per-world pentatonic scales
const WORLD_SCALES = [
  [220, 261.6, 329.6, 392, 440, 523.3],           // Deep Space — A minor pentatonic
  [233, 277.2, 311.1, 370, 415.3, 466.2],          // Nebula — Bb, shifted dreamy
  [196, 246.9, 293.7, 329.6, 392, 493.9],          // Asteroid Belt — G, earthy
  [261.6, 311.1, 370, 415.3, 523.3, 622.3],        // Ice Field — C, crystalline
  [293.7, 349.2, 392, 466.2, 523.3, 587.3],        // Supernova — D, intense
];

function startMusic() {
  if (muted || !audioCtx || musicPlaying) return;
  musicPlaying = true;
  const t = audioCtx.currentTime;
  const idx = getWorldIdx();

  // Bass drone — two detuned sines
  const drone1 = audioCtx.createOscillator();
  const drone2 = audioCtx.createOscillator();
  const droneGain = audioCtx.createGain();
  const baseFreq = [55, 52, 49, 58, 62][idx] || 55;
  drone1.type = 'sine';
  drone1.frequency.setValueAtTime(baseFreq, t);
  drone1.frequency.linearRampToValueAtTime(baseFreq * 1.12, t + 10);
  drone1.frequency.linearRampToValueAtTime(baseFreq, t + 20);
  drone1.frequency.linearRampToValueAtTime(baseFreq * 0.9, t + 30);
  drone1.frequency.linearRampToValueAtTime(baseFreq, t + 40);
  drone2.type = 'sine';
  drone2.frequency.setValueAtTime(baseFreq + 0.5, t);
  drone2.frequency.linearRampToValueAtTime(baseFreq * 1.12 + 0.5, t + 10);
  drone2.frequency.linearRampToValueAtTime(baseFreq + 0.5, t + 20);
  drone2.frequency.linearRampToValueAtTime(baseFreq * 0.9 + 0.5, t + 30);
  drone2.frequency.linearRampToValueAtTime(baseFreq + 0.5, t + 40);
  droneGain.gain.setValueAtTime(MUSIC_VOL, t);
  drone1.connect(droneGain); drone2.connect(droneGain);
  droneGain.connect(audioCtx.destination);
  drone1.start(t); drone2.start(t);
  drone1.stop(t + 120); drone2.stop(t + 120);
  musicNodes.push(drone1, drone2);

  // Sub bass
  const sub = audioCtx.createOscillator();
  const subGain = audioCtx.createGain();
  sub.type = 'sine';
  sub.frequency.setValueAtTime(baseFreq / 2, t);
  subGain.gain.setValueAtTime(MUSIC_VOL * 0.6, t);
  sub.connect(subGain); subGain.connect(audioCtx.destination);
  sub.start(t); sub.stop(t + 120);
  musicNodes.push(sub);

  // Melodic pings — world-specific scale
  const scaleNotes = WORLD_SCALES[idx] || WORLD_SCALES[0];
  musicPingTimer = setInterval(() => {
    if (!audioCtx || muted || paused) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(scaleNotes[Math.floor(Math.random() * scaleNotes.length)], now);
    g.gain.setValueAtTime(MUSIC_VOL * 0.6, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 2.5);
    musicNodes.push(osc);
  }, 2000 + Math.random() * 1500);
}

function stopMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  musicNodes = [];
  if (musicPingTimer) { clearInterval(musicPingTimer); musicPingTimer = null; }
}

function restartMusic() {
  stopMusic();
  startMusic();
}

// --- RESIZE ---
function resize() {
  const vv = window.visualViewport || { width: window.innerWidth, height: window.innerHeight };
  canvas.width = vv.width;
  canvas.height = vv.height;
  W = canvas.width;
  H = canvas.height;
  scale = Math.min(W / 800, H / 500);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => { setTimeout(resize, 200); });
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

// --- STARS (background) ---
function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.8 + 0.2,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function updateStars() {
  for (const s of stars) {
    s.y += s.speed * (gameState === 'playing' ? 1.5 : 0.5);
    s.twinkle += 0.03;
    if (s.y > H + 5) { s.y = -5; s.x = Math.random() * W; }
  }
}

function drawStars() {
  for (const s of stars) {
    const alpha = 0.4 + 0.3 * Math.sin(s.twinkle);
    let sc = [255,255,255];
    if (gameState === 'playing' || gameState === 'countdown' || gameState === 'levelcomplete') {
      const w = gameMode === 'campaign' ? WORLDS[currentWorld] : null;
      if (w) sc = w.starColor;
    }
    ctx.fillStyle = `rgba(${sc[0]},${sc[1]},${sc[2]},${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- SHIP DRAWING ---
function drawShip(x, y, w, h, wobble) {
  ctx.save();
  ctx.translate(x, y);

  // wobble effect
  if (wobble > 0) {
    const wobAng = Math.sin(wobble * 0.8) * 0.25;
    ctx.rotate(wobAng);
  }

  // phase shift flicker
  if (phaseActive) {
    ctx.globalAlpha = 0.4 + Math.sin(frameCount * 0.15) * 0.15;
  }
  // invincible flash
  if (invincibleTimer > 0 && Math.floor(invincibleTimer / 6) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  const hw = w / 2;
  const hh = h / 2;
  const s = getShip();
  const fc = s.flameColors; // [outer, mid, core]

  // Animated Canvas exhaust flames (drawn BEHIND ship)
  const flameH = 14 + Math.random() * 12;
  const flameW = w * 0.35;
  ctx.fillStyle = fc[0];
  ctx.beginPath();
  ctx.moveTo(-flameW / 2, hh * 0.75);
  ctx.quadraticCurveTo(-flameW * 0.1, hh + flameH * 0.7, 0, hh + flameH);
  ctx.quadraticCurveTo(flameW * 0.1, hh + flameH * 0.7, flameW / 2, hh * 0.75);
  ctx.fill();
  ctx.fillStyle = fc[1];
  ctx.beginPath();
  ctx.moveTo(-flameW / 3, hh * 0.75);
  ctx.quadraticCurveTo(0, hh + flameH * 0.6, 0, hh + flameH * 0.8);
  ctx.quadraticCurveTo(0, hh + flameH * 0.6, flameW / 3, hh * 0.75);
  ctx.fill();
  ctx.fillStyle = fc[2];
  ctx.beginPath();
  ctx.moveTo(-flameW / 6, hh * 0.75);
  ctx.quadraticCurveTo(0, hh + flameH * 0.3, 0, hh + flameH * 0.5);
  ctx.quadraticCurveTo(0, hh + flameH * 0.3, flameW / 6, hh * 0.75);
  ctx.fill();

  // SVG ship body
  if (isShipReady()) {
    const drawW = w * s.drawW;
    const drawH = h * s.drawH;
    ctx.drawImage(shipImages[selectedShip], -drawW / 2, -drawH / 2, drawW, drawH);
  } else {
    // Fallback
    ctx.fillStyle = s.accent;
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.bezierCurveTo(hw * 0.3, -hh, hw, -hh * 0.4, hw, hh * 0.5);
    ctx.lineTo(hw * 0.6, hh);
    ctx.lineTo(-hw * 0.6, hh);
    ctx.lineTo(-hw, hh * 0.5);
    ctx.bezierCurveTo(-hw, -hh * 0.4, -hw * 0.3, -hh, 0, -hh);
    ctx.fill();
  }

  ctx.restore();
}

// Draw a specific ship by index (for picker/title)
function drawShipByIndex(idx, x, y, w, h) {
  ctx.save();
  ctx.translate(x, y);
  const s = SHIPS[idx];
  const img = shipImages[idx];
  if (img.complete && img.naturalWidth > 0) {
    const drawW = w * s.drawW;
    const drawH = h * s.drawH;
    ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
  } else {
    ctx.fillStyle = s.accent;
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// --- ASTEROID DRAWING ---
function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);

  if (allAsteroidsReady()) {
    // SVG viewBox 200x200, asteroid shape spans ~170px diameter
    // Scale so game radius matches visual radius
    const drawSize = a.r * 2.35;
    const img = asteroidImgs[a.variant || 0];
    ctx.drawImage(img, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
  } else {
    // Canvas fallback
    const grad = ctx.createRadialGradient(0, 0, a.r * 0.2, 0, 0, a.r);
    grad.addColorStop(0, '#a0896e');
    grad.addColorStop(0.6, '#8b7355');
    grad.addColorStop(1, '#6b5540');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, a.r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function spawnAsteroid() {
  const r = 18 + Math.random() * 28;
  // Assign variant by radius tier:
  // small (r < 25): Pebble A or B (0/1), medium (r < 35): Rock (2), large: Boulder (3)
  let variant;
  if (r < 25) variant = Math.random() < 0.5 ? 0 : 1;
  else if (r < 35) variant = 2;
  else variant = 3;
  asteroids.push({
    x: r + Math.random() * (W - r * 2),
    y: -r * 2,
    r: r,
    speed: currentSpeed * (0.7 + Math.random() * 0.6),
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    variant: variant
  });
}

// --- PARTICLES ---
function spawnHitParticles(x, y) {
  // Big burst — 30 particles with varied sizes and speeds
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 7;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 35 + Math.random() * 30,
      maxLife: 65,
      size: 2 + Math.random() * 6,
      color: ['#ff6600', '#ffcc00', '#ff3333', '#fff', '#FF8A00', '#FFD740'][Math.floor(Math.random() * 6)]
    });
  }
  // Inner hot core particles — white, fast fade
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 15 + Math.random() * 10,
      maxLife: 25,
      size: 4 + Math.random() * 5,
      color: '#FFFFFF'
    });
  }
  // Expanding shockwave ring (rendered as a special particle)
  particles.push({
    x, y, vx: 0, vy: 0,
    life: 20, maxLife: 20,
    size: 5, // starting radius
    color: 'ring',
    ringColor: '#ff6600'
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    if (p.color === 'ring') {
      // Expanding shockwave ring
      const progress = 1 - p.life / p.maxLife;
      const radius = p.size + progress * 60 * scale;
      ctx.globalAlpha = (p.life / p.maxLife) * 0.6;
      ctx.strokeStyle = p.ringColor;
      ctx.lineWidth = (3 - progress * 2.5) * scale;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// --- BLASTERS ---
function spawnBlaster() {
  const isPlasma = plasmaActive;
  blasters.push({
    x: ship.x,
    y: ship.y - ship.h / 2,
    w: (isPlasma ? PLASMA_WIDTH : BLASTER_WIDTH) * scale,
    h: (isPlasma ? PLASMA_HEIGHT : BLASTER_HEIGHT) * scale,
    plasma: isPlasma
  });
  playSound('blaster');
}

function updateBlasters() {
  for (let i = blasters.length - 1; i >= 0; i--) {
    const b = blasters[i];
    b.y -= (b.plasma ? BLASTER_SPEED * 1.3 : BLASTER_SPEED) * scale;
    if (b.y + b.h < 0) { blasters.splice(i, 1); continue; }

    // Check collision with asteroids
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (dx * dx + dy * dy < (a.r + b.w) * (a.r + b.w)) {
        // Asteroid destroyed!
        spawnExplosionParticles(a.x, a.y, a.r);
        playSound('explode');
        score++;
        levelScore++;
        levelBlasted++;
        if (gameMode === 'campaign') worldProgress += BLAST_PROGRESS;
        if (score % 50 === 0) playSound('score');
        asteroids.splice(j, 1);
        // Plasma pierces — don't destroy the bolt
        if (!b.plasma) {
          blasters.splice(i, 1);
          break;
        }
      }
    }
  }
}

function drawBlasters() {
  for (const b of blasters) {
    if (b.plasma) {
      // Wide radial glow envelope
      const envelopeG = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.w * 2.5);
      envelopeG.addColorStop(0, 'rgba(0,229,255,0.25)');
      envelopeG.addColorStop(1, 'transparent');
      ctx.fillStyle = envelopeG;
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.w * 2.5, b.h * 0.9, 0, 0, Math.PI * 2);
      ctx.fill();
      // Electric side arcs
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#00E5FF';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(b.x - b.w * 1.2, b.y - b.h * 0.3);
      ctx.quadraticCurveTo(b.x - b.w * 0.5, b.y, b.x - b.w * 1.0, b.y + b.h * 0.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(b.x + b.w * 1.2, b.y - b.h * 0.3);
      ctx.quadraticCurveTo(b.x + b.w * 0.5, b.y, b.x + b.w * 1.0, b.y + b.h * 0.3);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Pointed oval core — bezier shape
      ctx.shadowColor = '#00E5FF';
      ctx.shadowBlur = 10;
      const coreGrad = ctx.createLinearGradient(b.x, b.y - b.h / 2, b.x, b.y + b.h / 2);
      coreGrad.addColorStop(0, '#FFFFFF');
      coreGrad.addColorStop(0.4, '#80F0FF');
      coreGrad.addColorStop(1, '#00E5FF');
      ctx.fillStyle = coreGrad;
      const hw = b.w / 2; const hh = b.h / 2;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y - hh);
      ctx.bezierCurveTo(b.x + hw, b.y - hh * 0.5, b.x + hw, b.y + hh * 0.5, b.x, b.y + hh);
      ctx.bezierCurveTo(b.x - hw, b.y + hh * 0.5, b.x - hw, b.y - hh * 0.5, b.x, b.y - hh);
      ctx.fill();
      ctx.shadowBlur = 0;
      // White hot center line
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y - hh * 0.7);
      ctx.lineTo(b.x, b.y + hh * 0.7);
      ctx.stroke();
    } else {
      // Standard blaster
      ctx.shadowColor = '#42A5F5';
      ctx.shadowBlur = 8;
      const grad = ctx.createLinearGradient(b.x, b.y - b.h / 2, b.x, b.y + b.h / 2);
      grad.addColorStop(0, '#90caf9');
      grad.addColorStop(0.5, '#42A5F5');
      grad.addColorStop(1, '#1565C0');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, b.w / 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

// --- POWER-UPS ---
const POWERUP_TYPES = [
  { id: 'plasma', label: 'PLASMA', color: '#00E5FF' },
  { id: 'shield', label: 'SHIELD', color: '#69F0AE' },
  { id: 'megabeam', label: 'MEGA BEAM', color: '#FF1744' },
  { id: 'phase', label: 'PHASE SHIFT', color: '#FFD740' },
];

function spawnPowerup() {
  const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  const r = POWERUP_RADIUS * scale;
  powerups.push({
    x: r + Math.random() * (W - r * 2),
    y: -r * 2,
    r: r,
    speed: 1.5 + Math.random() * 0.5,
    type: type.id,
    color: type.color,
    bob: Math.random() * Math.PI * 2
  });
}

function updatePowerups() {
  // Spawn timer
  powerupSpawnTimer++;
  if (powerupSpawnTimer >= POWERUP_SPAWN_INTERVAL) {
    spawnPowerup();
    powerupSpawnTimer = 0;
  }

  // Plasma timer
  if (plasmaActive) {
    plasmaTimer--;
    if (plasmaTimer <= 0) { plasmaActive = false; }
  }

  // Mega Beam timer
  if (megabeamActive) {
    megabeamTimer--;
    if (megabeamTimer <= 0) {
      megabeamActive = false;
      ship.w = SHIP_WIDTH * scale;
      ship.h = SHIP_HEIGHT * scale;
    }
  }

  // Phase Shift timer
  if (phaseActive) {
    phaseTimer--;
    if (phaseTimer <= 0) phaseActive = false;
  }

  // Move and collect
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.speed;
    p.bob += 0.05;

    // Off screen
    if (p.y > H + p.r * 2) { powerups.splice(i, 1); continue; }

    // Collection — circle vs ship ellipse
    const dx = p.x - ship.x;
    const dy = p.y - ship.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < p.r + ship.w * 0.4) {
      // Collected!
      playSound('powerup');
      if (p.type === 'plasma') {
        plasmaActive = true;
        plasmaTimer = PLASMA_DURATION;
      } else if (p.type === 'shield') {
        shieldActive = true;
      } else if (p.type === 'megabeam') {
        megabeamActive = true;
        megabeamTimer = MEGABEAM_DURATION;
        ship.w = SHIP_WIDTH * scale * MEGABEAM_SCALE;
        ship.h = SHIP_HEIGHT * scale * MEGABEAM_SCALE;
      } else if (p.type === 'phase') {
        phaseActive = true;
        phaseTimer = PHASE_DURATION;
      }
      // Collect particles
      for (let j = 0; j < 8; j++) {
        const a = Math.random() * Math.PI * 2;
        particles.push({
          x: p.x, y: p.y,
          vx: Math.cos(a) * 3, vy: Math.sin(a) * 3,
          life: 20, maxLife: 20,
          size: 2 + Math.random() * 2,
          color: p.color
        });
      }
      powerups.splice(i, 1);
    }
  }
}

function drawPowerups() {
  for (const p of powerups) {
    ctx.save();
    const bobY = Math.sin(p.bob) * 3;
    ctx.translate(p.x, p.y + bobY);

    // Outer ambient glow
    ctx.globalAlpha = 0.22 + Math.sin(p.bob * 2) * 0.08;
    const outerGlow = ctx.createRadialGradient(0, 0, p.r * 0.5, 0, 0, p.r * 1.5);
    outerGlow.addColorStop(0, p.color);
    outerGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = outerGlow;
    ctx.beginPath();
    ctx.arc(0, 0, p.r * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Dark inner fill
    ctx.fillStyle = '#0D0D20';
    ctx.beginPath();
    ctx.arc(0, 0, p.r, 0, Math.PI * 2);
    ctx.fill();

    // Border ring
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2 * scale;
    ctx.beginPath();
    ctx.arc(0, 0, p.r, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ring
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, p.r * 0.75, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // ---- Icons ----
    if (p.type === 'plasma') {
      // Gradient lightning bolt
      const s = p.r * 0.52;
      const boltGrad = ctx.createLinearGradient(0, -s, 0, s);
      boltGrad.addColorStop(0, '#FFFFFF');
      boltGrad.addColorStop(0.4, '#00E5FF');
      boltGrad.addColorStop(1, '#0077AA');
      ctx.fillStyle = boltGrad;
      ctx.beginPath();
      ctx.moveTo(s * 0.3, -s);
      ctx.lineTo(-s * 0.4, s * 0.05);
      ctx.lineTo(s * 0.05, s * 0.05);
      ctx.lineTo(-s * 0.3, s);
      ctx.lineTo(s * 0.4, -s * 0.05);
      ctx.lineTo(-s * 0.05, -s * 0.05);
      ctx.closePath();
      ctx.fill();
      // Electric arcs
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#00E5FF';
      ctx.lineWidth = 1;
      for (let arc = 0; arc < 3; arc++) {
        const ox = (arc - 1) * s * 0.5;
        ctx.beginPath();
        ctx.moveTo(ox - s * 0.3, -s * 0.9);
        ctx.quadraticCurveTo(ox + s * 0.4, -s * 0.3, ox - s * 0.2, s * 0.5);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // Core glow dot
      const coreG = ctx.createRadialGradient(0, -s * 0.1, 0, 0, -s * 0.1, s * 0.25);
      coreG.addColorStop(0, 'rgba(255,255,255,0.9)');
      coreG.addColorStop(1, 'transparent');
      ctx.fillStyle = coreG;
      ctx.beginPath();
      ctx.arc(0, -s * 0.1, s * 0.25, 0, Math.PI * 2);
      ctx.fill();
      // Spark dots
      ctx.fillStyle = '#FFFFFF';
      const sparks = [[-s*0.6,-s*0.7],[s*0.65,-s*0.5],[-s*0.5,s*0.6],[s*0.55,s*0.3]];
      for (const [sx, sy] of sparks) {
        ctx.beginPath();
        ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

    } else if (p.type === 'shield') {
      // Metallic green gradient shield
      const s = p.r * 0.55;
      const shieldGrad = ctx.createLinearGradient(-s * 0.5, -s, s * 0.5, s);
      shieldGrad.addColorStop(0, '#A5F3C4');
      shieldGrad.addColorStop(0.5, '#69F0AE');
      shieldGrad.addColorStop(1, '#2E7D5A');
      ctx.fillStyle = shieldGrad;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.85, -s * 0.55);
      ctx.lineTo(s * 0.85, s * 0.15);
      ctx.quadraticCurveTo(s * 0.7, s * 0.8, 0, s * 1.1);
      ctx.quadraticCurveTo(-s * 0.7, s * 0.8, -s * 0.85, s * 0.15);
      ctx.lineTo(-s * 0.85, -s * 0.55);
      ctx.closePath();
      ctx.fill();
      // White triangle highlight
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.9);
      ctx.lineTo(s * 0.5, -s * 0.3);
      ctx.lineTo(-s * 0.2, -s * 0.3);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      // Dark inner border
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.7);
      ctx.lineTo(s * 0.55, -s * 0.35);
      ctx.lineTo(s * 0.55, s * 0.1);
      ctx.quadraticCurveTo(s * 0.45, s * 0.55, 0, s * 0.75);
      ctx.quadraticCurveTo(-s * 0.45, s * 0.55, -s * 0.55, s * 0.1);
      ctx.lineTo(-s * 0.55, -s * 0.35);
      ctx.closePath();
      ctx.stroke();
      // Energy plus cross
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.25); ctx.lineTo(0, s * 0.25);
      ctx.moveTo(-s * 0.25, 0); ctx.lineTo(s * 0.25, 0);
      ctx.stroke();
      // Dashed outer ring
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#69F0AE';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(0, 0, p.r * 0.88, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;

    } else if (p.type === 'megabeam') {
      // Red beam column (top to mid)
      const s = p.r * 0.55;
      const beamGrad = ctx.createLinearGradient(0, -s * 1.1, 0, 0);
      beamGrad.addColorStop(0, 'rgba(255,23,68,0)');
      beamGrad.addColorStop(0.5, 'rgba(255,23,68,0.8)');
      beamGrad.addColorStop(1, '#FF1744');
      ctx.fillStyle = beamGrad;
      ctx.fillRect(-s * 0.15, -s * 1.1, s * 0.3, s * 1.1);
      // Mini ship silhouette at bottom
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.moveTo(0, s * 0.15);
      ctx.lineTo(-s * 0.35, s * 0.7);
      ctx.lineTo(-s * 0.15, s * 0.55);
      ctx.lineTo(-s * 0.1, s * 0.7);
      ctx.lineTo(0, s * 0.5);
      ctx.lineTo(s * 0.1, s * 0.7);
      ctx.lineTo(s * 0.15, s * 0.55);
      ctx.lineTo(s * 0.35, s * 0.7);
      ctx.closePath();
      ctx.fill();
      // Red wings
      ctx.fillStyle = '#FF1744';
      ctx.beginPath();
      ctx.moveTo(-s * 0.1, s * 0.4);
      ctx.lineTo(-s * 0.5, s * 0.75);
      ctx.lineTo(-s * 0.15, s * 0.55);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.1, s * 0.4);
      ctx.lineTo(s * 0.5, s * 0.75);
      ctx.lineTo(s * 0.15, s * 0.55);
      ctx.closePath();
      ctx.fill();
      // Radiating arc strokes
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#FF1744';
      ctx.lineWidth = 1;
      for (let arc = 0; arc < 3; arc++) {
        const spread = (arc + 1) * s * 0.2;
        ctx.beginPath();
        ctx.arc(0, -s * 0.3, spread, Math.PI * 1.1, Math.PI * 1.9);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // Chevron arrows
      ctx.strokeStyle = '#FF6B81';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      for (let cv = 0; cv < 2; cv++) {
        const cy = -s * 0.6 - cv * s * 0.3;
        ctx.beginPath();
        ctx.moveTo(-s * 0.15, cy + s * 0.1);
        ctx.lineTo(0, cy);
        ctx.lineTo(s * 0.15, cy + s * 0.1);
        ctx.stroke();
      }

    } else if (p.type === 'phase') {
      // Ghost ship silhouette — gold gradient, semi-transparent
      const s = p.r * 0.5;
      const ghostGrad = ctx.createLinearGradient(0, -s, 0, s);
      ghostGrad.addColorStop(0, 'rgba(255,255,180,0.85)');
      ghostGrad.addColorStop(0.5, 'rgba(255,215,64,0.7)');
      ghostGrad.addColorStop(1, 'rgba(180,120,0,0.55)');
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = ghostGrad;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.bezierCurveTo(s * 0.35, -s, s * 0.9, -s * 0.4, s * 0.9, s * 0.45);
      ctx.lineTo(s * 0.5, s);
      ctx.lineTo(-s * 0.5, s);
      ctx.lineTo(-s * 0.9, s * 0.45);
      ctx.bezierCurveTo(-s * 0.9, -s * 0.4, -s * 0.35, -s, 0, -s);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      // Faint shadow echo offset
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#FFD740';
      ctx.beginPath();
      ctx.moveTo(s * 0.12, -s * 0.9);
      ctx.bezierCurveTo(s * 0.45, -s, s * 1.02, -s * 0.4, s * 1.02, s * 0.45);
      ctx.lineTo(s * 0.62, s);
      ctx.lineTo(-s * 0.38, s);
      ctx.lineTo(-s * 0.78, s * 0.45);
      ctx.bezierCurveTo(-s * 0.78, -s * 0.4, -s * 0.22, -s, s * 0.12, -s * 0.9);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      // Horizontal scan lines
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#FFD740';
      ctx.lineWidth = 0.5;
      for (let line = 0; line < 8; line++) {
        const ly = -s + line * (s * 2 / 7);
        ctx.beginPath();
        ctx.moveTo(-s * 0.85, ly);
        ctx.lineTo(s * 0.85, ly);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // Glitch bars
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#FFD740';
      ctx.fillRect(-s * 0.6, -s * 0.15, s * 0.4, s * 0.08);
      ctx.fillRect(s * 0.1, s * 0.25, s * 0.5, s * 0.06);
      ctx.globalAlpha = 1;
      // Diamond sparkles
      ctx.fillStyle = '#FFFFFF';
      const diamonds = [[-s*0.7,-s*0.6],[s*0.75,-s*0.4],[-s*0.6,s*0.55],[s*0.65,s*0.7]];
      for (const [dx, dy] of diamonds) {
        const ds = 2.5;
        ctx.beginPath();
        ctx.moveTo(dx, dy - ds); ctx.lineTo(dx + ds, dy);
        ctx.lineTo(dx, dy + ds); ctx.lineTo(dx - ds, dy);
        ctx.closePath();
        ctx.fill();
      }
    }

    ctx.restore();
  }
}

function drawMegaBeam() {
  if (!megabeamActive) return;
  ctx.save();
  const bw = MEGABEAM_WIDTH * scale;
  const bx = ship.x;
  const topY = 0;
  const bottomY = ship.y - ship.h / 2;

  // Layer 1: Wide ambient red glow (4x beam width)
  const ambG = ctx.createLinearGradient(bx - bw * 2, 0, bx + bw * 2, 0);
  ambG.addColorStop(0, 'transparent');
  ambG.addColorStop(0.5, 'rgba(255,23,68,0.08)');
  ambG.addColorStop(1, 'transparent');
  ctx.fillStyle = ambG;
  ctx.fillRect(bx - bw * 2, topY, bw * 4, bottomY - topY);

  // Layer 2: Outer beam column
  const outerG = ctx.createLinearGradient(bx - bw / 2, 0, bx + bw / 2, 0);
  outerG.addColorStop(0, 'transparent');
  outerG.addColorStop(0.35, 'rgba(255,23,68,0.30)');
  outerG.addColorStop(0.5, 'rgba(255,23,68,0.30)');
  outerG.addColorStop(1, 'transparent');
  ctx.fillStyle = outerG;
  ctx.fillRect(bx - bw / 2, topY, bw, bottomY - topY);

  // Layer 3: White-hot inner core (35% of beam width)
  const coreW = bw * 0.35;
  const coreG = ctx.createLinearGradient(bx - coreW / 2, 0, bx + coreW / 2, 0);
  coreG.addColorStop(0, 'transparent');
  coreG.addColorStop(0.5, 'rgba(255,255,255,0.85)');
  coreG.addColorStop(1, 'transparent');
  ctx.fillStyle = coreG;
  ctx.fillRect(bx - coreW / 2, topY, coreW, bottomY - topY);

  // Layer 4: 5 energy rings traveling upward
  ctx.strokeStyle = 'rgba(255,100,120,0.6)';
  ctx.lineWidth = 1.5;
  for (let ring = 0; ring < 5; ring++) {
    const ringPhase = ((frameCount * 3 + ring * (360 / 5)) % 360) / 360;
    const ry = topY + ringPhase * (bottomY - topY);
    const rw = bw * (0.6 + Math.sin(ringPhase * Math.PI) * 0.4);
    ctx.globalAlpha = 0.4 * (1 - ringPhase);
    ctx.beginPath();
    ctx.ellipse(bx, ry, rw / 2, rw * 0.12, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Layer 5: Origin glow at ship nose
  const noseY = ship.y - ship.h / 2;
  const noseG = ctx.createRadialGradient(bx, noseY, 0, bx, noseY, bw * 1.2);
  noseG.addColorStop(0, 'rgba(255,255,255,0.9)');
  noseG.addColorStop(0.3, 'rgba(255,80,100,0.6)');
  noseG.addColorStop(1, 'transparent');
  ctx.fillStyle = noseG;
  ctx.beginPath();
  ctx.arc(bx, noseY, bw * 1.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawShieldEffect() {
  if (!shieldActive) return;
  ctx.save();
  ctx.translate(ship.x, ship.y);
  const r = ship.w * 0.85;
  const pulse = Math.sin(frameCount * 0.12) * 0.1;

  // Outer ambient glow
  const ambientG = ctx.createRadialGradient(0, 0, r * 0.6, 0, 0, r * 1.4);
  ambientG.addColorStop(0, 'rgba(105,240,174,0.06)');
  ambientG.addColorStop(1, 'transparent');
  ctx.fillStyle = ambientG;
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2);
  ctx.fill();

  // Bubble fill — brightens at edges
  const bubbleG = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r);
  bubbleG.addColorStop(0, 'rgba(105,240,174,0.02)');
  bubbleG.addColorStop(0.75, 'rgba(105,240,174,0.08)');
  bubbleG.addColorStop(1, 'rgba(105,240,174,0.20)');
  ctx.fillStyle = bubbleG;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  // Hex mesh pattern clipped to sphere
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.97, 0, Math.PI * 2);
  ctx.clip();
  ctx.globalAlpha = 0.10 + pulse * 0.5;
  ctx.strokeStyle = '#69F0AE';
  ctx.lineWidth = 0.8;
  const hexR = r * 0.28;
  const hexH = hexR * Math.sqrt(3);
  for (let row = -3; row <= 3; row++) {
    for (let col = -3; col <= 3; col++) {
      const hx = col * hexR * 1.5;
      const hy = row * hexH + (col % 2 === 0 ? 0 : hexH / 2);
      ctx.beginPath();
      for (let v = 0; v < 6; v++) {
        const ang = (Math.PI / 3) * v - Math.PI / 6;
        const vx = hx + hexR * Math.cos(ang);
        const vy = hy + hexR * Math.sin(ang);
        if (v === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.restore();

  // Bright edge ring (pulsing)
  ctx.globalAlpha = 0.50 + pulse * 0.15;
  ctx.strokeStyle = '#69F0AE';
  ctx.lineWidth = 2.5 * scale;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.stroke();

  // 4 rotating energy crackle arcs
  ctx.globalAlpha = 0.45;
  ctx.strokeStyle = '#A5F3C4';
  ctx.lineWidth = 1.2;
  for (let arc = 0; arc < 4; arc++) {
    const baseAng = (frameCount * 0.035) + arc * Math.PI / 2;
    const ax = Math.cos(baseAng) * r;
    const ay = Math.sin(baseAng) * r;
    const mx = Math.cos(baseAng + 0.4) * r * 0.6;
    const my = Math.sin(baseAng + 0.4) * r * 0.6;
    const bx = Math.cos(baseAng + 0.8) * r;
    const by = Math.sin(baseAng + 0.8) * r;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.quadraticCurveTo(mx, my, bx, by);
    ctx.stroke();
  }

  // Top specular highlight
  ctx.globalAlpha = 0.18;
  const specG = ctx.createRadialGradient(0, -r * 0.55, 0, 0, -r * 0.4, r * 0.45);
  specG.addColorStop(0, '#FFFFFF');
  specG.addColorStop(1, 'transparent');
  ctx.fillStyle = specG;
  ctx.beginPath();
  ctx.arc(0, -r * 0.4, r * 0.45, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPhaseEffect() {
  if (!phaseActive) return;
  ctx.save();
  // Glitch echo: ship offset 4px right, 10% opacity
  ctx.globalAlpha = 0.1;
  ctx.drawImage(canvas, ship.x - ship.w / 2 + 4, ship.y - ship.h / 2,
    ship.w, ship.h, ship.x - ship.w / 2 + 4, ship.y - ship.h / 2, ship.w, ship.h);
  ctx.globalAlpha = 1;

  // Horizontal scan lines across ship area (scrolling downward)
  const sx = ship.x - ship.w * 0.6;
  const sw = ship.w * 1.2;
  const sy = ship.y - ship.h * 0.55;
  const sh = ship.h * 1.1;
  ctx.strokeStyle = 'rgba(255,215,64,0.18)';
  ctx.lineWidth = 0.5;
  const lineSpacing = 4;
  const lineOffset = (frameCount * 1.2) % lineSpacing;
  for (let ly = sy + lineOffset; ly < sy + sh; ly += lineSpacing) {
    ctx.beginPath();
    ctx.moveTo(sx, ly);
    ctx.lineTo(sx + sw, ly);
    ctx.stroke();
  }

  // 3 random golden diamond sparkles around ship
  ctx.fillStyle = '#FFD740';
  for (let sp = 0; sp < 3; sp++) {
    const spx = ship.x + (Math.random() - 0.5) * ship.w * 1.5;
    const spy = ship.y + (Math.random() - 0.5) * ship.h * 1.5;
    const ds = 2 + Math.random() * 2;
    ctx.globalAlpha = Math.random() * 0.5 + 0.2;
    ctx.beginPath();
    ctx.moveTo(spx, spy - ds); ctx.lineTo(spx + ds, spy);
    ctx.lineTo(spx, spy + ds); ctx.lineTo(spx - ds, spy);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function clampFont(size) {
  return Math.max(11, Math.round(size * scale));
}

function drawPowerupBar(x, y, label, pct, color) {
  const barW = 70 * scale;
  const barH = 5 * scale;
  ctx.fillStyle = color;
  ctx.font = `bold ${clampFont(9)}px Arial, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(label, x, y);
  const by = y + 3 * scale;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.roundRect(x, by, barW, barH, barH / 2);
  ctx.fill();
  const grad = ctx.createLinearGradient(x, by, x + barW * pct, by);
  grad.addColorStop(0, color);
  grad.addColorStop(1, '#FFFFFF');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x, by, barW * Math.max(0.02, pct), barH, barH / 2);
  ctx.fill();
}

function drawPowerupHUD() {
  let hudY = 60 * scale;
  const hudX = 14;

  if (plasmaActive) {
    drawPowerupBar(hudX, hudY, '⚡ PLASMA', plasmaTimer / PLASMA_DURATION, '#00E5FF');
    hudY += 18 * scale;
  }

  if (megabeamActive) {
    drawPowerupBar(hudX, hudY, '🔴 MEGA BEAM', megabeamTimer / MEGABEAM_DURATION, '#FF1744');
    hudY += 18 * scale;
  }

  if (shieldActive) {
    ctx.fillStyle = '#69F0AE';
    ctx.font = `bold ${clampFont(9)}px Arial, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('🛡 SHIELD ACTIVE', hudX, hudY);
    hudY += 14 * scale;
  }

  if (phaseActive) {
    ctx.fillStyle = '#FFD740';
    ctx.font = `bold ${clampFont(9)}px Arial, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('👻 PHASE SHIFT', hudX, hudY);
  }
}

function spawnExplosionParticles(x, y, radius) {
  const count = 10 + Math.floor(radius * 0.4);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 25 + Math.random() * 20,
      maxLife: 45,
      size: 2 + Math.random() * 4,
      color: ['#ff6600', '#ffcc00', '#a0896e', '#fff', '#ff3333'][Math.floor(Math.random() * 5)]
    });
  }
}

// --- LIFE METER (Mini Ships) ---
function drawLives() {
  const shipW = Math.max(14, 16 * scale);
  const shipH = Math.max(19, 22 * scale);
  const gap = 6 * scale;
  const startX = 14 + shipW / 2;
  const startY = 14;

  // "LIVES" label
  ctx.fillStyle = SHIPS[selectedShip].accent + '99';
  ctx.font = `bold ${clampFont(7)}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('LIVES', startX + (MAX_LIVES - 1) * (shipW + gap) / 2, startY);

  for (let i = 0; i < MAX_LIVES; i++) {
    const x = startX + i * (shipW + gap);
    const y = startY + 8 * scale + shipH / 2;
    const alive = i < lives;
    drawMiniShip(x, y, shipW, shipH, alive);
  }
}

function drawMiniShip(x, y, w, h, alive) {
  ctx.save();
  ctx.translate(x, y);

  const hw = w / 2;
  const hh = h / 2;
  const s = SHIPS[selectedShip];
  const fc = s.flameColors;

  if (alive) {
    // Animated thruster flame using ship's own flame colors
    const flameH = 4 + Math.random() * 4;
    const flameW = w * 0.35;
    ctx.fillStyle = fc[0];
    ctx.beginPath();
    ctx.moveTo(-flameW / 2, hh);
    ctx.quadraticCurveTo(0, hh + flameH, flameW / 2, hh);
    ctx.fill();
    ctx.fillStyle = fc[1];
    ctx.beginPath();
    ctx.moveTo(-flameW / 4, hh);
    ctx.quadraticCurveTo(0, hh + flameH * 0.6, flameW / 4, hh);
    ctx.fill();
    ctx.fillStyle = fc[2];
    ctx.beginPath();
    ctx.moveTo(-flameW / 6, hh);
    ctx.quadraticCurveTo(0, hh + flameH * 0.35, flameW / 6, hh);
    ctx.fill();

    // Ship SVG image
    const img = shipImages[selectedShip];
    if (img.complete && img.naturalWidth > 0) {
      const drawW = w * s.drawW;
      const drawH = h * s.drawH;
      ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
    } else {
      // Fallback accent-colored shape
      ctx.fillStyle = s.accent;
      ctx.beginPath();
      ctx.moveTo(0, -hh);
      ctx.bezierCurveTo(hw * 0.4, -hh, hw * 0.8, -hh * 0.3, hw * 0.7, hh * 0.6);
      ctx.lineTo(-hw * 0.7, hh * 0.6);
      ctx.bezierCurveTo(-hw * 0.8, -hh * 0.3, -hw * 0.4, -hh, 0, -hh);
      ctx.fill();
    }
  } else {
    // Ghost / dead — same ship image at very low alpha
    ctx.globalAlpha = 0.15;
    const img = shipImages[selectedShip];
    if (img.complete && img.naturalWidth > 0) {
      const drawW = w * s.drawW;
      const drawH = h * s.drawH;
      ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
    } else {
      ctx.fillStyle = '#666';
      ctx.beginPath();
      ctx.moveTo(0, -hh);
      ctx.bezierCurveTo(hw * 0.4, -hh, hw * 0.8, -hh * 0.3, hw * 0.7, hh * 0.6);
      ctx.lineTo(-hw * 0.7, hh * 0.6);
      ctx.bezierCurveTo(-hw * 0.8, -hh * 0.3, -hw * 0.4, -hh, 0, -hh);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// --- HUD ---
function drawHUD() {
  drawLives();

  // Score (left of pause button)
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${clampFont(22)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText(score, W - 56 * scale, 30 * scale);

  // Best (endless only)
  if (gameMode === 'endless' && bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${clampFont(11)}px Arial, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText('BEST ' + bestScore, W - 56 * scale, 44 * scale);
  }

  // Campaign: world name + progress bar (Monster Rally style)
  if (gameMode === 'campaign') {
    const w = WORLDS[currentWorld];
    const barW = Math.max(120, Math.min(260, W * 0.35) * scale);
    const barH = 10 * scale;
    const barX = (W - barW) / 2;
    const barY = 10;
    const progress = Math.min(worldProgress / w.threshold, 1);

    // World label — accent colored, bold, like Monster Rally level titles
    ctx.fillStyle = w.accent;
    ctx.font = `bold ${clampFont(13)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`WORLD ${currentWorld + 1}: ${w.name}`, W / 2, barY + barH + 18 * scale);

    // Bar container with subtle border
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.roundRect(barX - 2, barY - 2, barW + 4, barH + 4, barH / 2 + 2);
    ctx.fill();

    // Bar background
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, barH / 2);
    ctx.fill();

    // Bar fill with gradient
    if (progress > 0) {
      const fillW = Math.max(barH, barW * progress); // minimum pill shape
      const grad = ctx.createLinearGradient(barX, 0, barX + fillW, 0);
      grad.addColorStop(0, w.accent);
      grad.addColorStop(1, '#fff');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(barX, barY, fillW, barH, barH / 2);
      ctx.fill();
    }

    // Percentage text inside bar
    ctx.fillStyle = progress > 0.15 ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.4)';
    ctx.font = `bold ${clampFont(7)}px Arial, sans-serif`;
    ctx.fillText(Math.round(progress * 100) + '%', W / 2, barY + barH - 2);

    // Bar glow pulse when nearly full
    if (progress > 0.8) {
      ctx.shadowColor = w.accent;
      ctx.shadowBlur = 10 + Math.sin(Date.now() / 150) * 6;
      ctx.strokeStyle = w.accent;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW * progress, barH, barH / 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }
}

// --- TITLE SCREEN ---
let titleShipBob = 0;
let titleBtns = { campaign: {}, endless: {}, prevShip: {}, nextShip: {} };

function drawTitle() {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  titleShipBob += 0.03;
  const t = Date.now() / 1000;

  // Title — animated wave + glow per letter
  const titleLetters = [
    { ch: 'S', color: '#42A5F5' },
    { ch: 'P', color: '#64B5F6' },
    { ch: 'A', color: '#90CAF9' },
    { ch: 'C', color: '#BBDEFB' },
    { ch: 'E', color: '#E3F2FD' },
    { ch: ' ', color: 'none' },
    { ch: 'D', color: '#FFFFFF' },
    { ch: 'O', color: '#E3F2FD' },
    { ch: 'D', color: '#BBDEFB' },
    { ch: 'G', color: '#90CAF9' },
    { ch: 'E', color: '#64B5F6' },
  ];
  const titleFontSize = Math.round(40 * scale);
  ctx.font = `bold ${titleFontSize}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  // Measure total width
  let totalTitleW = 0;
  const letterWidths = [];
  for (const l of titleLetters) {
    const w = l.ch === ' ' ? titleFontSize * 0.4 : ctx.measureText(l.ch).width;
    letterWidths.push(w);
    totalTitleW += w;
  }
  let tx = W / 2 - totalTitleW / 2;
  const titleBaseY = H * 0.09;
  for (let i = 0; i < titleLetters.length; i++) {
    const l = titleLetters[i];
    if (l.ch === ' ') { tx += letterWidths[i]; continue; }
    const waveY = Math.sin(t * 2.5 + i * 0.55) * 8 * scale;
    const scaleBoost = 1 + Math.sin(t * 2.5 + i * 0.55) * 0.03;
    ctx.save();
    ctx.translate(tx + letterWidths[i] / 2, titleBaseY + waveY);
    ctx.scale(scaleBoost, scaleBoost);
    ctx.shadowColor = '#42A5F5';
    ctx.shadowBlur = 15 + Math.sin(t * 3 + i) * 5;
    ctx.fillStyle = l.color;
    ctx.fillText(l.ch, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
    tx += letterWidths[i];
  }

  // Subtitle
  ctx.fillStyle = '#42A5F5';
  ctx.font = `bold ${Math.round(20 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('Dodge and blast the asteroids!', W / 2, H * 0.155);

  // --- SPOTLIGHT SHOWCASE ---
  const spotX = W / 2;
  const spotY = H * 0.42;

  // Light cone from below
  const coneGrad = ctx.createRadialGradient(spotX, spotY + 40 * scale, 0, spotX, spotY + 40 * scale, 120 * scale);
  coneGrad.addColorStop(0, getShip().accent + '30');
  coneGrad.addColorStop(0.5, getShip().accent + '10');
  coneGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = coneGrad;
  ctx.beginPath();
  ctx.ellipse(spotX, spotY + 40 * scale, 120 * scale, 60 * scale, 0, 0, Math.PI * 2);
  ctx.fill();

  // Glowing platform line
  ctx.strokeStyle = getShip().accent;
  ctx.lineWidth = 2 * scale;
  ctx.globalAlpha = 0.4 + Math.sin(t * 2) * 0.15;
  ctx.beginPath();
  ctx.ellipse(spotX, spotY + 50 * scale, 70 * scale, 12 * scale, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Ship (larger)
  const shipSz = 2.4;
  const bobY = spotY + Math.sin(titleShipBob) * 8;
  const unlocked = unlockedShips.includes(selectedShip);
  if (unlocked) {
    drawShip(spotX, bobY, SHIP_WIDTH * shipSz * scale, SHIP_HEIGHT * shipSz * scale, 0);
  } else {
    // Locked ship — ? silhouette
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.moveTo(spotX, bobY - 40 * scale);
    ctx.bezierCurveTo(spotX + 25 * scale, bobY - 40 * scale, spotX + 30 * scale, bobY, spotX + 25 * scale, bobY + 30 * scale);
    ctx.lineTo(spotX - 25 * scale, bobY + 30 * scale);
    ctx.bezierCurveTo(spotX - 30 * scale, bobY, spotX - 25 * scale, bobY - 40 * scale, spotX, bobY - 40 * scale);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = `bold ${Math.round(48 * scale)}px Arial, sans-serif`;
    ctx.fillText('?', spotX, bobY + 10 * scale);
  }

  // --- SHIP PICKER ARROWS ---
  const arrowY = spotY;
  const arrowSpread = 145 * scale;
  const arrowSz = 32 * scale;

  // Left arrow
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.arc(spotX - arrowSpread, arrowY, arrowSz, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = `bold ${Math.round(32 * scale)}px Arial, sans-serif`;
  ctx.fillText('‹', spotX - arrowSpread, arrowY + 9 * scale);
  titleBtns.prevShip = { x: spotX - arrowSpread - arrowSz, y: arrowY - arrowSz, w: arrowSz * 2, h: arrowSz * 2 };

  // Right arrow
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.arc(spotX + arrowSpread, arrowY, arrowSz, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('›', spotX + arrowSpread, arrowY + 9 * scale);
  titleBtns.nextShip = { x: spotX + arrowSpread - arrowSz, y: arrowY - arrowSz, w: arrowSz * 2, h: arrowSz * 2 };

  // Ship name + type
  const s = getShip();
  if (unlocked) {
    ctx.fillStyle = s.accent;
    ctx.font = `bold ${Math.round(22 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText(s.name, spotX, spotY + 115 * scale);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText(s.type, spotX, spotY + 135 * scale);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = `bold ${Math.round(20 * scale)}px Arial, sans-serif`;
    ctx.fillText('🔒 LOCKED', spotX, spotY + 115 * scale);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = `${Math.round(13 * scale)}px Arial, sans-serif`;
    if (selectedShip > 0) ctx.fillText('Beat campaign with ' + SHIPS[selectedShip - 1].name, spotX, spotY + 135 * scale);
  }

  // Ship dots (page indicators)
  const dotY = spotY + 155 * scale;
  for (let i = 0; i < SHIPS.length; i++) {
    ctx.fillStyle = i === selectedShip ? getShip().accent : 'rgba(255,255,255,' + (unlockedShips.includes(i) ? '0.3' : '0.1') + ')';
    ctx.beginPath();
    ctx.arc(spotX + (i - 2) * 22 * scale, dotY, 6 * scale, 0, Math.PI * 2);
    ctx.fill();
  }

  // Floating asteroids (decorative)
  for (let i = 0; i < 3; i++) {
    const ax = W * (0.08 + i * 0.38) + Math.sin(t + i * 2) * 20;
    const ay = H * 0.65 + Math.cos(t * 0.7 + i) * 15;
    const aSize = (30 + i * 8) * scale;
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(t * 0.3 * (i % 2 === 0 ? 1 : -1));
    if (allAsteroidsReady()) {
      ctx.drawImage(asteroidImgs[2], -aSize / 2, -aSize / 2, aSize, aSize);
    } else {
      ctx.fillStyle = '#6b5540';
      ctx.beginPath();
      ctx.arc(0, 0, aSize / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Mode buttons
  const btnW = 170 * scale;
  const btnH = 42 * scale;
  const gap = 14 * scale;
  const btnY = H * 0.82;

  // Campaign button
  const cX = W / 2 - btnW - gap / 2;
  ctx.fillStyle = '#2E7D32';
  ctx.beginPath();
  ctx.roundRect(cX, btnY, btnW, btnH, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(15 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText('🚀 CAMPAIGN', cX + btnW / 2, btnY + btnH / 2 + 5 * scale);
  titleBtns.campaign = { x: cX, y: btnY, w: btnW, h: btnH };

  // Endless button
  const eX = W / 2 + gap / 2;
  if (endlessUnlocked) {
    ctx.fillStyle = '#1565C0';
    ctx.beginPath();
    ctx.roundRect(eX, btnY, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText('♾️ ENDLESS', eX + btnW / 2, btnY + btnH / 2 + 5 * scale);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.roundRect(eX, btnY, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('🔒 ENDLESS', eX + btnW / 2, btnY + btnH / 2 + 5 * scale);
  }
  titleBtns.endless = { x: eX, y: btnY, w: btnW, h: btnH };

  // Best score
  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.round(12 * scale)}px Arial, sans-serif`;
    ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.96);
  }

  drawMenuButton();
  drawMuteButton();
}

// --- SHIP PICKER ---
function drawShipPicker() {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(32 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('CHOOSE YOUR SHIP', W / 2, H * 0.1);

  // Ship cards
  const cardW = Math.min(130, (W - 60) / 5) * scale;
  const cardH = cardW * 1.4;
  const gap = 12 * scale;
  const totalW = SHIPS.length * cardW + (SHIPS.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const cardY = H * 0.22;

  for (let i = 0; i < SHIPS.length; i++) {
    const cx = startX + i * (cardW + gap);
    const s = SHIPS[i];
    const unlocked = unlockedShips.includes(i);
    const isSelected = i === selectedShip;

    // Card background
    if (isSelected) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.strokeStyle = s.accent;
      ctx.lineWidth = 3;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
    }
    ctx.beginPath();
    ctx.roundRect(cx, cardY, cardW, cardH, 10);
    ctx.fill();
    ctx.stroke();

    if (unlocked) {
      // Draw ship
      const shipSize = cardW * 0.65;
      drawShipByIndex(i, cx + cardW / 2, cardY + cardH * 0.38, shipSize, shipSize * 1.3);

      // Ship name
      ctx.fillStyle = isSelected ? s.accent : 'rgba(255,255,255,0.7)';
      ctx.font = `bold ${Math.round(10 * scale)}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(s.name, cx + cardW / 2, cardY + cardH * 0.78);

      // Type
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = `${Math.round(8 * scale)}px Arial, sans-serif`;
      ctx.fillText(s.type, cx + cardW / 2, cardY + cardH * 0.88);

      // Selected indicator
      if (isSelected) {
        ctx.fillStyle = s.accent;
        ctx.font = `bold ${Math.round(9 * scale)}px Arial, sans-serif`;
        ctx.fillText('▼ ACTIVE ▼', cx + cardW / 2, cardY + cardH + 14 * scale);
      }
    } else {
      // Locked card — ? icon
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = `bold ${Math.round(40 * scale)}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('?', cx + cardW / 2, cardY + cardH * 0.5);

      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = `${Math.round(9 * scale)}px Arial, sans-serif`;
      ctx.fillText('🔒 LOCKED', cx + cardW / 2, cardY + cardH * 0.75);

      // Unlock hint
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = `${Math.round(7 * scale)}px Arial, sans-serif`;
      ctx.fillText('Beat campaign with', cx + cardW / 2, cardY + cardH * 0.85);
      ctx.fillText(i > 0 ? SHIPS[i-1].name : '', cx + cardW / 2, cardY + cardH * 0.93);
    }
  }

  // Back button
  const bbW = 100 * scale;
  const bbH = 36 * scale;
  const bbX = (W - bbW) / 2;
  const bbY = H * 0.88;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.roundRect(bbX, bbY, bbW, bbH, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(15 * scale)}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('← BACK', bbX + bbW / 2, bbY + bbH / 2 + 5 * scale);
  pickerBackBtn = { x: bbX, y: bbY, w: bbW, h: bbH };
}

// --- GAME OVER SCREEN ---

  ctx.fillText(score, W / 2, H * 0.5);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${Math.round(16 * scale)}px Arial, sans-serif`;
  ctx.fillText('ASTEROIDS CLEARED', W / 2, H * 0.57);

  // New best
  if (score >= bestScore && score > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = `bold ${Math.round(18 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('⭐ NEW BEST! ⭐', W / 2, H * 0.66);
  } else if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.66);
  }

  const blink = Math.sin(Date.now() / 400) > 0;
  if (blink) {
    ctx.fillStyle = '#42A5F5';
    ctx.font = `bold ${Math.round(20 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('TAP OR PRESS SPACE TO RETRY', W / 2, H * 0.8);
  }

  drawMenuButton();
  drawMuteButton();
}

function drawStar5(cx, cy, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
  }
  ctx.closePath();
  ctx.fill();
}

// --- WORLD TITLE CARD ---
function drawWorldTitle() {
  const w = WORLDS[currentWorld];
  drawWorldBackground();

  // World number
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = `bold ${Math.round(20 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`WORLD ${currentWorld + 1} of ${WORLDS.length}`, W / 2, H * 0.32);

  // World name with accent color
  ctx.fillStyle = w.accent;
  ctx.font = `bold ${Math.round(48 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText(w.name, W / 2, H * 0.46);

  // Decorative line
  const lineW = 120 * scale;
  ctx.strokeStyle = w.accent;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(W / 2 - lineW, H * 0.52);
  ctx.lineTo(W / 2 + lineW, H * 0.52);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Lives display — mini ships
  const miniW = 12 * scale;
  const miniH = 16 * scale;
  const miniGap = 4 * scale;
  const totalLivesW = MAX_LIVES * (miniW + miniGap) - miniGap;
  const livesStartX = W / 2 - totalLivesW / 2 - 30 * scale;
  const livesY = H * 0.6;
  for (let i = 0; i < MAX_LIVES; i++) {
    drawMiniShip(livesStartX + miniW / 2 + i * (miniW + miniGap), livesY, miniW, miniH, i < lives);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`|  Score: ${score}`, livesStartX + totalLivesW + 12 * scale, livesY + 5 * scale);
  ctx.textAlign = 'center';

  drawMenuButton();
  drawMuteButton();
}

// --- COUNTDOWN ---
function drawCountdown() {
  const w = gameMode === 'campaign' ? WORLDS[currentWorld] : WORLDS[0];
  drawWorldBackground();

  // Ship is visible during countdown
  if (ship.x) drawShip(ship.x, ship.y, ship.w, ship.h, 0);

  // Number or GO
  const label = countdownNum > 0 ? countdownNum.toString() : 'GO!';
  const numScale = countdownNum > 0 ? 80 : 60;
  ctx.fillStyle = countdownNum > 0 ? '#fff' : w.accent;
  ctx.font = `bold ${Math.round(numScale * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(label, W / 2, H * 0.45);
}

// --- LEVEL COMPLETE ---
function drawLevelComplete() {
  const w = WORLDS[currentWorld];
  drawWorldBackground();
  drawParticles();

  // Ship celebration (bobbing)
  if (ship.x) {
    titleShipBob += 0.05;
    const bobY = ship.y + Math.sin(titleShipBob) * 6;
    drawShip(ship.x, bobY, ship.w, ship.h, 0);
  }

  ctx.fillStyle = w.accent;
  ctx.font = `bold ${Math.round(36 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('WORLD COMPLETE!', W / 2, H * 0.25);

  // Stats
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(28 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText(w.name, W / 2, H * 0.38);

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `${Math.round(16 * scale)}px Arial, sans-serif`;
  ctx.fillText(`Blasted: ${levelBlasted}  |  Score: +${levelScore}`, W / 2, H * 0.5);

  // Next world preview
  if (currentWorld + 1 < WORLDS.length) {
    const next = WORLDS[currentWorld + 1];
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText(`Next: ${next.name}`, W / 2, H * 0.62);
  }
}

// --- VICTORY SCREEN ---
function drawVictory() {
  // Rainbow-ish cycling background
  const hue = (Date.now() / 50) % 360;
  ctx.fillStyle = `hsl(${hue}, 30%, 8%)`;
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Falling confetti stream
  if (Math.random() < 0.4) {
    particles.push({
      x: Math.random() * W, y: -5,
      vx: (Math.random() - 0.5) * 2,
      vy: 1 + Math.random() * 2,
      life: 80 + Math.random() * 40,
      maxLife: 120,
      size: 3 + Math.random() * 3,
      color: ['#FF5252','#FFD740','#69F0AE','#40C4FF','#E040FB','#FF6E40'][Math.floor(Math.random() * 6)]
    });
  }

  // Confetti pops — bursts from sides
  if (Math.random() < 0.06) {
    const fromLeft = Math.random() > 0.5;
    const bx = fromLeft ? W * 0.1 : W * 0.9;
    const by = H * (0.2 + Math.random() * 0.4);
    for (let i = 0; i < 15; i++) {
      const angle = (fromLeft ? -0.5 : 0.5) * Math.PI + (Math.random() - 0.5) * Math.PI * 0.8;
      const speed = 3 + Math.random() * 5;
      particles.push({
        x: bx, y: by,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        life: 40 + Math.random() * 30,
        maxLife: 70,
        size: 3 + Math.random() * 4,
        color: ['#FF5252','#FFD740','#69F0AE','#40C4FF','#E040FB','#FF6E40','#FFFFFF'][Math.floor(Math.random() * 7)]
      });
    }
  }

  drawParticles();
  updateParticles();

  // Ship celebration
  titleShipBob += 0.04;
  const shipY = H * 0.38 + Math.sin(titleShipBob) * 10;
  drawShip(W / 2, shipY, SHIP_WIDTH * 2 * scale, SHIP_HEIGHT * 2 * scale, 0);

  ctx.fillStyle = '#ffcc00';
  ctx.font = `bold ${Math.round(42 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('WELL DONE!', W / 2, H * 0.1);

  // Stars
  const starY = H * 0.17;
  for (let i = 0; i < 5; i++) {
    drawStar5(W / 2 + (i - 2) * 36 * scale, starY, 14 * scale, '#ffcc00');
  }

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(28 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText('ALL WORLDS COMPLETE!', W / 2, H * 0.65);

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(44 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText(score, W / 2, H * 0.74);

  // Unlock messages with ship preview
  const nextShip = selectedShip + 1;
  if (nextShip < SHIPS.length && unlockedShips.includes(nextShip)) {
    const ns = SHIPS[nextShip];
    const unlockY = H * 0.86;
    // Draw the unlocked ship small preview
    const previewSize = 30 * scale;
    drawShipByIndex(nextShip, W / 2 - 90 * scale, unlockY - 4 * scale, previewSize, previewSize * 1.3);
    // Text
    ctx.fillStyle = ns.accent;
    ctx.font = `bold ${Math.round(16 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(ns.name.toUpperCase() + ' UNLOCKED!', W / 2 - 60 * scale, unlockY + 4 * scale);
    ctx.textAlign = 'center';
  } else {
    ctx.fillStyle = '#69F0AE';
    ctx.font = `bold ${Math.round(16 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('♾️ ENDLESS MODE UNLOCKED!', W / 2, H * 0.86);
  }

  const blink = Math.sin(Date.now() / 400) > 0;
  if (blink) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText('TAP OR PRESS SPACE', W / 2, H * 0.95);
  }

  drawMenuButton();
  drawMuteButton();
}

// --- GAME INIT ---
function startCampaign() {
  initAudio();
  gameMode = 'campaign';
  currentWorld = 0;
  score = 0;
  lives = MAX_LIVES;
  showWorldTitle();
}

function startEndless() {
  initAudio();
  gameMode = 'endless';
  currentWorld = 0;
  playSound('start');
  gameState = 'playing';
  resetPlayState();
  generateWorldDecor();
  restartMusic();
}

function showWorldTitle() {
  gameState = 'worldtitle';
  transitionTimer = 120; // 2 seconds
  asteroids = [];
  blasters = [];
  particles = [];
  generateWorldDecor();
}

function startCountdown() {
  gameState = 'countdown';
  countdownNum = 3;
  transitionTimer = 60;
  resetPlayState();
  playSound('beep'); // sound on 3
}

function resetPlayState() {
  ship = { x: W / 2, y: H * 0.8, w: SHIP_WIDTH * scale, h: SHIP_HEIGHT * scale, speed: 6 };
  asteroids = [];
  blasters = [];
  blasterTimer = 0;
  particles = [];
  powerups = [];
  powerupSpawnTimer = 0;
  plasmaActive = false;
  plasmaTimer = 0;
  shieldActive = false;
  megabeamActive = false;
  megabeamTimer = 0;
  phaseActive = false;
  phaseTimer = 0;
  invincibleTimer = 0;
  wobbleTimer = 0;
  spawnTimer = 0;
  worldFrameCount = 0;
  worldProgress = 0;
  levelScore = 0;
  levelBlasted = 0;
  frameCount = 0;
  const w = gameMode === 'campaign' ? WORLDS[currentWorld] : WORLDS[0];
  currentSpeed = w.baseSpeed;
  spawnInterval = w.spawnStart;
}

function getWorldBg() {
  if (gameMode === 'campaign') return WORLDS[currentWorld].bg;
  const worldIdx = Math.min(Math.floor(frameCount / 3600), WORLDS.length - 1);
  return WORLDS[worldIdx].bg;
}

function getWorldIdx() {
  if (gameMode === 'campaign') return currentWorld;
  return Math.min(Math.floor(frameCount / 3600), WORLDS.length - 1);
}

// --- WORLD DECORATION DATA ---
let worldDecor = [];

function generateWorldDecor() {
  worldDecor = [];
  const idx = getWorldIdx();

  if (idx === 0) {
    // Deep Space — distant galaxies
    for (let i = 0; i < 3; i++) {
      worldDecor.push({ type: 'galaxy', x: Math.random(), y: 0.15 + Math.random() * 0.5, rx: 30 + Math.random() * 40, ry: 8 + Math.random() * 12, rot: Math.random() * Math.PI, alpha: 0.04 + Math.random() * 0.06 });
    }
  } else if (idx === 1) {
    // Nebula — Pillars of Creation style
    const staggerX = [0.15, 0.50, 0.80];
    const speeds = [0.2, 0.35, 0.5];
    const pillarColors = [
      ['#6a1a8a', '#b06aff', '#2a0e4a'],
      ['#8a1060', '#ff80cc', '#3a0830'],
      ['#1a2a8a', '#80aaff', '#0a1040'],
    ];
    worldDecor.push({ type: 'nebula_data', pillars: staggerX.map((xf, i) => ({
      x: xf,
      topY: -(Math.random() * H),
      botY: H * (0.4 + Math.random() * 0.6),
      width: 60 + Math.random() * 80,
      colors: pillarColors[i],
      speed: speeds[i],
      phase: Math.random() * Math.PI * 2
    })),
    tendrils: [0,1,2].map(() => ({
      x0: Math.random() * W, y0: Math.random() * H * 0.5,
      cx: Math.random() * W, cy: Math.random() * H,
      x1: Math.random() * W, y1: H * (0.5 + Math.random() * 0.5),
      color: Math.random() > 0.5 ? '#b060ff' : '#ff80cc',
      phase: Math.random() * Math.PI * 2
    })),
    brightStars: [0,1,2,3,4].map(() => ({
      x: Math.random() * W, y: Math.random() * H,
      r: 1.5 + Math.random() * 2,
      color: ['#ffe0ff','#c0a0ff','#ffc0e0','#80c0ff','#ffffff'][Math.floor(Math.random()*5)],
      phase: Math.random() * Math.PI * 2
    })),
    cluster: { x: (0.2 + Math.random() * 0.6) * W, y: (0.1 + Math.random() * 0.4) * H }
    });
  } else if (idx === 2) {
    // Asteroid Belt — Dense Debris Field
    const mkVerts = (n) => Array.from({length: n}, (_, i) => {
      const a = (i / n) * Math.PI * 2;
      const r = 0.65 + Math.random() * 0.35;
      return { a, r };
    });
    const far = [0,1,2].map(() => ({
      x: Math.random() * W, y: Math.random() * H,
      r: 35 + Math.random() * 15, alpha: 0.07 + Math.random() * 0.05,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.003,
      speed: 0.08 + Math.random() * 0.08, layer: 0,
      vertices: mkVerts(7 + Math.floor(Math.random() * 3)),
      craterX: (Math.random() - 0.5) * 20, craterY: (Math.random() - 0.5) * 20, craterR: 8 + Math.random() * 8
    }));
    const mid = [0,1,2,3,4].map(() => ({
      x: Math.random() * W, y: Math.random() * H,
      r: 18 + Math.random() * 10, alpha: 0.09 + Math.random() * 0.06,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.006,
      speed: 0.18 + Math.random() * 0.15, layer: 1,
      vertices: mkVerts(7 + Math.floor(Math.random() * 3)),
      craterX: (Math.random() - 0.5) * 10, craterY: (Math.random() - 0.5) * 10, craterR: 4 + Math.random() * 5
    }));
    const near = Array.from({length: 12}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: 4 + Math.random() * 6, alpha: 0.12 + Math.random() * 0.08,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.012,
      speed: 0.4 + Math.random() * 0.4, layer: 2,
      vertices: mkVerts(7 + Math.floor(Math.random() * 3)),
      craterX: 0, craterY: 0, craterR: 0
    }));
    const dustParticles = Array.from({length: 55}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: 0.8 + Math.random() * 1.8,
      alpha: 0.08 + Math.random() * 0.10,
      speed: 0.25 + Math.random() * 0.4,
      color: Math.random() > 0.5 ? '#8D6E63' : '#a08060'
    }));
    const gasBands = [0,1,2,3].map(() => ({
      y: Math.random() * H, w: W * (0.4 + Math.random() * 0.6),
      alpha: 0.04 + Math.random() * 0.06, speed: 0.05 + Math.random() * 0.10
    }));
    const warmStars = [0,1,2].map(() => ({
      x: Math.random() * W, y: Math.random() * H * 0.5,
      r: 2 + Math.random() * 1.5, phase: Math.random() * Math.PI * 2
    }));
    worldDecor.push({ type: 'asteroid_data', rocks: [...far, ...mid, ...near], dustParticles, gasBands, warmStars, bandX: 0 });
  } else if (idx === 3) {
    // Ice Field — Frozen Expanse
    const edgePositions = [
      // left edge crystals
      {x: W*0.04, y: H*0.55}, {x: W*0.07, y: H*0.70}, {x: W*0.03, y: H*0.40},
      {x: W*0.10, y: H*0.85},
      // right edge crystals
      {x: W*0.93, y: H*0.50}, {x: W*0.96, y: H*0.65}, {x: W*0.90, y: H*0.78},
      {x: W*0.88, y: H*0.35}
    ];
    const largeCrystals = [0,1,2,3].map(i => ({
      x: edgePositions[i].x, y: edgePositions[i].y,
      h: 55 + Math.random() * 35, w: 14 + Math.random() * 10,
      rot: (i < 4 ? -0.1 : 0.1) + (Math.random() - 0.5) * 0.25,

    }));
    const medCrystals = [0,1,2].map(i => ({
      x: edgePositions[i+4].x, y: edgePositions[i+4].y,
      h: 35 + Math.random() * 15, w: 10 + Math.random() * 6,

    const smallCrystals = smallPositions.map(p => ({

      h: 12 + Math.random() * 8, w: 4 + Math.random() * 4,
      rot: (Math.random() - 0.5) * 0.5,
      alpha: 0.07 + Math.random() * 0.06, hasHighlight: false, shimmerTimer: 0
    }));
    const auroraDefs = [
      { baseY: H * 0.18, amplitude: 28, freq: 0.006, phase: 0, colorCore: '#4FC3F7', colorGlow: '#1a6080' },
      { baseY: H * 0.32, amplitude: 18, freq: 0.009, phase: Math.PI * 0.6, colorCore: '#80DEEA', colorGlow: '#205060' },
      { baseY: H * 0.46, amplitude: 22, freq: 0.007, phase: Math.PI * 1.2, colorCore: '#69F0AE', colorGlow: '#1a5030' },
    ];
