// --- AUDIO ---
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch (type) {
    case 'hit':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.3);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
      break;
    case 'dodge':
      // subtle whoosh for near misses — future
      break;
    case 'lose':
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(55, t + 0.6);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.start(t); osc.stop(t + 0.6);
      break;
    case 'start':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(330, t);
      osc.frequency.setValueAtTime(440, t + 0.1);
      osc.frequency.setValueAtTime(660, t + 0.2);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
      break;
    case 'score':
      // every 50 points
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.08);
      osc.frequency.setValueAtTime(784, t + 0.16);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
      break;
    case 'blaster':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
      gain.gain.setValueAtTime(0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t); osc.stop(t + 0.1);
      break;
    case 'explode':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.2);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(t); osc.stop(t + 0.25);
      break;
    case 'levelup':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.1);
      osc.frequency.setValueAtTime(784, t + 0.2);
      osc.frequency.setValueAtTime(1047, t + 0.3);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t); osc.stop(t + 0.5);
      break;
    case 'victory':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.12);
      osc.frequency.setValueAtTime(784, t + 0.24);
      osc.frequency.setValueAtTime(1047, t + 0.36);
      osc.frequency.setValueAtTime(1319, t + 0.48);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      osc.start(t); osc.stop(t + 0.7);
      break;
    case 'beep':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, t);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
      break;
    case 'beepgo':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(t); osc.stop(t + 0.25);
      break;
  }
}

// --- RESIZE ---
function resize() {
  const vv = window.visualViewport || { width: window.innerWidth, height: window.innerHeight };
  canvas.width = vv.width;
  canvas.height = vv.height;
  W = canvas.width;
  H = canvas.height;
  scale = Math.min(W / 800, H / 500);
}
window.addEventListener('resize', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

// --- STARS (background) ---
function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.8 + 0.2,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function updateStars() {
  for (const s of stars) {
    s.y += s.speed * (gameState === 'playing' ? 1.5 : 0.5);
    s.twinkle += 0.03;
    if (s.y > H + 5) { s.y = -5; s.x = Math.random() * W; }
  }
}

function drawStars() {
  for (const s of stars) {
    const alpha = 0.4 + 0.3 * Math.sin(s.twinkle);
    let sc = [255,255,255];
    if (gameState === 'playing' || gameState === 'countdown' || gameState === 'levelcomplete') {
      const w = gameMode === 'campaign' ? WORLDS[currentWorld] : null;
      if (w) sc = w.starColor;
    }
    ctx.fillStyle = `rgba(${sc[0]},${sc[1]},${sc[2]},${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- SHIP DRAWING ---
function drawShip(x, y, w, h, wobble) {
  ctx.save();
  ctx.translate(x, y);

  // wobble effect
  if (wobble > 0) {
    const wobAng = Math.sin(wobble * 0.8) * 0.25;
    ctx.rotate(wobAng);
  }

  // invincible flash
  if (invincibleTimer > 0 && Math.floor(invincibleTimer / 6) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  const hw = w / 2;
  const hh = h / 2;
  const s = getShip();
  const fc = s.flameColors; // [outer, mid, core]

  // Animated Canvas exhaust flames (drawn BEHIND ship)
  const flameH = 14 + Math.random() * 12;
  const flameW = w * 0.35;
  ctx.fillStyle = fc[0];
  ctx.beginPath();
  ctx.moveTo(-flameW / 2, hh * 0.75);
  ctx.quadraticCurveTo(-flameW * 0.1, hh + flameH * 0.7, 0, hh + flameH);
  ctx.quadraticCurveTo(flameW * 0.1, hh + flameH * 0.7, flameW / 2, hh * 0.75);
  ctx.fill();
  ctx.fillStyle = fc[1];
  ctx.beginPath();
  ctx.moveTo(-flameW / 3, hh * 0.75);
  ctx.quadraticCurveTo(0, hh + flameH * 0.6, 0, hh + flameH * 0.8);
  ctx.quadraticCurveTo(0, hh + flameH * 0.6, flameW / 3, hh * 0.75);
  ctx.fill();
  ctx.fillStyle = fc[2];
  ctx.beginPath();
  ctx.moveTo(-flameW / 6, hh * 0.75);
  ctx.quadraticCurveTo(0, hh + flameH * 0.3, 0, hh + flameH * 0.5);
  ctx.quadraticCurveTo(0, hh + flameH * 0.3, flameW / 6, hh * 0.75);
  ctx.fill();

  // SVG ship body
  if (isShipReady()) {
    const drawW = w * s.drawW;
    const drawH = h * s.drawH;
    ctx.drawImage(shipImages[selectedShip], -drawW / 2, -drawH / 2, drawW, drawH);
  } else {
    // Fallback
    ctx.fillStyle = s.accent;
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.bezierCurveTo(hw * 0.3, -hh, hw, -hh * 0.4, hw, hh * 0.5);
    ctx.lineTo(hw * 0.6, hh);
    ctx.lineTo(-hw * 0.6, hh);
    ctx.lineTo(-hw, hh * 0.5);
    ctx.bezierCurveTo(-hw, -hh * 0.4, -hw * 0.3, -hh, 0, -hh);
    ctx.fill();
  }

  ctx.restore();
}

// Draw a specific ship by index (for picker/title)
function drawShipByIndex(idx, x, y, w, h) {
  ctx.save();
  ctx.translate(x, y);
  const s = SHIPS[idx];
  const img = shipImages[idx];
  if (img.complete && img.naturalWidth > 0) {
    const drawW = w * s.drawW;
    const drawH = h * s.drawH;
    ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
  } else {
    ctx.fillStyle = s.accent;
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// --- ASTEROID DRAWING ---
function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);

  if (asteroidImgReady) {
    // SVG viewBox 200x200, asteroid shape spans ~170px diameter
    // Scale so game radius matches visual radius
    const drawSize = a.r * 2.35;
    ctx.drawImage(asteroidImg, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
  } else {
    // Canvas fallback
    const grad = ctx.createRadialGradient(0, 0, a.r * 0.2, 0, 0, a.r);
    grad.addColorStop(0, '#a0896e');
    grad.addColorStop(0.6, '#8b7355');
    grad.addColorStop(1, '#6b5540');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, a.r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function spawnAsteroid() {
  const r = 18 + Math.random() * 28;
  asteroids.push({
    x: r + Math.random() * (W - r * 2),
    y: -r * 2,
    r: r,
    speed: currentSpeed * (0.7 + Math.random() * 0.6),
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04
  });
}

// --- PARTICLES ---
function spawnHitParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 2 + Math.random() * 3,
      color: ['#ff6600', '#ffcc00', '#ff3333', '#fff'][Math.floor(Math.random() * 4)]
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- BLASTERS ---
function spawnBlaster() {
  blasters.push({
    x: ship.x,
    y: ship.y - ship.h / 2,
    w: BLASTER_WIDTH * scale,
    h: BLASTER_HEIGHT * scale
  });
  playSound('blaster');
}

function updateBlasters() {
  for (let i = blasters.length - 1; i >= 0; i--) {
    const b = blasters[i];
    b.y -= BLASTER_SPEED * scale;
    if (b.y + b.h < 0) { blasters.splice(i, 1); continue; }

    // Check collision with asteroids
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (dx * dx + dy * dy < (a.r + b.w) * (a.r + b.w)) {
        // Asteroid destroyed!
        spawnExplosionParticles(a.x, a.y, a.r);
        playSound('explode');
        score++;
        levelScore++;
        levelBlasted++;
        if (gameMode === 'campaign') worldProgress += BLAST_PROGRESS;
        if (score % 50 === 0) playSound('score');
        asteroids.splice(j, 1);
        blasters.splice(i, 1);
        break;
      }
    }
  }
}

function drawBlasters() {
  for (const b of blasters) {
    // Glowing pellet
    ctx.shadowColor = '#42A5F5';
    ctx.shadowBlur = 8;
    const grad = ctx.createLinearGradient(b.x, b.y - b.h / 2, b.x, b.y + b.h / 2);
    grad.addColorStop(0, '#90caf9');
    grad.addColorStop(0.5, '#42A5F5');
    grad.addColorStop(1, '#1565C0');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, b.w / 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function spawnExplosionParticles(x, y, radius) {
  const count = 10 + Math.floor(radius * 0.4);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 25 + Math.random() * 20,
      maxLife: 45,
      size: 2 + Math.random() * 4,
      color: ['#ff6600', '#ffcc00', '#a0896e', '#fff', '#ff3333'][Math.floor(Math.random() * 5)]
    });
  }
}

// --- LIFE METER (Mini Ships) ---
function drawLives() {
  const shipW = 16 * scale;
  const shipH = 22 * scale;
  const gap = 6 * scale;
  const startX = 14 + shipW / 2;
  const startY = 8;

  // "LIVES" label
  ctx.fillStyle = 'rgba(100,200,255,0.6)';
  ctx.font = `bold ${Math.round(7 * scale)}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('LIVES', startX + (MAX_LIVES - 1) * (shipW + gap) / 2, startY);

  for (let i = 0; i < MAX_LIVES; i++) {
    const x = startX + i * (shipW + gap);
    const y = startY + 6 * scale + shipH / 2;
    const alive = i < lives;
    drawMiniShip(x, y, shipW, shipH, alive);
  }
}

function drawMiniShip(x, y, w, h, alive) {
  ctx.save();
  ctx.translate(x, y);

  const hw = w / 2;
  const hh = h / 2;

  if (alive) {
    // Animated thruster flame
    const flameH = 4 + Math.random() * 4;
    const flameW = w * 0.3;
    ctx.fillStyle = '#FF8F00';
    ctx.beginPath();
    ctx.moveTo(-flameW / 2, hh);
    ctx.quadraticCurveTo(0, hh + flameH, flameW / 2, hh);
    ctx.fill();
    ctx.fillStyle = '#FFD54F';
    ctx.beginPath();
    ctx.moveTo(-flameW / 4, hh);
    ctx.quadraticCurveTo(0, hh + flameH * 0.6, flameW / 4, hh);
    ctx.fill();

    // Body
    const grad = ctx.createLinearGradient(-hw, 0, hw, 0);
    grad.addColorStop(0, '#9E9E9E');
    grad.addColorStop(0.5, '#E0E0E0');
    grad.addColorStop(1, '#9E9E9E');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.bezierCurveTo(hw * 0.4, -hh, hw * 0.8, -hh * 0.3, hw * 0.7, hh * 0.6);
    ctx.lineTo(-hw * 0.7, hh * 0.6);
    ctx.bezierCurveTo(-hw * 0.8, -hh * 0.3, -hw * 0.4, -hh, 0, -hh);
    ctx.fill();

    // Blue panels
    ctx.fillStyle = '#2962FF';
    ctx.beginPath();
    ctx.moveTo(0, -hh * 0.7);
    ctx.lineTo(hw * 0.5, hh * 0.4);
    ctx.lineTo(0, hh * 0.5);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -hh * 0.7);
    ctx.lineTo(-hw * 0.5, hh * 0.4);
    ctx.lineTo(0, hh * 0.5);
    ctx.fill();

    // Red nose
    ctx.fillStyle = '#FF5252';
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.bezierCurveTo(hw * 0.2, -hh, hw * 0.3, -hh * 0.6, 0, -hh * 0.5);
    ctx.bezierCurveTo(-hw * 0.3, -hh * 0.6, -hw * 0.2, -hh, 0, -hh);
    ctx.fill();

    // Wings
    ctx.fillStyle = '#D32F2F';
    ctx.beginPath();
    ctx.moveTo(-hw * 0.6, hh * 0.2);
    ctx.lineTo(-hw, hh * 0.8);
    ctx.lineTo(-hw * 0.4, hh * 0.6);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hw * 0.6, hh * 0.2);
    ctx.lineTo(hw, hh * 0.8);
    ctx.lineTo(hw * 0.4, hh * 0.6);
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#81D4FA';
    ctx.beginPath();
    ctx.arc(0, -hh * 0.05, hw * 0.25, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Ghost ship — greyed out, faded
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.bezierCurveTo(hw * 0.4, -hh, hw * 0.8, -hh * 0.3, hw * 0.7, hh * 0.6);
    ctx.lineTo(-hw * 0.7, hh * 0.6);
    ctx.bezierCurveTo(-hw * 0.8, -hh * 0.3, -hw * 0.4, -hh, 0, -hh);
    ctx.fill();
    // Ghost wings
    ctx.beginPath();
    ctx.moveTo(-hw * 0.6, hh * 0.2);
    ctx.lineTo(-hw, hh * 0.8);
    ctx.lineTo(-hw * 0.4, hh * 0.6);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hw * 0.6, hh * 0.2);
    ctx.lineTo(hw, hh * 0.8);
    ctx.lineTo(hw * 0.4, hh * 0.6);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// --- HUD ---
function drawHUD() {
  drawLives();

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(22 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText(score, W - 14, 32 * scale);

  // Best (endless only)
  if (gameMode === 'endless' && bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.round(13 * scale)}px Arial, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText('BEST ' + bestScore, W - 14, 50 * scale);
  }

  // Campaign: world name + progress bar
  if (gameMode === 'campaign') {
    const w = WORLDS[currentWorld];
    const barW = Math.min(220, W * 0.3) * scale;
    const barH = 12 * scale;
    const barX = (W - barW) / 2;
    const barY = 12;
    const progress = Math.min(worldProgress / w.threshold, 1);

    // World label
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `bold ${Math.round(11 * scale)}px Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`WORLD ${currentWorld + 1}: ${w.name}`, W / 2, barY + barH + 14 * scale);

    // Bar background
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, barH / 2);
    ctx.fill();

    // Bar fill
    if (progress > 0) {
      const grad = ctx.createLinearGradient(barX, 0, barX + barW * progress, 0);
      grad.addColorStop(0, w.accent);
      grad.addColorStop(1, '#fff');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW * progress, barH, barH / 2);
      ctx.fill();
    }

    // Bar glow when nearly full
    if (progress > 0.8) {
      ctx.shadowColor = w.accent;
      ctx.shadowBlur = 8 + Math.sin(Date.now() / 200) * 4;
      ctx.fillStyle = 'transparent';
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW * progress, barH, barH / 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

// --- TITLE SCREEN ---
let titleShipBob = 0;
let titleBtns = { campaign: {}, endless: {}, ships: {} };

function drawTitle() {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  titleShipBob += 0.03;

  // Ship
  const shipY = H * 0.38 + Math.sin(titleShipBob) * 8;
  drawShip(W / 2, shipY, SHIP_WIDTH * 1.8 * scale, SHIP_HEIGHT * 1.8 * scale, 0);

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(42 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('SPACE DODGE', W / 2, H * 0.1);

  // Subtitle
  ctx.fillStyle = '#42A5F5';

  const decT = Date.now() / 1000;
  for (let i = 0; i < 3; i++) {
    const ax = W * (0.15 + i * 0.35) + Math.sin(decT + i * 2) * 20;
    const ay = H * 0.65 + Math.cos(decT * 0.7 + i) * 15;
    const aSize = (36 + i * 10) * scale;
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(decT * 0.3 * (i % 2 === 0 ? 1 : -1));

      ctx.drawImage(asteroidImg, -aSize / 2, -aSize / 2, aSize, aSize);
    } else {
      ctx.fillStyle = '#6b5540';
      ctx.beginPath();
      ctx.arc(0, 0, aSize / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Mode buttons
  const btnW = 180 * scale;
  const btnH = 42 * scale;

  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(16 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;

  // Endless button (locked/unlocked)

    ctx.fillStyle = '#1565C0';
    ctx.beginPath();
    ctx.roundRect(eX, btnY, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText('♾️ ENDLESS', eX + btnW / 2, btnY + btnH / 2 + 5 * scale);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.roundRect(eX, btnY, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('🔒 ENDLESS', eX + btnW / 2, btnY + btnH / 2 + 5 * scale);
  }
  titleBtns.endless = { x: eX, y: btnY, w: btnW, h: btnH };

  // Ships button (top right)
  const sbW = 80 * scale;
  const sbH = 32 * scale;
  const sbX = W - sbW - 14;
  const sbY = 12;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.roundRect(sbX, sbY, sbW, sbH, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = `bold ${Math.round(13 * scale)}px Arial, sans-serif`;
  ctx.fillText('🚀 SHIPS', sbX + sbW / 2, sbY + sbH / 2 + 4 * scale);
  titleBtns.ships = { x: sbX, y: sbY, w: sbW, h: sbH };

  // Selected ship name under the ship
  ctx.fillStyle = getShip().accent;
  ctx.font = `bold ${Math.round(13 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText(getShip().name, W / 2, H * 0.58);

  // Best score
  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.94);
  }

  drawMenuButton();
}

// --- SHIP PICKER ---
function drawShipPicker() {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(32 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('CHOOSE YOUR SHIP', W / 2, H * 0.1);

  // Ship cards
  const cardW = Math.min(130, (W - 60) / 5) * scale;
  const cardH = cardW * 1.4;
  const gap = 12 * scale;
  const totalW = SHIPS.length * cardW + (SHIPS.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const cardY = H * 0.22;

  for (let i = 0; i < SHIPS.length; i++) {
    const cx = startX + i * (cardW + gap);
    const s = SHIPS[i];
    const unlocked = unlockedShips.includes(i);
    const isSelected = i === selectedShip;

    // Card background
    if (isSelected) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.strokeStyle = s.accent;
      ctx.lineWidth = 3;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
    }
    ctx.beginPath();
    ctx.roundRect(cx, cardY, cardW, cardH, 10);
    ctx.fill();
    ctx.stroke();

    if (unlocked) {
      // Draw ship
      const shipSize = cardW * 0.65;
      drawShipByIndex(i, cx + cardW / 2, cardY + cardH * 0.38, shipSize, shipSize * 1.3);

      // Ship name
      ctx.fillStyle = isSelected ? s.accent : 'rgba(255,255,255,0.7)';
      ctx.font = `bold ${Math.round(10 * scale)}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(s.name, cx + cardW / 2, cardY + cardH * 0.78);

      // Type
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = `${Math.round(8 * scale)}px Arial, sans-serif`;
      ctx.fillText(s.type, cx + cardW / 2, cardY + cardH * 0.88);

      // Selected indicator
      if (isSelected) {
        ctx.fillStyle = s.accent;
        ctx.font = `bold ${Math.round(9 * scale)}px Arial, sans-serif`;
        ctx.fillText('▼ ACTIVE ▼', cx + cardW / 2, cardY + cardH + 14 * scale);
      }
    } else {
      // Locked card — ? icon
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = `bold ${Math.round(40 * scale)}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('?', cx + cardW / 2, cardY + cardH * 0.5);

      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = `${Math.round(9 * scale)}px Arial, sans-serif`;
      ctx.fillText('🔒 LOCKED', cx + cardW / 2, cardY + cardH * 0.75);

      // Unlock hint
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = `${Math.round(7 * scale)}px Arial, sans-serif`;
      ctx.fillText('Beat campaign with', cx + cardW / 2, cardY + cardH * 0.85);
      ctx.fillText(i > 0 ? SHIPS[i-1].name : '', cx + cardW / 2, cardY + cardH * 0.93);
    }
  }

  // Back button
  const bbW = 100 * scale;
  const bbH = 36 * scale;
  const bbX = (W - bbW) / 2;
  const bbY = H * 0.88;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.roundRect(bbX, bbY, bbW, bbH, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(15 * scale)}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('← BACK', bbX + bbW / 2, bbY + bbH / 2 + 5 * scale);
  pickerBackBtn = { x: bbX, y: bbY, w: bbW, h: bbH };
}

// --- GAME OVER SCREEN ---
function drawGameOver() {
  const bg = gameMode === 'campaign' ? WORLDS[currentWorld].bg : '#0a0a2e';
  drawWorldBackground();
  drawParticles();

  ctx.fillStyle = '#ffcc00';
  ctx.font = `bold ${Math.round(38 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('GREAT RUN!', W / 2, H * 0.2);

  // Stars decoration
  const starY = H * 0.28;
  for (let i = 0; i < 3; i++) {
    drawStar5(W / 2 + (i - 1) * 50 * scale, starY, 16 * scale, '#ffcc00');
  }

  // World reached (campaign)
  if (gameMode === 'campaign') {
    ctx.fillStyle = WORLDS[currentWorld].accent;
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText(`World ${currentWorld + 1}: ${WORLDS[currentWorld].name}`, W / 2, H * 0.37);
  }

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(52 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText(score, W / 2, H * 0.5);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${Math.round(16 * scale)}px Arial, sans-serif`;
  ctx.fillText('ASTEROIDS CLEARED', W / 2, H * 0.57);

  // New best
  if (score >= bestScore && score > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = `bold ${Math.round(18 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('⭐ NEW BEST! ⭐', W / 2, H * 0.66);
  } else if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.66);
  }

  const blink = Math.sin(Date.now() / 400) > 0;
  if (blink) {
    ctx.fillStyle = '#42A5F5';
    ctx.font = `bold ${Math.round(20 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('TAP OR PRESS SPACE TO RETRY', W / 2, H * 0.8);
  }

  drawMenuButton();
}

function drawStar5(cx, cy, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
  }
  ctx.closePath();
  ctx.fill();
}

// --- WORLD TITLE CARD ---
function drawWorldTitle() {
  const w = WORLDS[currentWorld];
  drawWorldBackground();

  // World number
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = `bold ${Math.round(20 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(`WORLD ${currentWorld + 1} of ${WORLDS.length}`, W / 2, H * 0.32);

  // World name with accent color
  ctx.fillStyle = w.accent;
  ctx.font = `bold ${Math.round(48 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText(w.name, W / 2, H * 0.46);

  // Decorative line
  const lineW = 120 * scale;
  ctx.strokeStyle = w.accent;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(W / 2 - lineW, H * 0.52);
  ctx.lineTo(W / 2 + lineW, H * 0.52);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Lives display
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
  ctx.fillText(`❤️ ${lives}  |  Score: ${score}`, W / 2, H * 0.62);

  drawMenuButton();
}

// --- COUNTDOWN ---
function drawCountdown() {
  const w = gameMode === 'campaign' ? WORLDS[currentWorld] : WORLDS[0];
  drawWorldBackground();

  // Ship is visible during countdown
  if (ship.x) drawShip(ship.x, ship.y, ship.w, ship.h, 0);

  // Number or GO
  const label = countdownNum > 0 ? countdownNum.toString() : 'GO!';
  const numScale = countdownNum > 0 ? 80 : 60;
  ctx.fillStyle = countdownNum > 0 ? '#fff' : w.accent;
  ctx.font = `bold ${Math.round(numScale * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(label, W / 2, H * 0.45);
}

// --- LEVEL COMPLETE ---
function drawLevelComplete() {
  const w = WORLDS[currentWorld];
  drawWorldBackground();
  drawParticles();

  // Ship celebration (bobbing)
  if (ship.x) {
    titleShipBob += 0.05;
    const bobY = ship.y + Math.sin(titleShipBob) * 6;
    drawShip(ship.x, bobY, ship.w, ship.h, 0);
  }

  ctx.fillStyle = w.accent;
  ctx.font = `bold ${Math.round(36 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('WORLD COMPLETE!', W / 2, H * 0.25);

  // Stats
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(28 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText(w.name, W / 2, H * 0.38);

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `${Math.round(16 * scale)}px Arial, sans-serif`;
  ctx.fillText(`Blasted: ${levelBlasted}  |  Score: +${levelScore}`, W / 2, H * 0.5);

  // Next world preview
  if (currentWorld + 1 < WORLDS.length) {
    const next = WORLDS[currentWorld + 1];
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText(`Next: ${next.name}`, W / 2, H * 0.62);
  }
}

// --- VICTORY SCREEN ---
function drawVictory() {
  // Rainbow-ish cycling background
  const hue = (Date.now() / 50) % 360;
  ctx.fillStyle = `hsl(${hue}, 30%, 8%)`;
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Confetti particles
  if (Math.random() < 0.3) {
    particles.push({
      x: Math.random() * W, y: -5,
      vx: (Math.random() - 0.5) * 2,
      vy: 1 + Math.random() * 2,
      life: 80 + Math.random() * 40,
      maxLife: 120,
      size: 3 + Math.random() * 3,
      color: ['#FF5252','#FFD740','#69F0AE','#40C4FF','#E040FB','#FF6E40'][Math.floor(Math.random() * 6)]
    });
  }
  drawParticles();
  updateParticles();

  // Ship celebration
  titleShipBob += 0.04;
  const shipY = H * 0.42 + Math.sin(titleShipBob) * 10;
  drawShip(W / 2, shipY, SHIP_WIDTH * 2 * scale, SHIP_HEIGHT * 2 * scale, 0);

  ctx.fillStyle = '#ffcc00';
  ctx.font = `bold ${Math.round(44 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('GREAT PILOT!', W / 2, H * 0.12);

  // Stars
  const starY = H * 0.19;
  for (let i = 0; i < 5; i++) {
    drawStar5(W / 2 + (i - 2) * 36 * scale, starY, 14 * scale, '#ffcc00');
  }

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(32 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText('ALL WORLDS COMPLETE!', W / 2, H * 0.68);

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(48 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.fillText(score, W / 2, H * 0.78);

  // Unlock messages
  const nextShip = selectedShip + 1;
  if (nextShip < SHIPS.length && unlockedShips.includes(nextShip)) {
    ctx.fillStyle = SHIPS[nextShip].accent;
    ctx.font = `bold ${Math.round(16 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('🚀 ' + SHIPS[nextShip].name.toUpperCase() + ' UNLOCKED!', W / 2, H * 0.87);
  } else {
    ctx.fillStyle = '#69F0AE';
    ctx.font = `bold ${Math.round(16 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
    ctx.fillText('♾️ ENDLESS MODE UNLOCKED!', W / 2, H * 0.87);
  }

  const blink = Math.sin(Date.now() / 400) > 0;
  if (blink) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.round(14 * scale)}px Arial, sans-serif`;
    ctx.fillText('TAP OR PRESS SPACE', W / 2, H * 0.95);
  }

  drawMenuButton();
}

// --- GAME INIT ---
function startCampaign() {
  initAudio();
  gameMode = 'campaign';
  currentWorld = 0;
  score = 0;
  lives = MAX_LIVES;
  showWorldTitle();
}

function startEndless() {
  initAudio();
  gameMode = 'endless';
  currentWorld = 0;
  playSound('start');
  gameState = 'playing';
  resetPlayState();
  generateWorldDecor();
}

function showWorldTitle() {
  gameState = 'worldtitle';
  transitionTimer = 120; // 2 seconds
  asteroids = [];
  blasters = [];
  particles = [];
  generateWorldDecor();
}

function startCountdown() {
  gameState = 'countdown';
  countdownNum = 3;
  transitionTimer = 60; // 1 second per number
  resetPlayState();
}

function resetPlayState() {
  ship = { x: W / 2, y: H * 0.8, w: SHIP_WIDTH * scale, h: SHIP_HEIGHT * scale, speed: 6 };
  asteroids = [];
  blasters = [];
  blasterTimer = 0;
  particles = [];
  invincibleTimer = 0;
  wobbleTimer = 0;
  spawnTimer = 0;
  worldFrameCount = 0;
  worldProgress = 0;
  levelScore = 0;
  levelBlasted = 0;
  frameCount = 0;
  const w = gameMode === 'campaign' ? WORLDS[currentWorld] : WORLDS[0];
  currentSpeed = w.baseSpeed;
  spawnInterval = w.spawnStart;
}

function getWorldBg() {
  if (gameMode === 'campaign') return WORLDS[currentWorld].bg;
  const worldIdx = Math.min(Math.floor(frameCount / 3600), WORLDS.length - 1);
  return WORLDS[worldIdx].bg;
}

function getWorldIdx() {
  if (gameMode === 'campaign') return currentWorld;
  return Math.min(Math.floor(frameCount / 3600), WORLDS.length - 1);
}

// --- WORLD DECORATION DATA ---
let worldDecor = [];

function generateWorldDecor() {
  worldDecor = [];
  const idx = getWorldIdx();

  if (idx === 0) {
    // Deep Space — distant galaxies
    for (let i = 0; i < 3; i++) {
      worldDecor.push({ type: 'galaxy', x: Math.random(), y: 0.15 + Math.random() * 0.5, rx: 30 + Math.random() * 40, ry: 8 + Math.random() * 12, rot: Math.random() * Math.PI, alpha: 0.04 + Math.random() * 0.06 });
    }
  } else if (idx === 1) {
    // Nebula — gas clouds
    for (let i = 0; i < 5; i++) {
      worldDecor.push({ type: 'cloud', x: Math.random(), y: Math.random(), rx: 80 + Math.random() * 120, ry: 40 + Math.random() * 60, color: Math.random() > 0.5 ? '#CE93D8' : '#F48FB1', alpha: 0.06 + Math.random() * 0.08, drift: (Math.random() - 0.5) * 0.15 });
    }
  } else if (idx === 2) {
    // Asteroid Belt — background rocks + dust
    for (let i = 0; i < 14; i++) {
      worldDecor.push({ type: 'bgrock', x: Math.random(), y: Math.random(), r: 6 + Math.random() * 20, alpha: 0.08 + Math.random() * 0.12, rot: Math.random() * Math.PI * 2, verts: 5 + Math.floor(Math.random() * 4) });
    }
    for (let i = 0; i < 30; i++) {
      worldDecor.push({ type: 'dust', x: Math.random(), y: Math.random(), r: 1 + Math.random() * 2, alpha: 0.1 + Math.random() * 0.15 });
    }
  } else if (idx === 3) {
    // Ice Field — crystal shards + aurora bands
    for (let i = 0; i < 10; i++) {
      worldDecor.push({ type: 'crystal', x: Math.random(), y: Math.random(), h: 15 + Math.random() * 35, w: 3 + Math.random() * 8, rot: -0.3 + Math.random() * 0.6, alpha: 0.06 + Math.random() * 0.1 });
    }
    for (let i = 0; i < 3; i++) {
      worldDecor.push({ type: 'aurora', y: 0.1 + Math.random() * 0.6, amplitude: 15 + Math.random() * 25, freq: 0.003 + Math.random() * 0.004, alpha: 0.06 + Math.random() * 0.06, color: Math.random() > 0.5 ? '#4FC3F7' : '#80DEEA', phase: Math.random() * Math.PI * 2 });
    }
  } else if (idx === 4) {
    // Supernova — shockwave rings are animated (no pre-gen needed), embers pre-gen
    for (let i = 0; i < 40; i++) {
      worldDecor.push({ type: 'ember', x: Math.random(), y: Math.random(), r: 1.5 + Math.random() * 3, speed: 0.2 + Math.random() * 0.6, color: Math.random() > 0.5 ? '#FF5722' : '#FFC107', alpha: 0.2 + Math.random() * 0.5 });
    }
  }
}

// --- WORLD BACKGROUND DRAWING ---
function drawWorldBackground() {
  const idx = getWorldIdx();
  const w = WORLDS[idx];

  // Base gradient
  drawWorldGradient(idx);

  // World-specific decorations
  if (idx === 0) drawDeepSpaceDecor();
  else if (idx === 1) drawNebulaDecor();
  else if (idx === 2) drawAsteroidBeltDecor();
  else if (idx === 3) drawIceFieldDecor();
  else if (idx === 4) drawSupernovaDecor();

  // Stars (already tinted per world)
  drawStars();
}

function drawWorldGradient(idx) {
  const gradients = [
    ['#050510', '#0B0B1A', '#121225'],           // Deep Space
    ['#120820', '#1a0a2e', '#220e3a'],            // Nebula
    ['#1a1008', '#201510', '#2a1a0a'],            // Asteroid Belt
    ['#061520', '#0a1a2e', '#0c2035'],            // Ice Field
    ['#200808', '#2e0a0a', '#3a0c0c'],            // Supernova
  ];
  const stops = gradients[idx];
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, stops[0]);
  grad.addColorStop(0.5, stops[1]);
  grad.addColorStop(1, stops[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawDeepSpaceDecor() {
  for (const d of worldDecor) {
    if (d.type !== 'galaxy') continue;
    ctx.save();
    ctx.translate(d.x * W, d.y * H);
    ctx.rotate(d.rot);
    ctx.globalAlpha = d.alpha;
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, d.rx);
    grad.addColorStop(0, '#8888cc');
    grad.addColorStop(0.5, '#444466');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, d.rx * scale, d.ry * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawNebulaDecor() {
  const t = frameCount * 0.01;
  for (const d of worldDecor) {
    if (d.type !== 'cloud') continue;
    ctx.save();
    const xOff = Math.sin(t + d.drift * 10) * 30;
    ctx.globalAlpha = d.alpha;
    const grad = ctx.createRadialGradient(d.x * W + xOff, d.y * H, 0, d.x * W + xOff, d.y * H, d.rx * scale);
    grad.addColorStop(0, d.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(d.x * W + xOff, d.y * H, d.rx * scale, d.ry * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawAsteroidBeltDecor() {
  for (const d of worldDecor) {
    if (d.type === 'bgrock') {
      ctx.save();
      ctx.translate(d.x * W, d.y * H);
      ctx.rotate(d.rot);
      ctx.globalAlpha = d.alpha;
      ctx.fillStyle = '#5D4037';
      ctx.beginPath();
      for (let i = 0; i < d.verts; i++) {
        const a = (i / d.verts) * Math.PI * 2;
        const r = d.r * scale * (0.7 + Math.sin(a * 3) * 0.3);
        const method = i === 0 ? 'moveTo' : 'lineTo';
        ctx[method](Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    } else if (d.type === 'dust') {
      ctx.globalAlpha = d.alpha;
      ctx.fillStyle = '#8D6E63';
      ctx.beginPath();
      ctx.arc(d.x * W, d.y * H, d.r * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawIceFieldDecor() {
  const t = frameCount * 0.02;

  // Crystal shards
  for (const d of worldDecor) {
    if (d.type === 'crystal') {
      ctx.save();
      ctx.translate(d.x * W, d.y * H);
      ctx.rotate(d.rot);
      ctx.globalAlpha = d.alpha;
      ctx.fillStyle = '#B3E5FC';
      ctx.beginPath();
      ctx.moveTo(0, -d.h * scale / 2);
      ctx.lineTo(d.w * scale / 2, d.h * scale / 2);
      ctx.lineTo(-d.w * scale / 2, d.h * scale / 2);
      ctx.closePath();
      ctx.fill();
      // Shine line
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -d.h * scale / 2);
      ctx.lineTo(d.w * scale * 0.15, d.h * scale * 0.2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // Aurora bands
  for (const d of worldDecor) {
    if (d.type !== 'aurora') continue;
    ctx.save();
    ctx.globalAlpha = d.alpha + Math.sin(t + d.phase) * 0.02;
    ctx.strokeStyle = d.color;
    ctx.lineWidth = 8 * scale;
    ctx.lineCap = 'round';
    ctx.beginPath();
    for (let x = 0; x <= W; x += 10) {
      const y = d.y * H + Math.sin(x * d.freq + t + d.phase) * d.amplitude * scale;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawSupernovaDecor() {
  const t = frameCount;

  // Shockwave rings from bottom center
  const ringCenterX = W / 2;
  const ringCenterY = H + 50;
  for (let i = 0; i < 3; i++) {
    const radius = ((t * 0.5 + i * 200) % 600) * scale;
    const alpha = Math.max(0, 0.3 - radius / (600 * scale) * 0.3);
    if (alpha > 0.01) {
      ctx.strokeStyle = i === 0 ? '#FF5722' : (i === 1 ? '#FF9800' : '#FFCC80');
      ctx.lineWidth = (20 - i * 5) * scale * (1 - radius / (600 * scale));
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(ringCenterX, ringCenterY, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Bottom glow
  const glowGrad = ctx.createRadialGradient(W / 2, H + 30, 0, W / 2, H + 30, H * 0.7);
  glowGrad.addColorStop(0, 'rgba(255,87,34,0.15)');
  glowGrad.addColorStop(0.5, 'rgba(255,152,0,0.05)');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, W, H);

  // Embers floating up
  for (const d of worldDecor) {
    if (d.type !== 'ember') continue;
    d.y -= d.speed * 0.002;
    if (d.y < -0.05) { d.y = 1.05; d.x = Math.random(); }
    ctx.globalAlpha = d.alpha;
    ctx.fillStyle = d.color;
    ctx.beginPath();
    ctx.arc(d.x * W, d.y * H, d.r * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// --- COLLISION ---
function checkCollision(a) {
  // circle vs rectangle approximation (ship as ellipse)
  const dx = a.x - ship.x;
  const dy = a.y - ship.y;
  const sw = ship.w * 0.4; // hitbox narrower than visual
  const sh = ship.h * 0.45;
  const nx = dx / (sw + a.r);
  const ny = dy / (sh + a.r);
  return (nx * nx + ny * ny) < 1;
}

// --- UPDATE ---
function update() {
  frameCount++;
  updateStars();

  // World title timer
  if (gameState === 'worldtitle') {
    transitionTimer--;
    if (transitionTimer <= 0) startCountdown();
    return;
  }

  // Countdown timer
  if (gameState === 'countdown') {
    transitionTimer--;
    if (transitionTimer <= 0) {
      countdownNum--;
      if (countdownNum > 0) {
        transitionTimer = 60;
        playSound('beep');
      } else if (countdownNum === 0) {
        transitionTimer = 40;
        playSound('beepgo');
      } else {
        gameState = 'playing';
        playSound('start');
      }
    }
    return;
  }

  // Level complete screen (auto-advance)
  if (gameState === 'levelcomplete') {
    transitionTimer--;
    if (transitionTimer <= 0) {
      currentWorld++;
      if (currentWorld >= WORLDS.length) {
        // Beat all worlds!
        gameState = 'victory';
        playSound('victory');
        endlessUnlocked = true;
        localStorage.setItem('sd_endless', 'true');
        // Unlock next ship
        const nextShip = selectedShip + 1;
        if (nextShip < SHIPS.length && !unlockedShips.includes(nextShip)) {
          unlockedShips.push(nextShip);
          localStorage.setItem('sd_unlocked', JSON.stringify(unlockedShips));
        }
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('sd_best', bestScore.toString());
        }
      } else {
        showWorldTitle();
      }
    }
    return;
  }

  if (gameState !== 'playing') return;

  worldFrameCount++;

  // Ship movement
  const moveSpeed = ship.speed * scale;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) ship.x -= moveSpeed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ship.x += moveSpeed;

  // Touch control
  if (touchActive && touchX !== null) {
    const dx = touchX - ship.x;
    if (Math.abs(dx) > 5) {
      ship.x += Math.sign(dx) * Math.min(Math.abs(dx) * 0.15, moveSpeed);
    }
  }

  // Clamp
  ship.x = Math.max(ship.w / 2, Math.min(W - ship.w / 2, ship.x));

  // Auto-fire blasters
  blasterTimer++;
  if (blasterTimer >= BLASTER_FIRE_RATE) {
    spawnBlaster();
    blasterTimer = 0;
  }

  // Timers
  if (invincibleTimer > 0) invincibleTimer--;
  if (wobbleTimer > 0) wobbleTimer--;

  // Speed ramp (per-world values for campaign, escalating for endless)
  const w = gameMode === 'campaign' ? WORLDS[currentWorld] : WORLDS[Math.min(Math.floor(frameCount / 3600), WORLDS.length - 1)];
  currentSpeed = w.baseSpeed + worldFrameCount * w.speedInc;
  spawnInterval = Math.max(w.spawnMin, w.spawnStart - worldFrameCount * w.spawnDec);

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnAsteroid();
    spawnTimer = 0;
  }

  // Update asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.y += a.speed;
    a.rot += a.rotSpeed;

    // Score when asteroid passes below ship
    if (a.y > ship.y + ship.h && !a.scored) {
      a.scored = true;
      score++;
      levelScore++;
      if (gameMode === 'campaign') worldProgress += DODGE_PROGRESS;
      if (score % 50 === 0) playSound('score');
    }

    // Off screen
    if (a.y > H + a.r * 2) {
      asteroids.splice(i, 1);
      continue;
    }

    // Collision
    if (invincibleTimer <= 0 && checkCollision(a)) {
      lives--;
      spawnHitParticles(a.x, a.y);
      playSound('hit');
      asteroids.splice(i, 1);

      if (lives <= 0) {
        gameState = 'gameover';
        playSound('lose');
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('sd_best', bestScore.toString());
        }
      } else {
        invincibleTimer = INVINCIBLE_DURATION;
        wobbleTimer = WOBBLE_DURATION;
      }
    }
  }

  // Check world completion (campaign only)
  if (gameMode === 'campaign' && worldProgress >= WORLDS[currentWorld].threshold) {
    gameState = 'levelcomplete';
    transitionTimer = 180; // 3 seconds
    playSound('levelup');
  }

  updateBlasters();
  updateParticles();
}

// --- DRAW ---
function draw() {
  if (gameState === 'title') { drawTitle(); return; }
  if (gameState === 'shippicker') { drawShipPicker(); return; }
  if (gameState === 'worldtitle') { drawWorldTitle(); return; }
  if (gameState === 'countdown') { drawCountdown(); return; }
  if (gameState === 'gameover') { drawGameOver(); return; }
  if (gameState === 'levelcomplete') { drawLevelComplete(); return; }
  if (gameState === 'victory') { drawVictory(); return; }

  // Playing
  drawWorldBackground();
  for (const a of asteroids) drawAsteroid(a);
  drawBlasters();
  drawShip(ship.x, ship.y, ship.w, ship.h, wobbleTimer);
  drawParticles();
  drawHUD();
  drawPauseButton();
}

// --- PAUSE ---
let paused = false;
let pauseBtn = {};

function drawPauseButton() {
  const sz = 36 * scale;
  const x = W - sz - 10;
  const y = H - sz - 10;
  pauseBtn = { x, y, w: sz, h: sz };
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.roundRect(x, y, sz, sz, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = `${Math.round(18 * scale)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(paused ? '▶' : '⏸', x + sz / 2, y + sz / 2 + 5 * scale);
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(36 * scale)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${Math.round(16 * scale)}px Arial, sans-serif`;
  ctx.fillText('Tap or press Space to continue', W / 2, H / 2 + 30 * scale);
}

// --- MAIN LOOP ---
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  if (!lastTime) { lastTime = timestamp; return; }
  const delta = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += delta;

  if (!paused) {
    while (accumulator >= FRAME_TIME) {
      update();
      accumulator -= FRAME_TIME;
    }
  }

  draw();
  if (paused && gameState === 'playing') drawPauseOverlay();
}

// --- INPUT HANDLERS ---
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
    handleAction();
  }
  if (e.key === 'Escape' && gameState === 'playing') {
    paused = !paused;
  }
  if (e.key === 'Escape' && gameState === 'shippicker') {
    gameState = 'title';
  }
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
});

function handleAction() {
  if (gameState === 'title') { startCampaign(); return; }
  if (gameState === 'shippicker') { gameState = 'title'; return; }
  if (gameState === 'gameover') { gameState = 'title'; return; }
  if (gameState === 'victory') { gameState = 'title'; return; }
  if (gameState === 'playing' && paused) { paused = false; }
}

// Helpers
function hitTest(x, y, btn) {
  return btn.w && x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h;
}

function handleTitleClick(tx, ty) {
  initAudio();
  if (hitTest(tx, ty, titleBtns.ships)) { gameState = 'shippicker'; return true; }
  if (hitTest(tx, ty, titleBtns.campaign)) { startCampaign(); return true; }
  if (hitTest(tx, ty, titleBtns.endless) && endlessUnlocked) { startEndless(); return true; }
  return false;
}

function handlePickerClick(tx, ty) {
  // Back button
  if (hitTest(tx, ty, pickerBackBtn)) { gameState = 'title'; return; }

  // Ship card clicks
  const cardW = Math.min(130, (W - 60) / 5) * scale;
  const cardH = cardW * 1.4;
  const gap = 12 * scale;
  const totalW = SHIPS.length * cardW + (SHIPS.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const cardY = H * 0.22;

  for (let i = 0; i < SHIPS.length; i++) {
    const cx = startX + i * (cardW + gap);
    if (tx >= cx && tx <= cx + cardW && ty >= cardY && ty <= cardY + cardH) {
      if (unlockedShips.includes(i)) {
        selectedShip = i;
        localStorage.setItem('sd_ship', selectedShip.toString());
        playSound('start');
      }
      return;
    }
  }
}

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
  const ty = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);

  // Check menu button
  if (hitTest(tx, ty, menuBtn)) { window.location.href = '/'; return; }

  // Check pause button
  if (gameState === 'playing' && hitTest(tx, ty, pauseBtn)) { paused = !paused; return; }

  if (gameState === 'title') { handleTitleClick(tx, ty); return; }
  if (gameState === 'shippicker') { initAudio(); handlePickerClick(tx, ty); return; }
  if (gameState === 'gameover' || gameState === 'victory') { gameState = 'title'; return; }
  if (paused) { paused = false; return; }

  touchActive = true;
  touchX = tx;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  const rect = canvas.getBoundingClientRect();
  touchX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  touchX = null;
}, { passive: false });

// Mouse click (for desktop)
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);

  if (hitTest(mx, my, menuBtn)) { window.location.href = '/'; return; }
  if (gameState === 'playing' && hitTest(mx, my, pauseBtn)) { paused = !paused; return; }
  if (gameState === 'title') { handleTitleClick(mx, my); return; }
  if (gameState === 'shippicker') { initAudio(); handlePickerClick(mx, my); return; }

  handleAction();
});

// --- ORIENTATION HANDLING ---
const rotateOverlay = document.getElementById('rotate-overlay');
let rotateOverlayDismissed = false;

function checkOrientation() {
  if (rotateOverlayDismissed) return;
  const isPortrait = window.innerHeight > window.innerWidth;
  const isMobile = window.innerWidth < 900 || window.innerHeight < 900;
  if (isPortrait && isMobile) {
    rotateOverlay.style.display = 'flex';
    canvas.style.display = 'none';
  } else {
    rotateOverlay.style.display = 'none';
    canvas.style.display = 'block';
    resize();
  }
}

rotateOverlay.addEventListener('click', () => {
  rotateOverlayDismissed = true;
  rotateOverlay.style.display = 'none';
  canvas.style.display = 'block';
  resize();
});

window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', () => { setTimeout(checkOrientation, 200); });
if (window.screen && window.screen.orientation) {
  window.screen.orientation.addEventListener('change', () => { setTimeout(checkOrientation, 200); });
}
checkOrientation();

// --- INIT ---
initStars();
// Force initial paint (Safari fix)
ctx.fillStyle = '#0a0a2e';
ctx.fillRect(0, 0, W, H);
drawStars();
requestAnimationFrame(() => { requestAnimationFrame(gameLoop); });

</script>
</body>
