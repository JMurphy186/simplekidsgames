  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.arc(muteX, muteY, 12, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
  ctx.fillText(audioMuted ? '🔇' : '🔊', muteX, muteY + 4); ctx.textAlign = 'left';

  // HONK button
  const honkX = W - 70, honkY = H - 40;
  const honkPulse = 0.9 + Math.sin(Date.now() * 0.005) * 0.1;
  ctx.save(); ctx.translate(honkX, honkY); ctx.scale(honkPulse, honkPulse);
  ctx.fillStyle = 'rgba(255,100,0,0.7)';
  ctx.beginPath(); ctx.roundRect(-35, -18, 70, 36, 18); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px "Arial Black", Impact, sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('HONK!', 0, 5); ctx.textAlign = 'left';
  ctx.restore();

  // Environment announcement
  if (envAnnouncementTimer > 0) {
    const ea = Math.min(1, envAnnouncementTimer / 30);
    ctx.globalAlpha = ea;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 30px "Arial Black", Impact, sans-serif';
    ctx.textAlign = 'center'; ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
    ctx.strokeText(envAnnouncementText + '!', W / 2, H / 2 - 60);
    ctx.fillText(envAnnouncementText + '!', W / 2, H / 2 - 60);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  }

  // Controls hint (single player, low score)
  if (numPlayers === 1 && player1 && player1.score < 30) {
    ctx.globalAlpha = 0.5; ctx.fillStyle = '#fff'; ctx.font = '13px Arial'; ctx.textAlign = 'center';
    ctx.fillText('TAP or SPACE to JUMP!  •  H = HORN  •  M = MUTE', W / 2, H - 15);
    ctx.textAlign = 'left'; ctx.globalAlpha = 1;
  }
}

// ============================================================
// TRUCK DRAWING (per player)
// ============================================================
function drawPlayerTruck(p) {
  const tk = p.truck;
  const colors = TRUCK_ROSTER[p.truckIdx];
  const squishY = tk.squish * 6;
  const tiltAngle = tk.tilt * 0.05;

  ctx.save();

  // Mega truck scale
  if (p.megaScale > 1.01) {
    ctx.translate(tk.x + tk.w / 2, tk.y + tk.h);
    ctx.scale(p.megaScale, p.megaScale);
    ctx.translate(-(tk.x + tk.w / 2), -(tk.y + tk.h));
    // Mega glow
    ctx.fillStyle = 'rgba(255,136,0,0.2)';
    ctx.beginPath(); ctx.arc(tk.x + tk.w / 2, tk.y + tk.h / 2, 60, 0, Math.PI * 2); ctx.fill();
  }

  ctx.translate(tk.x + tk.w / 2, tk.y + tk.h);
  if (p.flipAngle !== 0) ctx.rotate(p.flipAngle);
  else ctx.rotate(tiltAngle);
  ctx.translate(-(tk.x + tk.w / 2), -(tk.y + tk.h));

  // Shadow
  if (Math.abs(p.flipAngle) < 0.5) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(tk.x + tk.w / 2, GROUND_Y + 8, tk.w / 2 + 5, 6, 0, 0, Math.PI * 2); ctx.fill();
  }

  // Suspension bars
  ctx.strokeStyle = '#555'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(tk.x + 15, tk.y + tk.h - 5 + squishY);
  ctx.lineTo(tk.x + 15, tk.y + tk.h + 8 + squishY / 2);
  ctx.moveTo(tk.x + tk.w - 15, tk.y + tk.h - 5 + squishY);
  ctx.lineTo(tk.x + tk.w - 15, tk.y + tk.h + 8 + squishY / 2);
  ctx.stroke();

  // Headlight glow
  ctx.fillStyle = 'rgba(255,255,200,0.06)';
  ctx.beginPath();
  ctx.moveTo(tk.x + tk.w, tk.y + 15 + squishY);
  ctx.lineTo(tk.x + tk.w + 50, tk.y - 5);
  ctx.lineTo(tk.x + tk.w + 50, tk.y + tk.h + 15);
  ctx.closePath(); ctx.fill();

  // Draw the right vehicle type based on style
  if (colors.renderMode === 'svg') {
    const a = hdAssetMap[p.truckIdx];
    drawTruckHD(tk.x, tk.y, tk.w, tk.h, !tk.grounded, squishY, a, colors.flameOuter, colors.flameInner);
  } else if (colors.style === 'monster') {
    drawTruckMonster(tk.x, tk.y, tk.w, tk.h, colors, !tk.grounded, squishY);
  } else if (!colors.type || colors.type === 'monster' || colors.style === 'classic') {
    drawTruckWithColors(tk.x, tk.y, tk.w, tk.h, colors, !tk.grounded, squishY);
  } else {
    drawCarVehicle(tk.x, tk.y, tk.w, tk.h, colors, colors.type, squishY);
  }
  ctx.restore();
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw() {
  const scaleX = canvas.width / W;
  const scaleY = canvas.height / H;
  ctx.save();
  ctx.scale(scaleX, scaleY);

  if (screenShake > 0.5) {
    ctx.translate((Math.random() - 0.5) * screenShake * 2, (Math.random() - 0.5) * screenShake * 2);
  }

  // Draw environment background
  const env = ENVIRONMENTS[currentEnvIndex];
  drawEnvironmentBg(env);

  // Draw environment ground
  drawEnvironmentGround(env);

  // Tire tracks
  for (const p of players) {
    for (const tt of p.tireTracks) {
      ctx.globalAlpha = tt.life * 0.25;
      ctx.fillStyle = '#222';
      ctx.fillRect(tt.x - 2, tt.y, 4, 2);
    }
  }
  ctx.globalAlpha = 1;

  // Dust trail
  for (const d of dustTrail) {
    ctx.globalAlpha = d.life * 0.3;
    ctx.fillStyle = env.groundAccent;
    ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Environment transition flash
  if (envTransitionTimer > 0) {
    ctx.globalAlpha = envTransitionTimer / 30;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  if (gameState === 'playing' || gameState === 'countdown' || gameState === 'gameover' || gameState === 'paused' || gameState === 'levelcomplete') {
    // Battle mode: draw arena instead of scrolling level
    if (gameMode === 'battle') {
      // Arena is drawn instead of normal environment (override bg)
      // We already drew environment bg above, so draw arena on top
      drawBattleArena();

      // Draw trucks facing each other (P2 flipped)
      if (player2) {
        ctx.save();
        const tk2 = player2.truck;
        ctx.translate(tk2.x + tk2.w / 2, tk2.y + tk2.h);
        ctx.scale(-1, 1); // flip horizontally
        ctx.translate(-(tk2.x + tk2.w / 2), -(tk2.y + tk2.h));
        drawPlayerTruck(player2);
        ctx.restore();
      }
      if (player1) drawPlayerTruck(player1);
    } else {
      // Normal mode: draw stars, power-ups, obstacles, trucks
      // Draw stars
      for (const s of stars) { if (!s.collected) drawStar(s); }

      // Draw power-ups
      for (const pu of powerUps) { if (!pu.collected) drawPowerUp(pu); }

      // Draw obstacles
      for (const obs of obstacles) drawObstacle(obs);

      // Draw trucks (P2 first if exists, so P1 draws on top)
      if (player2) drawPlayerTruck(player2);
      if (player1) drawPlayerTruck(player1);
    }

    // Draw particles
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      if (p.type === 'text') {
        ctx.fillStyle = p.color;
        ctx.font = 'bold 20px "Arial Black", Impact, sans-serif';
        ctx.textAlign = 'center'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        ctx.strokeText(p.text, p.x, p.y); ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1; ctx.textAlign = 'left';

    // Flash effect
    if (flashTimer > 0) {
      ctx.globalAlpha = flashTimer / 12;
      ctx.fillStyle = flashColor;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // Turbo Boost speed lines + Super Jump trail
    if (gameState === 'playing') {
      for (const p of players) {
        if (p.activePowerUp && p.activePowerUp.effect === 'turbo') {
          ctx.globalAlpha = 0.15 + Math.random() * 0.1;
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
          for (let sl = 0; sl < 4; sl++) {
            const sy = 50 + Math.random() * (GROUND_Y - 60);
            ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }
        if (p.activePowerUp && p.activePowerUp.effect === 'superjump') {
          // Purple glow trail behind truck
          const tk = p.truck;
          for (let t = 1; t <= 4; t++) {
            ctx.globalAlpha = 0.3 - t * 0.06;
            ctx.fillStyle = '#8855ff';
            ctx.beginPath();
            ctx.arc(tk.x + tk.w / 2 - t * 12, tk.y + tk.h / 2 + t * 3, 8 - t, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      }
    }

    // Storm effects (rain + lightning) — drawn on top of everything
    if (ENVIRONMENTS[currentEnvIndex].features === 'storm' && gameMode === 'rally') {
      drawStormEffects();
    }

    if (gameState === 'playing' || gameState === 'paused') {
      if (gameMode === 'battle') drawBattleHUD();
      else drawHUD();
      drawPauseButton();

      // Campaign HUD: level indicator + max speed text + countdown
      if (gameMode === 'rally') {
        const lvl = CAMPAIGN_LEVELS[campaignLevel] || CAMPAIGN_LEVELS[0];
        ctx.textAlign = 'center';
        // Level indicator (top center)
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial';
        ctx.fillText('LEVEL ' + (campaignLevel + 1) + ': ' + lvl.name, W / 2, 12);

        // MAX SPEED! text when max reached
        if (campaignMaxSpeedReached) {
          const pulse = 0.8 + Math.sin(campaignMaxSpeedFlash) * 0.2;
          ctx.save();
          ctx.translate(W / 2, 75);
          ctx.scale(pulse, pulse);
          ctx.fillStyle = '#ffd700'; ctx.font = 'bold 28px "Arial Black", Impact, sans-serif';
          ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
          ctx.strokeText('MAX SPEED!', 0, 0);
          ctx.fillText('MAX SPEED!', 0, 0);
          ctx.restore();

          // 60s countdown below
          const secs = Math.ceil(campaignCountdown / 60);
          const urgent = secs <= 10;
          ctx.fillStyle = urgent ? '#ff4400' : '#ffd700';
          ctx.font = 'bold ' + (urgent ? '22' : '18') + 'px "Arial Black", Impact, sans-serif';
          const timerY = urgent ? 100 + Math.sin(Date.now() * 0.01) * 2 : 100;
          ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
          ctx.strokeText('0:' + (secs < 10 ? '0' : '') + secs, W / 2, timerY);
          ctx.fillText('0:' + (secs < 10 ? '0' : '') + secs, W / 2, timerY);
        }
        ctx.textAlign = 'left';
      }
    }
    if (gameState === 'paused') drawPauseOverlay();
    if (gameState === 'countdown') drawCountdown();
  }

  if (gameState === 'title') drawTitleScreen();
  if (gameState === 'picker') drawPickerScreen();
  if (gameState === 'modeselect') drawModeSelectScreen();
  if (gameState === 'playerselect') drawPlayerSelectScreen();
  if (gameState === 'gameover') drawGameOverScreen();
  if (gameState === 'levelcomplete') drawLevelCompleteScreen();
  if (gameState === 'leveltransition') drawLevelTransitionScreen();

  ctx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
let lastFrameTime = 0;
const FRAME_INTERVAL = 1000 / 60; // Cap at 60fps

function gameLoop(timestamp) {
  const elapsed = timestamp - lastFrameTime;
  if (elapsed >= FRAME_INTERVAL) {
    lastFrameTime = timestamp - (elapsed % FRAME_INTERVAL);
    update();
    draw();
  }
  requestAnimationFrame(gameLoop);
}

// Polyfill roundRect if needed
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
  };
}

draw(); // Force first frame to paint immediately (Safari fix)
gameLoop();
</script>
