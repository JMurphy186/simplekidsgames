<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Monster Rally!</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0B0E18;
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0; left: 0;
    font-family: 'Arial Black', 'Impact', sans-serif;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #game {
    display: block;
    width: 100vw;
    height: 100dvh;
    height: 100vh;
    margin: 0; padding: 0;
    border: none; border-radius: 0;
    outline: none; box-shadow: none;
    cursor: pointer;
  }
  #rotate-msg {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0B0E18;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Arial Black', Impact, sans-serif;
    text-align: center;
    gap: 20px;
  }
  #rotate-msg .rotate-icon {
    font-size: 64px;
    animation: rotatePhone 2s ease-in-out infinite;
  }
  #rotate-msg .rotate-text {
    font-size: 22px;
    color: #ffcc00;
  }
  #rotate-msg .rotate-sub {
    font-size: 14px;
    color: #888;
  }
  @keyframes rotatePhone {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(90deg); }
    50% { transform: rotate(90deg); }
    75% { transform: rotate(0deg); }
  }
  @media (orientation: portrait) {
    #rotate-msg { display: flex; }
    #game { display: none; }
  }
  @media (orientation: landscape) {
    #rotate-msg { display: none; }
    #game { display: block; }
  }
</style>
</head>
<body>
<div id="rotate-msg">
  <span class="rotate-icon">📱</span>
  <span class="rotate-text">Rotate your device!</span>
  <span class="rotate-sub">This game plays best in landscape mode</span>
</div>

// ============================================================
// RESPONSIVE SIZING
// ============================================================
function resize() {
  // Fill the entire screen — canvas CSS is 100vw x 100dvh
  // Set canvas resolution to match actual pixel dimensions
  const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  canvas.width = vw;
  canvas.height = vh;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('load', resize); // Safari sometimes needs this
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

// Force Safari to repaint canvas on load
window.addEventListener('load', function() {
  canvas.style.display = 'none';
  canvas.offsetHeight; // Force reflow
  canvas.style.display = '';
  canvas.style.opacity = '0.99';
  requestAnimationFrame(function() { canvas.style.opacity = '1'; });
});

// Try to hide Safari URL bar
window.scrollTo(0, 1);

// Fullscreen API (Android Chrome — iOS doesn't support it)
function tryFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();

}

  a.body.src = bodySrc; a.wheel.src = wheelSrc;
  return a;
}

let engineBeatInterval = null;

function startEngine() {
  if (!audioCtx || audioMuted) return;
  if (engineBeatInterval) return;

  // Rhythmic kick drum pattern — subtle heartbeat that speeds up with game
  function playKick() {
    if (!audioCtx || audioMuted) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(60, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.05);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.08);
  }

  // Start the beat
  playKick();
  engineBeatInterval = setInterval(() => {
    if (audioMuted || gameState === 'paused') return;
    playKick();
  }, 500); // Will be adjusted by updateEngineSound
}

function stopEngine() {
  if (engineBeatInterval) {
    clearInterval(engineBeatInterval);
    engineBeatInterval = null;
  }
  engineOsc = null;
  engineGain = null;
  engineLfo = null;
  engineLfoGain = null;
}

function updateEngineSound() {
  if (!audioCtx || audioMuted || !engineBeatInterval) return;
  // Adjust beat interval based on speed — faster game = faster heartbeat
  const speedFactor = Math.max(0, (gameSpeed - 1.5) / (maxSpeed - 1.5));
  const interval = Math.max(200, 600 - speedFactor * 350); // 600ms slow → 250ms fast
  clearInterval(engineBeatInterval);
  engineBeatInterval = setInterval(() => {
    if (audioMuted || gameState === 'paused') return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(60, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.05);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.08);
  }, interval);
}

function playSound(type, param) {
  if (!audioCtx || audioMuted) return;
  const t = audioCtx.currentTime;

  if (type === 'crush') {
    // White noise burst + low thump
    const bufferSize = audioCtx.sampleRate * CRUSH_NOISE_DURATION;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);

    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 800 + Math.random() * 400;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.value = 0.4;
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    noise.connect(lp);
    lp.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noise.start(t);
    noise.stop(t + 0.15);

    // Thump
    const thump = audioCtx.createOscillator();
    thump.type = 'sine';
    thump.frequency.value = CRUSH_THUMP_FREQ + Math.random() * 20;
    const thumpGain = audioCtx.createGain();
    thumpGain.gain.value = 0.5;
    thumpGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    thump.connect(thumpGain);
    thumpGain.connect(audioCtx.destination);
    thump.start(t);
    thump.stop(t + 0.1);
  }

  else if (type === 'star') {
    // Quick ascending C5 E5 G5
    STAR_NOTES.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const g = audioCtx.createGain();
      g.gain.value = 0;
      g.gain.setValueAtTime(0.25, t + i * 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.08);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(t + i * 0.04);
      osc.stop(t + i * 0.04 + 0.1);
    });
  }

  else if (type === 'ramp') {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(RAMP_FREQ_START, t);
    osc.frequency.exponentialRampToValueAtTime(RAMP_FREQ_END, t + 0.25);
    const g = audioCtx.createGain();
    g.gain.value = 0.2;
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.35);
  }

  else if (type === 'landing') {
    const volume = Math.min(0.4, (param || 5) * 0.04);
    const bufferSize = audioCtx.sampleRate * 0.05;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 200;
    const g = audioCtx.createGain();
    g.gain.value = volume;
    noise.connect(lp);
    lp.connect(g);
    g.connect(audioCtx.destination);
    noise.start(t);
    noise.stop(t + 0.06);
  }

  else if (type === 'combo') {
    const comboCount = param || 3;
    const duration = 0.15 + Math.min(comboCount * 0.03, 0.2);
    COMBO_CHORD.forEach(freq => {
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq * (1 + (comboCount - 3) * 0.05);
      const g = audioCtx.createGain();
      g.gain.value = 0.15;
      g.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + duration + 0.05);
    });
    // High sparkle
    const sparkle = audioCtx.createOscillator();
    sparkle.type = 'sine';
    sparkle.frequency.value = 2000;
    const sg = audioCtx.createGain();
    sg.gain.value = 0.1;
    sg.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    sparkle.connect(sg);
    sg.connect(audioCtx.destination);
    sparkle.start(t);
    sparkle.stop(t + 0.05);
  }

  else if (type === 'horn') {
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(HORN_FREQ, t);
    osc.frequency.linearRampToValueAtTime(HORN_FREQ * 0.85, t + HORN_DURATION);
    const g = audioCtx.createGain();
    g.gain.value = 0.3;
    g.gain.setValueAtTime(0.3, t + HORN_DURATION * 0.7);
    g.gain.exponentialRampToValueAtTime(0.001, t + HORN_DURATION);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + HORN_DURATION + 0.05);
  }

  else if (type === 'powerup') {
    // Deep whomp + ascending sparkle
    const thump = audioCtx.createOscillator();
    thump.type = 'sine';
    thump.frequency.value = 80;
    thump.frequency.exponentialRampToValueAtTime(40, t + 0.2);
    const tg = audioCtx.createGain();
    tg.gain.value = 0.4;
    tg.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    thump.connect(tg); tg.connect(audioCtx.destination);
    thump.start(t); thump.stop(t + 0.35);
    [600, 800, 1000, 1300].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine'; osc.frequency.value = freq;
      const g = audioCtx.createGain(); g.gain.value = 0;
      g.gain.setValueAtTime(0.15, t + 0.05 + i * 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.05 + i * 0.05 + 0.12);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t + 0.05 + i * 0.05); osc.stop(t + 0.05 + i * 0.05 + 0.15);
    });
  }

  else if (type === 'countdown') {
    const freq = param === 'GO' ? 880 : 440;
    const dur = param === 'GO' ? 0.3 : 0.15;
    const osc = audioCtx.createOscillator();
    osc.type = 'square'; osc.frequency.value = freq;
    const g = audioCtx.createGain(); g.gain.value = 0.2;
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur + 0.05);
  }

  else if (type === 'flip') {
    // Triumphant ascending arpeggio
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const g = audioCtx.createGain();
      g.gain.value = 0;
      g.gain.setValueAtTime(0.2, t + i * 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.15);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(t + i * 0.04);
      osc.stop(t + i * 0.04 + 0.2);
    });
  }
}

function startBigAir() {
  if (!audioCtx || audioMuted || bigAirPlaying) return;
  bigAirPlaying = true;

  const bufferSize = audioCtx.sampleRate * 3;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  bigAirNode = audioCtx.createBufferSource();
  bigAirNode.buffer = buffer;
  bigAirNode.loop = true;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 800;
  bp.Q.value = 2;

  bigAirGain = audioCtx.createGain();
  bigAirGain.gain.value = 0;
  bigAirGain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.5);

  bigAirNode.connect(bp);
  bp.connect(bigAirGain);
  bigAirGain.connect(audioCtx.destination);
  bigAirNode.start();
}

function stopBigAir() {
  if (!bigAirPlaying || !bigAirGain) return;
  bigAirPlaying = false;
  try {
    bigAirGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
    setTimeout(() => {
      try { if (bigAirNode) bigAirNode.stop(); } catch(e) {}
      bigAirNode = null;
      bigAirGain = null;
    }, 200);
  } catch(e) {
    bigAirNode = null;
    bigAirGain = null;
  }
}

function toggleMute() {
  audioMuted = !audioMuted;
  localStorage.setItem('monsterRallyMuted', audioMuted);
  if (audioMuted) {
    stopEngine();
    stopBigAir();
  } else if (audioInitialized && gameState === 'playing') {
    startEngine();
  }
}

// ============================================================
// INPUT HANDLING (Two-player support)
// ============================================================

function getVirtualCoords(e) {
  const rect = canvas.getBoundingClientRect();
  // Map from CSS display size to virtual 800x450 coords
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  let cx, cy;
  if (e.touches) {
    cx = (e.touches[0].clientX - rect.left) * scaleX;
    cy = (e.touches[0].clientY - rect.top) * scaleY;
  } else {
    cx = (e.clientX - rect.left) * scaleX;
    cy = (e.clientY - rect.top) * scaleY;
  }
  return { x: cx, y: cy };
}

let lastJumpTime = 0;
function playerJump(p) {
  if (!p) return;
  const now = Date.now();
  if (now - lastJumpTime < 20) return; // 20ms debounce for iPad touch
  lastJumpTime = now;
  p.jumpPressed = true; p.jumpHeld = true;
}

function handleDown(e) {
  e.preventDefault();
  initAudio();
  tryFullscreen();
  const vc = getVirtualCoords(e);

  if (gameState === 'title') {
    // Back to games button (top-left, 130x50 orange button)
    if (vc.x < 150 && vc.y < 60) { window.location.href = '/'; return; }
    gameState = 'picker'; pickerPlayer = 1; return;
  }
  if (gameState === 'picker') { handlePickerClick(vc.x, vc.y); return; }
  if (gameState === 'modeselect') { handleModeSelectClick(vc.x, vc.y); return; }
  if (gameState === 'playerselect') { handlePlayerSelectClick(vc.x, vc.y); return; }
  if (gameState === 'paused') { handlePauseClick(vc.x, vc.y); return; }
  if (gameState === 'gameover') { gameState = 'modeselect'; return; }
  if (gameState === 'levelcomplete') {
    // Advance to next level or go to mode select if campaign done
    if (campaignLevel < CAMPAIGN_LEVELS.length - 1) {
      campaignLevel++;
      startLevelTransition();
    } else {
      gameState = 'modeselect'; // Phase 2 will add win screen here
    }
    return;
  }
  if (gameState === 'leveltransition') return;
  if (gameState === 'countdown') return;

  // Playing state — pause button (50px hit area for mobile)
  if (vc.x > W - 65 && vc.x < W - 25 && vc.y < 40) { pauseGame(); return; }
  if (vc.x > W - 100 && vc.y > H - 60) { playSound('horn'); return; }
  if (vc.x > W - 45 && vc.y < 45) { toggleMute(); return; }

  // Touch zones: left half = P1, right half = P2 (or P1 in single)
  if (numPlayers === 2) {
    if (vc.x < W / 2) playerJump(player1);
    else playerJump(player2);
  } else {
    playerJump(player1);
  }
}

function handleUp(e) {
  e.preventDefault();
  if (player1) player1.jumpHeld = false;
  if (player2) player2.jumpHeld = false;
}

canvas.addEventListener('mousedown', handleDown);
canvas.addEventListener('mouseup', handleUp);
canvas.addEventListener('touchstart', handleDown, { passive: false });
canvas.addEventListener('touchend', handleUp, { passive: false });

document.addEventListener('keydown', (e) => {
  initAudio();

  // Menu navigation
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (gameState === 'title') { gameState = 'picker'; pickerPlayer = 1; return; }
    if (gameState === 'picker') { confirmPicker(); return; }
    if (gameState === 'modeselect') return;
    if (gameState === 'playerselect') return;
    if (gameState === 'gameover') { gameState = 'modeselect'; return; }
    if (gameState === 'levelcomplete') {
      if (campaignLevel < CAMPAIGN_LEVELS.length - 1) { campaignLevel++; startLevelTransition(); }
      else gameState = 'modeselect';
      return;
    }
  }

  // Mode select keyboard shortcuts
  if (gameState === 'modeselect') {
    if (e.code === 'Digit1') selectMode('rally');
    if (e.code === 'Digit2') selectMode('frenzy');
    if (e.code === 'Digit3') selectMode('battle');
    return;
  }
  if (gameState === 'playerselect') {
    if (e.code === 'Digit1') startRallyWithPlayers(1);
    if (e.code === 'Digit2') startRallyWithPlayers(2);
    return;
  }

  // Picker navigation
  if (gameState === 'picker') {
    const rc = ROSTER_COUNT;
    if (e.code === 'ArrowLeft') {
      if (pickerPlayer === 1) selectedTruck = (selectedTruck + rc - 1) % rc;
      else selectedTruck2 = (selectedTruck2 + rc - 1) % rc;
      pickerPage = Math.floor((pickerPlayer === 1 ? selectedTruck : selectedTruck2) / PICKER_PER_PAGE);
    }
    if (e.code === 'ArrowRight') {
      if (pickerPlayer === 1) selectedTruck = (selectedTruck + 1) % rc;
      else selectedTruck2 = (selectedTruck2 + 1) % rc;
      pickerPage = Math.floor((pickerPlayer === 1 ? selectedTruck : selectedTruck2) / PICKER_PER_PAGE);
    }
    return;
  }

  if (gameState !== 'playing' && gameState !== 'paused') return;

  // Pause controls
  if (gameState === 'paused') {
    if (e.code === 'Escape' || e.code === 'KeyP' || e.code === 'Space') { e.preventDefault(); resumeGame(); }
    if (e.code === 'KeyR') restartGame();
    if (e.code === 'KeyQ') quitToMenu();
    return;
  }
  if (e.code === 'Escape' || e.code === 'KeyP') { pauseGame(); return; }

  // Player 2 controls: Arrow keys
  if (e.code === 'ArrowUp') {
    e.preventDefault();
    if (numPlayers === 2) playerJump(player2);
    else playerJump(player1);
  }
  if (e.code === 'ArrowDown') {
    const p = numPlayers === 2 ? player2 : player1;
    if (p && !p.truck.grounded) p.truck.slamming = true;
  }

  // Player 1 controls: W/Space for jump, S for slam
  if (e.code === 'Space') { e.preventDefault(); playerJump(player1); }
  if (e.code === 'KeyW') { playerJump(player1); }
  if (e.code === 'KeyS') {
    if (player1 && !player1.truck.grounded) player1.truck.slamming = true;
  }

  // Battle mode: horizontal movement
  if (gameMode === 'battle') {
    if (e.code === 'KeyA' && player1) player1.battleMoveDir = -1;
    if (e.code === 'KeyD' && player1) player1.battleMoveDir = 1;
    if (e.code === 'ArrowLeft' && player2) player2.battleMoveDir = -1;
    if (e.code === 'ArrowRight' && player2) player2.battleMoveDir = 1;
  }

  if (e.code === 'KeyH') playSound('horn');
  if (e.code === 'KeyM') toggleMute();

});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' || e.code === 'KeyW') { if (player1) player1.jumpHeld = false; }
  if (e.code === 'ArrowUp') { if (player2) player2.jumpHeld = false; else if (player1) player1.jumpHeld = false; }
  // Battle movement stop
  if (gameMode === 'battle') {
    if (e.code === 'KeyA' || e.code === 'KeyD') { if (player1) player1.battleMoveDir = 0; }
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') { if (player2) player2.battleMoveDir = 0; }
  }
});

// ============================================================
// TRUCK PICKER + MODE SELECT + COUNTDOWN
// ============================================================
let pickerPage = 0;
const PICKER_PER_PAGE = 4;
const PICKER_PAGES = Math.ceil(ROSTER_COUNT / PICKER_PER_PAGE);

function getPickerTruckRects() {
  const rects = [];
  const startX = 80, gap = 170, y = 170;
  const pageStart = pickerPage * PICKER_PER_PAGE;
  const pageEnd = Math.min(pageStart + PICKER_PER_PAGE, ROSTER_COUNT);
  for (let i = pageStart; i < pageEnd; i++) {
    const col = i - pageStart;
    rects.push({ x: startX + col * gap, y, w: 140, h: 120, idx: i });
  }
  return rects;
}

function handlePickerClick(vx, vy) {
  // Check page arrows
  if (vy >= 210 && vy <= 260) {
    if (vx >= 20 && vx <= 60) { pickerPage = (pickerPage - 1 + PICKER_PAGES) % PICKER_PAGES; return; }
    if (vx >= W - 60 && vx <= W - 20) { pickerPage = (pickerPage + 1) % PICKER_PAGES; return; }
  }

  const rects = getPickerTruckRects();
  for (let i = 0; i < rects.length; i++) {
    const r = rects[i];
    if (vx >= r.x && vx <= r.x + r.w && vy >= r.y && vy <= r.y + r.h) {
      const truckIdx = r.idx;
      if (pickerPlayer === 1) {
        selectedTruck = truckIdx;
      } else {
        selectedTruck2 = truckIdx;
      }
      // Single tap: select AND immediately confirm
      confirmPicker();
      return;
    }
  }
}

function confirmPicker() {
  localStorage.setItem('monsterRallyTruck', selectedTruck);
  if (pickerPlayer === 1) {
    // Go to mode select
    gameState = 'modeselect';
  } else {
    // P2 picked, start countdown
    startCountdown();
  }
}

function handleModeSelectClick(vx, vy) {
  // Back to games (top-left)
  if (vx < 145 && vy < 55) { window.location.href = '/'; return; }
  // Change truck (top-right, 130x44 button at W-145, 5)
  if (vx > W - 150 && vy < 55) { pickerPlayer = 1; gameState = 'picker'; return; }

  const btnW = 200, btnH = 65, gap = 20;
  const by = 160;
  for (let i = 0; i < 3; i++) {
    const bx = W / 2 - btnW / 2;
    const btnY = by + i * (btnH + gap);
    if (vx >= bx && vx <= bx + btnW && vy >= btnY && vy <= btnY + btnH) {
      if (i === 0) selectMode('rally');
      else if (i === 1) selectMode('frenzy');
      else if (i === 2) selectMode('battle');
      return;
    }
  }
}

function selectMode(mode) {
  gameMode = mode;
  if (mode === 'rally') {
    // Rally: campaign mode, always 1 player
    numPlayers = 1;
    campaignLevel = 0;
    startLevelTransition();
  } else if (mode === 'frenzy') {
    // Frenzy: always 1P
    numPlayers = 1;
    startCountdown();
  } else if (mode === 'battle') {
    // Battle: always 2P, need P2 to pick truck
    numPlayers = 2;
    pickerPlayer = 2;
    selectedTruck2 = (selectedTruck + 1) % ROSTER_COUNT;
    gameState = 'picker';
  }
}

function handlePlayerSelectClick(vx, vy) {
  const btnW = 180, btnH = 70, gap = 40;
  const bx1 = W / 2 - btnW - gap / 2, by = 220;
  const bx2 = W / 2 + gap / 2;
  if (vy >= by && vy <= by + btnH) {
    if (vx >= bx1 && vx <= bx1 + btnW) startRallyWithPlayers(1);
    else if (vx >= bx2 && vx <= bx2 + btnW) startRallyWithPlayers(2);
  }
}

function startRallyWithPlayers(n) {
  numPlayers = n;
  if (n === 2) {
    pickerPlayer = 2;
    selectedTruck2 = (selectedTruck + 1) % ROSTER_COUNT;
    gameState = 'picker';
  } else {
    startCountdown();
  }
}

function startLevelTransition() {
  gameState = 'leveltransition';
  levelTransitionTimer = 120; // 2 seconds to show level name
  initGame();
}

function startCountdown() {
  gameState = 'countdown';
  countdownTimer = 180; // 3 seconds at 60fps
}

function initGame() {
  obstacles = [];
  particles = [];
  stars = [];
  dustTrail = [];
  powerUps = [];
  currentEnvIndex = 0;
  envTransitionTimer = 0;
  envAnnouncementTimer = 0;
  lavaBubbles = [];

  // Mode-specific settings
  if (gameMode === 'battle') {
    gameSpeed = 0; // no scrolling in battle
    obstacleTimer = 9999;
    starTimer = 9999;
    powerUpSpawnTimer = 9999;
    roundTimer = 0; // no timer, first to 5 wins
    battleScores = [0, 0];
    battleResetTimer = 0;
  } else if (gameMode === 'frenzy') {
    gameSpeed = 2.4;
    obstacleTimer = 10;
    starTimer = 9999;
    powerUpSpawnTimer = 150; // power-ups enabled in frenzy!
    roundTimer = 1800; // 30 seconds
  } else if (gameMode === 'rally') {
    // Campaign mode: use level configs
    const lvl = CAMPAIGN_LEVELS[campaignLevel] || CAMPAIGN_LEVELS[0];
    gameSpeed = lvl.baseSpeed;
    maxSpeed = lvl.maxSpeed;
    currentEnvIndex = lvl.envIndex;
    obstacleTimer = lvl.obstGap;
    starTimer = lvl.starFreq;
    powerUpSpawnTimer = 150;
    roundTimer = 0;
    campaignMaxSpeedReached = false;
    campaignCountdown = 0;
    campaignMaxSpeedFlash = 0;
    levelStats = { stars: 0, crushes: 0, flips: 0, score: 0 };
    // Init rain for stormy highway
    raindrops = [];
    if (ENVIRONMENTS[lvl.envIndex].features === 'storm') {
      for (let i = 0; i < 50; i++) {
        raindrops.push({ x: Math.random() * W, y: Math.random() * H, speed: 6 + Math.random() * 4, len: 8 + Math.random() * 7 });
      }
      lightningTimer = 360 + Math.random() * 240; // 6-10s
      lightningFlash = 0;
    }
  } else {
    gameSpeed = 1.6;
    obstacleTimer = 80;
    starTimer = 30;
    powerUpSpawnTimer = 150;
    roundTimer = 0;
  }

  players = [];
  if (gameMode === 'battle') {
    // Battle: face-to-face arena
    player1 = createPlayer(selectedTruck, 0);
    player1.truck.x = 150; // left side facing right
    player1.battleFacing = 1; // 1 = facing right
    players.push(player1);
    player2 = createPlayer(selectedTruck2, 0);
    player2.truck.x = 620; // right side facing left
    player2.battleFacing = -1; // -1 = facing left
    players.push(player2);
  } else if (numPlayers === 2) {
    player1 = createPlayer(selectedTruck, -10);
    players.push(player1);
    player2 = createPlayer(selectedTruck2, 10);
    players.push(player2);
  } else {
    player1 = createPlayer(selectedTruck, 0);
    players.push(player1);
    player2 = null;
  }

  // Compat aliases
  score = 0; combo = 0; comboTimer = 0;
}

function startPlaying() {
  gameState = 'playing';
  if (!audioMuted) startEngine();
  // Immediate engagement — spawn first obstacle and star right away
  obstacleTimer = 15;
  if (gameMode !== 'battle') {
    spawnStar(450, GROUND_Y - 80);
    spawnObstacle();
    if (obstacles.length > 0) obstacles[obstacles.length - 1].x = 550;
  }
}

// ============================================================
// PAUSE SYSTEM
// ============================================================
function pauseGame() {
  if (gameState !== 'playing') return;
  gameState = 'paused';
  // Engine beat skips ticks automatically when paused (checked in setInterval callback)
  stopBigAir();
}

function resumeGame() {
  if (gameState !== 'paused') return;
  gameState = 'playing';
  // Engine beat resumes automatically (checked in setInterval callback)
}

function restartGame() {
  gameState = 'playing'; // temporarily so stopEngine works
  stopEngine();
  stopBigAir();
  initGame();
  startCountdown();
}

function quitToMenu() {
  stopEngine();
  stopBigAir();
  gameState = 'modeselect';
}

function handlePauseClick(vx, vy) {
  // MUST match drawPauseOverlay layout exactly
  const btnW = 200, btnH = 45, gap = 12;
  const bx = W / 2 - btnW / 2;
  const baseY = 130;

  // Resume button
  if (vx >= bx && vx <= bx + btnW && vy >= baseY && vy <= baseY + btnH) {
    resumeGame(); return;
  }
  // Restart button
  const ry = baseY + btnH + gap;
  if (vx >= bx && vx <= bx + btnW && vy >= ry && vy <= ry + btnH) {
    restartGame(); return;
  }
  // Quit button
  const qy = ry + btnH + gap;
  if (vx >= bx && vx <= bx + btnW && vy >= qy && vy <= qy + btnH) {
    quitToMenu(); return;
  }
  // Main Menu button (back to landing page)
  const my = qy + btnH + gap;
  if (vx >= bx && vx <= bx + btnW && vy >= my && vy <= my + btnH) {
    window.location.href = '/'; return;
  }
}

function drawPickerScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  pickerPulse += 0.06;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 30px "Arial Black", Impact, sans-serif';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
  const title = pickerPlayer === 1 ? 'CHOOSE YOUR RIDE!' : 'PLAYER 2 — PICK YOUR RIDE!';
  ctx.strokeText(title, W / 2, 55); ctx.fillText(title, W / 2, 55);

  // Category label
  const pageStart = pickerPage * PICKER_PER_PAGE;
  const pageLabel = pageStart < 4 ? 'CLASSIC TRUCKS' : pageStart < 8 ? 'MONSTER TRUCKS' : 'CARS & VEHICLES';
  const pageIcon = pageStart < 8 ? '🏁' : '🚗';
  ctx.fillStyle = '#aaa'; ctx.font = '14px Arial';
  ctx.fillText(pageIcon + ' ' + pageLabel, W / 2, 80);

  const rects = getPickerTruckRects();
  const activeTruck = pickerPlayer === 1 ? selectedTruck : selectedTruck2;

  for (let ri = 0; ri < rects.length; ri++) {
    const r = rects[ri], t = TRUCK_ROSTER[r.idx];
    const isSelected = r.idx === activeTruck;
    const isP1Pick = pickerPlayer === 2 && r.idx === selectedTruck;

    ctx.fillStyle = isSelected ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)';
    if (isP1Pick) ctx.fillStyle = 'rgba(255,100,0,0.1)';
    ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 10); ctx.fill();

    if (isSelected) {
      const glow = 0.5 + Math.sin(pickerPulse) * 0.3;
      ctx.strokeStyle = t.accent; ctx.lineWidth = 3; ctx.globalAlpha = glow;
      ctx.beginPath(); ctx.roundRect(r.x - 2, r.y - 2, r.w + 4, r.h + 4, 12); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    if (isP1Pick) {
      ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 10); ctx.stroke();
      ctx.fillStyle = '#ff4400'; ctx.font = '11px Arial'; ctx.textAlign = 'center';
      ctx.fillText('P1', r.x + r.w / 2, r.y + r.h + 14);
    }

    // Draw vehicle preview using unified function
    ctx.save();
    ctx.translate(r.x + r.w / 2, r.y + 50);
    ctx.scale(1.2, 1.2);
    drawVehiclePreview(-45, -25, t, false, 0, r.idx);
    ctx.restore();

    // Name
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px "Arial Black", Impact, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t.name, r.x + r.w / 2, r.y + r.h - 18);

    // Style/type badge
    let badge, badgeColor;
    if (t.style === 'hd') { badge = 'HD'; badgeColor = '#ffd700'; }
    else if (t.style === 'classic') { badge = 'CLASSIC'; badgeColor = '#ff6600'; }
    else if (t.style === 'monster') { badge = 'MONSTER'; badgeColor = '#44ff44'; }
    else { badge = t.type.toUpperCase(); badgeColor = '#4488ff'; }
    ctx.fillStyle = badgeColor; ctx.font = '9px Arial';
    ctx.fillText(badge, r.x + r.w / 2, r.y + 15);

    // Per-truck best score
    const best = getBestScore(r.idx);
    if (best > 0) {
      ctx.fillStyle = '#ffd700'; ctx.font = '11px Arial';
      ctx.fillText('Best: ⭐ ' + best, r.x + r.w / 2, r.y + r.h - 5);
    }
  }

  // Page arrows
  if (PICKER_PAGES > 1) {
    ctx.font = 'bold 36px Arial'; ctx.textAlign = 'center';
    if (pickerPage > 0) {
      ctx.fillStyle = '#fff';
      ctx.fillText('◀', 40, 240);
    } else {
      ctx.fillStyle = '#333';
      ctx.fillText('◀', 40, 240);
    }
    if (pickerPage < PICKER_PAGES - 1) {
      ctx.fillStyle = '#fff';
      ctx.fillText('▶', W - 40, 240);
    } else {
      ctx.fillStyle = '#333';
      ctx.fillText('▶', W - 40, 240);
    }
    // Page dots
    for (let p = 0; p < PICKER_PAGES; p++) {
      ctx.fillStyle = p === pickerPage ? '#ffcc00' : '#555';
      ctx.beginPath(); ctx.arc(W / 2 - (PICKER_PAGES - 1) * 8 + p * 16, 310, 4, 0, Math.PI * 2); ctx.fill();
    }
  }

  ctx.fillStyle = '#aaa'; ctx.font = '13px Arial'; ctx.textAlign = 'center';
  const blink = Math.sin(Date.now() * 0.004) > 0;
  if (blink) { ctx.fillStyle = '#fff'; ctx.fillText('TAP a vehicle, then TAP again to confirm!', W / 2, H - 50); }
  ctx.fillStyle = '#666'; ctx.font = '12px Arial';
  ctx.fillText('◀ ▶ to browse pages  •  Arrow keys to pick  •  Space/Enter to confirm', W / 2, H - 30);
  ctx.textAlign = 'left';
}

function drawStormEffects() {
  // Rain
  ctx.strokeStyle = 'rgba(200,210,220,0.3)';
  ctx.lineWidth = 1;
  for (const rd of raindrops) {
    ctx.beginPath();
    ctx.moveTo(rd.x, rd.y);
    ctx.lineTo(rd.x - 3, rd.y + rd.len);
    ctx.stroke();
  }

  // Lightning flash
  if (lightningFlash > 0) {
    const intensity = lightningFlash > 4 ? 0.3 : lightningFlash > 2 ? 0.15 : 0.05;
    ctx.fillStyle = `rgba(255,255,255,${intensity})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Wet road reflections
  ctx.strokeStyle = 'rgba(150,160,170,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const ry = GROUND_Y + 5 + i * 12;
    ctx.beginPath(); ctx.moveTo(0, ry); ctx.lineTo(W, ry); ctx.stroke();
  }
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 6;

  const bounce = Math.sin(Date.now() * 0.005) * 5;

  if (gameMode === 'battle' && player1 && player2) {
    // Battle sumo: show winner
    const p1c = TRUCK_ROSTER[player1.truckIdx];
    const p2c = TRUCK_ROSTER[player2.truckIdx];

    let winText, winColor;
    if (battleScores[0] >= battleWinScore) { winText = 'PLAYER 1 WINS!'; winColor = p1c.body; }
    else { winText = 'PLAYER 2 WINS!'; winColor = p2c.body; }

    // Big winner text
    ctx.fillStyle = winColor;
    ctx.font = 'bold 44px "Arial Black", Impact, sans-serif';
    ctx.strokeText(winText, W / 2, 110 + bounce);
    ctx.fillText(winText, W / 2, 110 + bounce);

    // Score display
    ctx.save(); ctx.translate(W / 4, 200);
    ctx.scale(0.8, 0.8);
    drawVehiclePreview(-45, -25, p1c, false, 0, player1.truckIdx);
    ctx.restore();
    ctx.fillStyle = p1c.body; ctx.font = 'bold 18px Arial';
    ctx.fillText('P1: ' + p1c.name, W / 4, 250);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 36px "Arial Black", Impact, sans-serif';
    ctx.strokeText(battleScores[0] + ' pts', W / 4, 295);
    ctx.fillText(battleScores[0] + ' pts', W / 4, 295);

    ctx.save(); ctx.translate(W * 3 / 4, 200);
    ctx.scale(0.8, 0.8);
    drawVehiclePreview(-45, -25, p2c, false, 0, player2.truckIdx);
    ctx.restore();
    ctx.fillStyle = p2c.body; ctx.font = 'bold 18px Arial';
    ctx.fillText('P2: ' + p2c.name, W * 3 / 4, 250);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 36px "Arial Black", Impact, sans-serif';
    ctx.strokeText(battleScores[1] + ' pts', W * 3 / 4, 295);
    ctx.fillText(battleScores[1] + ' pts', W * 3 / 4, 295);

    ctx.fillStyle = winColor; ctx.font = 'bold 32px "Arial Black", Impact, sans-serif';
    const winBounce = Math.sin(Date.now() * 0.006) * 4;
    ctx.strokeText(winText, W / 2, 350 + winBounce);
    ctx.fillText(winText, W / 2, 350 + winBounce);
  } else {
    // Frenzy/Rally: show TIME'S UP
    ctx.fillStyle = '#ff4400';
    ctx.font = 'bold 44px "Arial Black", Impact, sans-serif';
    ctx.strokeText("TIME'S UP!", W / 2, 110 + bounce);
    ctx.fillText("TIME'S UP!", W / 2, 110 + bounce);

    // Single score
    ctx.save(); ctx.translate(W / 2, 190);
    ctx.scale(1.0, 1.0);
    drawVehiclePreview(-45, -25, TRUCK_ROSTER[player1.truckIdx], false, 0, player1.truckIdx);
    ctx.restore();

    ctx.fillStyle = '#fff'; ctx.font = 'bold 48px "Arial Black", Impact, sans-serif';
    ctx.strokeText('⭐ ' + player1.score, W / 2, 280);
    ctx.fillText('⭐ ' + player1.score, W / 2, 280);

    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 22px Arial';
    ctx.fillText('CRUSHES: ' + player1.totalCrushes, W / 2, 320);
  }

  // Tap to continue
  const blink = Math.sin(Date.now() * 0.004) > 0;
  if (blink) {
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial';
    ctx.fillText('TAP TO PLAY AGAIN!', W / 2, H - 40);
  }
  ctx.textAlign = 'left';
}

function drawCountdown() {
  const secs = Math.ceil(countdownTimer / 60);
  const txt = secs > 0 ? String(secs) : 'GO!';
  const progress = (countdownTimer % 60) / 60;
  const scale = 1 + (1 - progress) * 0.5;

  ctx.save();
  ctx.textAlign = 'center';
  ctx.translate(W / 2, H / 2 - 30);
  ctx.scale(scale, scale);
  ctx.globalAlpha = progress > 0.1 ? 1 : progress * 10;
  ctx.fillStyle = txt === 'GO!' ? '#44ff44' : '#fff';
  ctx.font = 'bold 80px "Arial Black", Impact, sans-serif';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 8;
  ctx.strokeText(txt, 0, 0); ctx.fillText(txt, 0, 0);
  ctx.restore();
  ctx.textAlign = 'left';
}

// ============================================================
// POWER-UP ICON DRAWING (polished Canvas-drawn icons)
// ============================================================
function drawPowerUpGlow(ctx, r, color, intensity) {
  const grad = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 1.5);
  grad.addColorStop(0, color + (intensity || '44'));
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2); ctx.fill();
}

// Turbo Boost — Speed Bolt (orange circle, speed lines, lightning bolt)
function drawTurboIcon(ctx, r) {
  drawPowerUpGlow(ctx, r, '#ff4400');
  const g = ctx.createRadialGradient(-r*0.1, -r*0.1, 0, 0, 0, r);
  g.addColorStop(0, '#ffaa00'); g.addColorStop(0.6, '#ff4400'); g.addColorStop(1, '#cc2200');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  // Speed lines
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = r * 0.06;
  for (let i = 0; i < 3; i++) {
    const ly = -r*0.3 + i * r * 0.3;
    ctx.beginPath(); ctx.moveTo(-r * 0.85, ly); ctx.lineTo(-r * 0.45, ly); ctx.stroke();
  }
  // Lightning bolt
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = r * 0.3;
  ctx.beginPath();
  ctx.moveTo(-r*0.25, -r*0.6); ctx.lineTo(r*0.15, -r*0.08); ctx.lineTo(-r*0.05, -r*0.08);
  ctx.lineTo(r*0.25, r*0.6); ctx.lineTo(-r*0.15, r*0.08); ctx.lineTo(r*0.05, r*0.08);
  ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
}

// Mega Truck — Shield Star (red circle, hexagonal shield, up-arrow)
function drawMegaIcon(ctx, r) {
  drawPowerUpGlow(ctx, r, '#ff3333');
  const g = ctx.createRadialGradient(0, -r*0.1, 0, 0, 0, r);
  g.addColorStop(0, '#ff6644'); g.addColorStop(1, '#bb1100');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  // Shield shape
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.moveTo(0, -r*0.7); ctx.lineTo(r*0.55, -r*0.35); ctx.lineTo(r*0.55, r*0.2);
  ctx.lineTo(0, r*0.65); ctx.lineTo(-r*0.55, r*0.2); ctx.lineTo(-r*0.55, -r*0.35);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = r * 0.05; ctx.stroke();
  // Up arrow
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(0, -r*0.4); ctx.lineTo(r*0.25, -r*0.05); ctx.lineTo(r*0.1, -r*0.05);
  ctx.lineTo(r*0.1, r*0.3); ctx.lineTo(-r*0.1, r*0.3); ctx.lineTo(-r*0.1, -r*0.05);
  ctx.lineTo(-r*0.25, -r*0.05); ctx.closePath(); ctx.fill();
}

// Magnet — Horseshoe Magnet (blue circle, red U-magnet, field lines)
function drawMagnetIcon(ctx, r) {
  drawPowerUpGlow(ctx, r, '#4488ff');
  const g = ctx.createRadialGradient(0, -r*0.1, 0, 0, 0, r);
  g.addColorStop(0, '#6699ff'); g.addColorStop(1, '#2244aa');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  // Magnet U-shape
  ctx.strokeStyle = '#ff3333'; ctx.lineWidth = r * 0.2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, -r*0.05, r*0.4, 0, Math.PI); ctx.stroke();
  // Silver tips
  ctx.strokeStyle = '#cccccc'; ctx.lineWidth = r * 0.2;
  ctx.beginPath(); ctx.moveTo(-r*0.4, -r*0.05); ctx.lineTo(-r*0.4, -r*0.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.4, -r*0.05); ctx.lineTo(r*0.4, -r*0.35); ctx.stroke();
  // Field lines
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = r * 0.03;
  ctx.setLineDash([r*0.05, r*0.05]);
  for (let i = 0; i < 3; i++) {
    const mr = r * (0.55 + i * 0.12);
    ctx.beginPath(); ctx.arc(0, -r*0.05, mr, 0.3, Math.PI - 0.3); ctx.stroke();
  }
  ctx.setLineDash([]); ctx.lineCap = 'butt';
}

// Super Jump — Spring Coil (purple circle, white spring, yellow arrow)
function drawJumpIcon(ctx, r) {
  drawPowerUpGlow(ctx, r, '#8855ff');
  const g = ctx.createRadialGradient(0, -r*0.1, 0, 0, 0, r);
  g.addColorStop(0, '#aa77ff'); g.addColorStop(1, '#5522aa');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  // Spring coils
  ctx.strokeStyle = '#fff'; ctx.lineWidth = r * 0.08; ctx.lineCap = 'round';
  const coils = 4, springW = r * 0.4, springH = r * 1.2, startY = r * 0.5;
  ctx.beginPath();
  for (let i = 0; i <= coils * 20; i++) {
    const t = i / (coils * 20);
    const x = Math.sin(t * coils * Math.PI * 2) * springW;
    const y = startY - t * springH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke(); ctx.lineCap = 'butt';
  // Up arrow at top
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.moveTo(0, -r*0.75); ctx.lineTo(r*0.2, -r*0.45); ctx.lineTo(-r*0.2, -r*0.45);
  ctx.closePath(); ctx.fill();
}

function drawPowerUpIcon(effect, r) {
  if (effect === 'turbo') drawTurboIcon(ctx, r);
  else if (effect === 'mega') drawMegaIcon(ctx, r);
  else if (effect === 'magnet') drawMagnetIcon(ctx, r);
  else if (effect === 'superjump') drawJumpIcon(ctx, r);
}

function drawPowerUp(pu) {
  const bob = Math.sin(pu.bobPhase) * 8;
  const px = pu.x, py = pu.y + bob;
  pu.glowPhase += 0.1;

  // Draw the polished icon
  ctx.save();
  ctx.translate(px, py);
  drawPowerUpIcon(pu.type.effect, 22);
  ctx.restore();

  // Name label above
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.strokeText(pu.type.name, px, py - 28);
  ctx.fillText(pu.type.name, px, py - 28);
  ctx.textAlign = 'left';
}

// ============================================================
// ENVIRONMENT DRAWING
// ============================================================
function drawEnvironmentBg(env) {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, env.skyTop);
  skyGrad.addColorStop(0.5, env.skyMid);
  skyGrad.addColorStop(1, env.skyBot);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Sky stars
  const bright = env.starBright;
  for (let i = 0; i < 30; i++) {
    const sx = (i * 127 + 50) % W;
    const sy = (i * 73 + 10) % (GROUND_Y - 50);
    const twinkle = 0.3 + Math.abs(Math.sin(Date.now() * 0.001 + i)) * 0.7;
    ctx.globalAlpha = twinkle * bright;
    ctx.fillStyle = '#fff';
    const sz = env.features === 'moon' ? 3 : 2;
    ctx.fillRect(sx, sy, sz, sz);
  }
  ctx.globalAlpha = 1;

  // Feature-specific backgrounds
  if (env.features === 'city') drawCityBg();
  else if (env.features === 'neon') drawNeonBg();
  else if (env.features === 'moon') drawMoonBg();
  else if (env.features === 'lava') drawLavaBg();

  // Mountains
  ctx.fillStyle = env.mountainColor;
  for (const m of bgMountains) {
    ctx.beginPath();
    ctx.moveTo(m.x, GROUND_Y);
    ctx.lineTo(m.x + m.w / 2, GROUND_Y - m.h);
    ctx.lineTo(m.x + m.w, GROUND_Y);
    ctx.closePath(); ctx.fill();
  }

  // Clouds (if applicable)
  if (env.cloudAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${env.cloudAlpha})`;
    for (const c of bgClouds) {
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w / 2, 15, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Stadium lights (desert only)
  if (env.features === 'desert') {
    ctx.fillStyle = 'rgba(255,200,50,0.08)';
    ctx.beginPath(); ctx.moveTo(50, GROUND_Y - 120); ctx.lineTo(100, GROUND_Y); ctx.lineTo(0, GROUND_Y); ctx.fill();
    ctx.beginPath(); ctx.moveTo(750, GROUND_Y - 120); ctx.lineTo(800, GROUND_Y); ctx.lineTo(700, GROUND_Y); ctx.fill();
  }
}

function drawCityBg() {
  // Skyline silhouette
  ctx.fillStyle = '#0d0d1a';
  const buildings = [
    { x: 20, w: 50, h: 80 }, { x: 80, w: 35, h: 120 }, { x: 130, w: 60, h: 90 },
    { x: 210, w: 40, h: 140 }, { x: 270, w: 55, h: 70 }, { x: 340, w: 45, h: 110 },
    { x: 400, w: 65, h: 130 }, { x: 480, w: 35, h: 85 }, { x: 530, w: 50, h: 150 },
    { x: 600, w: 40, h: 95 }, { x: 660, w: 55, h: 115 }, { x: 730, w: 45, h: 80 }
  ];
  for (const b of buildings) {
    ctx.fillRect(b.x, GROUND_Y - b.h, b.w, b.h);
    // Windows
    ctx.fillStyle = 'rgba(255,200,50,0.3)';
    for (let wy = GROUND_Y - b.h + 8; wy < GROUND_Y - 10; wy += 12) {
      for (let wx = b.x + 5; wx < b.x + b.w - 5; wx += 10) {
        if (Math.random() > 0.3) ctx.fillRect(wx, wy, 5, 7);
      }
    }
    ctx.fillStyle = '#0d0d1a';
  }
  // Orange clouds
  ctx.fillStyle = 'rgba(255,100,50,0.08)';
  for (const c of bgClouds) {
    ctx.beginPath(); ctx.ellipse(c.x, c.y + 30, c.w / 2, 20, 0, 0, Math.PI * 2); ctx.fill();
  }
}

function drawNeonBg() {
  // Neon spotlights sweeping
  for (const s of neonSpotlights) {
    s.angle += s.speed;
    const endX = s.x + Math.sin(s.angle) * 200;
    const grad = ctx.createLinearGradient(s.x, 20, endX, GROUND_Y);
    grad.addColorStop(0, s.color.replace(')', ',0.15)').replace('rgb', 'rgba'));
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = `${s.color}22`;
    ctx.beginPath();
    ctx.moveTo(s.x, 20);
    ctx.lineTo(endX - 40, GROUND_Y);
    ctx.lineTo(endX + 40, GROUND_Y);
    ctx.closePath(); ctx.fill();
  }
  // Crowd silhouette
  ctx.fillStyle = '#110022';
  for (let x = 0; x < W; x += 12) {
    const h = 8 + Math.sin(x * 0.3) * 4 + Math.sin(x * 0.7 + Date.now() * 0.003) * 2;
    ctx.beginPath();
    ctx.arc(x + 6, GROUND_Y - h, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillRect(x + 4, GROUND_Y - h, 4, h);
  }
}

function drawMoonBg() {
  // Earth in background
  ctx.fillStyle = '#2244aa';
  ctx.beginPath(); ctx.arc(650, 80, 40, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#33aa55';
  ctx.beginPath();
  ctx.arc(640, 75, 15, 0, Math.PI * 2); ctx.fill();
  ctx.arc(660, 90, 10, 0, Math.PI * 2); ctx.fill();
  // Atmosphere glow
  ctx.strokeStyle = 'rgba(100,180,255,0.3)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(650, 80, 44, 0, Math.PI * 2); ctx.stroke();
}

function drawLavaBg() {
  // Volcanic mountains with glow
  ctx.fillStyle = '#330000';
  for (const m of bgMountains) {
    ctx.beginPath();
    ctx.moveTo(m.x, GROUND_Y); ctx.lineTo(m.x + m.w / 2, GROUND_Y - m.h - 20);
    ctx.lineTo(m.x + m.w, GROUND_Y); ctx.closePath(); ctx.fill();
    // Lava glow at peak
    ctx.fillStyle = 'rgba(255,100,0,0.3)';
    ctx.beginPath(); ctx.arc(m.x + m.w / 2, GROUND_Y - m.h - 15, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#330000';
  }
  // Floating embers
  for (let i = 0; i < 15; i++) {
    const ex = (i * 137 + Date.now() * 0.02) % W;
    const ey = GROUND_Y - 30 - ((Date.now() * 0.03 + i * 50) % 200);
    ctx.globalAlpha = 0.4 + Math.sin(i + Date.now() * 0.005) * 0.3;
    ctx.fillStyle = Math.random() > 0.5 ? '#ff6600' : '#ffaa00';
    ctx.beginPath(); ctx.arc(ex, ey, 1.5 + Math.random(), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Lava bubbles in ground
  for (let i = lavaBubbles.length - 1; i >= 0; i--) {
    const b = lavaBubbles[i];
    b.life -= 0.02;
    b.y -= 0.5;
    b.r += 0.1;
    if (b.life <= 0) { lavaBubbles.splice(i, 1); continue; }
    ctx.globalAlpha = b.life * 0.6;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  if (Math.random() > 0.95) {
    lavaBubbles.push({ x: Math.random() * W, y: GROUND_Y + 15, r: 2, life: 1 });
  }
}

function drawEnvironmentGround(env) {
  // Ground
  ctx.fillStyle = env.ground;
  ctx.fillRect(0, GROUND_Y + 8, W, H - GROUND_Y);

  // Ground texture
  ctx.fillStyle = env.groundAccent;
  for (let x = 0; x < W; x += 20) {
    ctx.fillRect(x, GROUND_Y + 10, 12, 3);
    ctx.fillRect(x + 7, GROUND_Y + 20, 8, 2);
  }

  // Moon craters
  if (env.features === 'moon') {
    ctx.fillStyle = '#777';
    const craters = [80, 220, 400, 580, 720];
    for (const cx of craters) {
      ctx.beginPath(); ctx.ellipse(cx, GROUND_Y + 20, 18, 5, 0, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Lava ground glow
  if (env.features === 'lava') {
    ctx.fillStyle = 'rgba(255,100,0,0.15)';
    ctx.fillRect(0, GROUND_Y + 8, W, 6);
  }

  // Road surface
  ctx.fillStyle = env.road;
  ctx.fillRect(0, GROUND_Y + 4, W, 6);
}
