// Draw truck with custom colors — used by picker preview and gameplay
// Helper: darken a hex color by ~25%
function getDarkShade(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r = Math.max(0, Math.round(parseInt(hex.substr(0,2),16) * 0.75));
  const g = Math.max(0, Math.round(parseInt(hex.substr(2,2),16) * 0.75));
  const b = Math.max(0, Math.round(parseInt(hex.substr(4,2),16) * 0.75));
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// Helper: draw shared decals for classic and monster trucks
function _drawTruckDecals(colors, dx, dy, panelW, panelH, bodyX, bodyY, bodyW, bodyH) {
  ctx.fillStyle = colors.accent;
  if (colors.decal === 'flames') {
    for (let i = 0; i < 7; i++) {
      ctx.beginPath();
      ctx.moveTo(dx + i * (panelW / 7), dy + panelH);
      ctx.lineTo(dx + i * (panelW / 7) + (panelW / 14), dy - 2 - Math.random() * 3);
      ctx.lineTo(dx + (i + 1) * (panelW / 7), dy + panelH);
      ctx.fill();
    }
  } else if (colors.decal === 'bolts') {
    for (let i = 0; i < 2; i++) {
      const bx = dx + 4 + i * (panelW * 0.4);
      ctx.beginPath();
      ctx.moveTo(bx + 5, dy - 2);
      ctx.lineTo(bx, dy + panelH * 0.4);
      ctx.lineTo(bx + 6, dy + panelH * 0.35);
      ctx.lineTo(bx + 1, dy + panelH + 2);
      ctx.lineTo(bx + 7, dy + panelH * 0.55);
      ctx.lineTo(bx + 2, dy + panelH * 0.6);
      ctx.closePath();
      ctx.fill();
    }
  } else if (colors.decal === 'stripes') {
    ctx.save();
    ctx.beginPath(); ctx.rect(dx, dy, panelW, panelH); ctx.clip();
    ctx.fillStyle = colors.accent;
    for (let i = 0; i < 2; i++) {
      ctx.beginPath();
      ctx.moveTo(dx + i * 14, dy - 2);
      ctx.lineTo(dx + i * 14 + 5, dy - 2);
      ctx.lineTo(dx + i * 14 - 6, dy + panelH + 2);
      ctx.lineTo(dx + i * 14 - 11, dy + panelH + 2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  } else if (colors.decal === 'stars') {
    for (let i = 0; i < 3; i++) {
      const sx = dx + 6 + i * (panelW / 3);
      const sy = dy + panelH / 2;
      const sr = 4;
      ctx.beginPath();
      for (let j = 0; j < 10; j++) {
        const a = (j * Math.PI / 5) - Math.PI / 2;
        const rr = j % 2 === 0 ? sr : sr * 0.45;
        const fn = j === 0 ? 'moveTo' : 'lineTo';
        ctx[fn](sx + Math.cos(a) * rr, sy + Math.sin(a) * rr);
      }
      ctx.closePath();
      ctx.fill();
    }
  } else if (colors.decal === 'skull') {
    const sc = dx + panelW * 0.4, scy = dy + panelH * 0.4;
    ctx.beginPath(); ctx.arc(sc, scy, 6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(sc - 4, scy + 5); ctx.lineTo(sc, scy + 11); ctx.lineTo(sc + 4, scy + 5); ctx.fill();
    ctx.fillStyle = colors.body;
    ctx.beginPath(); ctx.arc(sc - 2.5, scy - 1, 1.5, 0, Math.PI * 2); ctx.arc(sc + 2.5, scy - 1, 1.5, 0, Math.PI * 2); ctx.fill();
  } else if (colors.decal === 'claws') {
    ctx.strokeStyle = colors.accent; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(dx + 4 + i * 8, dy - 2);
      ctx.lineTo(dx + 4 + i * 8 + 5, dy + panelH + 2);
      ctx.stroke();
    }
    ctx.lineCap = 'butt';
  } else if (colors.decal === 'horns') {
    ctx.strokeStyle = colors.accent; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(bodyX + 5, bodyY + 6);
    ctx.quadraticCurveTo(bodyX - 6, bodyY - 6, bodyX + 3, bodyY - 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bodyX + 5, bodyY + bodyH - 6);
    ctx.quadraticCurveTo(bodyX - 6, bodyY + bodyH + 6, bodyX + 3, bodyY + bodyH + 3);
    ctx.stroke();
    ctx.lineCap = 'butt';
    ctx.fillStyle = colors.accent;
    ctx.fillRect(bodyX + 12, bodyY + bodyH / 2 - 2, bodyW * 0.5, 3);
  } else if (colors.decal === 'hazard') {
    ctx.save(); ctx.beginPath();
    ctx.rect(dx, dy, panelW, panelH); ctx.clip();
    for (let i = -2; i < 10; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#000' : colors.accent;
      ctx.beginPath();
      ctx.moveTo(dx + i * 7, dy - 1); ctx.lineTo(dx + i * 7 + 5, dy - 1);
      ctx.lineTo(dx + i * 7 - 8, dy + panelH + 1); ctx.lineTo(dx + i * 7 - 13, dy + panelH + 1);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawTruckWithColors(tx, ty, tw, th, colors, showExhaust, squishY) {
  const dark = getDarkShade(colors.body);
  const bodyW = tw - 10;
  const bodyX = tx + 5;
  const totalH = th - 16 - squishY;
  const bodyBottom = ty + 8 + squishY + totalH;

  // Stepped silhouette dimensions
  const hoodW = bodyW * 0.25;
  const cabW = bodyW * 0.40;
  const bedW = bodyW * 0.35;
  const cabH = totalH;
  const hoodH = totalH * 0.70;
  const bedH = totalH * 0.70;
  const hoodX = bodyX + bedW + cabW;
  const cabX = bodyX + bedW;
  const bedX = bodyX;

  // --- Underside shadow ---
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(bodyX, bodyBottom - 3, bodyW, 3);

  // --- Bed (rear, lower) ---
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.moveTo(bedX, bodyBottom);
  ctx.lineTo(bedX, bodyBottom - bedH);
  ctx.lineTo(bedX + bedW, bodyBottom - bedH);
  ctx.lineTo(bedX + bedW, bodyBottom);
  ctx.closePath();
  ctx.fill();
  // Bed dark lower panel
  ctx.fillStyle = dark;
  ctx.fillRect(bedX, bodyBottom - bedH * 0.35, bedW, bedH * 0.35);

  // --- Cab (middle, tallest) ---
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.moveTo(cabX, bodyBottom);
  ctx.lineTo(cabX, bodyBottom - cabH);
  ctx.lineTo(cabX + cabW, bodyBottom - cabH);
  ctx.lineTo(cabX + cabW, bodyBottom);
  ctx.closePath();
  ctx.fill();
  // Cab dark lower panel
  ctx.fillStyle = dark;
  ctx.fillRect(cabX, bodyBottom - cabH * 0.35, cabW, cabH * 0.35);

  // --- Hood (front, lower) ---
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.moveTo(hoodX, bodyBottom);
  ctx.lineTo(hoodX, bodyBottom - hoodH);
  ctx.lineTo(hoodX + hoodW - 2, bodyBottom - hoodH + 2);
  ctx.lineTo(hoodX + hoodW, bodyBottom);
  ctx.closePath();
  ctx.fill();
  // Hood dark lower panel
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.moveTo(hoodX, bodyBottom);
  ctx.lineTo(hoodX, bodyBottom - hoodH * 0.35);
  ctx.lineTo(hoodX + hoodW - 1, bodyBottom - hoodH * 0.35 + 1);
  ctx.lineTo(hoodX + hoodW, bodyBottom);
  ctx.closePath();
  ctx.fill();

  // --- Chrome grille (front face of hood) ---
  const grilleX = hoodX + hoodW - 3;
  const grilleTop = bodyBottom - hoodH + 3;
  const grilleBot = bodyBottom - 2;
  const grilleH = grilleBot - grilleTop;
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(grilleX, grilleTop, 4, grilleH);
  ctx.fillStyle = '#c0c0c0';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(grilleX + 0.5, grilleTop + 1 + i * (grilleH / 4), 3, grilleH / 4 - 2);
  }
  // Headlights
  ctx.fillStyle = '#ffffcc';
  ctx.fillRect(grilleX, grilleTop + 1, 3, 3);
  ctx.fillRect(grilleX, grilleBot - 4, 3, 3);

  // --- Front bumper ---
  ctx.fillStyle = '#aaaaaa';
  ctx.fillRect(hoodX + hoodW - 2, bodyBottom - 7, 5, 8);

  // --- Window (in cab) ---
  const winMargin = 3;
  const winX = cabX + winMargin;
  const winY = bodyBottom - cabH + winMargin;
  const winW = cabW - winMargin * 2;
  const winH = cabH * 0.50;
  ctx.fillStyle = '#7ec8e3';
  ctx.beginPath();
  ctx.moveTo(winX + 3, winY);
  ctx.lineTo(winX + winW, winY);
  ctx.lineTo(winX + winW, winY + winH);
  ctx.lineTo(winX, winY + winH);
  ctx.closePath();
  ctx.fill();
  // Reflection highlight
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(winX + 3, winY + 1);
  ctx.lineTo(winX + winW * 0.4, winY + 1);
  ctx.lineTo(winX + winW * 0.25, winY + winH * 0.6);
  ctx.lineTo(winX + 1, winY + winH * 0.6);
  ctx.closePath();
  ctx.fill();

  // --- Fender arches ---
  ctx.fillStyle = colors.body;
  const fwY = bodyBottom;
  // Front wheel arch
  ctx.beginPath();
  ctx.arc(tx + tw - 18, fwY + 5, 17, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.arc(tx + tw - 18, fwY + 5, 17, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.arc(tx + tw - 18, fwY + 5, 15, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  // Rear wheel arch
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.arc(tx + 18, fwY + 5, 17, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.arc(tx + 18, fwY + 5, 15, Math.PI, 0);
  ctx.closePath();
  ctx.fill();

  // --- Decals (on lower panel of bed + cab) ---
  const decalX = bedX + 3;
  const decalY = bodyBottom - bedH * 0.35 + 1;
  const decalW = bedW + cabW - 10;
  const decalH = bedH * 0.35 - 5;
  _drawTruckDecals(colors, decalX, decalY, decalW, decalH, bodyX, bodyBottom - cabH, bodyW, cabH);

  // --- Wheels (14px) ---
  const wheelR = 14;
  const wheelY2 = ty + th + 5 + squishY / 2;
  drawWheelColored(tx + 18, wheelY2, wheelR, colors.body);
  drawWheelColored(tx + tw - 18, wheelY2, wheelR, colors.body);

  // --- Exhaust flames ---
  if (showExhaust) {
    ctx.globalAlpha = 0.7 + Math.random() * 0.3;
    const exW = 8 + Math.random() * 12;
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.moveTo(bedX - 2, bodyBottom - 8);
    ctx.lineTo(bedX - exW - 5, bodyBottom - 4);
    ctx.lineTo(bedX - 2, bodyBottom);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(bedX - 2, bodyBottom - 6);
    ctx.lineTo(bedX - exW, bodyBottom - 4);
    ctx.lineTo(bedX - 2, bodyBottom - 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawWheelColored(cx, cy, r, hubColor) {
  // 1. Outer tire
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // 2. Tread: 8 thick radial lines, rotate with wheelAngle
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  for (let i = 0; i < 8; i++) {
    const a = wheelAngle + (i / 8) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (r * 0.75), cy + Math.sin(a) * (r * 0.75));
    ctx.lineTo(cx + Math.cos(a) * (r - 1), cy + Math.sin(a) * (r - 1));
    ctx.stroke();
  }

  // 3. Sidewall ring
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = r * 0.2;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.65, 0, Math.PI * 2);
  ctx.stroke();

  // 4. Rim: chrome disc
  ctx.fillStyle = '#c8c8c8';
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.45, 0, Math.PI * 2);
  ctx.fill();
  // Rim darker edge ring
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.44, 0, Math.PI * 2);
  ctx.stroke();

  // 5. Spokes: 5 thin dark lines
  ctx.strokeStyle = '#777';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const a = wheelAngle + (i / 5) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * (r * 0.43), cy + Math.sin(a) * (r * 0.43));
    ctx.stroke();
  }

  // 6. Hub cap
  ctx.fillStyle = hubColor;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.15, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
// NEW MONSTER TRUCK DRAWING (big wheels, high suspension)
// ============================================================
function drawTruckMonster(tx, ty, tw, th, colors, showExhaust, squishY) {
  const dark = getDarkShade(colors.body);
  const wheelR = 20;
  const wheelY = ty + th + 5 + squishY / 2;

  const bodyW = 65, bodyH = 28;
  const bodyX = tx + (tw - bodyW) / 2;
  const bodyY = ty + 2 + squishY;
  const bodyBottom = bodyY + bodyH;

  // Stepped silhouette dimensions
  const hoodW = bodyW * 0.25;
  const cabW = bodyW * 0.40;
  const bedW = bodyW * 0.35;
  const cabH = bodyH;
  const hoodH = bodyH * 0.70;
  const bedH = bodyH * 0.70;
  const hoodX = bodyX + bedW + cabW;
  const cabX = bodyX + bedW;
  const bedX = bodyX;

  // --- Suspension arms (V-shape from body to wheels) ---
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3;
  // Front wheel
  ctx.beginPath();
  ctx.moveTo(hoodX + 5, bodyBottom); ctx.lineTo(tx + tw - 18, wheelY);
  ctx.moveTo(hoodX + hoodW - 5, bodyBottom); ctx.lineTo(tx + tw - 18, wheelY);
  ctx.stroke();
  // Rear wheel
  ctx.beginPath();
  ctx.moveTo(bedX + 5, bodyBottom); ctx.lineTo(tx + 18, wheelY);
  ctx.moveTo(bedX + bedW - 5, bodyBottom); ctx.lineTo(tx + 18, wheelY);
  ctx.stroke();

  // --- Underside shadow ---
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(bodyX, bodyBottom - 3, bodyW, 3);

  // --- Bed (rear, lower) ---
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.moveTo(bedX, bodyBottom);
  ctx.lineTo(bedX, bodyBottom - bedH);
  ctx.lineTo(bedX + bedW, bodyBottom - bedH);
  ctx.lineTo(bedX + bedW, bodyBottom);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = dark;
  ctx.fillRect(bedX, bodyBottom - bedH * 0.35, bedW, bedH * 0.35);

  // --- Cab (middle, tallest) ---
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.moveTo(cabX, bodyBottom);
  ctx.lineTo(cabX, bodyBottom - cabH);
  ctx.lineTo(cabX + cabW, bodyBottom - cabH);
  ctx.lineTo(cabX + cabW, bodyBottom);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = dark;
  ctx.fillRect(cabX, bodyBottom - cabH * 0.35, cabW, cabH * 0.35);

  // --- Hood (front, lower with slope) ---
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.moveTo(hoodX, bodyBottom);
  ctx.lineTo(hoodX, bodyBottom - hoodH);
  ctx.lineTo(hoodX + hoodW - 2, bodyBottom - hoodH + 2);
  ctx.lineTo(hoodX + hoodW, bodyBottom);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.moveTo(hoodX, bodyBottom);
  ctx.lineTo(hoodX, bodyBottom - hoodH * 0.35);
  ctx.lineTo(hoodX + hoodW - 1, bodyBottom - hoodH * 0.35 + 1);
  ctx.lineTo(hoodX + hoodW, bodyBottom);
  ctx.closePath();
  ctx.fill();

  // --- Chrome grille ---
  const grilleX = hoodX + hoodW - 3;
  const grilleTop = bodyBottom - hoodH + 3;
  const grilleBot = bodyBottom - 2;
  const grilleH = grilleBot - grilleTop;
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(grilleX, grilleTop, 5, grilleH);
  ctx.fillStyle = '#c0c0c0';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(grilleX + 0.5, grilleTop + 1 + i * (grilleH / 4), 4, grilleH / 4 - 2);
  }
  // Headlights
  ctx.fillStyle = '#ffffcc';
  ctx.fillRect(grilleX, grilleTop + 1, 4, 3);
  ctx.fillRect(grilleX, grilleBot - 4, 4, 3);

  // --- Front bumper ---
  ctx.fillStyle = '#aaaaaa';
  ctx.fillRect(hoodX + hoodW - 2, bodyBottom - 8, 6, 10);

  // --- Window ---
  const winMargin = 3;
  const winX = cabX + winMargin;
  const winY = bodyBottom - cabH + winMargin;
  const winW = cabW - winMargin * 2;
  const winH = cabH * 0.50;
  ctx.fillStyle = '#7ec8e3';
  ctx.beginPath();
  ctx.moveTo(winX + 3, winY);
  ctx.lineTo(winX + winW, winY);
  ctx.lineTo(winX + winW, winY + winH);
  ctx.lineTo(winX, winY + winH);
  ctx.closePath();
  ctx.fill();
  // Reflection
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(winX + 3, winY + 1);
  ctx.lineTo(winX + winW * 0.4, winY + 1);
  ctx.lineTo(winX + winW * 0.25, winY + winH * 0.6);
  ctx.lineTo(winX + 1, winY + winH * 0.6);
  ctx.closePath();
  ctx.fill();

  // --- Fender arches (larger for monster) ---
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.arc(tx + tw - 18, bodyBottom + 2, 18, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.arc(tx + tw - 18, bodyBottom + 2, 16, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.arc(tx + 18, bodyBottom + 2, 18, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = colors.body;
  ctx.beginPath();
  ctx.arc(tx + 18, bodyBottom + 2, 16, Math.PI, 0);
  ctx.closePath();
  ctx.fill();

  // --- Decals ---
  const decalX = bedX + 3;
  const decalY = bodyBottom - bedH * 0.35 + 1;
  const decalW = bedW + cabW - 10;
  const decalH = bedH * 0.35 - 5;
  _drawTruckDecals(colors, decalX, decalY, decalW, decalH, bodyX, bodyBottom - cabH, bodyW, cabH);

  // --- Massive wheels ---
  drawMonsterWheel(tx + 18, wheelY, wheelR, colors.accent);
  drawMonsterWheel(tx + tw - 18, wheelY, wheelR, colors.accent);

  // --- Exhaust flames ---
  if (showExhaust) {
    ctx.globalAlpha = 0.7 + Math.random() * 0.3;
    const exW = 10 + Math.random() * 15;
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.moveTo(bedX - 2, bodyBottom - 10);
    ctx.lineTo(bedX - exW - 5, bodyBottom - 6);
    ctx.lineTo(bedX - 2, bodyBottom - 2);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(bedX - 2, bodyBottom - 8);
    ctx.lineTo(bedX - exW, bodyBottom - 6);
    ctx.lineTo(bedX - 2, bodyBottom - 4);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawMonsterWheel(cx, cy, r, hubColor) {
  // 1. Outer tire
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

  // 2. Chunky tread: 10 thick radial lines, rotate with wheelAngle
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  for (let i = 0; i < 10; i++) {
    const a = wheelAngle + (i / 10) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (r * 0.7), cy + Math.sin(a) * (r * 0.7));
    ctx.lineTo(cx + Math.cos(a) * (r - 1), cy + Math.sin(a) * (r - 1));
    ctx.stroke();
  }

  // 3. Sidewall ring
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = r * 0.2;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2);
  ctx.stroke();

  // Shadow on bottom half for depth
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI); ctx.fill();

  // 4. Chrome rim
  ctx.fillStyle = '#c8c8c8';
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.45, 0, Math.PI * 2); ctx.fill();
  // Darker rim edge ring
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.44, 0, Math.PI * 2); ctx.stroke();

  // 5. Spokes: 5 thin dark lines from center to rim edge
  ctx.strokeStyle = '#777';
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 5; i++) {
    const a = wheelAngle + (i / 5) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * (r * 0.43), cy + Math.sin(a) * (r * 0.43));
    ctx.stroke();
  }

  // 6. Hub cap
  ctx.fillStyle = hubColor;
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.15, 0, Math.PI * 2); ctx.fill();
}

// ============================================================
// HD SVG TRUCK DRAWING (generalized for all HD trucks)
// ============================================================
function drawTruckHD(tx, ty, tw, th, showExhaust, squishY, assets, flameOuter, flameInner) {
  if (!assets || !assets.loaded) {
    // Fallback to canvas Flame Crusher if SVGs not loaded yet
    drawTruckWithColors(tx, ty, tw, th, TRUCK_ROSTER[0], showExhaust, squishY);
    return;
  }

  const scale = tw / 260;
  const fullW = 400 * scale;
  const fullH = 250 * scale;
  const drawX = tx - 55 * scale;
  const drawY = ty - 45 * scale + squishY;

  // Animated exhaust flames (Canvas-drawn, always visible, color-matched)
  {
    const exX = drawX + 72 * scale;
    const exY = drawY + 125 * scale;
    const exW = (8 + Math.random() * 12) * 1.5;
    ctx.globalAlpha = 0.7 + Math.random() * 0.3;
    ctx.fillStyle = flameOuter || '#ff4400';
    ctx.beginPath();
    ctx.moveTo(exX, exY - 6 * scale);
    ctx.lineTo(exX - exW * scale, exY);
    ctx.lineTo(exX, exY + 6 * scale);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = flameInner || '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(exX, exY - 3.75 * scale);
    ctx.lineTo(exX - (exW - 3) * scale, exY);
    ctx.lineTo(exX, exY + 3.75 * scale);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw body SVG (on top of flames so pipe covers the flame origin)
  ctx.drawImage(assets.body, drawX, drawY, fullW, fullH);

  // Wheels — spin independently
  const wheelR = 42 * scale;
  const wheelDiam = wheelR * 2;
  const rearCX = drawX + 140 * scale;
  const rearCY = drawY + 165 * scale;
  const frontCX = drawX + 270 * scale;
  const frontCY = drawY + 165 * scale;

  ctx.save();
  ctx.translate(rearCX, rearCY); ctx.rotate(wheelAngle);
  ctx.drawImage(assets.wheel, -wheelDiam / 2, -wheelDiam / 2, wheelDiam, wheelDiam);
  ctx.restore();

  ctx.save();
  ctx.translate(frontCX, frontCY); ctx.rotate(wheelAngle);
  ctx.drawImage(assets.wheel, -wheelDiam / 2, -wheelDiam / 2, wheelDiam, wheelDiam);
  ctx.restore();
}

// Draw car-type vehicle (for car/suv/bus/limo roster entries)
function drawCarVehicle(tx, ty, tw, th, colors, vehicleType, squishY) {
  const bodyY = ty + th * 0.3 + squishY;
  const bodyH = th * 0.7 - squishY;

  // Body
  ctx.fillStyle = colors.body;
  ctx.beginPath(); ctx.roundRect(tx, bodyY, tw, bodyH, 4); ctx.fill();

  // Highlight
  ctx.fillStyle = colors.highlight;
  ctx.beginPath(); ctx.roundRect(tx + 3, bodyY + 2, tw - 6, bodyH * 0.3, 2); ctx.fill();

  // Roof / cabin
  const roofW = vehicleType === 'bus' ? tw * 0.7 : vehicleType === 'limo' ? tw * 0.55 : tw * 0.5;
  const roofX = vehicleType === 'bus' ? tx + tw * 0.1 : tx + tw * 0.2;
  ctx.fillStyle = colors.body;
  ctx.beginPath(); ctx.roundRect(roofX, ty + squishY, roofW, th * 0.4, 3); ctx.fill();

  // Windows
  ctx.fillStyle = '#88ccff';
  ctx.beginPath(); ctx.roundRect(roofX + 3, ty + 3 + squishY, roofW - 6, th * 0.3, 2); ctx.fill();

  // Decal stripe
  if (colors.accent !== '#000') {
    ctx.fillStyle = colors.accent;
    ctx.fillRect(tx + 4, bodyY + bodyH * 0.4, tw - 8, 3);
  }

  // Wheels
  const wheelR = vehicleType === 'bus' ? 7 : vehicleType === 'limo' ? 6 : 6;
  const wheelY = ty + th + 3 + squishY / 2;
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(tx + tw * 0.2, wheelY, wheelR, 0, Math.PI * 2);
  ctx.arc(tx + tw * 0.8, wheelY, wheelR, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.arc(tx + tw * 0.2, wheelY, wheelR * 0.45, 0, Math.PI * 2);
  ctx.arc(tx + tw * 0.8, wheelY, wheelR * 0.45, 0, Math.PI * 2);
  ctx.fill();

  // Bus: black stripe
  if (vehicleType === 'bus') {
    ctx.fillStyle = '#000';
    ctx.fillRect(tx + 5, bodyY + bodyH * 0.55, tw - 10, 3);
    ctx.font = '8px Arial'; ctx.fillStyle = '#000'; ctx.textAlign = 'center';
    ctx.fillText('SCHOOL BUS', tx + tw / 2, bodyY + bodyH * 0.45);
    ctx.textAlign = 'left';
  }

  // Limo: chrome strip + extra windows
  if (vehicleType === 'limo') {
    ctx.fillStyle = '#ccc';
    ctx.fillRect(tx + 5, bodyY + bodyH * 0.5, tw - 10, 2);
    ctx.fillStyle = '#223';
    for (let wx = roofX + roofW + 5; wx < tx + tw - 15; wx += 15) {
      ctx.beginPath(); ctx.roundRect(wx, ty + 3 + squishY, 10, th * 0.3, 2); ctx.fill();
    }
  }

  // Exhaust puff when not grounded (moving fast)
  ctx.globalAlpha = 0.5 + Math.random() * 0.3;
  const exW = 4 + Math.random() * 6;
  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.arc(tx - exW, bodyY + bodyH - 3, 3 + Math.random() * 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// Unified vehicle preview for picker (works for both monster trucks and cars)
function drawVehiclePreview(tx, ty, roster, showExhaust, squishY, rosterIdx) {
  if (roster.renderMode === 'svg') {
    const a = hdAssetMap[rosterIdx !== undefined ? rosterIdx : 8];
    drawTruckHD(tx, ty, 90, 50, showExhaust, squishY, a, roster.flameOuter, roster.flameInner);
  } else if (roster.style === 'monster') {
    drawTruckMonster(tx, ty, 90, 50, roster, showExhaust, squishY);
  } else if (!roster.type || roster.type === 'monster' || roster.style === 'classic') {
    drawTruckWithColors(tx, ty, 90, 50, roster, showExhaust, squishY);
  } else {
    const vw = roster.type === 'bus' ? 85 : roster.type === 'limo' ? 95 : roster.type === 'suv' ? 65 : 55;
    const vh = roster.type === 'bus' ? 35 : roster.type === 'limo' ? 28 : roster.type === 'suv' ? 32 : 25;
    drawCarVehicle(tx - vw / 2 + 45, ty + (50 - vh) / 2, vw, vh, roster, roster.type, squishY);
  }
}

// ============================================================
// OBSTACLE DRAWING (including new types)
// ============================================================
function drawObstacle(obs) {
  if (obs.type === 'barrel') return drawBarrel(obs);
  if (obs.type === 'portapotty') return drawPortaPotty(obs);
  if (obs.type === 'tvstack') return drawTVStack(obs);
  if (obs.type === 'trashcan') return drawTrashCans(obs);
  if (obs.type === 'red_racer' || obs.type === 'cool_blue' || obs.type === 'gold_rush') return drawPickupTruck(obs);
  if (obs.type === 'big_suv') return drawBigSUV(obs);
  if (obs.type === 'school_bus') return drawSchoolBus(obs);
  if (obs.type === 'stretch_limo') return drawStretchLimo(obs);
  if (obs.type === 'ramp') return drawRamp(obs);
  return drawPickupTruck(obs); // fallback
}

function drawBarrel(obs) {
  const x = obs.x, y = obs.y;
  if (obs.crushed) {
    const cp = Math.min(obs.crushAnim, 1);
    ctx.save();
    ctx.globalAlpha = 1 - cp * 0.5;
    // Scattered barrel pieces
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(x - 5, GROUND_Y - 5 * (1 - cp), obs.w + 10, 5 * (1 - cp) + 3);
    ctx.fillStyle = '#A0522D';
    ctx.beginPath();
    ctx.arc(x + 10, GROUND_Y - 3, 4 * (1 - cp), 0, Math.PI * 2);
    ctx.arc(x + 30, GROUND_Y - 2, 3 * (1 - cp), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  // 3 stacked barrels (pyramid: 2 bottom, 1 top)
  ctx.fillStyle = '#8B4513';
  // Bottom left
  ctx.beginPath();
  ctx.ellipse(x + 10, y + 20, 10, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  // Bottom right
  ctx.beginPath();
  ctx.ellipse(x + 30, y + 20, 10, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  // Top
  ctx.beginPath();
  ctx.ellipse(x + 20, y + 5, 10, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Metal bands
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1.5;
  [{ cx: 10, cy: 20 }, { cx: 30, cy: 20 }, { cx: 20, cy: 5 }].forEach(b => {
    ctx.beginPath();
    ctx.ellipse(x + b.cx, y + b.cy - 4, 9, 2, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(x + b.cx, y + b.cy + 4, 9, 2, 0, 0, Math.PI * 2);
    ctx.stroke();
  });
}

function drawPortaPotty(obs) {
  const x = obs.x, y = obs.y;
  if (obs.crushed) {
    const cp = Math.min(obs.crushAnim, 1);
    ctx.save();
    ctx.globalAlpha = 1 - cp * 0.5;
    // Tipping over animation
    ctx.translate(x + obs.w, GROUND_Y);
    ctx.rotate(cp * Math.PI / 2);
    ctx.translate(-(x + obs.w), -GROUND_Y);
    ctx.fillStyle = '#2288cc';
    ctx.fillRect(x, y, obs.w, obs.h);
    ctx.fillStyle = '#1a6699';
    ctx.fillRect(x + obs.w * 0.35, y + 8, obs.w * 0.3, obs.h - 12);
    ctx.restore();
    return;
  }

  // Main body
  ctx.fillStyle = '#2288cc';
  ctx.beginPath();
  ctx.roundRect(x, y, obs.w, obs.h, 3);
  ctx.fill();

  // Roof overhang
  ctx.fillStyle = '#1a6699';
  ctx.fillRect(x - 2, y - 3, obs.w + 4, 6);

  // Door
  ctx.fillStyle = '#1a6699';
  ctx.fillRect(x + obs.w * 0.3, y + 8, obs.w * 0.4, obs.h - 12);

  // Door handle
  ctx.fillStyle = '#ccc';
  ctx.fillRect(x + obs.w * 0.6, y + obs.h * 0.5, 3, 5);

  // Vent at top
  ctx.fillStyle = '#44aadd';
  ctx.fillRect(x + 5, y + 5, obs.w - 10, 4);
  ctx.strokeStyle = '#1a6699';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(x + 7 + i * 5, y + 5);
    ctx.lineTo(x + 7 + i * 5, y + 9);
    ctx.stroke();
  }
}

function drawTVStack(obs) {
  const x = obs.x, y = obs.y;
  if (obs.crushed) {
    const cp = Math.min(obs.crushAnim, 1);
    ctx.save();
    ctx.globalAlpha = 1 - cp * 0.5;
    ctx.fillStyle = '#555';
    ctx.fillRect(x - 5, GROUND_Y - 8 * (1 - cp), obs.w + 10, 8 * (1 - cp) + 2);
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = Math.random() > 0.5 ? '#0ff' : '#fff';
      ctx.fillRect(x + Math.random() * obs.w, GROUND_Y - Math.random() * 10, 3, 2);
    }
    ctx.restore();
    return;
  }

  // Flicker: every ~30 frames, briefly flash brightness
  const flicker = (Math.floor(Date.now() / 500) % 3 === 0) ? 0.7 : 0.3;

  // Bottom TV (CRT)
  ctx.fillStyle = '#4a4a4a';
  ctx.beginPath(); ctx.roundRect(x, y + 20, 45, 22, 3); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.fillRect(x + 4, y + 23, 37, 15);
  // Animated static — random horizontal lines each frame
  for (let i = 0; i < 6; i++) {
    const ly = y + 24 + Math.random() * 13;
    const brightness = Math.random() * flicker;
    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
    ctx.fillRect(x + 5, ly, 35, 1);
  }
  // Screen tint
  ctx.fillStyle = `rgba(100,200,255,${flicker * 0.15})`;
  ctx.fillRect(x + 4, y + 23, 37, 15);
  // Buttons on side
  ctx.fillStyle = '#888';
  ctx.beginPath(); ctx.arc(x + 44, y + 28, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 44, y + 33, 1.5, 0, Math.PI * 2); ctx.fill();

  // Top TV (smaller CRT)
  ctx.fillStyle = '#5a5a5a';
  ctx.beginPath(); ctx.roundRect(x + 5, y, 35, 20, 3); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.fillRect(x + 8, y + 3, 29, 14);
  // Animated static
  for (let i = 0; i < 5; i++) {
    const ly = y + 4 + Math.random() * 12;
    const brightness = Math.random() * flicker;
    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
    ctx.fillRect(x + 9, ly, 27, 1);
  }
  ctx.fillStyle = `rgba(100,200,255,${flicker * 0.12})`;
  ctx.fillRect(x + 8, y + 3, 29, 14);

  // Rabbit ear antennas
  ctx.strokeStyle = '#999'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x + 18, y); ctx.lineTo(x + 10, y - 10);
  ctx.moveTo(x + 28, y); ctx.lineTo(x + 36, y - 10);
  ctx.stroke();
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.arc(x + 10, y - 10, 2, 0, Math.PI * 2);
  ctx.arc(x + 36, y - 10, 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawTrashCans(obs) {
  const x = obs.x, y = obs.y;
  if (obs.crushed) {
    const cp = Math.min(obs.crushAnim, 1);
    ctx.save();
    ctx.globalAlpha = 1 - cp * 0.5;
    // Bins scatter outward
    ctx.fillStyle = '#33aa33';
    ctx.save(); ctx.translate(x + 5, GROUND_Y - 8 * (1 - cp));
    ctx.rotate(-cp * 0.5);
    ctx.fillRect(-4, -10, 8, 10);
    ctx.restore();
    ctx.save(); ctx.translate(x + obs.w - 5, GROUND_Y - 6 * (1 - cp));
    ctx.rotate(cp * 0.7);
    ctx.fillRect(-4, -10, 8, 10);
    ctx.restore();
    // Lids flying off
    ctx.fillStyle = '#227722';
    ctx.save(); ctx.translate(x + 10, GROUND_Y - 12 * (1 - cp) - cp * 8);
    ctx.rotate(cp * 2);
    ctx.fillRect(-5, -2, 10, 3);
    ctx.restore();
    ctx.save(); ctx.translate(x + obs.w - 8, GROUND_Y - 10 * (1 - cp) - cp * 12);
    ctx.rotate(-cp * 1.5);
    ctx.fillRect(-4, -2, 8, 3);
    ctx.restore();
    ctx.restore();
    return;
  }

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(x + obs.w / 2, GROUND_Y + 2, obs.w / 2 + 3, 3, 0, 0, Math.PI * 2); ctx.fill();

  // Helper: draw one wheelie bin
  function drawBin(bx, by, bw, bh, tilt) {
    ctx.save();
    if (tilt) { ctx.translate(bx + bw / 2, by + bh); ctx.rotate(tilt); ctx.translate(-(bx + bw / 2), -(by + bh)); }
    // Body (tapered: narrower at bottom)
    const bodyGrad = ctx.createLinearGradient(bx, 0, bx + bw, 0);
    bodyGrad.addColorStop(0, '#227722'); bodyGrad.addColorStop(0.4, '#33bb33');
    bodyGrad.addColorStop(0.6, '#33bb33'); bodyGrad.addColorStop(1, '#227722');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(bx + 1, by + bh); ctx.lineTo(bx, by + 4);
    ctx.lineTo(bx + bw, by + 4); ctx.lineTo(bx + bw - 1, by + bh);
    ctx.closePath(); ctx.fill();
    // Lid (darker green)
    ctx.fillStyle = '#1a5c1a';
    ctx.beginPath(); ctx.roundRect(bx - 1, by, bw + 2, 5, 2); ctx.fill();
    // Handle groove
    ctx.fillStyle = '#115511';
    ctx.fillRect(bx + bw * 0.3, by + 5, bw * 0.4, 2);
    // Horizontal ridges
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.5;
    for (let r = 0; r < 3; r++) {
      ctx.beginPath(); ctx.moveTo(bx + 1, by + 10 + r * 5); ctx.lineTo(bx + bw - 1, by + 10 + r * 5); ctx.stroke();
    }
    // Highlight streak
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(bx + bw * 0.25, by + 6, bw * 0.15, bh - 8);
    // Wheels (two small circles at bottom)
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(bx + 2, by + bh + 1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx + bw - 2, by + bh + 1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // 3 bins: back center (higher), two front side by side
  drawBin(x + 10, y - 2, 12, 20, 0); // back center
  drawBin(x, y + 8, 12, 20, 0); // front left
  drawBin(x + 20, y + 8, 12, 20, 0.15); // front right (tilted)
}

function drawLimo(obs) {
  const x = obs.x, y = obs.y;
  if (obs.crushed) {
    const cp = Math.min(obs.crushAnim, 1);
    ctx.save();
    ctx.globalAlpha = 1 - cp * 0.5;
    ctx.fillStyle = obs.color;
    const flatH = obs.h * (1 - cp * 0.7);
    const flatY = GROUND_Y - flatH;
    ctx.fillRect(x - 5, flatY, obs.w + 10, flatH);
    ctx.fillStyle = 'rgba(150,200,255,0.4)';
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(x + 10 + i * 20, flatY - 2, 10, 4);
    }
    ctx.restore();
    return;
  }

  // Body (long and sleek)
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.roundRect(x, y + obs.h * 0.35, obs.w, obs.h * 0.65, 5);
  ctx.fill();

  // Roof
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.roundRect(x + obs.w * 0.12, y, obs.w * 0.6, obs.h * 0.45, 4);
  ctx.fill();

  // Tinted windows (dark)
  ctx.fillStyle = '#223';
  ctx.beginPath();
  ctx.roundRect(x + obs.w * 0.14, y + 3, obs.w * 0.15, obs.h * 0.35, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(x + obs.w * 0.32, y + 3, obs.w * 0.13, obs.h * 0.35, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(x + obs.w * 0.48, y + 3, obs.w * 0.13, obs.h * 0.35, 2);
  ctx.fill();

  // Chrome strip
  ctx.fillStyle = '#ccc';
  ctx.fillRect(x + 5, y + obs.h * 0.55, obs.w - 10, 2);

  // Shine effect
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.roundRect(x + 5, y + obs.h * 0.38, obs.w - 10, obs.h * 0.15, 2);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(x + obs.w * 0.15, y + obs.h + 2, 6, 0, Math.PI * 2);
  ctx.arc(x + obs.w * 0.85, y + obs.h + 2, 6, 0, Math.PI * 2);
  ctx.fill();

  // Hubcaps
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.arc(x + obs.w * 0.15, y + obs.h + 2, 3, 0, Math.PI * 2);
  ctx.arc(x + obs.w * 0.85, y + obs.h + 2, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawCar(obs) {
  if (obs.crushed) {
    const crushProgress = Math.min(obs.crushAnim, 1);
    ctx.save();
    ctx.globalAlpha = 1 - crushProgress * 0.5;
    ctx.fillStyle = obs.color;
    const flatH = obs.h * (1 - crushProgress * 0.7);
    const flatY = GROUND_Y - flatH;
    ctx.fillRect(obs.x - 5, flatY, obs.w + 10, flatH);
    ctx.fillStyle = 'rgba(150,200,255,0.4)';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(obs.x + 10 + i * 15, flatY - 2, 8, 4);
    }
    ctx.restore();
    return;
  }

  const x = obs.x, y = obs.y;

  if (obs.type === 'ramp') {
    ctx.fillStyle = '#e67e22';
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x + obs.w, GROUND_Y);
    ctx.lineTo(x + obs.w, GROUND_Y - obs.h);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#f39c12';
    for (let i = 0; i < 3; i++) {
      const sx = x + 10 + i * 18;
      ctx.beginPath();
      ctx.moveTo(sx, GROUND_Y);
      ctx.lineTo(sx + 6, GROUND_Y);
      const rh = ((sx - x) / obs.w) * obs.h;
      ctx.lineTo(sx + 6, GROUND_Y - rh);
      ctx.lineTo(sx, GROUND_Y - rh + 2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px Arial';
    ctx.fillText('▲', x + obs.w - 20, GROUND_Y - 5);
    return;
  }

  // Car body
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.roundRect(x, y + obs.h * 0.35, obs.w, obs.h * 0.65, 4);
  ctx.fill();

  // Roof
  const roofW = obs.type === 'bus' ? obs.w * 0.7 : obs.w * 0.5;
  const roofX = obs.type === 'bus' ? x + obs.w * 0.1 : x + obs.w * 0.2;
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.roundRect(roofX, y, roofW, obs.h * 0.45, 3);
  ctx.fill();

  // Windows
  ctx.fillStyle = '#88ccff';
  ctx.beginPath();
  ctx.roundRect(roofX + 3, y + 3, roofW - 6, obs.h * 0.35, 2);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(x + obs.w * 0.2, y + obs.h + 2, 5, 0, Math.PI * 2);
  ctx.arc(x + obs.w * 0.8, y + obs.h + 2, 5, 0, Math.PI * 2);
  ctx.fill();

  if (obs.type === 'bus') {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x + 5, y + obs.h * 0.5, obs.w - 10, 3);
  }
}

// ============================================================
// NEW NAMED VEHICLE DRAWING (clean vector style)
// ============================================================
function drawPickupTruck(obs) {
  const x = obs.x, y = obs.y, w = obs.w, h = obs.h;
  if (obs.crushed) {
    const cp = Math.min(obs.crushAnim, 1);
    ctx.save(); ctx.globalAlpha = 1 - cp * 0.5;
    ctx.fillStyle = obs.color;
    const flatH = h * (1 - cp * 0.7);
    ctx.fillRect(x - 3, GROUND_Y - flatH, w + 6, flatH);
    ctx.fillStyle = 'rgba(150,200,255,0.4)';
    ctx.fillRect(x + 10, GROUND_Y - flatH - 2, 12, 4);
    ctx.restore(); return;
  }
  const dark = getDarkShade(obs.color);
  const bottom = y + h;
  // Stepped silhouette: hood(front 25%), cab(40%), bed(rear 35%)
  const hoodW = w * 0.25, cabW = w * 0.40, bedW = w * 0.35;
  const cabH = h, hoodH = h * 0.70, bedH = h * 0.70;
  const hoodX = x + bedW + cabW, cabX = x + bedW, bedX = x;

  // Underside shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x, bottom - 2, w, 2);

  // Bed
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.moveTo(bedX, bottom); ctx.lineTo(bedX, bottom - bedH);
  ctx.lineTo(bedX + bedW, bottom - bedH); ctx.lineTo(bedX + bedW, bottom);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = dark;
  ctx.fillRect(bedX, bottom - bedH * 0.35, bedW, bedH * 0.35);

  // Cab
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.moveTo(cabX, bottom); ctx.lineTo(cabX, bottom - cabH);
  ctx.lineTo(cabX + cabW, bottom - cabH); ctx.lineTo(cabX + cabW, bottom);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = dark;
  ctx.fillRect(cabX, bottom - cabH * 0.35, cabW, cabH * 0.35);

  // Hood
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.moveTo(hoodX, bottom); ctx.lineTo(hoodX, bottom - hoodH);
  ctx.lineTo(hoodX + hoodW, bottom - hoodH + 2); ctx.lineTo(hoodX + hoodW, bottom);
  ctx.closePath(); ctx.fill();

  // Small grille
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(hoodX + hoodW - 2, bottom - hoodH + 2, 3, hoodH - 4);
  ctx.fillStyle = '#c0c0c0';
  ctx.fillRect(hoodX + hoodW - 1.5, bottom - hoodH + 3, 2, 3);
  ctx.fillRect(hoodX + hoodW - 1.5, bottom - hoodH + 8, 2, 3);

  // Headlight
  ctx.fillStyle = '#ffffcc';
  ctx.fillRect(hoodX + hoodW - 2, bottom - hoodH + 2, 2, 2);
  // Taillight
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(x, bottom - bedH + 1, 2, 3);

  // Window
  const winM = 2;
  ctx.fillStyle = '#7ec8e3';
  ctx.beginPath();
  ctx.moveTo(cabX + winM + 2, bottom - cabH + winM);
  ctx.lineTo(cabX + cabW - winM, bottom - cabH + winM);
  ctx.lineTo(cabX + cabW - winM, bottom - cabH + cabH * 0.50);
  ctx.lineTo(cabX + winM, bottom - cabH + cabH * 0.50);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(cabX + winM + 1, bottom - cabH + winM + 1, 4, cabH * 0.25);

  // Wheels (5-6px)
  const wr = 5, wy = y + h + 2;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x + w * 0.2, wy, wr, 0, Math.PI * 2);
  ctx.arc(x + w * 0.8, wy, wr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#c8c8c8';
  ctx.beginPath();
  ctx.arc(x + w * 0.2, wy, wr * 0.45, 0, Math.PI * 2);
  ctx.arc(x + w * 0.8, wy, wr * 0.45, 0, Math.PI * 2);
  ctx.fill();
}

function drawBigSUV(obs) {
  const x = obs.x, y = obs.y, w = obs.w, h = obs.h;
  if (obs.crushed) {
    const cp = Math.min(obs.crushAnim, 1);
    ctx.save(); ctx.globalAlpha = 1 - cp * 0.5;
    ctx.translate(x + w / 2, GROUND_Y);
    ctx.rotate(cp * 0.15);
    ctx.translate(-(x + w / 2), -GROUND_Y);
    ctx.fillStyle = obs.color;
    const flatH = h * (1 - cp * 0.7);
    ctx.fillRect(x - 3, GROUND_Y - flatH, w + 6, flatH);
    ctx.restore(); return;
  }
  const dark = getDarkShade(obs.color);
  const bottom = y + h;
  // SUV is boxier: cab nearly full length, short hood
  const hoodW = w * 0.18, cabW = w * 0.82;
  const cabH = h, hoodH = h * 0.65;
  const hoodX = x + cabW, cabX = x;

  // Underside shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x, bottom - 2, w, 2);

  // Cab (almost full length, tallest)
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.moveTo(cabX, bottom); ctx.lineTo(cabX, bottom - cabH);
  ctx.lineTo(cabX + cabW, bottom - cabH); ctx.lineTo(cabX + cabW, bottom);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = dark;
  ctx.fillRect(cabX, bottom - cabH * 0.30, cabW, cabH * 0.30);

  // Hood (short front, lower)
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.moveTo(hoodX, bottom); ctx.lineTo(hoodX, bottom - hoodH);
  ctx.lineTo(hoodX + hoodW, bottom - hoodH + 2); ctx.lineTo(hoodX + hoodW, bottom);
  ctx.closePath(); ctx.fill();

  // Roof rack
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cabX + 4, bottom - cabH - 2);
  ctx.lineTo(cabX + cabW - 4, bottom - cabH - 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cabX + 10, bottom - cabH - 2); ctx.lineTo(cabX + 10, bottom - cabH);
  ctx.moveTo(cabX + cabW - 10, bottom - cabH - 2); ctx.lineTo(cabX + cabW - 10, bottom - cabH);
  ctx.stroke();

  // 2 windows with pillar
  const winTop = bottom - cabH + 3;
  const winH = cabH * 0.45;
  const winSec = (cabW - 12) / 2;
  ctx.fillStyle = '#7ec8e3';
  // Window 1
  ctx.beginPath();
  ctx.moveTo(cabX + 3, winTop + winH); ctx.lineTo(cabX + 5, winTop);
  ctx.lineTo(cabX + 3 + winSec - 1, winTop); ctx.lineTo(cabX + 3 + winSec - 1, winTop + winH);
  ctx.closePath(); ctx.fill();
  // Pillar
  ctx.fillStyle = obs.color;
  ctx.fillRect(cabX + 3 + winSec - 1, winTop, 3, winH);
  // Window 2
  ctx.fillStyle = '#7ec8e3';
  ctx.fillRect(cabX + 5 + winSec, winTop, winSec - 2, winH);
  // Reflections
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(cabX + 5, winTop + 1, 4, winH * 0.5);
  ctx.fillRect(cabX + 6 + winSec, winTop + 1, 4, winH * 0.5);

  // Chrome grille
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(hoodX + hoodW - 3, bottom - hoodH + 2, 4, hoodH - 4);
  ctx.fillStyle = '#c0c0c0';
  for (let i = 0; i < 3; i++) {
    ctx.fillRect(hoodX + hoodW - 2.5, bottom - hoodH + 3 + i * ((hoodH - 6) / 3), 3, (hoodH - 6) / 3 - 2);
  }

  // Headlight + taillight
  ctx.fillStyle = '#ffffcc';
  ctx.fillRect(hoodX + hoodW - 2, bottom - hoodH + 2, 3, 3);
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(x, bottom - cabH + 3, 2, 4);

  // Chrome strip
  ctx.fillStyle = '#aaa';
  ctx.fillRect(x + 3, bottom - cabH * 0.30 - 1, w - 6, 2);

  // Wheels (6px)
  const wr = 6, wy = y + h + 2;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x + w * 0.2, wy, wr, 0, Math.PI * 2);
  ctx.arc(x + w * 0.8, wy, wr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#c8c8c8';
  ctx.beginPath();
  ctx.arc(x + w * 0.2, wy, wr * 0.45, 0, Math.PI * 2);
  ctx.arc(x + w * 0.8, wy, wr * 0.45, 0, Math.PI * 2);
  ctx.fill();
}

function drawSchoolBus(obs) {
  const x = obs.x, y = obs.y, w = obs.w, h = obs.h;
  if (obs.crushed) {
    const cp = Math.min(obs.crushAnim, 1);
    ctx.save(); ctx.globalAlpha = 1 - cp * 0.5;
    ctx.fillStyle = '#f1c40f';
    const flatH = h * (1 - cp * 0.8);
    ctx.fillRect(x - 5, GROUND_Y - flatH, w + 10, flatH);
    ctx.fillStyle = '#e67e22';
    ctx.save(); ctx.translate(x + w - 5, GROUND_Y - flatH);
    ctx.rotate(-cp * 0.8);
    ctx.fillRect(0, -8, 15, 8);
    ctx.restore();
    ctx.restore(); return;
  }
  const bottom = y + h;
  const busYellow = '#f1c40f';
  const busDark = '#c89e0c';

  // Bus body — flat front, rectangular
  ctx.fillStyle = busYellow;
  ctx.beginPath();
  ctx.moveTo(x, bottom); ctx.lineTo(x, y);
  ctx.lineTo(x + w, y); ctx.lineTo(x + w, bottom);
  ctx.closePath(); ctx.fill();

  // Black trim strip (lower)
  ctx.fillStyle = '#222';
  ctx.fillRect(x, bottom - h * 0.18, w, h * 0.18);

  // Underside shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x, bottom - 2, w, 2);

  // Dark lower body
  ctx.fillStyle = busDark;
  ctx.fillRect(x, bottom - h * 0.30, w, h * 0.12);

  // Row of windows (5 windows)
  ctx.fillStyle = '#7ec8e3';
  const winCount = 5;
  const winGap = 3;
  const winAreaStart = x + 8;
  const winAreaW = w - 20;
  const singleWinW = (winAreaW - (winCount - 1) * winGap) / winCount;
  for (let i = 0; i < winCount; i++) {
    const wx = winAreaStart + i * (singleWinW + winGap);
    ctx.fillRect(wx, y + 4, singleWinW, h * 0.32);
  }
  // Window reflections
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  for (let i = 0; i < winCount; i++) {
    const wx = winAreaStart + i * (singleWinW + winGap);
    ctx.fillRect(wx + 1, y + 5, 3, h * 0.20);
  }

  // "SCHOOL BUS" text
  ctx.fillStyle = '#333'; ctx.font = 'bold 7px Arial'; ctx.textAlign = 'center';
  ctx.fillText('SCHOOL BUS', x + w / 2, y + h * 0.60);
  ctx.textAlign = 'left';

  // Stop sign arm (left side)
  ctx.fillStyle = '#cc0000';
  ctx.beginPath();
  ctx.moveTo(x - 7, y + h * 0.30);
  ctx.lineTo(x - 2, y + h * 0.25);
  ctx.lineTo(x - 2, y + h * 0.50);
  ctx.lineTo(x - 7, y + h * 0.45);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = '4px Arial'; ctx.textAlign = 'center';
  ctx.fillText('STOP', x - 4.5, y + h * 0.40);
  ctx.textAlign = 'left';

  // Flat front face
  ctx.fillStyle = '#e0b200';
  ctx.fillRect(x + w - 3, y + 2, 4, h - 4);

  // Emergency door (back)
  ctx.fillStyle = '#d4a800';
  ctx.fillRect(x + 2, y + h * 0.38, 7, h * 0.45);
  ctx.strokeStyle = '#999'; ctx.lineWidth = 0.5;
  ctx.strokeRect(x + 2, y + h * 0.38, 7, h * 0.45);

  // Headlights
  ctx.fillStyle = '#ffffcc';
  ctx.fillRect(x + w - 2, y + h * 0.35, 3, 4);
  ctx.fillRect(x + w - 2, y + h * 0.65, 3, 4);
  // Taillights
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(x, y + h * 0.35, 2, 3);
  ctx.fillRect(x, y + h * 0.68, 2, 3);

  // Wheels (6px)
  const wr = 6, wy = y + h + 2;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x + w * 0.15, wy, wr, 0, Math.PI * 2);
  ctx.arc(x + w * 0.85, wy, wr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#c8c8c8';
  ctx.beginPath();
  ctx.arc(x + w * 0.15, wy, wr * 0.45, 0, Math.PI * 2);
  ctx.arc(x + w * 0.85, wy, wr * 0.45, 0, Math.PI * 2);
  ctx.fill();
}

function drawStretchLimo(obs) {
  const x = obs.x, y = obs.y, w = obs.w, h = obs.h;
  if (obs.crushed) {
    const cp = Math.min(obs.crushAnim, 1);
    ctx.save(); ctx.globalAlpha = 1 - cp * 0.5;
    ctx.fillStyle = obs.color;
    const compW = w * (1 - cp * 0.3);
    const flatH = h * (1 - cp * 0.6);

    for (let i = 0; i < 4; i++) {
      const lx = x + compW - 10 - i * 8;
      ctx.beginPath(); ctx.moveTo(lx, GROUND_Y - flatH); ctx.lineTo(lx + 3, GROUND_Y); ctx.stroke();
    }

  }
  const dark = getDarkShade(obs.color);

  // Underside shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';

  // Long lower body
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.moveTo(x, bottom); ctx.lineTo(x, bottom - bodyRestH);
  ctx.lineTo(x + bodyRestW, bottom - bodyRestH);
  ctx.lineTo(x + bodyRestW, bottom);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = dark;
  ctx.fillRect(x, bottom - bodyRestH * 0.30, bodyRestW, bodyRestH * 0.30);

  // Cab (taller front section)
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.moveTo(cabX, bottom); ctx.lineTo(cabX, bottom - cabH);

  ctx.lineTo(cabX + cabW, bottom);

  ctx.fillStyle = '#ccc';
  ctx.fillRect(x + 3, bottom - bodyRestH * 0.35, w - 6, 2);

  // Shine effect on upper body
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(x + 4, bottom - bodyRestH + 2, w - 8, bodyRestH * 0.25);

  // Tinted dark windows in cab
  ctx.fillStyle = '#223';
  const cwm = 3;
  ctx.beginPath();
  ctx.moveTo(cabX + cwm + 2, bottom - cabH + cwm);

  ctx.lineTo(cabX + cwm, bottom - cabH + cabH * 0.50);

    ctx.fillStyle = '#223';
    ctx.fillRect(x + 8 + i * (lwW + 5), lwTop, lwW, lwH);
  }

  // Chrome bumpers
  ctx.fillStyle = '#ccc';
  ctx.fillRect(x - 2, bottom - bodyRestH * 0.6, 4, bodyRestH * 0.4);

  ctx.fillStyle = '#ffffcc';
  ctx.fillRect(x + w - 3, bottom - cabH + 2, 4, 4);

  ctx.fillStyle = '#ff2222';

  const wr = 5, wy = y + h + 2;

  ctx.beginPath();
  ctx.arc(x + w * 0.10, wy, wr, 0, Math.PI * 2);
  ctx.arc(x + w * 0.50, wy, wr, 0, Math.PI * 2);
  ctx.arc(x + w * 0.88, wy, wr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#c8c8c8';
  ctx.beginPath();
  ctx.arc(x + w * 0.10, wy, wr * 0.45, 0, Math.PI * 2);
  ctx.arc(x + w * 0.50, wy, wr * 0.45, 0, Math.PI * 2);
  ctx.arc(x + w * 0.88, wy, wr * 0.45, 0, Math.PI * 2);
  ctx.fill();
}

function drawRamp(obs) {
  const x = obs.x, w = obs.w, h = obs.h;

  // Triangle ramp shape with yellow/black hazard stripes
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x, GROUND_Y); ctx.lineTo(x + w, GROUND_Y);
  ctx.lineTo(x + w, GROUND_Y - h);
  ctx.closePath();
  ctx.clip();

  // Diagonal hazard stripes
  const stripeW = 8;
  for (let i = -2; i < 12; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#ffcc00' : '#222';
    ctx.beginPath();
    const sx = x + i * stripeW;
    ctx.moveTo(sx, GROUND_Y + 5);
    ctx.lineTo(sx + stripeW, GROUND_Y + 5);
    ctx.lineTo(sx + stripeW - h * 0.8, GROUND_Y - h - 5);
    ctx.lineTo(sx - h * 0.8, GROUND_Y - h - 5);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // Edge outline
  ctx.strokeStyle = '#b8960e'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, GROUND_Y); ctx.lineTo(x + w, GROUND_Y);
  ctx.lineTo(x + w, GROUND_Y - h);
  ctx.closePath(); ctx.stroke();

  // Flashing orange warning light at peak
  const lightOn = (Math.floor(Date.now() / 333) % 2 === 0); // flash ~3Hz
  const lightX = x + w, lightY = GROUND_Y - h - 6;

  // Pole
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(lightX, GROUND_Y - h); ctx.lineTo(lightX, lightY + 3);
  ctx.stroke();

  // Light glow
  if (lightOn) {
    ctx.fillStyle = 'rgba(255,160,0,0.25)';
    ctx.beginPath(); ctx.arc(lightX, lightY, 10, 0, Math.PI * 2); ctx.fill();
  }

  // Light bulb
  const bulbGrad = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, 5);
  if (lightOn) {
    bulbGrad.addColorStop(0, '#ffcc00');
    bulbGrad.addColorStop(1, '#ff8800');
  } else {
    bulbGrad.addColorStop(0, '#664400');
    bulbGrad.addColorStop(1, '#442200');
  }
  ctx.fillStyle = bulbGrad;
  ctx.beginPath(); ctx.arc(lightX, lightY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(lightX, lightY, 4, 0, Math.PI * 2); ctx.stroke();
}

// Star shape helper (used by Star Coin icon)
function drawStarShape(cx, cy, outerR, innerR, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const a = (i * Math.PI / points) - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

// Star Coin drawing (Concept C — chunky gold coin with embossed star)
function drawStarCoin(r) {
  // Glow
  const glow = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 1.4);
  glow.addColorStop(0, 'rgba(255,200,0,0.3)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2); ctx.fill();

  // Thick metallic rim
  const rimGrad = ctx.createLinearGradient(-r, -r, r, r);
  rimGrad.addColorStop(0, '#ddaa00'); rimGrad.addColorStop(0.3, '#ffdd44');
  rimGrad.addColorStop(0.5, '#ddaa00'); rimGrad.addColorStop(0.7, '#ffdd44');
  rimGrad.addColorStop(1, '#aa7700');
  ctx.fillStyle = rimGrad;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

  // Inner face
  const faceGrad = ctx.createRadialGradient(-r * 0.1, -r * 0.1, 0, 0, 0, r * 0.78);
  faceGrad.addColorStop(0, '#ffcc00'); faceGrad.addColorStop(1, '#b38600');
  ctx.fillStyle = faceGrad;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.78, 0, Math.PI * 2); ctx.fill();

  // Notched rim
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = r * 0.03;
  for (let i = 0; i < 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 0.82, Math.sin(a) * r * 0.82);
    ctx.lineTo(Math.cos(a) * r * 0.92, Math.sin(a) * r * 0.92);
    ctx.stroke();
  }

  // Star shadow (emboss effect)
  ctx.fillStyle = 'rgba(100,70,0,0.3)';
  drawStarShape(r * 0.02, r * 0.03, r * 0.52, r * 0.24, 5); ctx.fill();
  // Bright star
  const starG = ctx.createRadialGradient(0, -r * 0.1, 0, 0, 0, r * 0.5);
  starG.addColorStop(0, '#fff566'); starG.addColorStop(1, '#ffbb00');
  ctx.fillStyle = starG;
  drawStarShape(0, 0, r * 0.5, r * 0.22, 5); ctx.fill();
  // Star outline
  ctx.strokeStyle = 'rgba(180,130,0,0.5)'; ctx.lineWidth = r * 0.03;
  drawStarShape(0, 0, r * 0.5, r * 0.22, 5); ctx.stroke();

  // Shimmer highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.18, -r * 0.32, r * 0.3, r * 0.12, -0.3, 0, Math.PI * 2);
  ctx.fill();
}

function drawStar(s) {
  const bob = Math.sin(s.bobPhase) * 5;
  const sx = s.x, sy = s.y + bob;

  ctx.save();
  ctx.translate(sx, sy);
  drawStarCoin(12);
  ctx.restore();
}

// ============================================================
// PHYSICS & COLLISION (Multi-player + Power-ups + Environments)
// ============================================================
function getGravity() {
  const env = ENVIRONMENTS[currentEnvIndex];
  return BASE_GRAVITY * env.gravityMult;
}

function getEffectiveSpeed() {
  // Turbo boost: increase speed by 40%
  for (const p of players) {
    if (p.activePowerUp && p.activePowerUp.effect === 'turbo') return gameSpeed * 1.4;
  }
  return gameSpeed;
}

function updatePlayer(p) {
  const tk = p.truck;
  const grav = getGravity();
  const truckColors = TRUCK_ROSTER[p.truckIdx];

  // Jump (Super Jump = 1.8x force)
  if (p.jumpPressed && tk.grounded) {
    const jumpMult = (p.activePowerUp && p.activePowerUp.effect === 'superjump') ? 1.8 : 1.0;
    tk.vy = JUMP_FORCE * jumpMult;
    tk.grounded = false;
    tk.jumping = true;
    spawnLandParticles(tk.x + tk.w / 2, GROUND_Y + 8);
  }
  p.jumpPressed = false;

  // Slam
  if (tk.slamming && !tk.grounded) {
    tk.vy = SLAM_FORCE;
    tk.slamming = false;
  }

  // Mega truck scale
  if (p.activePowerUp && p.activePowerUp.effect === 'mega') {
    p.megaScale = Math.min(2.0, p.megaScale + 0.05);
  } else {
    p.megaScale = Math.max(1.0, p.megaScale - 0.05);
  }

  if (!tk.grounded) {
    tk.vy += grav;
    tk.y += tk.vy;
    tk.tilt = tk.vy * 0.5;
    p.airborneFrames++;

    if (p.airborneFrames === 90) startBigAir();

    // Backflip — max 1 per jump
    if (p.airborneFrames >= AIRBORNE_FLIP_THRESHOLD && !p.flipInProgress && p.flipsCompleted < 1) {
      p.flipInProgress = true; p.flipStarted = true;
    }
    if (p.flipInProgress) {
      p.flipAngle += (Math.PI * 2) / FLIP_DURATION;
      if (p.flipAngle >= Math.PI * 2) {
        p.flipsCompleted++;
        p.flipAngle = 0; // snap upright
        p.flipInProgress = false;
        p.score += FLIP_BONUS_POINTS; if (gameMode === 'rally') levelStats.flips++;
        screenShake = 10; flashTimer = 8; flashColor = truckColors.accent;
        spawnFlipParticles(tk.x + tk.w / 2, tk.y + tk.h / 2, p.truckIdx, p.flipsCompleted);
        playSound('flip');
      }
    }

    // Ramp collision
    for (const obs of obstacles) {
      if (obs.type === 'ramp' && !obs.crushed) {
        const isMega = p.activePowerUp && p.activePowerUp.effect === 'mega';
        if (isMega) { obs.crushed = true; obs.crushAnim = 0; p.score += 15; playSound('crush'); continue; }
        const onRamp = tk.x + tk.w > obs.x && tk.x < obs.x + obs.w;
        if (onRamp && tk.y + tk.h >= obs.y && tk.vy > 0) {
          tk.vy = JUMP_FORCE * 1.4;
          screenShake = 5; flashTimer = 8; flashColor = '#ff8800';
          spawnLandParticles(tk.x + tk.w / 2, obs.y);
          p.score += 25; playSound('ramp');
          particles.push({ x: tk.x + tk.w / 2, y: tk.y - 10, vx: 0, vy: -2, size: 1, color: '#ff8800', life: 1, decay: 0.025, type: 'text', text: 'BIG AIR!' });
        }
      }
    }

    // Landing
    if (tk.y >= p.groundY) {
      const fallSpeed = tk.vy;
      tk.y = p.groundY;
      tk.vy = 0; tk.grounded = true; tk.jumping = false;
      tk.squish = 1; tk.tilt = 0; screenShake = 3;
      spawnLandParticles(tk.x + tk.w / 2, p.groundY + 8);
      playSound('landing', fallSpeed);
      stopBigAir();
      p.flipAngle = 0; p.flipInProgress = false; p.flipStarted = false;
      p.airborneFrames = 0; p.flipsCompleted = 0;
    }
  }

  // Squish
  if (tk.squish > 0) tk.squish *= 0.85;
  if (tk.squish < 0.01) tk.squish = 0;

  // Combo timer
  if (p.comboTimer > 0) { p.comboTimer--; if (p.comboTimer <= 0) p.combo = 0; }

  // Power-up timer
  if (p.activePowerUp) {
    p.powerUpTimer--;
    if (p.powerUpTimer <= 0) { p.activePowerUp = null; }
  }

  // Tire tracks
  if (tk.grounded && Math.random() > 0.6) {
    p.tireTracks.push({ x: tk.x + 18, y: p.groundY + 6, life: 1 });
    p.tireTracks.push({ x: tk.x + tk.w - 18, y: p.groundY + 6, life: 1 });
  }
  for (let i = p.tireTracks.length - 1; i >= 0; i--) {
    p.tireTracks[i].x -= getEffectiveSpeed() * 0.98;
    p.tireTracks[i].life -= 0.008;
    if (p.tireTracks[i].life <= 0 || p.tireTracks[i].x < -10) p.tireTracks.splice(i, 1);
  }
  // Cap tire tracks
  if (p.tireTracks.length > 100) p.tireTracks.splice(0, p.tireTracks.length - 100);

  // Obstacle collision — sync global combo for particle text display
  combo = p.combo;
  const isMega = p.activePowerUp && p.activePowerUp.effect === 'mega';
  const pointsMult = isMega ? 2 : 1;

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obs = obstacles[i];
    if (obs.crushed || obs.type === 'ramp') continue;

    const truckBottom = tk.y + tk.h;
    const truckRight = tk.x + tk.w * p.megaScale;
    const overlap = truckRight > obs.x + 10 && tk.x < obs.x + obs.w - 10;

    if (overlap && truckBottom > obs.y && truckBottom < obs.y + obs.h + 15 && (tk.vy > 0 || isMega)) {
      obs.crushed = true;
      p.combo++; p.totalCrushes++; if (gameMode === 'rally') levelStats.crushes++;
      p.comboTimer = (gameMode === 'frenzy' || gameMode === 'battle') ? 120 : 90;
      const basePoints = obs.points || 10;
      const points = basePoints * p.combo * pointsMult;
      p.score += points;
      screenShake = 8; flashTimer = 6; flashColor = obs.color;

      if (obs.type === 'barrel') spawnCrushParticlesColored(obs.x + obs.w / 2, obs.y, ['#8B4513', '#A0522D', '#D2691E', '#ffcc00']);
      else if (obs.type === 'portapotty') spawnCrushParticlesColored(obs.x + obs.w / 2, obs.y, ['#2288cc', '#44aadd', '#1a6699', '#fff']);
      else if (obs.type === 'tvstack') spawnCrushParticlesColored(obs.x + obs.w / 2, obs.y, ['#555', '#888', '#0ff', '#fff', '#333']);
      else if (obs.type === 'trashcan') spawnCrushParticlesColored(obs.x + obs.w / 2, obs.y, ['#33aa33', '#227722', '#999', '#44cc44']);
      else if (obs.type === 'school_bus') spawnCrushParticlesColored(obs.x + obs.w / 2, obs.y, ['#f1c40f', '#e67e22', '#f39c12', '#fff']);
      else if (obs.type === 'stretch_limo') { spawnCrushParticlesColored(obs.x + obs.w / 2, obs.y, ['#ecf0f1', '#ccc', '#fff', '#88ccff']); screenShake = 12; }
      else spawnCrushParticles(obs.x + obs.w / 2, obs.y, obs.color);

      tk.vy = JUMP_FORCE * 0.6;
      playSound('crush');
      if (p.combo >= 3) playSound('combo', p.combo);
    } else if (overlap && tk.grounded && tk.y + tk.h > obs.y) {
      obs.crushed = true; obs.crushAnim = 0.5;
      spawnCrushParticles(obs.x + obs.w / 2, obs.y, obs.color);
      screenShake = 4; p.score += 2 * pointsMult;
      playSound('crush');
    }
  }

  // Star collision + magnet
  const hasMagnet = p.activePowerUp && p.activePowerUp.effect === 'magnet';
  const hasSuperJump = p.activePowerUp && p.activePowerUp.effect === 'superjump';
  for (let i = stars.length - 1; i >= 0; i--) {
    const s = stars[i];
    if (s.collected) continue;
    const dx = (tk.x + tk.w / 2) - s.x;
    const dy = (tk.y + tk.h / 2) - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Magnet attraction
    if (hasMagnet && dist < 220) {
      const pull = 0.12; // stronger attraction
      s.x += dx * pull; s.y += dy * pull;
    }

    if (dist < 35 * p.megaScale) {
      s.collected = true;
      const starVal = 15;
      p.score += starVal;
      if (gameMode === 'rally') levelStats.stars++;
      spawnStarParticles(s.x, s.y);
      flashTimer = 4; flashColor = '#ffd700';
      playSound('star');
    }
  }

  // Power-up collision
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    if (pu.collected) continue;
    const dx = (tk.x + tk.w / 2) - pu.x;
    const dy = (tk.y + tk.h / 2) - pu.y;
    if (Math.sqrt(dx * dx + dy * dy) < 40) {
      pu.collected = true;
      p.activePowerUp = pu.type;
      p.powerUpTimer = pu.type.duration;
      playSound('powerup');
      flashTimer = 8; flashColor = pu.type.color;
      screenShake = 5;
      particles.push({ x: pu.x, y: pu.y - 20, vx: 0, vy: -2, size: 1, color: pu.type.color, life: 1, decay: 0.012, type: 'text', text: pu.type.name + '!' });
    }
  }
}

// ============================================================
// BATTLE MODE (Monster Truck Sumo)
// ============================================================
function resetBattlePositions() {
  player1.truck.x = 150; player1.truck.y = GROUND_Y;
  player1.truck.vy = 0; player1.truck.grounded = true;
  player1.truck.squish = 0; player1.truck.tilt = 0;
  player1.flipAngle = 0; player1.flipInProgress = false;

  player2.truck.x = 620; player2.truck.y = GROUND_Y;
  player2.truck.vy = 0; player2.truck.grounded = true;
  player2.truck.squish = 0; player2.truck.tilt = 0;
  player2.flipAngle = 0; player2.flipInProgress = false;

  battleResetTimer = 90; // brief pause before next round
}

function updateBattle() {
  wheelAngle += 0.05;

  // Reset timer (pause between rounds)
  if (battleResetTimer > 0) {
    battleResetTimer--;
    // Screen shake decay
    if (screenShake > 0) screenShake *= 0.85;
    if (flashTimer > 0) flashTimer--;
    // Update particles during reset
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (p.type === 'spark' || p.type === 'dust') p.vy += 0.15;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
    return;
  }

  // Check win condition
  if (battleScores[0] >= battleWinScore || battleScores[1] >= battleWinScore) {
    gameState = 'gameover';
    stopEngine();
    return;
  }

  // Update each player's physics
  for (const p of [player1, player2]) {
    const tk = p.truck;

    // Jump
    if (p.jumpPressed && tk.grounded) {
      tk.vy = JUMP_FORCE;
      tk.grounded = false;
      spawnLandParticles(tk.x + tk.w / 2, GROUND_Y + 8);
    }
    p.jumpPressed = false;

    // Gravity
    if (!tk.grounded) {
      tk.vy += GRAVITY;
      tk.y += tk.vy;
      tk.tilt = tk.vy * 0.5;

      if (tk.y >= GROUND_Y) {
        tk.y = GROUND_Y; tk.vy = 0; tk.grounded = true;
        tk.squish = 1; tk.tilt = 0;
        spawnLandParticles(tk.x + tk.w / 2, GROUND_Y + 8);
        playSound('landing', 5);
      }
    }

    // Squish decay
    if (tk.squish > 0) tk.squish *= 0.85;
    if (tk.squish < 0.01) tk.squish = 0;
  }

  // Movement: auto-charge + player control
  const t1 = player1.truck, t2 = player2.truck;
  const moveSpeed = 4;
  // Auto-charge (always approach)
  t1.x += battleAutoCharge;
  t2.x -= battleAutoCharge;
  // Player-controlled movement (desktop)
  if (player1.battleMoveDir !== 0) t1.x += player1.battleMoveDir * moveSpeed;
  if (player2.battleMoveDir !== 0) t2.x += player2.battleMoveDir * moveSpeed;

  // Clamp positions
  t1.x = Math.max(30, Math.min(W / 2 - 20, t1.x));
  t2.x = Math.min(W - 30 - t2.w, Math.max(W / 2 + 20 - t2.w, t2.x));

  // Collision check
  const overlap = t1.x + t1.w > t2.x && t1.x < t2.x + t2.w;
  if (overlap) {
    const heightDiff = t1.y - t2.y; // negative = P1 higher (above P2)

    if (heightDiff < -15 && t1.vy > 0) {
      // P1 landed on P2!
      battleScores[0]++;
      screenShake = 12; flashTimer = 10;
      flashColor = TRUCK_ROSTER[player1.truckIdx].body;
      t2.squish = 1;
      playSound('crush');
      spawnCrushParticlesColored(
        (t1.x + t2.x + t2.w) / 2, GROUND_Y - 10,
        [TRUCK_ROSTER[player1.truckIdx].body, TRUCK_ROSTER[player2.truckIdx].body, '#ffcc00', '#fff']
      );
      particles.push({
        x: (t1.x + t2.x + t2.w) / 2, y: GROUND_Y - 40,
        vx: 0, vy: -2, size: 1, color: '#fff', life: 1, decay: 0.015,
        type: 'text', text: ['SMASH!','CRUSHED!','STOMPED!'][Math.floor(Math.random() * 3)]
      });
      resetBattlePositions();
    } else if (heightDiff > 15 && t2.vy > 0) {
      // P2 landed on P1!
      battleScores[1]++;
      screenShake = 12; flashTimer = 10;
      flashColor = TRUCK_ROSTER[player2.truckIdx].body;
      t1.squish = 1;
      playSound('crush');
      spawnCrushParticlesColored(
        (t1.x + t1.w + t2.x) / 2, GROUND_Y - 10,
        [TRUCK_ROSTER[player2.truckIdx].body, TRUCK_ROSTER[player1.truckIdx].body, '#ffcc00', '#fff']
      );
      particles.push({
        x: (t1.x + t1.w + t2.x) / 2, y: GROUND_Y - 40,
        vx: 0, vy: -2, size: 1, color: '#fff', life: 1, decay: 0.015,
        type: 'text', text: ['SMASH!','CRUSHED!','STOMPED!'][Math.floor(Math.random() * 3)]
      });
      resetBattlePositions();
    } else {
      // Same height: bounce both back
      t1.x -= 8; t2.x += 8;
      screenShake = 4;
      playSound('landing', 3);
    }
  }

  // Screen shake & flash decay
  if (screenShake > 0) screenShake *= 0.85;
  if (flashTimer > 0) flashTimer--;

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (p.type === 'spark' || p.type === 'dust') p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawBattleArena() {
  const env = ENVIRONMENTS[0]; // desert background
  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, '#0a0020');
  skyGrad.addColorStop(0.5, '#1a0040');
  skyGrad.addColorStop(1, '#0f0c29');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137.5) % W;
    const sy = (i * 73.1) % (GROUND_Y - 50) + 10;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Arena ground
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  // Dirt oval
  ctx.fillStyle = '#4a3a2a';
  ctx.beginPath();
  ctx.ellipse(W / 2, GROUND_Y + 30, 350, 40, 0, 0, Math.PI * 2);
  ctx.fill();

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.moveTo(W / 2, GROUND_Y - 80);
  ctx.lineTo(W / 2, GROUND_Y + 60);
  ctx.stroke();
  ctx.setLineDash([]);

  // Crowd silhouettes along edges
  ctx.fillStyle = 'rgba(50,30,60,0.6)';
  for (let i = 0; i < 30; i++) {
    const cx = i * 28 + 5;
    const ch = 15 + Math.sin(i * 1.7) * 5;
    ctx.beginPath();
    ctx.arc(cx, GROUND_Y + 70, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(cx - 4, GROUND_Y + 70, 8, ch);
  }

  // Spotlights
  ctx.fillStyle = 'rgba(255,200,100,0.03)';
  ctx.beginPath();
  ctx.moveTo(200, 0); ctx.lineTo(100, GROUND_Y); ctx.lineTo(300, GROUND_Y);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(600, 0); ctx.lineTo(500, GROUND_Y); ctx.lineTo(700, GROUND_Y);
  ctx.fill();
}

function drawBattleHUD() {
  const p1c = TRUCK_ROSTER[player1.truckIdx];
  const p2c = TRUCK_ROSTER[player2.truckIdx];

  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 4;

  ctx.fillText('—', W / 2, 35);

  ctx.fillStyle = p2c.body;

  // Score dots (first to 5)
  for (let i = 0; i < battleWinScore; i++) {

  ctx.fillText(audioMuted ? '🔇' : '🔊', muteX, muteY + 4);

  ctx.textAlign = 'left';
}

function update() {
  // Always decay visual effects regardless of state
  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.1) screenShake = 0;
  if (flashTimer > 0) flashTimer--;

  // Skip all updates when paused or on results screens
  if (gameState === 'paused') return;
  if (gameState === 'gameover') return;
  if (gameState === 'levelcomplete') return;

  // Level transition timer
  if (gameState === 'leveltransition') {
    levelTransitionTimer--;
    if (levelTransitionTimer <= 0) startCountdown();
    return;
  }

  // Countdown
  if (gameState === 'countdown') {
    countdownTimer--;
    const prevSec = Math.ceil((countdownTimer + 1) / 60);
    const curSec = Math.ceil(countdownTimer / 60);
    if (curSec !== prevSec && curSec >= 0) {
      playSound('countdown', curSec === 0 ? 'GO' : curSec);
    }
    if (countdownTimer <= 0) startPlaying();
    return;
  }

  if (gameState !== 'playing') return;

  // Battle mode: completely different update loop
  if (gameMode === 'battle') { updateBattle(); return; }

  // Get highest player score for speed/spawning
  let maxScore = 0;
  for (const p of players) { if (p.score > maxScore) maxScore = p.score; }
  score = maxScore; // compat alias

  const effSpeed = getEffectiveSpeed();
  // Speed progression
  if (gameMode === 'rally') {
    const lvl = CAMPAIGN_LEVELS[campaignLevel] || CAMPAIGN_LEVELS[0];
    gameSpeed = Math.min(lvl.maxSpeed, lvl.baseSpeed + maxScore / lvl.speedRamp);

    // Campaign max speed detection
    if (!campaignMaxSpeedReached && gameSpeed >= lvl.maxSpeed) {
      campaignMaxSpeedReached = true;
      campaignCountdown = 3600; // 60 seconds at 60fps
      campaignMaxSpeedFlash = 1;
    }

    // Campaign 60s countdown at max speed
    if (campaignMaxSpeedReached && campaignCountdown > 0) {
      campaignCountdown--;
      campaignMaxSpeedFlash += 0.05;
      if (campaignCountdown <= 0) {
        // LEVEL COMPLETE!
        levelStats.score = maxScore;
        gameState = 'levelcomplete';
        stopEngine();
        stopBigAir();
        return;
      }
    }

    // Storm effects update
    if (ENVIRONMENTS[currentEnvIndex].features === 'storm') {
      // Rain
      for (const rd of raindrops) {
        rd.x -= effSpeed * 0.3;
        rd.y += rd.speed;
        if (rd.y > H) { rd.y = -10; rd.x = Math.random() * W; }
        if (rd.x < -10) rd.x = W + Math.random() * 50;
      }
      // Lightning
      if (lightningTimer > 0) lightningTimer--;
      if (lightningTimer <= 0) {
        lightningFlash = 6; // 6 frames of flash
        lightningTimer = 360 + Math.random() * 240;
        // Thunder rumble sound
        if (audioCtx && !audioMuted) {
          const t = audioCtx.currentTime;
          const bufSize = audioCtx.sampleRate * 0.2;
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
          const n = audioCtx.createBufferSource(); n.buffer = buf;
          const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 150;
          const g = audioCtx.createGain(); g.gain.value = 0.15;
          n.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
          n.start(t + 0.5); n.stop(t + 0.8);
        }
      }
      if (lightningFlash > 0) lightningFlash--;
    }
  }
  wheelAngle += effSpeed * 0.08;
  updateEngineSound();

  // Round timer for frenzy
  if (roundTimer > 0) {
    roundTimer--;
    if (roundTimer <= 0) {
      gameState = 'gameover';
      stopEngine();
      stopBigAir();
      return;
    }
  }

  // Environment progression (only in non-campaign modes)
  if (gameMode !== 'rally') {
  const newEnv = Math.floor(maxScore / 500) % ENVIRONMENTS.length;
  if (newEnv !== currentEnvIndex) {
    currentEnvIndex = newEnv;
    envAnnouncementText = ENVIRONMENTS[currentEnvIndex].name;
    envAnnouncementTimer = 120;
    envTransitionTimer = 30;
    flashTimer = 15; flashColor = '#fff';
  }
  if (envTransitionTimer > 0) envTransitionTimer--;
  if (envAnnouncementTimer > 0) envAnnouncementTimer--;
  } // end non-campaign env progression

  // Update each player
  for (const p of players) updatePlayer(p);

  // Screen shake & flash decay
  if (screenShake > 0) screenShake *= 0.85;
  if (flashTimer > 0) flashTimer--;

  // Spawn obstacles
  obstacleTimer--;
  if (obstacleTimer <= 0) {
    spawnObstacle();
    if (gameMode === 'frenzy' || gameMode === 'battle') {
      obstacleTimer = 20 + Math.random() * 20; // wall-to-wall cars!
    } else {
      if (gameMode === 'rally') {
        const lvl = CAMPAIGN_LEVELS[campaignLevel] || CAMPAIGN_LEVELS[0];
        obstacleTimer = lvl.obstGap * 0.5 + Math.random() * lvl.obstGap * 0.5 - Math.min(maxScore / 50, 30);
      } else {
        obstacleTimer = 80 + Math.random() * 70 - Math.min(maxScore / 50, 30);
      }
    }
  }

  // Spawn stars (rally only)
  if (gameMode === 'rally') {
    starTimer--;
    if (starTimer <= 0) { spawnStar(); starTimer = 50 + Math.random() * 40; }
  }

  // Spawn power-ups (rally + frenzy, not battle)
  if (gameMode === 'rally' || gameMode === 'frenzy') {
    powerUpSpawnTimer--;
    if (powerUpSpawnTimer <= 0) {
      spawnPowerUp();
      powerUpSpawnTimer = 200 + Math.random() * 100;
    }
  }

  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= effSpeed;
    if (obstacles[i].crushed) obstacles[i].crushAnim += 0.05;
    if (obstacles[i].x < -120) obstacles.splice(i, 1);
  }

  // Update stars
  for (let i = stars.length - 1; i >= 0; i--) {
    stars[i].x -= effSpeed;
    stars[i].bobPhase += 0.06;
    if (stars[i].x < -20 || stars[i].collected) stars.splice(i, 1);
  }

  // Update power-ups
  for (let i = powerUps.length - 1; i >= 0; i--) {
    powerUps[i].x -= effSpeed;
    powerUps[i].bobPhase += 0.06;
    if (powerUps[i].x < -30 || powerUps[i].collected) powerUps.splice(i, 1);
  }

  // Update particles (cap at 150)
  if (particles.length > 150) particles.splice(0, particles.length - 150);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx || 0; p.y += p.vy || 0;
    if (p.type === 'spark' || p.type === 'dust') p.vy += 0.2;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Dust trail
  if (dustTrail.length > 30) dustTrail.splice(0, dustTrail.length - 30);
  for (const p of players) {
    if (p.truck.grounded && Math.random() > 0.5) {
      dustTrail.push({ x: p.truck.x + 5, y: GROUND_Y + 8 + Math.random() * 4, size: 3 + Math.random() * 5, life: 1 });
    }
  }
  for (let i = dustTrail.length - 1; i >= 0; i--) {
    dustTrail[i].x -= effSpeed * 0.5;
    dustTrail[i].life -= 0.03;
    dustTrail[i].size += 0.1;
    if (dustTrail[i].life <= 0) dustTrail.splice(i, 1);
  }

  // Update bg (parallax — mountains slow, clouds slower)
  for (const c of bgClouds) { c.x -= c.speed; if (c.x < -c.w) c.x = W + 20; }
  for (const m of bgMountains) { m.x -= effSpeed * 0.1; if (m.x < -m.w) m.x = W + m.w; }

  // Track best scores
  for (const p of players) {
    const best = getBestScore(p.truckIdx);
    if (p.score > best) setBestScore(p.truckIdx, p.score);
  }
  if (maxScore > bestScore) { bestScore = maxScore; localStorage.setItem('monsterRallyBest', bestScore); }
}

function drawPlayerHUD(p, side) {
  const isLeft = side === 'left';
  const x = isLeft ? 20 : W - 170;
  const truckColors = TRUCK_ROSTER[p.truckIdx];

  // Player label in 2P mode
  if (numPlayers === 2) {
    ctx.fillStyle = truckColors.body;
    ctx.font = 'bold 12px Arial'; ctx.textAlign = isLeft ? 'left' : 'right';
    ctx.fillText(isLeft ? 'P1' : 'P2', isLeft ? x : x + 150, 18);
  }

  // Score with coin icon
  ctx.textAlign = isLeft ? 'left' : 'right';
  const scoreX = isLeft ? x : x + 150;
  const coinX = isLeft ? scoreX + 10 : scoreX - 10;
  ctx.save(); ctx.translate(coinX, 30); drawStarCoin(9); ctx.restore();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px "Arial Black", Impact, sans-serif';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
  const textX = isLeft ? scoreX + 24 : scoreX - 24;
  ctx.strokeText(p.score, textX, 38);
  ctx.fillText(p.score, textX, 38);

  // Combo
  if (p.combo > 1) {
    const ca = Math.min(1, p.comboTimer / 30);
    ctx.globalAlpha = ca;
    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 18px "Arial Black", Impact, sans-serif';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    const ct = p.combo + 'x COMBO!';
    ctx.strokeText(ct, scoreX, 60);
    ctx.fillText(ct, scoreX, 60);
    ctx.globalAlpha = 1;
  }

  // Power-up timer bar + icon
  if (p.activePowerUp) {
    const iconR = 12;
    const iconX = isLeft ? x + iconR : x + 150 - iconR;
    const barX = isLeft ? x + iconR * 2 + 4 : x + 60;
    const barW = 70;
    const pct = p.powerUpTimer / p.activePowerUp.duration;
    // Mini icon
    ctx.save(); ctx.translate(iconX, 74);
    drawPowerUpIcon(p.activePowerUp.effect, iconR);
    ctx.restore();
    // Timer bar
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.roundRect(barX, 69, barW, 10, 5); ctx.fill();
    ctx.fillStyle = p.activePowerUp.color;
    ctx.beginPath(); ctx.roundRect(barX, 69, barW * pct, 10, 5); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '8px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(p.activePowerUp.name, barX + barW / 2, 77);
  }

  ctx.textAlign = 'left';
}

  if (numPlayers === 1) {
    drawPlayerHUD(player1, 'left');
  } else {
    drawPlayerHUD(player1, 'left');
    drawPlayerHUD(player2, 'right');
    // Touch zone hint (first 5 seconds = ~300 frames)
    const maxScore = Math.max(player1.score, player2.score);
    if (maxScore < 15) {
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
      ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#fff'; ctx.font = '16px Arial'; ctx.textAlign = 'center';
      ctx.fillText('P1 TAP', W / 4, H / 2);
      ctx.fillText('P2 TAP', W * 3 / 4, H / 2);
      ctx.globalAlpha = 1;
    }
  }

  // Round timer for frenzy/battle
  if (roundTimer > 0) {

    ctx.textAlign = 'center';
    ctx.fillStyle = urgent ? '#ff4400' : '#fff';

    ctx.strokeText(secs + 's', W / 2, timerY);
    ctx.fillText(secs + 's', W / 2, timerY);
    // Mode label

    ctx.fillText(gameMode === 'battle' ? 'BATTLE' : 'CRUSH FRENZY', W / 2, 18);
    ctx.textAlign = 'left';
  }

  // Speed indicator (center-top, only in rally)
  if (gameMode === 'rally') {
  const speedPct = (gameSpeed - 1.6) / (maxSpeed - 1.6);

  ctx.fillStyle = '#fff'; ctx.font = '8px Arial'; ctx.textAlign = 'center';
  ctx.fillText('SPEED', W / 2, 18); ctx.textAlign = 'left';
  } // end rally speed indicator

  // Mute button
