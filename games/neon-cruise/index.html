<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Cruise — Simple Kids Games</title>
<meta name="description" content="Cruise endless neon highways. Collect coins, dodge traffic, unlock rides! A free, ad-free browser game for kids.">
<link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Baloo+2:wght@400;600;700;800&family=Bungee&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100dvh;
  overflow: hidden;
  background: #000;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* ── HUD ── */
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 8px 16px;
  pointer-events: none;
  z-index: 5;
  display: none;
}
#hud .hud-row {
  display: flex; justify-content: space-between; align-items: flex-start;
}
.hud-left, .hud-center, .hud-right {
  display: flex; flex-direction: column; align-items: center;
}
.hud-left { align-items: flex-start; }
.hud-right { align-items: flex-end; margin-right: 60px; }
.hud-dist {
  font-family: 'Bungee', cursive;
  font-size: clamp(18px, 4vw, 28px);
  color: #fff;
  text-shadow: 0 0 8px rgba(255,255,255,0.3);
}
.hud-speed {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(10px, 2vw, 14px);
  color: rgba(255,255,255,0.6);
}
.hud-coins {
  font-family: 'Bungee', cursive;
  font-size: clamp(14px, 3vw, 20px);
  color: #FFD700;
  text-shadow: 0 0 6px rgba(255,215,0,0.4);
}
.hud-lives {
  font-size: clamp(16px, 3vw, 22px);
  letter-spacing: 2px;
}

/* ── Settings / Pause (C&R verbatim) ── */
#settingsBtn {
  position: fixed;
  top: clamp(10px, 2vh, 20px);
  right: clamp(12px, 2.5vw, 20px);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: rgba(255,255,255,0.7);
  font-size: clamp(22px, 4vw, 30px);
  padding: 8px 12px;
  cursor: pointer;
  pointer-events: auto;
  z-index: 10;
  line-height: 1;
  display: none;
}
#settingsBtn:hover { background: rgba(255,255,255,0.18); color: #fff; }

#pauseMenu {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(11,14,24,0.85);
  backdrop-filter: blur(6px);
  z-index: 50;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(12px, 2.5vh, 20px);
  pointer-events: auto;
}
#pauseMenu.open { display: flex; }

.pause-title {
  font-family: 'Luckiest Guy', cursive;
  font-size: clamp(28px, 6vw, 44px);
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
  margin-bottom: clamp(8px, 2vh, 16px);
}

.pause-btn {
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: clamp(14px, 2.5vw, 20px);
  border: none;
  border-radius: 12px;
  padding: clamp(10px, 2vh, 16px) clamp(28px, 5vw, 48px);
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  min-width: clamp(180px, 40vw, 260px);
  display: block;
}
.pause-resume { background: #2E7D32; color: #fff; }
.pause-resume:hover { background: #388E3C; }
.pause-mute { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15); }
.pause-mute:hover { background: rgba(255,255,255,0.15); color: #fff; }
.pause-trophy { background: rgba(255,229,53,0.15); color: #FFE135; border: 1px solid rgba(255,229,53,0.25); }
.pause-trophy:hover { background: rgba(255,229,53,0.25); }
.pause-level { background: linear-gradient(135deg, #E67E22, #D35400); color: #fff; border: 1px solid #F0923E; box-shadow: 0 0 16px rgba(230,126,34,0.4), 0 4px 12px rgba(0,0,0,0.3); text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
.pause-level:hover { background: linear-gradient(135deg, #F08A30, #E05808); }
.pause-char { background: #1565C0; color: #fff; }
.pause-char:hover { background: #1976D2; }
.pause-menu { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
.pause-menu:hover { background: rgba(255,255,255,0.18); color: #fff; }

/* ── Screens (title, picker, gameover) ── */
.screen-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(5,5,15,0.92);
  backdrop-filter: blur(4px);
  z-index: 20;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(10px, 2vh, 18px);
  overflow-y: auto;
  padding: 20px;
}
.screen-overlay.active { display: flex; }

.screen-title {
  font-family: 'Luckiest Guy', cursive;
  font-size: clamp(32px, 8vw, 56px);
  text-align: center;
  line-height: 1.1;
}
.screen-subtitle {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(11px, 2vw, 15px);
  color: rgba(255,255,255,0.5);
}
.screen-stats {
  font-family: 'Bungee', cursive;
  font-size: clamp(14px, 3vw, 20px);
  color: #FFD700;
  text-align: center;
}
.screen-btn {
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: clamp(16px, 3vw, 22px);
  border: none;
  border-radius: 14px;
  padding: clamp(12px, 2.5vh, 18px) clamp(32px, 6vw, 56px);
  cursor: pointer;
  min-width: clamp(200px, 45vw, 280px);
  text-align: center;
  transition: transform 0.1s;
}
.screen-btn:active { transform: scale(0.96); }
.btn-primary { color: #fff; }
.btn-secondary { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.15); }
.btn-secondary:hover { background: rgba(255,255,255,0.18); color: #fff; }

/* ── Picker cards ── */
.picker-grid {
  display: flex; gap: 14px; flex-wrap: wrap;
  justify-content: center;
  max-width: 700px;
}
.picker-card {
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px;
  width: clamp(140px, 28vw, 200px);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
}
.picker-card:active { transform: scale(0.96); }
.picker-card.selected { border-color: #4CAF50; box-shadow: 0 0 16px rgba(76,175,80,0.3); }
.picker-card.locked { opacity: 0.5; cursor: default; }
.picker-card canvas { border-radius: 8px; }
.picker-name {
  font-family: 'Luckiest Guy', cursive;
  font-size: clamp(13px, 2.5vw, 17px);
  color: #fff;
  text-align: center;
}
.picker-hint {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(9px, 1.5vw, 12px);
  color: rgba(255,255,255,0.4);
  text-align: center;
}
.stat-bar-wrap {
  width: 100%; display: flex; align-items: center; gap: 6px;
}
.stat-label {
  font-family: 'Baloo 2', cursive;
  font-size: 10px; color: rgba(255,255,255,0.5);
  min-width: 50px;
}
.stat-bar {
  flex: 1; height: 6px; background: rgba(255,255,255,0.1);
  border-radius: 3px; overflow: hidden;
}
.stat-fill { height: 100%; border-radius: 3px; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #FFE135;
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: 16px;
  padding: 10px 24px;
  border-radius: 10px;
  border: 1px solid rgba(255,229,53,0.3);
  z-index: 100;
  display: none;
  pointer-events: none;
}
#toast.show { display: block; animation: toastIn 0.3s ease-out; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ── Unlock toast ── */
#unlockToast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9);
  border: 2px solid #FFD700;
  border-radius: 16px;
  padding: 20px 32px;
  z-index: 60;
  text-align: center;
  display: none;
}
#unlockToast.show { display: block; animation: toastIn 0.4s ease-out; }
.unlock-icon { font-size: 40px; }
.unlock-text {
  font-family: 'Luckiest Guy', cursive;
  font-size: 22px;
  color: #FFD700;
  margin-top: 8px;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-row">
    <div class="hud-left">
      <div class="hud-dist" id="hudDist">0 m</div>
      <div class="hud-speed" id="hudSpeed">0 km/h</div>
    </div>
    <div class="hud-center">
      <div class="hud-coins" id="hudCoins">0</div>
    </div>
    <div class="hud-right">
      <div class="hud-lives" id="hudLives"></div>
    </div>
  </div>
</div>

<!-- Settings gear (C&R verbatim) -->
<button id="settingsBtn" onclick="togglePauseMenu()">⚙️</button>

<!-- Pause menu (C&R verbatim, 6 buttons for Neon Cruise) -->
<div id="pauseMenu">
  <div class="pause-title">PAUSED</div>
  <button class="pause-btn pause-resume" onclick="togglePauseMenu()">▶ RESUME</button>
  <button class="pause-btn pause-mute" id="pauseMuteBtn">🔊 SOUND: ON</button>
  <button class="pause-btn pause-trophy" onclick="showComingSoonToast()">🏆 TROPHIES</button>
  <button class="pause-btn pause-level" onclick="pauseChangeWorld()">🌍 CHANGE WORLD</button>
  <button class="pause-btn pause-char" onclick="pauseChangeVehicle()">🚗 CHANGE VEHICLE</button>
  <a href="/" class="pause-btn pause-menu">🏠 MENU</a>
</div>

<!-- Title screen -->
<div class="screen-overlay active" id="titleScreen">
  <div class="screen-title" id="titleLogo">
    <span style="color:#FFD700">NEON</span> <span id="titleAccent">CRUISE</span>
  </div>
  <div class="screen-subtitle">v0.1 PREVIEW</div>
  <div class="screen-stats" id="titleStats"></div>
  <button class="screen-btn btn-primary" id="btnPlay" onclick="startGame()">PLAY</button>
  <button class="screen-btn btn-secondary" onclick="openVehiclePicker()">🚗 VEHICLE</button>
  <button class="screen-btn btn-secondary" onclick="openWorldPicker()">🌍 WORLD</button>
  <button class="screen-btn btn-secondary" onclick="window.location.href='/'">🏠 MENU</button>
</div>

<!-- Vehicle picker -->
<div class="screen-overlay" id="vehiclePicker">
  <div class="screen-title" style="font-size:clamp(24px,5vw,36px);color:#fff;">CHOOSE VEHICLE</div>
  <div class="picker-grid" id="vehicleGrid"></div>
  <button class="screen-btn btn-secondary" onclick="closePicker('vehiclePicker')">← BACK</button>
</div>

<!-- World picker -->
<div class="screen-overlay" id="worldPicker">
  <div class="screen-title" style="font-size:clamp(24px,5vw,36px);color:#fff;">CHOOSE WORLD</div>
  <div class="picker-grid" id="worldGrid"></div>
  <button class="screen-btn btn-secondary" onclick="closePicker('worldPicker')">← BACK</button>
</div>

<!-- Game over -->
<div class="screen-overlay" id="gameOverScreen">
  <div class="screen-title" style="font-size:clamp(24px,6vw,40px);color:#FF4444;">RUN ENDED</div>
  <div class="screen-stats" id="goStats"></div>
  <div id="goNewHigh" style="display:none;font-family:'Luckiest Guy',cursive;font-size:20px;color:#FFD700;text-shadow:0 0 12px rgba(255,215,0,0.5);">⭐ NEW HIGH SCORE! ⭐</div>
  <button class="screen-btn btn-primary" id="btnPlayAgain" onclick="startGame()">PLAY AGAIN</button>
  <button class="screen-btn btn-secondary" onclick="openVehiclePicker()">🚗 CHANGE VEHICLE</button>
  <button class="screen-btn btn-secondary" onclick="openWorldPicker()">🌍 CHANGE WORLD</button>
  <button class="screen-btn btn-secondary" onclick="showTitle()">🏠 TITLE</button>
</div>

<!-- Toast -->
<div id="toast"></div>
<div id="unlockToast"><div class="unlock-icon">🔓</div><div class="unlock-text" id="unlockName"></div></div>

<script>
// ============================================================
// NEON CRUISE — v0.1 MVP
// ============================================================

// ── Canvas setup ──
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resizeCanvas() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Game state (declared early to avoid TDZ) ──
let gameState = 'title'; // title | playing | paused | gameover
let paused = false;
let animId = null;
let lastTime = 0;

// ── Persistence ──
function safeSave(k, v) { try { localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v)); } catch(e) {} }
function safeLoad(k, def) { try { const v = localStorage.getItem(k); return v !== null ? v : def; } catch(e) { return def; } }

let save = {
  highDistance: 0,
  totalCoins: 0,
  totalDistanceEver: 0,
  unlockedVehicles: ['road-runner'],
  unlockedWorlds: ['sunset-coast'],
  selectedVehicle: 'road-runner',
  selectedWorld: 'sunset-coast',
  soundOn: true,
};

function loadSave() {
  try {
    const raw = safeLoad('nc_save', null);
    if (raw) {
      const d = JSON.parse(raw);
      Object.assign(save, d);
    }
  } catch(e) {}
}
function writeSave() { safeSave('nc_save', save); }
loadSave();

// ── Audio ──
let audioCtx = null;
let masterGain = null;
let soundOn = save.soundOn;
let engineOsc = null;
let engineGain = null;
let engineRunning = false;

function initAudio() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = soundOn ? 0.5 : 0;
    masterGain.connect(audioCtx.destination);
  } catch(e) {}
}

function playTone(freq, dur, type, vol) {
  if (!audioCtx || !soundOn) return;
  try {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime((vol || 0.15) * 0.5, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playCoinSound() {
  if (!audioCtx || !soundOn) return;
  try {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, audioCtx.currentTime); // C5
    osc.frequency.exponentialRampToValueAtTime(659, audioCtx.currentTime + 0.08); // E5
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
  } catch(e) {}
}

function playCrashSound() {
  if (!audioCtx || !soundOn) return;
  try {
    // Descending square wave honk
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(220, audioCtx.currentTime); // A3
    osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.4); // A2
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
    // Noise burst
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
    const noise = audioCtx.createBufferSource();
    const ng = audioCtx.createGain();
    noise.buffer = buf;
    ng.gain.setValueAtTime(0.1, audioCtx.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    noise.connect(ng);
    ng.connect(masterGain);
    noise.start();
  } catch(e) {}
}

function playUIClick() { playTone(800, 0.03, 'square', 0.08); }

function startEngine() {
  if (!audioCtx || !soundOn || engineRunning) return;
  try {
    engineOsc = audioCtx.createOscillator();
    engineGain = audioCtx.createGain();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 80;
    engineGain.gain.value = 0.04;
    engineOsc.connect(engineGain);
    engineGain.connect(masterGain);
    engineOsc.start();
    engineRunning = true;
  } catch(e) {}
}

function stopEngine() {
  if (engineOsc) { try { engineOsc.stop(); } catch(e) {} engineOsc = null; }
  engineGain = null;
  engineRunning = false;
}

function updateEngine(speed) {
  if (!engineOsc || !engineGain) return;
  // Pitch: 60 at idle → 140 at max speed
  engineOsc.frequency.value = 60 + speed * 80;
  engineGain.gain.value = 0.02 + speed * 0.04;
}

function toggleMute() {
  soundOn = !soundOn;
  save.soundOn = soundOn;
  writeSave();
  if (masterGain) masterGain.gain.value = soundOn ? 0.5 : 0;
  if (!soundOn) stopEngine();
  else if (gameState === 'playing') startEngine();
}

function toggleMuteBtn() {
  initAudio();
  toggleMute();
  const btn = document.getElementById('pauseMuteBtn');
  if (btn) btn.textContent = soundOn ? '🔊 SOUND: ON' : '🔇 SOUND: OFF';
}

// ============================================================
// WORLD CONFIGS
// ============================================================
const WORLDS = [
  {
    id: 'sunset-coast',
    name: 'Sunset Coast',
    unlock: { type: 'free' },
    sky: 'sunset-coast',
    sun: 'sunset-coast',
    horizon: { type: 'ocean' },
    roadside: { left: { sprite: 'palm', density: 0.25 }, right: { sprite: 'palm', density: 0.25 } },
    road: { asphalt: ['#2A2428', '#332B30'], stripe: '#FFFFFF', shoulder: '#6B5A4F' },
    accent: '#FF7A5C',
  },
  {
    id: 'neon-city',
    name: 'Neon City',
    unlock: { type: 'distance', threshold: 3000 },
    sky: 'neon-city',
    sun: 'neon-city',
    horizon: { type: 'city', color: '#1B0A3A', windows: '#FF2E88' },
    roadside: { gridFloor: true, gridColor: '#FF2E88', gridSpacing: 80 },
    road: { asphalt: ['#0A0418', '#15082A'], stripe: '#00F0FF', shoulder: '#FF2E88' },
    accent: '#FF2E88',
  },
  {
    id: 'desert-run',
    name: 'Desert Run',
    unlock: { type: 'coins', threshold: 250 },
    sky: 'desert-run',
    sun: 'desert-run',
    horizon: { type: 'mesa', color: '#4A1418', highlight: '#7A2A1C' },
    roadside: { left: { sprite: 'cactus', density: 0.18 }, right: { sprite: 'cactus', density: 0.18 } },
    road: { asphalt: ['#3A2A24', '#453028'], stripe: '#F0D88C', shoulder: '#8A5A3A' },
    accent: '#FF7A3C',
  },
];

// ── Neon City stars (pre-generated) ──
const neonStars = [];
for (let i = 0; i < 120; i++) neonStars.push({ x: Math.random(), y: Math.random() * 0.35, size: 0.5 + Math.random() * 1.5, twinkle: Math.random() * Math.PI * 2 });

// ============================================================
// VEHICLE CONFIGS
// ============================================================
const VEHICLES = [
  {
    id: 'road-runner',
    name: 'Road Runner',
    unlock: { type: 'free' },
    stats: { speed: 0.85, handling: 0.95 },
    body: { color1: '#4488cc', color2: '#2266aa', color3: '#1a5588' },
    features: { stripe: 'white', spoiler: false, wide: false, tall: false, roof: 'luggage' },
  },
  {
    id: 'sunset-fury',
    name: 'Sunset Fury',
    unlock: { type: 'distance', threshold: 2000 },
    stats: { speed: 1.00, handling: 0.80 },
    body: { color1: '#ff4422', color2: '#cc2211', color3: '#881100' },
    features: { stripe: null, spoiler: true, wide: true, tall: false, roof: null },
  },
  {
    id: 'lil-kart',
    name: 'Lil Kart',
    unlock: { type: 'coins', threshold: 500 },
    stats: { speed: 0.70, handling: 1.00 },
    body: { color1: '#ff6633', color2: '#dd4422', color3: '#bb3311' },
    features: { stripe: 'white', spoiler: false, wide: false, tall: false, roof: null, kart: true },
  },
];

// ============================================================
// VEHICLE DRAW FUNCTION (unified, mockup-ported)
// ============================================================
function drawVehicle(ctx, cx, cy, veh, sc, lean) {
  lean = lean || 0;
  const b = veh.body;
  const f = veh.features;
  const isKart = f.kart;
  const isWide = f.wide;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);

  // Body width/height
  const bw = isWide ? 52 : (isKart ? 28 : 44);
  const bh = isKart ? 16 : 24;

  // Underglow
  const uglow = ctx.createRadialGradient(lean, 8, 0, lean, 8, bw * 1.4);
  uglow.addColorStop(0, b.color1 + '44');
  uglow.addColorStop(1, 'transparent');
  ctx.fillStyle = uglow;
  ctx.beginPath(); ctx.ellipse(lean, 8, bw * 1.4, 10, 0, 0, Math.PI * 2); ctx.fill();

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(lean, 6, bw * 0.9, 5, 0, 0, Math.PI * 2); ctx.fill();

  // Wheels
  const wheelW = isKart ? 12 : 14;
  const wheelH = isKart ? 10 : 10;
  const wheelX = isKart ? 26 : (isWide ? 36 : 32);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(-wheelX + lean, 4, wheelW, wheelH, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(wheelX + lean, 4, wheelW, wheelH, 0, 0, Math.PI * 2); ctx.fill();
  // Hubcaps
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.ellipse(-wheelX + lean, 4, wheelW * 0.5, wheelH * 0.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(wheelX + lean, 4, wheelW * 0.5, wheelH * 0.5, 0, 0, Math.PI * 2); ctx.fill();

  if (isKart) {
    // Kart: open body with roll bar
    ctx.fillStyle = b.color1;
    ctx.beginPath(); ctx.roundRect(-bw + lean, -bh - 2, bw * 2, bh + 2, 5); ctx.fill();
    // Stripe
    if (f.stripe) {
      ctx.fillStyle = f.stripe === 'white' ? '#fff' : '#111';
      ctx.fillRect(-4 + lean, -bh - 2, 8, bh + 2);
    }
    // Roll bar
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-bw * 0.8 + lean, -bh - 2);
    ctx.quadraticCurveTo(lean * 0.5, -bh - 18, bw * 0.8 + lean, -bh - 2);
    ctx.stroke();
    // Helmet + head
    ctx.fillStyle = '#FFD4A8';
    ctx.beginPath(); ctx.arc(lean * 0.5, -bh - 12, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = b.color1;
    ctx.beginPath(); ctx.arc(lean * 0.5, -bh - 14, 6, Math.PI, 0); ctx.fill();
    // Number 7
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('7', lean * 0.5, -bh + 8);
  } else {
    // Normal car / muscle car body
    const bodyGrad = ctx.createLinearGradient(0, -bh - 4, 0, 4);
    bodyGrad.addColorStop(0, b.color1);
    bodyGrad.addColorStop(0.5, b.color2);
    bodyGrad.addColorStop(1, b.color3);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-bw + lean, 0);
    ctx.lineTo(-bw + 5 + lean, -bh + 4);
    ctx.lineTo(-bw * 0.45 + lean * 0.5, -bh - 4);
    ctx.lineTo(bw * 0.45 + lean * 0.5, -bh - 4);
    ctx.lineTo(bw - 5 + lean, -bh + 4);
    ctx.lineTo(bw + lean, 0);
    ctx.closePath();
    ctx.fill();

    // Chrome bumper
    ctx.fillStyle = '#ccc';
    ctx.fillRect(-bw * 0.7 + lean, -1, bw * 1.4, 2);

    // Windshield
    ctx.fillStyle = 'rgba(100,200,255,0.25)';
    ctx.beginPath();
    ctx.moveTo(-bw * 0.4 + lean * 0.5, -bh - 2);
    ctx.lineTo(bw * 0.4 + lean * 0.5, -bh - 2);
    ctx.lineTo(bw * 0.5 + lean * 0.6, -bh + 6);
    ctx.lineTo(-bw * 0.5 + lean * 0.6, -bh + 6);
    ctx.closePath();
    ctx.fill();

    // Racing stripe
    if (f.stripe) {
      ctx.strokeStyle = f.stripe === 'white' ? '#fff' : '#111';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(lean * 0.5, -bh - 4);
      ctx.lineTo(lean, 0);
      ctx.stroke();
    }

    // Spoiler (Sunset Fury)
    if (f.spoiler) {
      ctx.fillStyle = b.color3;
      ctx.fillRect(-bw * 0.35 + lean * 0.5, -bh - 8, bw * 0.7, 3);
      ctx.fillRect(-4 + lean * 0.5, -bh - 5, 3, 4);
      ctx.fillRect(1 + lean * 0.5, -bh - 5, 3, 4);
    }

    // Roof accessory: luggage rack
    if (f.roof === 'luggage') {
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-12 + lean * 0.5, -bh - 1, 24, 6);
      ctx.fillStyle = '#665544';
      ctx.fillRect(-10 + lean * 0.5, -bh, 20, 4);
    }

    // Tail lights with glow
    ctx.save();
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ff2222';
    ctx.fillRect(-bw + 4 + lean, -6, 8, 4);
    ctx.fillRect(bw - 12 + lean, -6, 8, 4);
    ctx.restore();

    // Neon side underglow edge
    ctx.strokeStyle = b.color1 + '88';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-bw + lean, 0); ctx.lineTo(bw + lean, 0); ctx.stroke();
  }

  ctx.restore();
}

const NPC_DRAWS = [drawNPCSedan, drawNPCTruck, drawNPCVan];
const NPC_COLORS = ['#E53935', '#43A047', '#1E88E5', '#FB8C00', '#8E24AA', '#00ACC1', '#FFB300', '#78909C'];

// ============================================================
// ROAD ENGINE
// ============================================================
const RENDER = {
  fieldOfView: 100,
  cameraHeight: 1000,
  cameraDepth: 1 / Math.tan((100 / 2) * Math.PI / 180),
  drawDistance: 300,
  fogDensity: 5,
  segmentLength: 200,
  rumbleLength: 3,
  roadWidth: 2000,
  lanes: 3,
};

// Per-world segment color tables (LIGHT/DARK alternating)
const COLORS = {
  'sunset-coast': {
    LIGHT: { road: '#332B30', grass: '#6B5A4F', rumble: '#FFFFFF', lane: '#FFFFFF' },
    DARK:  { road: '#2A2428', grass: '#5E4E44', rumble: '#FFFFFF', lane: null },
  },
  'neon-city': {
    LIGHT: { road: '#15082A', grass: '#0A041A', rumble: '#FF2E88', lane: '#00F0FF' },
    DARK:  { road: '#0A0418', grass: '#05020F', rumble: '#FF2E88', lane: null },
  },
  'desert-run': {
    LIGHT: { road: '#453028', grass: '#8A5A3A', rumble: '#F0D88C', lane: '#F0D88C' },
    DARK:  { road: '#3A2A24', grass: '#7A4E32', rumble: '#F0D88C', lane: null },
  },
};

const TOTAL_SEGMENTS = 500;
let segments = [];

function buildSegments(worldId) {
  segments = [];
  const colorSet = COLORS[worldId] || COLORS['sunset-coast'];
  for (let i = 0; i < TOTAL_SEGMENTS; i++) {
    segments.push({
      index: i,
      p1: { world: { x: 0, y: 0, z: i * RENDER.segmentLength }, camera: {}, screen: {} },
      p2: { world: { x: 0, y: 0, z: (i + 1) * RENDER.segmentLength }, camera: {}, screen: {} },
      curve: 0,
      colors: (Math.floor(i / RENDER.rumbleLength) % 2) ? colorSet.DARK : colorSet.LIGHT,
    });
  }
}
buildSegments(save.selectedWorld || 'sunset-coast');

function project(p, cameraX, cameraY, cameraZ, cameraDepth, width, height, roadWidth) {
  p.camera.x = (p.world.x || 0) - cameraX;
  p.camera.y = (p.world.y || 0) - cameraY;
  p.camera.z = (p.world.z || 0) - cameraZ;
  if (p.camera.z <= 0) { p.screen.scale = 0; p.screen.x = 0; p.screen.y = 0; p.screen.w = 0; return; }
  p.screen.scale = cameraDepth / p.camera.z;
  p.screen.x = Math.round((width / 2) + (p.screen.scale * p.camera.x * width / 2));
  p.screen.y = Math.round((height / 2) - (p.screen.scale * p.camera.y * height / 2));
  p.screen.w = Math.round(p.screen.scale * roadWidth * width / 2);
}

function drawPolygon(ctx, x1, y1, x2, y2, x3, y3, x4, y4, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.lineTo(x4, y4);
  ctx.closePath();
  ctx.fill();
}

function renderSegment(ctx, width, lanes, x1, y1, w1, x2, y2, w2, fog, colors) {
  const r1 = Math.max(6, Math.floor(w1 / Math.max(6, 2 * lanes)));
  const r2 = Math.max(6, Math.floor(w2 / Math.max(6, 2 * lanes)));
  const l1 = Math.max(1, Math.floor(w1 / Math.max(32, 8 * lanes)));
  const l2 = Math.max(1, Math.floor(w2 / Math.max(32, 8 * lanes)));

  // Grass fill
  ctx.fillStyle = colors.grass;
  ctx.fillRect(0, y2, width, y1 - y2);

  // Rumble strips
  drawPolygon(ctx, x1 - w1 - r1, y1, x1 - w1, y1, x2 - w2, y2, x2 - w2 - r2, y2, colors.rumble);
  drawPolygon(ctx, x1 + w1 + r1, y1, x1 + w1, y1, x2 + w2, y2, x2 + w2 + r2, y2, colors.rumble);

  // Road surface
  drawPolygon(ctx, x1 - w1, y1, x1 + w1, y1, x2 + w2, y2, x2 - w2, y2, colors.road);

  // Lane markers
  if (colors.lane) {
    const lw1 = (w1 * 2) / lanes;
    const lw2 = (w2 * 2) / lanes;
    let lx1 = x1 - w1 + lw1;
    let lx2 = x2 - w2 + lw2;
    for (let lane = 1; lane < lanes; lane++, lx1 += lw1, lx2 += lw2) {
      drawPolygon(ctx, lx1 - l1 / 2, y1, lx1 + l1 / 2, y1, lx2 + l2 / 2, y2, lx2 - l2 / 2, y2, colors.lane);
    }
  }

  // Fog overlay
  if (fog < 1) {
    ctx.fillStyle = 'rgba(0,0,0,' + ((1 - fog) * 0.35) + ')';
    ctx.fillRect(0, y2, width, y1 - y2);
  }
}

function interpolate(a, b, percent) { return a + (b - a) * percent; }
function exponentialFog(distance, density) { return 1 / Math.pow(Math.E, distance * distance * density); }
function findSegment(z) { return segments[Math.floor(z / RENDER.segmentLength) % segments.length]; }

// ============================================================
// PLAYER STATE
// ============================================================
let player = {
  x: 0,       // -1..1 lateral position
  z: 0,       // distance traveled
  speed: 0,   // 0..1 normalized speed
  lives: 3,
  coins: 0,
  distance: 0,
  steering: 0, // -1..1 current lateral velocity
  spinout: 0,  // >0 means in spinout animation
  spinAngle: 0,
  invincible: 0,
};

// ── NPC / Coin pools ──
let npcs = [];
let coins = [];
let particles = [];
let nextNPCZ = 2000;
let nextCoinZ = 1500;

function resetPlayer() {
  player.x = 0;
  player.z = 0;
  player.speed = 0;
  player.lives = 3;
  player.coins = 0;
  player.distance = 0;
  player.steering = 0;
  player.spinout = 0;
  player.spinAngle = 0;
  player.invincible = 0;
  npcs = [];
  coins = [];
  particles = [];
  nextNPCZ = player.z + 2000;
  nextCoinZ = player.z + 1500;
}

// ============================================================
// GAME LOGIC
// ============================================================
function getWorld() { return WORLDS.find(w => w.id === save.selectedWorld) || WORLDS[0]; }
function getVehicle() { return VEHICLES.find(v => v.id === save.selectedVehicle) || VEHICLES[0]; }

function update(dt) {
  if (player.spinout > 0) {
    player.spinout -= dt;
    player.spinAngle += dt * 15;
    player.speed = Math.max(0, player.speed - dt * 2);
    if (player.spinout <= 0) {
      player.spinout = 0;
      player.spinAngle = 0;
      player.invincible = 1.5;
    }
    // Still advance slowly
    player.z += player.speed * 300 * dt;
    player.distance = player.z / 100;
    updateHUD();
    updateParticles(dt);
    return;
  }

  if (player.invincible > 0) player.invincible -= dt;

  const veh = getVehicle();
  const topSpeed = veh.stats.speed;
  const handling = veh.stats.handling;

  // Accelerate
  player.speed = Math.min(topSpeed, player.speed + dt * 0.25);

  // Steering — smooth decay toward 0 when no input
  const steerForce = handling * 2.0;
  if (steerLeft) player.steering = Math.max(-1, player.steering - steerForce * dt);
  else if (steerRight) player.steering = Math.min(1, player.steering + steerForce * dt);
  else player.steering *= (1 - 3 * dt); // decay

  player.x += player.steering * dt * 1.2;
  player.x = Math.max(-1.2, Math.min(1.2, player.x));

  // If off-road, slow down
  if (Math.abs(player.x) > 0.9) {
    player.speed *= (1 - dt * 0.8);
  }

  // Advance
  const moveZ = player.speed * 600 * dt;
  player.z += moveZ;
  player.distance = player.z / 100;

  // Update engine pitch
  updateEngine(player.speed / topSpeed);

  // Spawn NPCs
  while (nextNPCZ < player.z + 6000) {
    const lane = (Math.floor(Math.random() * 3) - 1) * 0.6; // -0.6, 0, 0.6
    npcs.push({
      z: nextNPCZ,
      x: lane,
      speed: 0.3 + Math.random() * 0.3,
      drawFn: NPC_DRAWS[Math.floor(Math.random() * 3)],
      color: NPC_COLORS[Math.floor(Math.random() * NPC_COLORS.length)],
    });
    nextNPCZ += 800 + Math.random() * 600;
  }

  // Spawn coins
  while (nextCoinZ < player.z + 5000) {
    const lane = (Math.floor(Math.random() * 3) - 1) * 0.5;
    coins.push({
      z: nextCoinZ,
      x: lane,
      collected: false,
    });
    nextCoinZ += 200 + Math.random() * 150;
  }

  // Update NPCs
  for (let i = npcs.length - 1; i >= 0; i--) {
    const npc = npcs[i];
    npc.z += npc.speed * 300 * dt;
    if (npc.z < player.z - 400) { npcs.splice(i, 1); continue; }

    // Collision check
    if (player.invincible <= 0 && player.spinout <= 0) {
      const dz = Math.abs(npc.z - player.z);
      const dx = Math.abs(npc.x - player.x);
      if (dz < 120 && dx < 0.35) {
        // CRASH!
        player.lives--;
        player.spinout = 0.8;
        player.spinAngle = 0;
        playCrashSound();
        // Star burst particles
        for (let j = 0; j < 8; j++) {
          const angle = (j / 8) * Math.PI * 2;
          particles.push({
            x: W / 2, y: H * 0.7,
            vx: Math.cos(angle) * 200,
            vy: Math.sin(angle) * 200 - 100,
            life: 0.6,
            color: '#FFD700',
            size: 4,
          });
        }
        npcs.splice(i, 1);
        if (player.lives <= 0) {
          endGame();
          return;
        }
        break;
      }
    }
  }

  // Update coins
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    if (c.z < player.z - 200) { coins.splice(i, 1); continue; }
    if (!c.collected) {
      const dz = Math.abs(c.z - player.z);
      const dx = Math.abs(c.x - player.x);
      if (dz < 100 && dx < 0.4) {
        c.collected = true;
        player.coins++;
        playCoinSound();
        coins.splice(i, 1);
      }
    }
  }

  updateParticles(dt);
  updateHUD();
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 400 * dt; // gravity
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateHUD() {
  const dist = player.distance;
  document.getElementById('hudDist').textContent = dist >= 1000 ? (dist / 1000).toFixed(1) + ' km' : Math.floor(dist) + ' m';
  document.getElementById('hudSpeed').textContent = Math.floor(player.speed * 200) + ' km/h';
  document.getElementById('hudCoins').textContent = '🪙 ' + player.coins;
  let hearts = '';
  for (let i = 0; i < 3; i++) hearts += i < player.lives ? '❤️' : '🖤';
  document.getElementById('hudLives').textContent = hearts;
}

// ============================================================
// RENDERING (mockup-ported sky, sun, horizon)
// ============================================================
const HORIZON_Y_FRAC = 0.48;

function drawSky(world) {
  const skyH = H * HORIZON_Y_FRAC;
  const grad = ctx.createLinearGradient(0, 0, 0, skyH);
  const now = Date.now() * 0.001;

  if (world.id === 'sunset-coast') {
    grad.addColorStop(0.00, '#1a3a6a');
    grad.addColorStop(0.25, '#3366aa');
    grad.addColorStop(0.45, '#5588cc');
    grad.addColorStop(0.60, '#ee8844');
    grad.addColorStop(0.75, '#ff9944');
    grad.addColorStop(0.88, '#ffcc66');
    grad.addColorStop(1.00, '#ffddaa');
  } else if (world.id === 'neon-city') {
    grad.addColorStop(0.00, '#0a0028');
    grad.addColorStop(0.30, '#1a0044');
    grad.addColorStop(0.60, '#3d0066');
    grad.addColorStop(0.85, '#cc3388');
    grad.addColorStop(1.00, '#ff6633');
  } else {
    // Desert Run
    grad.addColorStop(0.00, '#4a1a10');
    grad.addColorStop(0.30, '#a0381e');
    grad.addColorStop(0.60, '#d85a28');
    grad.addColorStop(0.85, '#ff8844');
    grad.addColorStop(1.00, '#ffb870');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, skyH);

  // Neon City: 120 twinkling stars
  if (world.id === 'neon-city') {
    for (const s of neonStars) {
      const alpha = 0.4 + 0.6 * Math.abs(Math.sin(now + s.twinkle));
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fillRect(s.x * W, s.y * H, s.size, s.size);
    }
  }
}

function drawSun(world) {
  const horizonY = H * HORIZON_Y_FRAC;

  if (world.id === 'sunset-coast') {
    const sunR = Math.min(W, H) * 0.14;
    const sunX = W * 0.7;
    const sunY = horizonY - sunR * 0.6;
    // Warm ambient glow
    const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.2, sunX, sunY, sunR * 3);
    glow.addColorStop(0.0, 'rgba(255,220,100,0.5)');
    glow.addColorStop(0.3, 'rgba(255,150,50,0.2)');
    glow.addColorStop(1.0, 'rgba(255,100,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, horizonY + 20);
    // Sun disc — 4-stop radial
    const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
    sunGrad.addColorStop(0.0, '#ffffee');
    sunGrad.addColorStop(0.3, '#ffee66');
    sunGrad.addColorStop(0.7, '#ffaa33');
    sunGrad.addColorStop(1.0, '#ff6622');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
    ctx.fill();

  } else if (world.id === 'neon-city') {
    const sunR = Math.min(W, H) * 0.18;
    const sunX = W * 0.5;
    const sunY = horizonY - sunR * 0.15;
    // Glow
    const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.3, sunX, sunY, sunR * 2);
    glow.addColorStop(0.0, 'rgba(255,150,50,0.3)');
    glow.addColorStop(0.5, 'rgba(255,50,100,0.1)');
    glow.addColorStop(1.0, 'rgba(255,50,100,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, horizonY - sunR * 2.5, W, sunR * 3);
    // Sun body: clip, vertical gradient, 7-stripe lower half
    ctx.save();
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
    ctx.clip();
    const sunGrad = ctx.createLinearGradient(sunX, sunY - sunR, sunX, sunY + sunR);
    sunGrad.addColorStop(0.0, '#ffee00');
    sunGrad.addColorStop(0.3, '#ffaa00');
    sunGrad.addColorStop(0.6, '#ff6644');
    sunGrad.addColorStop(1.0, '#ff2288');
    ctx.fillStyle = sunGrad;
    ctx.fillRect(sunX - sunR, sunY - sunR, sunR * 2, sunR * 2);
    // 7 stripes in lower half
    ctx.fillStyle = 'rgba(10,0,20,0.9)';
    for (let i = 0; i < 7; i++) {
      const frac = (i + 1) / 8;
      const sy = sunY - sunR + frac * sunR * 2;
      const gap = 2 + i * 1.5;
      if (sy > sunY) {
        ctx.fillRect(sunX - sunR, sy - gap / 2, sunR * 2, gap);
      }
    }
    ctx.restore();

  } else {
    // Desert Run
    const sunR = Math.min(W, H) * 0.10;
    const sunX = W * 0.30;
    const sunY = horizonY - sunR * 0.4;
    // Glow
    const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.2, sunX, sunY, sunR * 2.5);
    glow.addColorStop(0.0, 'rgba(255,220,100,0.4)');
    glow.addColorStop(0.4, 'rgba(255,150,50,0.15)');
    glow.addColorStop(1.0, 'rgba(255,100,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, horizonY + 10);
    // Sun disc
    const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
    sunGrad.addColorStop(0.0, '#fff8e0');
    sunGrad.addColorStop(0.3, '#ffdc88');
    sunGrad.addColorStop(0.7, '#ffa050');
    sunGrad.addColorStop(1.0, '#ff6428');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawLensFlare() {
  const sunX = W * 0.7;
  const horizonY = H * HORIZON_Y_FRAC;
  const sunR = Math.min(W, H) * 0.14;
  const sunY = horizonY - sunR * 0.6;
  const flarePoints = [0.2, 0.4, 0.6, 0.8];
  const targetX = W * 0.3, targetY = H * 0.7;
  for (const f of flarePoints) {
    const fx = sunX + (targetX - sunX) * f;
    const fy = sunY + (targetY - sunY) * f;
    const fr = 10 + f * 30;
    const alpha = 0.04 + (1 - f) * 0.06;
    ctx.fillStyle = 'rgba(255,220,150,' + alpha + ')';
    ctx.beginPath();
    ctx.arc(fx, fy, fr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawCoastalCliffs() {
  const horizonY = H * HORIZON_Y_FRAC;
  ctx.fillStyle = '#2a4422';
  ctx.beginPath();
  ctx.moveTo(0, horizonY);
  ctx.quadraticCurveTo(W * 0.08, horizonY - H * 0.06, W * 0.15, horizonY);
  ctx.lineTo(0, horizonY);
  ctx.fill();
  ctx.fillStyle = '#334d28';
  ctx.beginPath();
  ctx.moveTo(W * 0.10, horizonY);
  ctx.quadraticCurveTo(W * 0.18, horizonY - H * 0.04, W * 0.25, horizonY);
  ctx.lineTo(W * 0.10, horizonY);
  ctx.fill();
}

function drawOcean() {
  const horizonY = H * HORIZON_Y_FRAC;
  const oceanH = H * 0.12;
  const t = Date.now();
  // Ocean band
  const oceanGrad = ctx.createLinearGradient(0, horizonY, 0, horizonY + oceanH);
  oceanGrad.addColorStop(0.0, '#dd8844');
  oceanGrad.addColorStop(0.2, '#3388aa');
  oceanGrad.addColorStop(0.5, '#2277aa');
  oceanGrad.addColorStop(1.0, '#1a5577');
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, horizonY, W, oceanH);
  // Sun reflection column
  const sunX = W * 0.7;
  const reflGrad = ctx.createLinearGradient(sunX, horizonY, sunX, horizonY + oceanH);
  reflGrad.addColorStop(0.0, 'rgba(255,200,100,0.5)');
  reflGrad.addColorStop(1.0, 'rgba(255,150,50,0)');
  ctx.fillStyle = reflGrad;
  ctx.fillRect(sunX - 60, horizonY, 120, oceanH);
  // Wave shimmer
  const now = t * 0.001;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 12; i++) {
    const wy = horizonY + 8 + i * (oceanH / 12);
    ctx.beginPath();
    for (let x = 0; x < W; x += 8) {
      const y = wy + Math.sin(x * 0.02 + now * 2 + i) * 2;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

function drawHorizonGlow() {
  const horizonY = H * HORIZON_Y_FRAC;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,100,200,0.6)';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff66cc';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.moveTo(0, horizonY);
  ctx.lineTo(W, horizonY);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawHorizon(world) {
  const skyH = H * HORIZON_Y_FRAC;
  const h = world.horizon;

  if (h.type === 'city') {
    // Skyline silhouette
    ctx.fillStyle = h.color;
    const seed = 42;
    for (let i = 0; i < 25; i++) {
      const bx = (i * W / 25) + ((seed * (i + 1) * 7) % 20) - 10;
      const bw = 15 + ((seed * (i + 1) * 13) % 25);
      const bh = 20 + ((seed * (i + 1) * 17) % 60);
      ctx.fillRect(bx, skyH - bh, bw, bh);
      // Windows
      if (i % 3 === 0) {
        ctx.fillStyle = h.windows;
        for (let wy = skyH - bh + 5; wy < skyH - 4; wy += 8) {
          for (let wx = bx + 3; wx < bx + bw - 3; wx += 6) {
            if (((seed * (i + 1) * (wy + wx)) % 7) > 3) {
              ctx.fillRect(wx, wy, 2, 2);
            }
          }
        }
        ctx.fillStyle = h.color;
      }
    }
  } else if (h.type === 'mesa') {
    // Mesa silhouettes
    const mesas = [
      { x: 0.1, w: 0.25, h: 50 },
      { x: 0.4, w: 0.2, h: 70 },
      { x: 0.7, w: 0.3, h: 40 },
      { x: 0.55, w: 0.15, h: 55 },
    ];
    for (const m of mesas) {
      const mx = W * m.x;
      const mw = W * m.w;
      const mh = m.h * (W / 800);
      ctx.fillStyle = h.color;
      ctx.beginPath();
      ctx.moveTo(mx, skyH);
      ctx.lineTo(mx + mw * 0.15, skyH - mh);
      ctx.lineTo(mx + mw * 0.85, skyH - mh);
      ctx.lineTo(mx + mw, skyH);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = h.highlight;
      ctx.fillRect(mx + mw * 0.15, skyH - mh, mw * 0.7, 3);
    }
  }
}

// ── Shared projection state for roadside/NPC/coin rendering ──
let _renderPlayerY = 0;

function drawRoadScene() {
  const world = getWorld();
  const skyH = H * HORIZON_Y_FRAC;

  // Ground fill below horizon
  ctx.fillStyle = (COLORS[world.id] || COLORS['sunset-coast']).DARK.grass;
  ctx.fillRect(0, skyH, W, H - skyH);

  const baseSegment = findSegment(player.z);
  const basePercent = (player.z % RENDER.segmentLength) / RENDER.segmentLength;
  const playerSegment = findSegment(player.z + RENDER.cameraHeight);
  const playerY = interpolate(playerSegment.p1.world.y || 0, playerSegment.p2.world.y || 0, basePercent);
  _renderPlayerY = playerY;

  let maxY = H;
  let x = 0;
  let dx = 0;

  for (let n = 0; n < RENDER.drawDistance; n++) {
    const seg = segments[(baseSegment.index + n) % segments.length];
    seg.looped = seg.index < baseSegment.index;
    seg.fog = exponentialFog(n / RENDER.drawDistance, RENDER.fogDensity);

    const loopOffset = seg.looped ? segments.length * RENDER.segmentLength : 0;

    project(seg.p1,
      (player.x * RENDER.roadWidth) - x,
      playerY + RENDER.cameraHeight,
      player.z - loopOffset,
      RENDER.cameraDepth, W, H, RENDER.roadWidth
    );
    project(seg.p2,
      (player.x * RENDER.roadWidth) - x - dx,
      playerY + RENDER.cameraHeight,
      player.z - loopOffset,
      RENDER.cameraDepth, W, H, RENDER.roadWidth
    );

    x = x + dx;
    dx = dx + (seg.curve || 0);

    // Cull
    if (seg.p1.camera.z <= RENDER.cameraDepth) continue;
    if (seg.p2.screen.y >= seg.p1.screen.y) continue;
    if (seg.p2.screen.y >= maxY) continue;

    renderSegment(ctx, W, RENDER.lanes,
      seg.p1.screen.x, seg.p1.screen.y, seg.p1.screen.w,
      seg.p2.screen.x, seg.p2.screen.y, seg.p2.screen.w,
      seg.fog, seg.colors
    );

    maxY = seg.p2.screen.y;
  }

  // Grid floor for Neon City
  if (world.roadside && world.roadside.gridFloor) {
    ctx.strokeStyle = world.roadside.gridColor + '22';
    ctx.lineWidth = 1;
    for (let y = skyH; y < H; y += 20) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
  }
}

// ── Roadside sprites ──
function drawRoadsideSprites() {
  const world = getWorld();
  if (!world.roadside || world.roadside.gridFloor) return;

  const spriteType = world.roadside.left ? world.roadside.left.sprite : 'palm';
  const density = world.roadside.left ? world.roadside.left.density : 0.25;
  const baseSegment = findSegment(player.z);

  // Draw far to near so nearer sprites overlap farther ones
  for (let n = RENDER.drawDistance - 1; n > 5; n--) {
    const segIdx = (baseSegment.index + n) % segments.length;
    const seg = segments[segIdx];

    // Deterministic density — use segment index as pseudo-random seed
    if (((segIdx * 7 + 3) % 100) / 100 > density) continue;

    // Skip if segment not projected yet or behind camera
    if (seg.p1.screen.scale <= 0 || seg.p1.screen.y <= 0 || seg.p1.screen.y >= H) continue;

    // Roadside offset: sprites sit at 1.1-1.35x road width past center
    const offsets = [0.10, 0.25]; // near road edge, farther out
    const roadW = seg.p1.screen.w;
    const screenX = seg.p1.screen.x;
    const screenY = seg.p1.screen.y;
    const sprSize = roadW * 0.4; // scale with road width (perspective)

    if (sprSize < 2) continue;

    // Left side sprite
    const leftOffset = offsets[segIdx % 2];
    const leftX = screenX - roadW - roadW * leftOffset;
    if (spriteType === 'palm') drawPalm(leftX, screenY, sprSize);
    else drawCactus(leftX, screenY, sprSize);

    // Right side sprite (slightly different offset for variety)
    if (((segIdx * 13 + 5) % 100) / 100 < density) {
      const rightOffset = offsets[(segIdx + 1) % 2];
      const rightX = screenX + roadW + roadW * rightOffset;
      if (spriteType === 'palm') drawPalm(rightX, screenY, sprSize);
      else drawCactus(rightX, screenY, sprSize);
    }
  }
}

function drawPalm(screenX, baseY, scale) {
  if (scale < 2) return;
  const s = scale / 40; // normalize — scale comes as roadW * 0.4
  if (s < 0.05) return;
  const alpha = Math.min(1, s * 2.5);
  const t = Date.now();
  ctx.save();
  ctx.globalAlpha = alpha;
  const trunkH = 100 * s;
  const trunkW = 6 * s;
  const now = t * 0.001;
  // Curved, swaying trunk
  ctx.strokeStyle = '#5a3a1a';
  ctx.lineWidth = trunkW;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(screenX, baseY);
  const sway = Math.sin(now * 0.5 + screenX * 0.01) * 5 * s;
  ctx.quadraticCurveTo(screenX + sway, baseY - trunkH * 0.6, screenX + sway * 1.5, baseY - trunkH);
  ctx.stroke();
  // Fronds
  const topX = screenX + sway * 1.5;
  const topY = baseY - trunkH;
  const frondLen = 50 * s;
  ctx.strokeStyle = '#2d6b1e';
  ctx.lineWidth = 3 * s;
  for (let a = -2.8; a <= 0.8; a += 0.45) {
    ctx.beginPath();
    ctx.moveTo(topX, topY);
    ctx.quadraticCurveTo(
      topX + Math.cos(a) * frondLen * 0.6,
      topY + Math.sin(a) * frondLen * 0.2 - 15 * s,
      topX + Math.cos(a) * frondLen,
      topY + Math.sin(a) * frondLen * 0.5 - 8 * s
    );
    ctx.stroke();
  }
  for (let a = Math.PI - 0.8; a <= Math.PI + 2.8; a += 0.45) {
    ctx.beginPath();
    ctx.moveTo(topX, topY);
    ctx.quadraticCurveTo(
      topX + Math.cos(a) * frondLen * 0.6,
      topY + Math.sin(a) * frondLen * 0.2 - 15 * s,
      topX + Math.cos(a) * frondLen,
      topY + Math.sin(a) * frondLen * 0.5 - 8 * s
    );
    ctx.stroke();
  }
  // Coconuts
  ctx.fillStyle = '#3d2a10';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(topX - 4 * s + i * 4 * s, topY + 4 * s, 3 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawCactus(x, y, size) {
  if (size < 3) return;
  const s = Math.min(size, 80);
  ctx.fillStyle = '#3A7A3A';
  ctx.fillRect(x - s * 0.05, y - s * 0.6, s * 0.1, s * 0.6);
  // Arms
  ctx.fillRect(x - s * 0.2, y - s * 0.45, s * 0.15, s * 0.06);
  ctx.fillRect(x - s * 0.2, y - s * 0.45, s * 0.06, s * 0.2);
  ctx.fillRect(x + s * 0.1, y - s * 0.35, s * 0.12, s * 0.06);
  ctx.fillRect(x + s * 0.16, y - s * 0.35, s * 0.06, s * 0.15);
}

// ── Draw NPC vehicles in the road ──
function drawNPCs() {
  const maxZ = player.z + RENDER.drawDistance * RENDER.segmentLength;
  const visible = npcs.filter(n => n.z > player.z && n.z < maxZ);
  visible.sort((a, b) => b.z - a.z);

  const tempP = { world: { x: 0, y: 0, z: 0 }, camera: {}, screen: {} };
  for (const npc of visible) {
    tempP.world.x = npc.x * RENDER.roadWidth;
    tempP.world.y = 0;
    tempP.world.z = npc.z;
    project(tempP,
      player.x * RENDER.roadWidth,
      _renderPlayerY + RENDER.cameraHeight,
      player.z,
      RENDER.cameraDepth, W, H, RENDER.roadWidth
    );
    if (tempP.screen.scale <= 0) continue;
    const sx = tempP.screen.x;
    const sy = tempP.screen.y;
    const drawSc = tempP.screen.w / RENDER.roadWidth * 3.5;

    if (sy > 0 && sy < H && drawSc > 0.3) {
      npc.drawFn(ctx, sx, sy, Math.min(drawSc, 2.5), npc.color);
    }
  }
}

// ── Draw coins in the road ──
function drawCoins() {
  const tempP = { world: { x: 0, y: 0, z: 0 }, camera: {}, screen: {} };
  for (const c of coins) {
    if (c.collected) continue;
    const dz = c.z - player.z;
    if (dz <= 0 || dz > RENDER.drawDistance * RENDER.segmentLength) continue;

    tempP.world.x = c.x * RENDER.roadWidth;
    tempP.world.y = 80; // Hover slightly above road
    tempP.world.z = c.z;
    project(tempP,
      player.x * RENDER.roadWidth,
      _renderPlayerY + RENDER.cameraHeight,
      player.z,
      RENDER.cameraDepth, W, H, RENDER.roadWidth
    );
    if (tempP.screen.scale <= 0) continue;
    const sx = tempP.screen.x;
    const sy = tempP.screen.y;
    const drawSc = tempP.screen.w / RENDER.roadWidth * 3;

    if (sy > 0 && sy < H && drawSc > 0.2) {
      const spin = Math.sin(Date.now() * 0.005 + c.z * 0.01);
      const r = Math.max(2, drawSc * 14);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.ellipse(sx, sy, r * Math.max(0.2, Math.abs(spin)), r, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#B8860B';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

// ── Draw player vehicle ──
function drawPlayer() {
  const veh = getVehicle();
  const px = W / 2;
  const py = H * 0.82;
  const sc = 1.2 * (W / 800);

  const lean = player.steering * 5;

  ctx.save();
  if (player.spinout > 0) {
    ctx.translate(px, py);
    ctx.rotate(player.spinAngle);
    ctx.translate(-px, -py);
    if (Math.floor(player.spinout * 10) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }
  } else if (player.invincible > 0) {
    if (Math.floor(player.invincible * 8) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }
  }
  drawVehicle(ctx, px, py, veh, sc, lean);
  ctx.restore();
}

// ── Draw particles ──
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.font = (p.size || 4) + 'px sans-serif';
    ctx.fillText('★', p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ── Main render ──
function render() {
  ctx.clearRect(0, 0, W, H);
  const world = getWorld();

  drawSky(world);
  drawSun(world);

  if (world.id === 'sunset-coast') {
    drawLensFlare();
    drawCoastalCliffs();
    drawOcean();
  } else if (world.id === 'neon-city') {
    drawHorizon(world);  // city silhouette
    drawHorizonGlow();
  } else {
    drawHorizon(world);  // mesa silhouettes
  }

  drawRoadScene();
  drawRoadsideSprites();
  drawNPCs();
  drawCoins();
  drawPlayer();
  drawParticles();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (paused || gameState !== 'playing') return;
  if (!lastTime) { lastTime = timestamp; }
  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  if (dt > 0.1) dt = 0.016; // cap large jumps

  update(dt);
  render();
  animId = requestAnimationFrame(gameLoop);
}

function startLoop() {
  lastTime = 0;
  animId = requestAnimationFrame(gameLoop);
}

function stopLoop() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  initAudio();
  playUIClick();
  resetPlayer();
  buildSegments(save.selectedWorld);
  gameState = 'playing';
  paused = false;
  hideAllScreens();
  document.getElementById('hud').style.display = 'block';
  document.getElementById('settingsBtn').style.display = 'block';
  startEngine();
  startLoop();
}

function endGame() {
  gameState = 'gameover';
  stopLoop();
  stopEngine();
  document.getElementById('hud').style.display = 'none';
  document.getElementById('settingsBtn').style.display = 'none';

  // Update save
  const dist = Math.floor(player.distance);
  const isNewHigh = dist > save.highDistance;
  if (isNewHigh) save.highDistance = dist;
  save.totalCoins += player.coins;
  save.totalDistanceEver += dist;
  writeSave();

  // Check unlocks
  checkUnlocks();

  // Show game over screen
  const goStats = document.getElementById('goStats');
  goStats.innerHTML = `Distance: ${dist >= 1000 ? (dist/1000).toFixed(1) + ' km' : dist + ' m'}<br>Coins: ${player.coins}`;
  document.getElementById('goNewHigh').style.display = isNewHigh ? 'block' : 'none';

  const world = getWorld();
  document.getElementById('btnPlayAgain').style.background = world.accent;

  document.getElementById('gameOverScreen').classList.add('active');
}

function showTitle() {
  gameState = 'title';
  stopLoop();
  stopEngine();
  hideAllScreens();
  document.getElementById('hud').style.display = 'none';
  document.getElementById('settingsBtn').style.display = 'none';

  const world = getWorld();
  document.getElementById('titleAccent').style.color = world.accent;
  document.getElementById('btnPlay').style.background = world.accent;
  const dist = save.highDistance;
  document.getElementById('titleStats').innerHTML =
    `BEST: ${dist >= 1000 ? (dist/1000).toFixed(1) + ' km' : dist + ' m'} &nbsp;|&nbsp; COINS: ${save.totalCoins}`;

  document.getElementById('titleScreen').classList.add('active');

  // Render a still frame of the world background
  buildSegments(world.id);
  render();
}

function hideAllScreens() {
  document.querySelectorAll('.screen-overlay').forEach(s => s.classList.remove('active'));
}

// ============================================================
// PAUSE MENU (C&R pattern)
// ============================================================
let pickerFromPause = false;
let pickerSource = null; // 'vehicle' or 'world'

function togglePauseMenu() {
  if (gameState === 'playing') {
    paused = true;
    gameState = 'paused';
    stopEngine();
    document.getElementById('pauseMenu').classList.add('open');
    document.getElementById('settingsBtn').style.display = 'none';
  } else if (gameState === 'paused') {
    paused = false;
    gameState = 'playing';
    document.getElementById('pauseMenu').classList.remove('open');
    document.getElementById('settingsBtn').style.display = 'block';
    if (soundOn) startEngine();
    lastTime = 0;
    startLoop();
  }
}

function showComingSoonToast() {
  const toast = document.getElementById('toast');
  toast.textContent = '🏆 Trophies coming soon!';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function pauseChangeWorld() {
  pickerFromPause = true;
  pickerSource = 'world';
  document.getElementById('pauseMenu').classList.remove('open');
  openWorldPicker();
}

function pauseChangeVehicle() {
  pickerFromPause = true;
  pickerSource = 'vehicle';
  document.getElementById('pauseMenu').classList.remove('open');
  openVehiclePicker();
}

function closePicker(id) {
  playUIClick();
  document.getElementById(id).classList.remove('active');
  if (pickerFromPause) {
    if (pickerSource === 'world') {
      // World change resets run
      pickerFromPause = false;
      pickerSource = null;
      startGame();
    } else {
      // Vehicle change preserves run
      pickerFromPause = false;
      pickerSource = null;
      paused = false;
      gameState = 'playing';
      document.getElementById('settingsBtn').style.display = 'block';
      if (soundOn) startEngine();
      lastTime = 0;
      startLoop();
    }
  } else {
    showTitle();
  }
}

// ============================================================
// PICKERS
// ============================================================
function openVehiclePicker() {
  playUIClick();
  hideAllScreens();
  const grid = document.getElementById('vehicleGrid');
  grid.innerHTML = '';
  for (const v of VEHICLES) {
    const unlocked = save.unlockedVehicles.includes(v.id);
    const selected = save.selectedVehicle === v.id;
    const card = document.createElement('div');
    card.className = 'picker-card' + (selected ? ' selected' : '') + (!unlocked ? ' locked' : '');

    // Mini canvas for vehicle preview
    const cvs = document.createElement('canvas');
    cvs.width = 200; cvs.height = 120;
    cvs.style.width = '100px'; cvs.style.height = '60px';
    const vctx = cvs.getContext('2d');
    vctx.scale(1, 1);
    if (!unlocked) { vctx.filter = 'grayscale(100%)'; }
    drawVehicle(vctx, 100, 100, v, 1.5, 0);
    vctx.filter = 'none';

    let hint = '';
    if (!unlocked) {
      if (v.unlock.type === 'distance') hint = `🔒 Drive ${(v.unlock.threshold/1000).toFixed(0)}km total`;
      else if (v.unlock.type === 'coins') hint = `🔒 Collect ${v.unlock.threshold} coins`;
    }

    card.appendChild(cvs);
    card.insertAdjacentHTML('beforeend', `
      <div class="picker-name">${v.name}</div>
      <div class="stat-bar-wrap"><span class="stat-label">Speed</span><div class="stat-bar"><div class="stat-fill" style="width:${v.stats.speed*100}%;background:#FF6B1A;"></div></div></div>
      <div class="stat-bar-wrap"><span class="stat-label">Handling</span><div class="stat-bar"><div class="stat-fill" style="width:${v.stats.handling*100}%;background:#4CAF50;"></div></div></div>
      ${hint ? `<div class="picker-hint">${hint}</div>` : ''}
    `);

    if (unlocked) {
      card.onclick = () => {
        save.selectedVehicle = v.id;
        writeSave();
        closePicker('vehiclePicker');
      };
    }
    grid.appendChild(card);
  }
  document.getElementById('vehiclePicker').classList.add('active');
}

function openWorldPicker() {
  playUIClick();
  hideAllScreens();
  const grid = document.getElementById('worldGrid');
  grid.innerHTML = '';
  for (const w of WORLDS) {
    const unlocked = save.unlockedWorlds.includes(w.id);
    const selected = save.selectedWorld === w.id;
    const card = document.createElement('div');
    card.className = 'picker-card' + (selected ? ' selected' : '') + (!unlocked ? ' locked' : '');

    // Mini sky preview
    const cvs = document.createElement('canvas');
    cvs.width = 200; cvs.height = 80;
    cvs.style.width = '100px'; cvs.style.height = '40px';
    const wctx = cvs.getContext('2d');
    const grad = wctx.createLinearGradient(0, 0, 0, 80);
    const skyStops = {
      'sunset-coast': [['#1a3a6a',0],['#5588cc',0.45],['#ff9944',0.75],['#ffddaa',1]],
      'neon-city': [['#0a0028',0],['#3d0066',0.5],['#cc3388',0.85],['#ff6633',1]],
      'desert-run': [['#4a1a10',0],['#d85a28',0.5],['#ff8844',0.85],['#ffb870',1]],
    }[w.id] || [['#333',0],['#666',1]];
    for (const [c, p] of skyStops) grad.addColorStop(p, c);
    wctx.fillStyle = grad;
    wctx.fillRect(0, 0, 200, 80);
    // Mini sun
    const sunColors = { 'sunset-coast': '#ffaa33', 'neon-city': '#ff2288', 'desert-run': '#ffa050' };
    const sunPos = { 'sunset-coast': [0.7, 0.6], 'neon-city': [0.5, 0.5], 'desert-run': [0.3, 0.65] };
    wctx.fillStyle = sunColors[w.id] || '#fff';
    wctx.beginPath();
    wctx.arc(200 * (sunPos[w.id] || [0.5, 0.5])[0], 80 * (sunPos[w.id] || [0.5, 0.5])[1], 12, 0, Math.PI * 2);
    wctx.fill();
    if (!unlocked) { wctx.fillStyle = 'rgba(0,0,0,0.6)'; wctx.fillRect(0, 0, 200, 80); }

    let hint = '';
    if (!unlocked) {
      if (w.unlock.type === 'distance') hint = `🔒 Drive ${(w.unlock.threshold/1000).toFixed(0)}km total`;
      else if (w.unlock.type === 'coins') hint = `🔒 Collect ${w.unlock.threshold} coins`;
    }

    card.appendChild(cvs);
    card.insertAdjacentHTML('beforeend', `
      <div class="picker-name">${w.name}</div>
      ${hint ? `<div class="picker-hint">${hint}</div>` : ''}
    `);

    if (unlocked) {
      card.onclick = () => {
        save.selectedWorld = w.id;
        writeSave();
        closePicker('worldPicker');
      };
    }
    grid.appendChild(card);
  }
  document.getElementById('worldPicker').classList.add('active');
}

// ============================================================
// UNLOCK SYSTEM
// ============================================================
function checkUnlocks() {
  let newUnlocks = [];

  for (const v of VEHICLES) {
    if (save.unlockedVehicles.includes(v.id)) continue;
    let unlocked = false;
    if (v.unlock.type === 'distance' && save.totalDistanceEver >= v.unlock.threshold) unlocked = true;
    if (v.unlock.type === 'coins' && save.totalCoins >= v.unlock.threshold) unlocked = true;
    if (unlocked) {
      save.unlockedVehicles.push(v.id);
      newUnlocks.push(v.name);
    }
  }

  for (const w of WORLDS) {
    if (save.unlockedWorlds.includes(w.id)) continue;
    let unlocked = false;
    if (w.unlock.type === 'distance' && save.totalDistanceEver >= w.unlock.threshold) unlocked = true;
    if (w.unlock.type === 'coins' && save.totalCoins >= w.unlock.threshold) unlocked = true;
    if (unlocked) {
      save.unlockedWorlds.push(w.id);
      newUnlocks.push(w.name);
    }
  }

  if (newUnlocks.length > 0) {
    writeSave();
    showUnlockToast(newUnlocks);
  }
}

function showUnlockToast(names) {
  const el = document.getElementById('unlockToast');
  document.getElementById('unlockName').textContent = names.join(', ');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ============================================================
// INPUT
// ============================================================
let steerLeft = false;
let steerRight = false;
let touchId = null;

// Touch
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  initAudio();
  if (gameState !== 'playing') return;
  const touch = e.touches[0];
  const tx = touch.clientX;
  touchId = touch.identifier;
  if (tx < W / 2) steerLeft = true;
  else steerRight = true;
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (gameState !== 'playing') return;
  for (let i = 0; i < e.touches.length; i++) {
    if (e.touches[i].identifier === touchId) {
      const tx = e.touches[i].clientX;
      steerLeft = tx < W / 2;
      steerRight = tx >= W / 2;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  steerLeft = false;
  steerRight = false;
  touchId = null;
}, { passive: false });

// Keyboard
document.addEventListener('keydown', function(e) {
  initAudio();
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') steerLeft = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') steerRight = true;
  if ((e.key === 'Escape' || e.key === 'p' || e.key === 'P') && (gameState === 'playing' || gameState === 'paused')) {
    e.preventDefault();
    togglePauseMenu();
  }
  if (e.key === ' ') {
    e.preventDefault();
    if (gameState === 'title') startGame();
    else if (gameState === 'gameover') startGame();
  }
});

document.addEventListener('keyup', function(e) {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') steerLeft = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') steerRight = false;
});

// ============================================================
// PAUSE MENU TOUCH HANDLERS (C&R pattern)
// ============================================================
// Mute button debounce
(function() {
  var btn = document.getElementById('pauseMuteBtn');
  if (!btn) return;
  var lastToggle = 0;
  function doToggle() {
    var now = Date.now();
    if (now - lastToggle < 300) return;
    lastToggle = now;
    toggleMuteBtn();
  }
  btn.addEventListener('click', doToggle);
  btn.addEventListener('touchend', function(e) { e.preventDefault(); doToggle(); }, { passive: false });
})();

// Touch handlers for all pause menu buttons
document.querySelectorAll('#pauseMenu button, #pauseMenu .pause-btn').forEach(function(btn) {
  btn.addEventListener('touchend', function(e) {
    e.preventDefault();
    if (btn.id === 'pauseMuteBtn') { /* handled by debounce above */ }
    else if (btn.classList.contains('pause-resume')) { togglePauseMenu(); }
    else if (btn.classList.contains('pause-trophy')) { showComingSoonToast(); }
    else if (btn.classList.contains('pause-level')) { pauseChangeWorld(); }
    else if (btn.classList.contains('pause-char')) { pauseChangeVehicle(); }
    else if (btn.classList.contains('pause-menu')) { window.location.href = '/'; }
    else { btn.click(); }
  }, { passive: false });
});

// Settings gear touch handler
document.getElementById('settingsBtn').addEventListener('touchend', function(e) {
  e.preventDefault(); togglePauseMenu();
}, { passive: false });

// Sync mute button text with saved state
if (!soundOn) {
  var mb = document.getElementById('pauseMuteBtn');
  if (mb) mb.textContent = '🔇 SOUND: OFF';
}

// ============================================================
// INIT
// ============================================================
showTitle();
</script>
